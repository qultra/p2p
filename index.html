<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🔏 초간편 비밀 DM 도구 (데이터 URL 북마크)</title>
  <style>
    body { font-family: system-ui; background: #0a0e14; color: #cdd6e0; padding: 20px; text-align: center; }
    .box { max-width: 500px; margin: 0 auto; }
    button { padding: 14px; background: #5190f0; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin: 6px 0; }
    textarea, input { width: 100%; padding: 12px; margin: 6px 0; background: #141b22; color: white; border: 1px solid #1e293b; border-radius: 10px; font-size: 16px; }
    .code { background: #0f172a; padding: 10px; border-radius: 10px; font-family: monospace; font-size: 0.6rem; word-break: break-all; max-height: 100px; overflow-y: auto; }
  </style>
</head>
<body>
  <div class="box">
    <h1>📌 데이터 URL 북마크 만들기</h1>
    <p>아래 버튼을 누르면 한 번에 복사됩니다.<br>이 주소를 <strong>새 북마크의 URL</strong>에 붙여넣으세요.</p>
    <button id="generateBtn">🔗 데이터 URL 복사</button>
    <textarea id="dataUrlDisplay" class="code" readonly style="height:80px;"></textarea>
    <p style="font-size:0.8rem;color:#8895a5;">북마크를 눌렀을 때 열리는 비밀 도구입니다.</p>
  </div>

<script>
document.getElementById('generateBtn').addEventListener('click', () => {
  // 미니 암호화 도구 HTML + JS (데이터 URL)
  const toolHTML = `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>🔐 비밀 DM</title><style>body{font-family:system-ui;background:#0a0e14;color:white;padding:16px;text-align:center;}input,textarea{width:100%;padding:12px;margin:4px 0;background:#141b22;color:white;border:1px solid #1e293b;border-radius:10px;}button{background:#5190f0;border:none;color:white;padding:12px;border-radius:10px;width:100%;margin:4px 0;}</style></head><body>
  <h3>🔏 비밀 DM 도구</h3>
  <input type="password" id="pw" placeholder="비밀번호">
  <textarea id="txt" rows="3" placeholder="평문 또는 암호문(🔒:...)"></textarea>
  <button id="enc">🔒 암호화 & 복사</button>
  <button id="dec">🔓 복호화</button>
  <div id="out" style="margin-top:8px;word-break:break-all;background:#0f172a;padding:10px;border-radius:10px;"></div>
  <script>
    const b64=b=>btoa(String.fromCharCode(...new Uint8Array(b))).replace(/\\+/g,'-').replace(/\\//g,'_').replace(/=/g,'');
    const db64=s=>{s=s.replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';return Uint8Array.from(atob(s),c=>c.charCodeAt(0)).buffer;};
    async function k(pw,s){let m=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:s,iterations:250000,hash:'SHA-256'},m,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);}
    async function e(pw,pt){let s=crypto.getRandomValues(new Uint8Array(16)),key=await k(pw,s),iv=crypto.getRandomValues(new Uint8Array(12)),ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,new TextEncoder().encode(pt)),c=new Uint8Array(16+12+ct.byteLength);c.set(s,0);c.set(iv,16);c.set(new Uint8Array(ct),28);return '🔒:'+b64(c.buffer);}
    async function d(pw,full){let b=new Uint8Array(db64(full.slice(2))),s=b.slice(0,16),iv=b.slice(16,28),ct=b.slice(28),key=await k(pw,s),pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);return new TextDecoder().decode(pt);}
    document.getElementById('enc').onclick=async()=>{let p=document.getElementById('pw').value,t=document.getElementById('txt').value;if(!p||!t)return;try{let c=await e(p,t);document.getElementById('out').textContent=c;await navigator.clipboard.writeText(c);alert('암호문 복사됨');}catch(ex){alert('오류: '+ex);}};
    document.getElementById('dec').onclick=async()=>{let p=document.getElementById('pw').value,t=document.getElementById('txt').value;if(!p||!t||!t.startsWith('🔒:'))return;try{let pt=await d(p,t);document.getElementById('out').textContent=pt;}catch(ex){alert('복호화 실패');}};
  <\/script></body></html>`;

  const dataUrl = 'data:text/html;charset=utf-8,' + encodeURIComponent(toolHTML);
  document.getElementById('dataUrlDisplay').value = dataUrl;
  navigator.clipboard.writeText(dataUrl).then(() => alert('✅ 데이터 URL이 복사되었습니다.\n이제 새 북마크의 URL에 붙여넣으세요.'));
});
</script>
</body>
</html>
