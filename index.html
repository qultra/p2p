<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0, minimum-scale=1.0">
  <title>P2P 비밀 메신저 – 절대 보안 완전판</title>
  <meta http-equiv="Content-Security-Policy" 
      content="default-src 'self'; 
               script-src 'self' 'unsafe-inline'; 
               connect-src *; 
               media-src 'self'; 
               img-src 'self' data: blob:; 
               style-src 'self' 'unsafe-inline'; 
               base-uri 'none'; 
               form-action 'none'; 
               referrer no-referrer;">
  <meta name="referrer" content="no-referrer">
  <style>
    :root {
      --bg: #06090f; --surface: #0f141e; --card: rgba(15,20,30,0.9);
      --text: #e0e5f0; --sub: #8892b0; --accent: #5b8df0; --danger: #f97070;
      --success: #45d68a; --border: #1a2332; --radius: 20px; --radius-sm: 14px;
      --safe-bottom: env(safe-area-inset-bottom, 10px);
    }
    * { margin:0; padding:0; box-sizing:border-box; user-select: none !important; -webkit-user-select: none !important; -moz-user-select: none !important; -webkit-touch-callout: none !important; -webkit-tap-highlight-color: transparent; }
    input, textarea { user-select: text !important; -webkit-user-select: text !important; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; justify-content: center; align-items: center;
      min-height: 100dvh; padding: 10px;
      overscroll-behavior: none; -webkit-overflow-scrolling: touch;
    }
    .container {
      width: 100%; max-width: 520px; height: 95dvh;
      background: var(--surface); border-radius: 30px;
      box-shadow: 0 30px 70px rgba(0,0,0,0.7);
      display: flex; flex-direction: column; overflow: hidden;
      border: 1px solid var(--border); position: relative;
    }
    .header { padding:14px 20px; background:rgba(8,14,24,0.95); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; min-height:56px; }
    .header h1 { font-size:1.1rem; font-weight:700; background:linear-gradient(135deg,#90b4ff,#b794f4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .status-bar { display:flex; align-items:center; gap:7px; }
    .dot { width:10px; height:10px; border-radius:50%; transition:0.2s; }
    .dot.on { background:var(--success); box-shadow:0 0 10px var(--success); }
    .dot.off { background:var(--danger); }
    .main-content { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; }
    .main-content::-webkit-scrollbar { width:4px; } .main-content::-webkit-scrollbar-thumb { background:#253040; border-radius:2px; }
    .card { background:var(--card); backdrop-filter:blur(14px); border-radius:var(--radius); padding:18px; margin-bottom:12px; border:1px solid var(--border); }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; background:rgba(255,255,255,0.05); color:white; border:1px solid var(--border); padding:14px 20px; border-radius:var(--radius-sm); cursor:pointer; font-weight:600; font-size:0.95rem; transition:0.2s; width:100%; backdrop-filter:blur(10px); }
    .btn:hover { background:rgba(255,255,255,0.12); }
    .btn:active { transform:scale(0.97); }
    .btn.primary { background:var(--accent); border:none; }
    .btn.danger { background:var(--danger); border:none; }
    .btn-small { padding:8px 14px; font-size:0.8rem; width:auto; border-radius:12px; }
    input, textarea { width:100%; background:#0a0f18; color:var(--text); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px 15px; font-size:16px; outline:none; }
    input:focus, textarea:focus { border-color:var(--accent); box-shadow: 0 0 0 2px rgba(91,141,240,0.3); }
    .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index:100; display:flex; align-items:center; justify-content:center; }
    .modal-content { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; width:90%; max-width:360px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
    .modal-content h3 { margin-bottom: 16px; font-size: 1.1rem; }
    #chatScreen { display:none; flex-direction:column; flex:1; }
    #messages { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px; padding:6px 0; }
    .msg { display:flex; flex-direction:column; animation:fadeUp 0.2s ease; }
    .msg.system { align-items:center; } .msg.me { align-items:flex-end; } .msg.other { align-items:flex-start; }
    .bubble { max-width:83%; padding:10px 16px; border-radius:20px; background:rgba(22,30,44,0.85); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.05); word-break:break-word; position:relative; overflow:hidden; z-index:1; transition:filter 0.25s ease, opacity 0.2s; }
    .blur-target { filter: blur(18px); cursor: pointer; position: relative; }
    .blur-target::after { content: '🔒 길게 눌러 확인'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,0.7); font-size:0.75rem; font-weight:600; letter-spacing:0.5px; background:rgba(0,0,0,0.5); border-radius:inherit; z-index:2; pointer-events:none; opacity:0; transition:opacity 0.2s; }
    .blur-target:hover::after { opacity:1; }
    .blur-target.revealed { filter: blur(0); }
    .blur-target.revealed::after { opacity:0; }
    .blur-target.locked { filter: blur(28px); cursor: not-allowed; pointer-events: auto; }
    .blur-target.locked::after { content: '⛔ 잠김'; opacity:1; }
    .msg.system .bubble { background:rgba(255,255,255,0.04); border:none; font-size:0.78rem; color:var(--sub); filter: none !important; }
    .msg.system .bubble::after { display: none !important; }
    .msg.me .bubble { background:linear-gradient(140deg,rgba(74,130,250,0.5),rgba(124,92,240,0.5)); border-bottom-right-radius:6px; }
    .msg.other .bubble { border-bottom-left-radius:6px; }
    .msg .time { font-size:0.65rem; color:var(--sub); margin-top:4px; display:flex; justify-content:flex-end; gap:6px; position:relative; z-index:5; }
    .encrypted-bubble { background:#0a0f18; border:1px solid var(--border); font-family:monospace; font-size:0.7rem; color:#94a3b8; white-space:pre-wrap; word-break:break-all; padding:10px; border-radius:12px; max-width:90%; filter: none !important; }
    .encrypted-bubble::after { display: none !important; }
    .input-bar { display:flex; gap:6px; padding:10px 0 0; align-items:flex-end; padding-bottom:var(--safe-bottom); }
    #msgInput { flex:1; min-height:44px; max-height:110px; resize:none; }
    .icon-btn { background:none; border:none; font-size:1.3rem; cursor:pointer; padding:10px; color:var(--accent); }
    .send-btn { background:var(--accent); color:white; width:44px; height:44px; display:flex; align-items:center; justify-content:center; border-radius:50%; cursor:pointer; flex-shrink:0; }
    .action-bar { display:flex; gap:4px; padding:4px 0 0; position:relative; flex-wrap:wrap; }
    .action-btn { background:rgba(255,255,255,0.05); border:1px solid var(--border); color:var(--text); padding:8px 14px; border-radius:14px; cursor:pointer; font-size:0.85rem; }
    .picker-overlay { display:none; position:absolute; bottom:100%; left:0; right:0; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:12px; max-height:220px; overflow-y:auto; z-index:20; margin-bottom:4px; }
    .picker-overlay.active { display:flex; flex-direction:column; gap:8px; }
    .picker-search { width:100%; background:#0a0f18; color:var(--text); border:1px solid var(--border); border-radius:12px; padding:10px 12px; font-size:16px; outline:none; margin-bottom:4px; }
    .picker-grid { display:flex; flex-wrap:wrap; gap:8px; }
    .picker-item { cursor:pointer; border-radius:8px; overflow:hidden; }
    .picker-item img { width:64px; height:64px; object-fit:cover; border-radius:8px; }
    .emoji-item { font-size:1.8rem; cursor:pointer; padding:6px 8px; border-radius:8px; }
    .hidden { display:none !important; }
    .text-center { text-align:center; } .text-sub { color:var(--sub); font-size:0.82rem; }
    .mt { margin-top:12px; } .mb { margin-bottom:12px; }
    .link-box { word-break:break-all; background:#0a0f18; padding:10px; border-radius:12px; font-size:0.72rem; margin:8px 0; max-height:75px; overflow-y:auto; color:#9aa4bf; }
    .fingerprint { font-family:monospace; font-size:0.6rem; background:#0a0f18; padding:6px; border-radius:8px; word-break:break-all; user-select:text !important; -webkit-user-select:text !important; }
    .chat-header { display:flex; align-items:center; gap:10px; padding:10px 16px; border-bottom:1px solid var(--border); }
    .chat-title { font-size:0.95rem; font-weight:600; flex:1; }
    .typing-indicator { font-size:0.75rem; color:var(--sub); padding:4px 16px; display:none; }
    .contact-list { display:flex; flex-direction:column; gap:8px; margin-top:12px; }
    .contact-card { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:16px; padding:14px 16px; cursor:pointer; display:flex; align-items:center; gap:12px; position:relative; }
    .contact-card.active { border-color:var(--accent); background:rgba(91,141,240,0.1); }
    .contact-avatar { width:44px; height:44px; border-radius:50%; background:rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0; position:relative; }
    .contact-dot { position:absolute; bottom:0; right:0; width:12px; height:12px; border-radius:50%; border:2px solid var(--surface); }
    .contact-dot.on { background:var(--success); } .contact-dot.off { background:var(--danger); }
    .contact-info { flex:1; min-width:0; }
    .contact-name { font-size:0.95rem; font-weight:600; }
    .contact-status { font-size:0.75rem; color:var(--sub); margin-top:2px; }
    .unread-badge { background:var(--danger); color:white; border-radius:12px; padding:2px 8px; font-size:0.7rem; font-weight:bold; margin-left:8px; }
    .svg-icon { width:20px; height:20px; fill:currentColor; flex-shrink:0; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spinner { width:20px; height:20px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block; }
  </style>
</head>
<body>
<div class="container">
  <div class="header"><h1>🔐 P2P 비밀채팅</h1><div class="status-bar"><span id="connDot" class="dot off"></span><span id="connLabel">오프라인</span></div></div>
  <div class="main-content" id="mainArea">
    <div id="simpleMode" class="view">
      <div class="card text-center">
        <h3 style="margin-bottom:4px;">서버 없이 완벽한 익명성</h3>
        <p class="text-sub mb">연결 끊겨도 자동 복구 · 오프라인 메시지 큐</p>
        <button class="btn primary" id="btnNewChat"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>새 채팅 생성</button>
        <button class="btn mt" id="btnJoinChat"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>초대 링크로 참가</button>
      </div>
      <div style="font-size:0.8rem; color:var(--sub); margin-bottom:8px; font-weight:600;">📋 대화 목록</div>
      <div class="contact-list" id="contactList"></div>
    </div>
    <div id="nameModal" class="modal hidden">
      <div class="modal-content"><h3>✨ 새 채팅</h3><input type="text" id="peerNameInput" placeholder="상대방 이름 입력"><div class="mt" style="display:flex;gap:8px;"><button class="btn primary" id="btnConfirmName" style="flex:1;">확인</button><button class="btn" id="btnCancelName" style="flex:1;">취소</button></div></div>
    </div>
    <div id="offerPanel" class="view hidden">
      <div class="card text-center">
        <div class="spinner mb" id="offerSpinner" style="display:none;"></div>
        <p><strong>연결 링크 생성 중...</strong></p>
        <p class="text-sub">생성된 링크를 상대에게 전송하세요.</p>
        <div class="link-box" id="offerLinkDisplay">생성 중...</div>
        <button class="btn mt" id="btnCopyOffer">링크 복사</button>
        <p class="text-sub mt">상대가 보낸 Answer 링크를 아래에 붙여넣으세요.</p>
        <input type="text" id="answerLinkInput" placeholder="Answer 링크 입력..."><button class="btn primary mt" id="btnApplyAnswer">연결 완료</button>
        <button class="btn mt" id="btnOfferHome">홈으로</button>
      </div>
    </div>
    <div id="answerPanel" class="view hidden">
      <div class="card"><strong>📥 초대 링크 붙여넣기</strong><textarea id="remoteOfferSDP" rows="3" placeholder="방장에게 받은 전체 링크..."></textarea><button class="btn primary mt" id="btnCreateAnswer">연결 시작</button></div>
      <button class="btn mt" id="btnAnswerHome">홈으로</button>
    </div>
    <div id="chatScreen" class="view hidden">
      <div class="chat-header">
        <button class="btn-small" id="btnChatBack"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></button>
        <span class="chat-title" id="chatTitle">채팅</span>
        <button class="btn-small" id="btnRename"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg></button>
        <button class="btn-small danger" id="btnDestroy"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
      </div>
      <div id="securityCard" class="card" style="margin:0 0 4px; padding:6px 12px; font-size:0.7rem; display:none; align-items:center; gap:6px;">
        <span>🔒</span><span id="sessionFingerprint" class="fingerprint"></span>
      </div>
      <div id="passwordPrompt" class="card text-center" style="margin:8px;">
        <strong>🔐 채팅방 암호 입력</strong>
        <input type="password" id="chatPasswordInput" placeholder="상대와 공유한 암호" style="margin-top:8px;">
        <button class="btn primary mt" id="btnSubmitPassword">암호 설정</button>
        <p class="text-sub mt">암호가 없으면 수신된 암호문만 표시됩니다.</p>
        <p id="passwordError" class="text-sub" style="color:var(--danger); display:none;"></p>
      </div>
      <div id="messages"></div>
      <div id="typingIndicator" class="typing-indicator">상대방이 입력 중...</div>
      <div class="action-bar" style="position:relative; padding:0 8px;">
        <button class="action-btn" id="btnEmojiPicker">😀</button>
        <button class="action-btn" id="btnMediaPicker">🔗</button>
        <button class="action-btn" id="btnStickerUpload">📁</button>
        <div class="picker-overlay" id="emojiPicker"><div class="picker-grid" id="emojiGrid"></div></div>
        <div class="picker-overlay" id="mediaPicker">
          <input type="text" class="picker-search" placeholder="URL 입력 후 Enter" id="mediaSearch">
          <div class="picker-grid" id="mediaGrid"></div>
        </div>
        <input type="file" id="stickerFileInput" class="hidden" accept="image/*">
      </div>
      <div class="input-bar" style="padding:8px;">
        <button class="icon-btn" id="btnFileAttach" title="파일">📎</button>
        <textarea id="msgInput" rows="1" placeholder="메시지 (종단간 암호화)"></textarea>
        <button class="send-btn" id="btnSend">➤</button>
      </div>
      <input type="file" id="fileInput" class="hidden" multiple>
    </div>
  </div>
</div>
<div id="answerModal" class="modal hidden">
  <div class="modal-content">
    <h3>📤 내 Answer 링크</h3>
    <p class="text-sub" style="margin-bottom:12px;">이 링크를 상대에게 전송하면 연결됩니다.</p>
    <div class="link-box" id="answerModalLink" style="margin-bottom:12px;"></div>
    <div style="display:flex; gap:8px;"><button class="btn primary" id="btnCopyAnswerModal" style="flex:1;">📋 복사</button><button class="btn" id="btnCloseAnswerModal" style="flex:1;">닫기</button></div>
  </div>
</div>

<script>
(function() {
  'use strict';
  // ─────────────────────────────────────────────────────────────
  //  P2P 비밀 메신저 – 절대 보안 완전판
  //  모든 평문은 메모리에서 즉시 소멸, DOM에 절대 남지 않음
  // ─────────────────────────────────────────────────────────────

  // ---------- 보안 환경 설정 ----------
  // performance.now 정밀도 낮추기 (타이밍 공격 방어)
  const originalNow = performance.now.bind(performance);
  performance.now = () => Math.floor(originalNow() / 10) * 10;
  // SharedArrayBuffer 접근 제거 (Spectre 완화)
  if (typeof SharedArrayBuffer !== 'undefined') {
    Object.defineProperty(window, 'SharedArrayBuffer', { get: () => undefined });
  }

  // DevTools 감지 및 방어
  let devToolsOpen = false;
  const devToolsCheck = () => {
    const threshold = 160;
    const widthThreshold = window.outerWidth - window.innerWidth > threshold;
    const heightThreshold = window.outerHeight - window.innerHeight > threshold;
    if (widthThreshold || heightThreshold) {
      if (!devToolsOpen) { devToolsOpen = true; onDevToolsOpened(); }
    } else {
      if (devToolsOpen) { devToolsOpen = false; onDevToolsClosed(); }
    }
  };
  const onDevToolsOpened = () => {
    document.querySelectorAll('.blur-target.revealed').forEach(el => {
      el.classList.remove('revealed');
      el.setAttribute('data-revealed', 'false');
      const timer = el._revealTimer; if (timer) { clearTimeout(timer); delete el._revealTimer; }
    });
    lockAllBlurs(30000);
    try { console.clear(); } catch(e) {}
  };
  const onDevToolsClosed = () => {
    document.querySelectorAll('.blur-target.locked').forEach(el => el.classList.remove('locked'));
  };
  setInterval(devToolsCheck, 500);

  // 콘솔 완전 무력화
  const noop = () => {};
  Object.defineProperty(window, 'console', {
    value: { log:noop, warn:noop, error:noop, info:noop, debug:noop, clear:noop, table:noop, trace:noop, dir:noop, dirxml:noop, group:noop, groupCollapsed:noop, groupEnd:noop, time:noop, timeEnd:noop, timeLog:noop, count:noop, countReset:noop, assert:noop, profile:noop, profileEnd:noop },
    writable: false, configurable: false
  });

  // 디버거 트랩
  let debuggerInterval = setInterval(() => { if (devToolsOpen) { try { debugger; } catch(e) {} } }, 300);

  // 우클릭 완전 방지
  document.addEventListener('contextmenu', e => e.preventDefault(), true);
  // 복사 방지
  document.addEventListener('copy', e => {
    const sel = window.getSelection();
    if (sel && sel.toString().length > 0 && document.getElementById('messages')?.contains(sel.anchorNode)) {
      e.preventDefault();
      e.clipboardData.setData('text/plain', '');
    }
  }, true);
  // 드래그 방지
  document.addEventListener('dragstart', e => { if (e.target.closest('#messages')) e.preventDefault(); }, true);
  // 키보드 단축키 완전 차단
  document.addEventListener('keydown', e => {
    const blocked = [
      { key:'F12' }, { key:'I', ctrlKey:true, shiftKey:true }, { key:'J', ctrlKey:true, shiftKey:true },
      { key:'U', ctrlKey:true }, { key:'S', ctrlKey:true }, { key:'C', ctrlKey:true, shiftKey:true },
      { code:'F12' }, { code:'KeyI', ctrlKey:true, shiftKey:true }, { code:'KeyJ', ctrlKey:true, shiftKey:true },
      { code:'KeyU', ctrlKey:true }, { code:'KeyS', ctrlKey:true }, { code:'KeyC', ctrlKey:true, shiftKey:true }
    ];
    if (blocked.some(b => (e.key===b.key||e.code===b.code) && !!b.ctrlKey===e.ctrlKey && !!b.shiftKey===e.shiftKey)) {
      e.preventDefault(); e.stopPropagation(); return false;
    }
  }, true);

  // DOM 변경 감시 (의심스러운 요소 삽입 방지)
  const observer = new MutationObserver(mutations => {
    for (const m of mutations) {
      for (const node of m.addedNodes) {
        if (node.nodeType === 1) {
          if (node.tagName === 'SCRIPT' || node.tagName === 'IFRAME' || node.tagName === 'LINK' || node.tagName === 'META') {
            node.remove();
          }
        }
      }
    }
  });
  observer.observe(document.documentElement, { childList: true, subtree: true });

  // ================= 유틸리티 =================
  const textEncoder = new TextEncoder();
  const textDecoder = new TextDecoder();
  const toBase64url = buf => btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  const fromBase64url = str => { str = str.replace(/-/g,'+').replace(/_/g,'/'); while(str.length%4) str+='='; return Uint8Array.from(atob(str),c=>c.charCodeAt(0)).buffer; };
  const encodeSDP = obj => toBase64url(textEncoder.encode(JSON.stringify(obj)));

  const sessionsMap = new Map();

  // ─── 상수 시간 비교 ────────────────────────
  function constantTimeCompare(a, b) {

  // ─── 로컬 스토리지 암호화 래퍼 ────────────
  let storageKey = null;

  async function encryptForStorage(plaintext) {
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ct = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, storageKey, textEncoder.encode(plaintext));
    const result = JSON.stringify({ iv: toBase64url(iv.buffer), ct: toBase64url(ct) });

  }
  async function decryptFromStorage(ciphertext) {
    try {
      const { iv, ct } = JSON.parse(ciphertext);

    } catch(e) { return null; }
  }
  async function saveEncryptedItem(key, value) {
    try { const enc = await encryptForStorage(value); localStorage.setItem(key, enc); } catch(e) {}
  }
  async function loadEncryptedItem(key) {
    try { const enc = localStorage.getItem(key); if (!enc) return null; return await decryptFromStorage(enc); } catch(e) { return null; }
  }

  // ─── 오프라인 큐 암호화 저장 ──────────────
  async function saveOfflineQueue(peerId, queue) {

  }
  function clearOfflineQueue(peerId) { localStorage.removeItem(OFFLINE_QUEUE_PREFIX+peerId); }

  function setPendingDestroy(peerId) { try { localStorage.setItem(PENDING_DESTROY_PREFIX+peerId, Date.now().toString()); } catch(e) {} }

  // ─── 암호화 상수 ──────────────────────────
  const ECDH_ALG = { name: 'ECDH', namedCurve: 'P-521' };

  // ─── 세션 객체 ────────────────────────────
  function getOrCreateSession(peerId) {

        pc: null, dc: null, typingDC: null, typingKey: null, isOfferer: false,
        password: null, rootKey: null, sendChainKey: null, recvChainKey: null,
        sendMsgNum: 0, recvMsgNum: 0, ourEphemeralKeyPair: null, theirEphemeralPub: null,
        salt: null, ourEcdhPair: null, peerEcdhPub: null, handshakeDone: false,
        confirmed: false, isOnline: false, receivedMessageIds: new Set(),

  }
  function isDestroyed(peerId) { return !!(localStorage.getItem(DESTROY_PREFIX+peerId) || sessionStorage.getItem(DESTROY_PREFIX+peerId)); }
  function markDestroyed(peerId) {

  }
  setInterval(() => { if (activePeerId && isDestroyed(activePeerId)) goHome(); }, 500);

  // ─── 연락처 암호화 저장 ────────────────────
  async function getContacts() {
    const data = await loadEncryptedItem('p2p_contacts_enc');
    return data ? JSON.parse(data) : [];
  }
  async function saveContacts(contacts) { await saveEncryptedItem('p2p_contacts_enc', JSON.stringify(contacts)); }
  async function addContact(peerId, name) {

    if (!contacts.find(c => c.id === peerId)) { contacts.push({ id:peerId, name }); await saveContacts(contacts); }
    renderContactList();
  }
  async function renameChat() {

  }
  async function renderContactList() {

    const contacts = (await getContacts()).filter(c => !isDestroyed(c.id));
    container.innerHTML = '';
    for (const c of contacts) {

      const online = sess && sess.isOnline;

  // ─── UI 전환 ──────────────────────────────
  function showView(viewId) {
    document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));

  }
  function selectPeer(peerId) {
    if (isDestroyed(peerId)) { alert('이 대화는 삭제되었습니다.'); return; }
    if (hasPendingDestroy(peerId)) { markDestroyed(peerId); alert('이 대화는 삭제 요청되었습니다.'); renderContactList(); return; }
    activePeerId = peerId; showView('chatScreen');
    document.getElementById('messages').innerHTML = '';
    const sess = getOrCreateSession(peerId);
    sess.pendingMessages.forEach(msg => appendMessage(msg.text, msg.who, msg.msgId));
    sess.pendingMessages = [];
    getContacts().then(contacts => {
      document.getElementById('chatTitle').textContent = contacts.find(c => c.id===peerId)?.name || '채팅';
    });

  function showNameModal() { document.getElementById('nameModal').classList.remove('hidden'); document.getElementById('peerNameInput').focus(); }
  function closeNameModal() { document.getElementById('nameModal').classList.add('hidden'); }
  async function confirmNewChat() {

  }
  function showJoinPanel() { showView('answerPanel'); }
  async function createAnswerFromOffer() {
    const t = document.getElementById('remoteOfferSDP').value.trim(); if (!t) return;
    let offerStr = t; let peerId;
    if (t.startsWith('http')) { const u = new URL(t); const hp = new URLSearchParams(u.hash.substring(1)); if (!hp.has('offer')) { alert('올바른 초대 링크가 아닙니다.'); return; } offerStr = hp.get('offer'); peerId = hp.get('peer') || genUUID(); }
    else { peerId = genUUID(); }
    const offer = decodeSDP(offerStr); await addContact(peerId, '상대방'); activePeerId = peerId;
    const sess = getOrCreateSession(peerId); sess.isOfferer = false; initPC(peerId);
    await sess.pc.setRemoteDescription(offer); const ans = await sess.pc.createAnswer(); await sess.pc.setLocalDescription(ans); await waitIce(sess.pc);
    const answerB64 = encodeSDP(sess.pc.localDescription);

  function closeAnswerModal() { document.getElementById('answerModal').classList.add('hidden'); }
  function copyAnswerModalLink() {

  }
  async function applyAnswerLink() {
    const l = document.getElementById('answerLinkInput').value.trim(); if (!l) return;
    if (!activePeerId || !sessionsMap.has(activePeerId) || !sessionsMap.get(activePeerId)?.pc || !sessionsMap.get(activePeerId)?.isOfferer) { alert('먼저 "새 채팅 생성"을 눌러 연결을 시작한 후 Answer 링크를 적용하세요.'); return; }
    try {
      let answerStr = l; if (l.startsWith('http')) { const u = new URL(l); const hp = new URLSearchParams(u.hash.substring(1)); if (!hp.has('answer')) { alert('올바르지 않은 Answer 링크입니다.'); return; } answerStr = hp.get('answer'); }
      await sessionsMap.get(activePeerId).pc.setRemoteDescription(decodeSDP(answerStr));
      showView('chatScreen'); const contacts = await getContacts();
      document.getElementById('chatTitle').textContent = contacts.find(c=>c.id===activePeerId)?.name || '채팅';
      document.getElementById('passwordPrompt').style.display = 'block';
    } catch(e) { alert('Answer 링크 적용 실패'); }
  }
  function waitIce(pc) { return new Promise(r => { if (pc.iceGatheringState==='complete') r(); else pc.addEventListener('icegatheringstatechange', ()=>{ if(pc.iceGatheringState==='complete') r(); }); }); }

  // ─── WebRTC 연결 ──────────────────────────
  function initPC(peerId) {
    const sess = sessionsMap.get(peerId); if (!sess) return;
    if (sess.pc) { sess.pc.close(); }
    sess.pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
    sess.pc.oniceconnectionstatechange = () => {
      const state = sess.pc.iceConnectionState;
      if (state === 'connected' || state === 'completed') {
        sess.isOnline = true; updateConn(true); renderContactList();
        sess.reconnectAttempts = 0;
        if (hasPendingDestroy(peerId)) trySendDestroy(peerId);
      } else if (state === 'disconnected' || state === 'failed' || state === 'closed') {
        const wasOnline = sess.isOnline; sess.isOnline = false; updateConn(false);
        if (wasOnline) { sendClearRevealed(peerId); clearRevealedMessages(peerId); }

          else { sess.handshakeDone = false; sess.rootKey = null; sess.sendChainKey = null; sess.recvChainKey = null; sess.confirmed = false; addMsg(peerId, '⚠️ 연결이 완전히 끊어졌습니다. 재연결 시 보안 세션이 초기화됩니다.', 'system'); }
        }
      }
    };
    sess.pc.ondatachannel = e => {
      if (e.channel.label === 'chat') { sess.dc = e.channel; setupDC(peerId); }
      else if (e.channel.label === 'typing') { sess.typingDC = e.channel; setupTypingDC(peerId); }
    };
  }
  function setupDC(peerId) {
    const sess = sessionsMap.get(peerId); if (!sess?.dc) return;
    sess.dc.onopen = () => {
      if (isDestroyed(peerId)) return;
      sess.isOnline = true; updateConn(true); renderContactList();
      if (hasPendingDestroy(peerId)) { trySendDestroy(peerId); return; }
      if (sess.handshakeDone) { addMsg(peerId, '🔄 연결이 복구되었습니다. 보안 세션을 재수립합니다.', 'system'); sess.handshakeDone = false; sess.rootKey = null; sess.sendChainKey = null; sess.recvChainKey = null; sess.typingKey = null; sess.confirmed = false; startEcdhExchange(peerId); }
      else if (!sess.handshakeDone && !sess.rootKey) { if (!sess.ourEcdhPair) startEcdhExchange(peerId); }
    };

  }
  function setupTypingDC(peerId) {
    const sess = sessionsMap.get(peerId); if (!sess?.typingDC) return;
    sess.typingDC.onmessage = e => {
      if (typeof e.data === 'string') {
        try { const enc = JSON.parse(e.data); if (enc.type === '__destroy_req__') { markDestroyed(enc.peerId||peerId); goHome(); return; } decryptTyping(sess, enc).then(state => { if (peerId===activePeerId) document.getElementById('typingIndicator').style.display = state==='1'?'block':'none'; }).catch(()=>{}); } catch(ex) {}
      }
    };
  }

  function sendRawDestroy(peerId) {
    const sess = sessionsMap.get(peerId); if (!sess) return false;
    let sent = false;
    const destroyMsg = JSON.stringify({ type:'__destroy_req__', peerId, ts:Date.now() });
    [sess.dc, sess.typingDC].filter(c=>c&&c.readyState==='open').forEach(ch => { try { ch.send(destroyMsg); sent = true; } catch(e) {} });
    return sent;
  }
  async function trySendDestroy(peerId) {
    const sess = sessionsMap.get(peerId); if (!sess) { markDestroyed(peerId); goHome(); return; }
    const rawSent = sendRawDestroy(peerId);
    if (rawSent) { clearPendingDestroy(peerId); markDestroyed(peerId); if (activePeerId===peerId) goHome(); if (sess.pc) { sess.pc.close(); sessionsMap.delete(peerId); } renderContactList(); return; }
    if (sess.rootKey && sess.confirmed && sess.dc && sess.dc.readyState==='open') {
      try {
        const destroyPayload = { type:'__destroy__', timestamp:Date.now(), id:genUUID() };
        const enc = await encryptPayload(sess, destroyPayload);
        sess.dc.send(JSON.stringify({ type:'msg', ...enc }));
        clearPendingDestroy(peerId); markDestroyed(peerId); if (activePeerId===peerId) goHome(); if (sess.pc) { sess.pc.close(); sessionsMap.delete(peerId); } renderContactList(); return;
      } catch(e) {}
    }
    if (sess.destroyRetry < 30) { sess.destroyRetry++; setTimeout(() => trySendDestroy(peerId), 300); }
    else { clearPendingDestroy(peerId); markDestroyed(peerId); if (activePeerId===peerId) goHome(); if (sess.pc) { sess.pc.close(); sessionsMap.delete(peerId); } renderContactList(); }
  }

  function sendClearRevealed(peerId) {
    const sess = sessionsMap.get(peerId); if (!sess) return;
    const msg = JSON.stringify({ type:'__clear_revealed__' });
    [sess.dc, sess.typingDC].forEach(ch => { if (ch && ch.readyState==='open') { try { ch.send(msg); } catch(e) {} } });
  }
  function clearRevealedMessages(peerId) {
    if (peerId !== activePeerId) return;
    const messagesDiv = document.getElementById('messages'); if (!messagesDiv) return;
    messagesDiv.querySelectorAll('.blur-target.revealed').forEach(el => {
      el.classList.remove('revealed'); el.setAttribute('data-revealed','false');
      const timer = el._revealTimer; if (timer) { clearTimeout(timer); delete el._revealTimer; }
    });
  }

  // ─── 더블 래칫 핵심 ────────────────────────
  async function startEcdhExchange(peerId) {
    const sess = sessionsMap.get(peerId); if (!sess) return;
    try {
      const keyPair = await crypto.subtle.generateKey(ECDH_ALG, true, ['deriveKey','deriveBits']);
      sess.ourEcdhPair = { privateKey:keyPair.privateKey, publicKey:keyPair.publicKey };
      const pubRaw = await crypto.subtle.exportKey('raw', sess.ourEcdhPair.publicKey);
      if (sess.isOfferer) { sess.salt = crypto.getRandomValues(new Uint8Array(SALT_SIZE)); if (sess.dc && sess.dc.readyState==='open') sess.dc.send(JSON.stringify({ type:'__ecdhe__', salt:toBase64url(sess.salt.buffer), pubKey:toBase64url(pubRaw) })); }
      else { if (sess.dc && sess.dc.readyState==='open') sess.dc.send(JSON.stringify({ type:'__ecdhe__', pubKey:toBase64url(pubRaw) })); }
    } catch(e) { addMsg(peerId, '보안 키 교환 시작 오류', 'system'); }
  }
  async function handleEcdheMessage(peerId, data) {
    const sess = sessionsMap.get(peerId); if (!sess || sess.handshakeDone) return;
    try {
      if (data.salt) sess.salt = new Uint8Array(fromBase64url(data.salt));
      sess.peerEcdhPub = await crypto.subtle.importKey('raw', fromBase64url(data.pubKey), ECDH_ALG, true, []);
      if (sess.password && sess.ourEcdhPair && sess.peerEcdhPub && sess.salt) await deriveSessionKey(peerId);
    } catch(e) { addMsg(peerId, '키 교환 처리 실패', 'system'); }
  }
  async function submitPassword() {
    if (!activePeerId) { alert('대화 상대가 선택되지 않았습니다.'); return; }
    const sess = sessionsMap.get(activePeerId); if (!sess) { alert('세션 정보를 찾을 수 없습니다.'); return; }
    const now = Date.now();
    if (sess.passwordBlockedUntil > now) {
      document.getElementById('passwordError').textContent = `너무 많은 시도. ${Math.ceil((sess.passwordBlockedUntil-now)/1000)}초 후 재시도 가능`;
      document.getElementById('passwordError').style.display = 'block'; return;
    }
    const password = document.getElementById('chatPasswordInput').value.trim();
    if (!password) { document.getElementById('passwordError').textContent = '암호를 입력하세요.'; document.getElementById('passwordError').style.display = 'block'; return; }
    sess.password = password;
    if (sess.salt && sess.ourEcdhPair && sess.peerEcdhPub) { await deriveSessionKey(activePeerId); }
    else { document.getElementById('passwordError').textContent = '아직 보안 연결이 준비되지 않았습니다. 잠시 후 다시 시도해주세요.'; document.getElementById('passwordError').style.display = 'block'; }
  }
  async function deriveSessionKey(peerId) {
    const sess = sessionsMap.get(peerId); if (!sess) return;
    const now = Date.now();
    if (sess.passwordBlockedUntil > now) {
      if (peerId===activePeerId) { document.getElementById('passwordError').textContent = `차단됨. ${Math.ceil((sess.passwordBlockedUntil-now)/1000)}초 후 재시도`; document.getElementById('passwordError').style.display = 'block'; }
      return;
    }
    sess.passwordAttempts++;
    if (sess.passwordAttempts > MAX_PASSWORD_ATTEMPTS) {
      sess.passwordBlockedUntil = now + PASSWORD_BLOCK_DURATION;
      if (peerId===activePeerId) { document.getElementById('passwordError').textContent = '비밀번호 시도 횟수 초과. 1분 후 다시 시도하세요.'; document.getElementById('passwordError').style.display = 'block'; }
      return;
    }
    try {
      const km = await crypto.subtle.importKey('raw', textEncoder.encode(sess.password), 'PBKDF2', false, ['deriveKey']);
      sess.authKey = await crypto.subtle.deriveKey({ name:'PBKDF2', salt:sess.salt, iterations:PBKDF2_ITERS, hash:'SHA-512' }, km, { name:'AES-GCM', length:AES_LEN }, true, ['encrypt','decrypt']);
      const ecdhBits = await crypto.subtle.deriveBits({ name:'ECDH', public:sess.peerEcdhPub }, sess.ourEcdhPair.privateKey, 521);
      const authRaw = await crypto.subtle.exportKey('raw', sess.authKey);
      const ikm = concatBufs(ecdhBits, textEncoder.encode(sess.password));
      const hkdfKey = await crypto.subtle.importKey('raw', ikm, 'HKDF', false, ['deriveBits']);
      const rootKey = await crypto.subtle.deriveBits({ name:'HKDF', hash:'SHA-512', salt:authRaw, info:textEncoder.encode('root') }, hkdfKey, 256);

      sess.ourEphemeralKeyPair = sess.ourEcdhPair; sess.theirEphemeralPub = sess.peerEcdhPub;
      const typingKeyRaw = new Uint8Array(rootKey).slice(0,16);
      sess.typingKey = await crypto.subtle.importKey('raw', typingKeyRaw, { name:'AES-GCM', length:TYPING_AES_LEN }, false, ['encrypt','decrypt']);
      sess.handshakeDone = true; sess.passwordAttempts = 0;

      if (sess.pendingConfirm) { const pending = sess.pendingConfirm; sess.pendingConfirm = null; await handleConfirmation(peerId, pending); }
      if (peerId===activePeerId) {
        document.getElementById('securityCard').style.display = 'flex';
        document.getElementById('sessionFingerprint').textContent = buf2hex(sess.rootKey);
        document.getElementById('passwordPrompt').style.display = 'none';
        document.getElementById('passwordError').style.display = 'none';
      }
      secureEraseObject({ password:sess.password }); // 보안상 암호 객체 정리
    } catch(e) {
      if (peerId===activePeerId) { document.getElementById('passwordError').textContent = '세션 키 생성 실패: 암호가 일치하지 않습니다.'; document.getElementById('passwordError').style.display = 'block'; }
    }
  }
  async function sendConfirmation(peerId) {
    const sess = sessionsMap.get(peerId); if (!sess || !sess.rootKey || !sess.dc || sess.dc.readyState!=='open') return;
    const newKeyPair = await crypto.subtle.generateKey(ECDH_ALG, true, ['deriveKey','deriveBits']);
    sess.ourEphemeralKeyPair = newKeyPair;
    const newChainKey = await dhRatchet(sess, newKeyPair.privateKey, sess.theirEphemeralPub);
    sess.sendChainKey = newChainKey; sess.sendMsgNum = 0;
    const pubRaw = await crypto.subtle.exportKey('raw', newKeyPair.publicKey);
    sess.dc.send(JSON.stringify({ type:'__confirm__', dhPub:toBase64url(pubRaw) }));
  }
  async function handleConfirmation(peerId, data) {
    const sess = sessionsMap.get(peerId); if (!sess || !sess.rootKey) { sess.pendingConfirm = data; return; }
    if (data.dhPub) await processReceivedRatchet(sess, data.dhPub);
    sess.confirmed = true;
    if (!sess.isOfferer) await sendConfirmation(peerId);
    if (peerId===activePeerId) {
      document.getElementById('securityCard').style.display = 'flex';
      document.getElementById('sessionFingerprint').textContent = buf2hex(sess.rootKey);
      document.getElementById('passwordPrompt').style.display = 'none';
      document.getElementById('passwordError').style.display = 'none';
    }
    flushOfflineQueue(peerId);
  }
  async function dhRatchet(sess, ourNewPriv, theirPub) {
    const dhBits = await crypto.subtle.deriveBits({ name:'ECDH', public:theirPub }, ourNewPriv, 521);
    const ikm = concatBufs(dhBits, sess.rootKey);
    const hkdfKey = await crypto.subtle.importKey('raw', ikm, 'HKDF', false, ['deriveBits']);
    const okm = await crypto.subtle.deriveBits({ name:'HKDF', hash:'SHA-512', salt:new Uint8Array(32), info:textEncoder.encode('double-ratchet') }, hkdfKey, 512);
    sess.rootKey = okm.slice(0,32);
    return okm.slice(32,64);
  }
  async function symmetricRatchet(chainKey) {
    const ck = await crypto.subtle.importKey('raw', chainKey, { name:'HMAC', hash:'SHA-512' }, false, ['sign']);
    const msgKeySig = await crypto.subtle.sign('HMAC', ck, new Uint8Array([1]));
    const nextChainKeySig = await crypto.subtle.sign('HMAC', ck, new Uint8Array([2]));
    return { msgKey: msgKeySig.slice(0,32), nextChainKey: nextChainKeySig.slice(0,32) };
  }
  async function performSendingRatchetIfNeeded(sess) {
    if (!sess.sendChainKey) {
      const newKeyPair = await crypto.subtle.generateKey(ECDH_ALG, true, ['deriveKey','deriveBits']);
      sess.ourEphemeralKeyPair = newKeyPair;
      const newChainKey = await dhRatchet(sess, newKeyPair.privateKey, sess.theirEphemeralPub);
      sess.sendChainKey = newChainKey; sess.sendMsgNum = 0;

    }

  }
  async function encryptPayload(sess, obj) {
    const dhPub = await performSendingRatchetIfNeeded(sess);
    const { msgKey, nextChainKey } = await symmetricRatchet(sess.sendChainKey);
    sess.sendChainKey = nextChainKey;
    const seq = sess.sendMsgNum++;
    const iv = crypto.getRandomValues(new Uint8Array(16));
    const padLen = PADDING_MIN + Math.floor(crypto.getRandomValues(new Uint8Array(1))[0]/256*(PADDING_MAX-PADDING_MIN));
    const padded = { ...obj, _pad: toBase64url(crypto.getRandomValues(new Uint8Array(padLen)).buffer) };
    const ct = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, await crypto.subtle.importKey('raw', msgKey, 'AES-GCM', false, ['encrypt']), textEncoder.encode(JSON.stringify(padded)));
    const result = { seq, iv:Array.from(new Uint8Array(iv)), ct:Array.from(new Uint8Array(ct)) };
    if (dhPub) result.dhPub = dhPub;
    return result;
  }
  async function processReceivedRatchet(sess, dhPubB64) {
    const pubRaw = fromBase64url(dhPubB64);
    const peerPub = await crypto.subtle.importKey('raw', pubRaw, ECDH_ALG, true, []);
    const newRecvChainKey = await dhRatchet(sess, sess.ourEphemeralKeyPair.privateKey, peerPub);
    sess.recvChainKey = newRecvChainKey; sess.recvMsgNum = 0; sess.theirEphemeralPub = peerPub;
  }
  async function decryptPayload(sess, d) {
    if (d.dhPub) await processReceivedRatchet(sess, d.dhPub);
    if (!sess.recvChainKey) throw new Error('수신 체인 없음');
    const { seq, iv, ct } = d;
    if (seq < sess.recvMsgNum) return null;
    while (sess.recvMsgNum < seq) { const { nextChainKey } = await symmetricRatchet(sess.recvChainKey); sess.recvChainKey = nextChainKey; sess.recvMsgNum++; }
    const { msgKey, nextChainKey } = await symmetricRatchet(sess.recvChainKey);
    sess.recvChainKey = nextChainKey; sess.recvMsgNum = seq + 1;
    const plain = await crypto.subtle.decrypt({ name:'AES-GCM', iv:new Uint8Array(iv) }, await crypto.subtle.importKey('raw', msgKey, 'AES-GCM', false, ['decrypt']), new Uint8Array(ct));
    const obj = JSON.parse(textDecoder.decode(plain)); delete obj._pad; return obj;
  }

  // ─── 메시지 송수신 ─────────────────────────
  async function sendText() {
    if (!activePeerId || isDestroyed(activePeerId)) return;
    const sess = sessionsMap.get(activePeerId); if (!sess) return;
    const inp = document.getElementById('msgInput'); const txt = inp.value.trim(); if (!txt) return;
    const msgId = genUUID(); const payload = { type:'text', content:txt, id:msgId };
    await sendPayload(sess, payload, txt, msgId); inp.value = '';
  }
  async function sendPayload(sess, payload, displayContent, msgId) {
    if (!sess.dc || sess.dc.readyState!=='open' || !sess.rootKey || !sess.confirmed) {
      const queue = await loadOfflineQueue(activePeerId); queue.push({ payload, displayContent, id:msgId, ts:Date.now() }); await saveOfflineQueue(activePeerId, queue);
      addMsg(activePeerId, displayContent, 'me', msgId);
      if (!sess.rootKey || !sess.confirmed) addMsg(activePeerId, '⏳ 보안 세션 준비 중...', 'system'); else addMsg(activePeerId, '⏳ 오프라인-복구 시 자동 전송', 'system');
      return;
    }
    try {
      const enc = await encryptPayload(sess, payload); sess.dc.send(JSON.stringify({ type:'msg', ...enc }));
      addMsg(activePeerId, displayContent, 'me', msgId); notifyIfNeeded(displayContent);
    } catch(e) {
      const queue = await loadOfflineQueue(activePeerId); queue.push({ payload, displayContent, id:msgId, ts:Date.now() }); await saveOfflineQueue(activePeerId, queue);
      addMsg(activePeerId, displayContent, 'me', msgId); addMsg(activePeerId, '⚠️ 전송 실패, 오프라인 큐에 저장', 'system');
    }
  }
  function onMsg(peerId, e) {
    if (isDestroyed(peerId)) return;
    if (hasPendingDestroy(peerId)) { markDestroyed(peerId); goHome(); return; }
    const sess = sessionsMap.get(peerId); if (!sess) return;
    if (e.data instanceof ArrayBuffer) { handleBinaryChunk(peerId, e.data); return; }
    try {
      const d = JSON.parse(e.data);
      if (d.type === '__ecdhe__') { handleEcdheMessage(peerId, d); return; }
      if (d.type === '__confirm__') { handleConfirmation(peerId, d); return; }
      if (d.type === '__destroy_req__') { markDestroyed(d.peerId||peerId); goHome(); return; }
      if (d.type === '__clear_revealed__') { clearRevealedMessages(peerId); return; }
      if (d.type === 'msg') {
        if (!sess.rootKey || !sess.confirmed) { addEncryptedMessage(peerId, d); return; }
        decryptPayload(sess, d).then(inner => {
          if (!inner) return;
          if (inner.id && sess.receivedMessageIds.has(inner.id)) return;
          if (inner.id) sess.receivedMessageIds.add(inner.id);
          switch (inner.type) {
            case 'text': receiveMessage(peerId, inner.content, 'other', inner.id); sendReadReceipt(peerId, inner.id); break;
            case 'emoji': receiveMessage(peerId, inner.content, 'other', inner.id); break;
            case 'media': receiveMessage(peerId, `[이미지]`, 'other', inner.id); break;
            case 'read': markAsRead(peerId, inner.id); break;
            case 'file_start': handleFileStart(peerId, inner); break;
            case 'file_end': if (sess.fileReceive && sess.fileReceive.id===inner.id) assembleFile(peerId); break;
            case '__destroy__': markDestroyed(peerId); goHome(); break;
          }
        }).catch(() => addEncryptedMessage(peerId, d));
      }
    } catch(e) {}
  }
  async function flushOfflineQueue(peerId) {
    const sess = sessionsMap.get(peerId); if (!sess?.dc || sess.dc.readyState!=='open' || !sess.rootKey || !sess.confirmed) return;
    const queue = await loadOfflineQueue(peerId); if (queue.length===0) return;
    clearOfflineQueue(peerId); addMsg(peerId, `📬 ${queue.length}개의 대기 메시지 전송 중...`, 'system');
    for (const item of queue) {
      try { const enc = await encryptPayload(sess, item.payload); sess.dc.send(JSON.stringify({ type:'msg', ...enc })); } catch(e) {
        const remaining = await loadOfflineQueue(peerId); remaining.push(item); await saveOfflineQueue(peerId, remaining); break;
      }
    }
    if ((await loadOfflineQueue(peerId)).length===0) addMsg(peerId, '📬 대기 메시지 전송 완료', 'system');
  }
  function receiveMessage(peerId, text, who, msgId) {
    const sess = sessionsMap.get(peerId); if (!sess) return;
    if (peerId === activePeerId) addMsg(peerId, text, who, msgId);
    else { sess.pendingMessages.push({ text, who, msgId }); notifyIfNeeded(text); renderContactList(); }
  }

  // ─── 타이핑 암호화 ────────────────────────
  async function encryptTyping(sess, state) { if (!sess.typingKey) return null; const iv = crypto.getRandomValues(new Uint8Array(12)); const ct = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, sess.typingKey, textEncoder.encode(state)); return { iv:Array.from(new Uint8Array(iv)), ct:Array.from(new Uint8Array(ct)) }; }
  async function decryptTyping(sess, data) { if (!sess.typingKey) throw new Error('no typing key'); const iv = new Uint8Array(data.iv), ct = new Uint8Array(data.ct); const plain = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, sess.typingKey, ct); return textDecoder.decode(plain); }
  function sendTyping(state) { const sess = sessionsMap.get(activePeerId); if (sess?.typingDC && sess.typingDC.readyState==='open' && sess.typingKey) { encryptTyping(sess, state?'1':'0').then(enc => enc && sess.typingDC.send(JSON.stringify(enc))).catch(()=>{}); } }
  document.getElementById('msgInput').addEventListener('input', () => { sendTyping(true); const sess = sessionsMap.get(activePeerId); if (sess) { clearTimeout(sess.typingTimer); sess.typingTimer = setTimeout(() => sendTyping(false), 1500); } });

  // ─── 이모지/미디어/파일 ────────────────────
  const EMOJI_LIST = ['😀','😂','🥰','😎','🤔','👍','❤️','🔥','🎉','💯','😢','😡','🥺','🤯','✨','🍕','🚀','💻','📱','🎵'];
  function buildEmojiPicker() { document.getElementById('emojiGrid').innerHTML = EMOJI_LIST.map(e => `<span class="emoji-item" data-emoji="${e}">${e}</span>`).join(''); document.querySelectorAll('#emojiGrid .emoji-item').forEach(item => item.addEventListener('click', () => { const emoji = item.getAttribute('data-emoji'); if (emoji) sendEmoji(emoji); })); }

  function closeAllPickers() { document.querySelectorAll('.picker-overlay').forEach(p => p.classList.remove('active')); }
  function sendEmoji(emoji) { if (!activePeerId || isDestroyed(activePeerId)) return; const sess = sessionsMap.get(activePeerId); if (!sess) return; const msgId = genUUID(); sendPayload(sess, { type:'emoji', content:emoji, id:msgId }, emoji, msgId); closeAllPickers(); }
  function sendMedia(url) { if (!activePeerId || isDestroyed(activePeerId)) return; const sess = sessionsMap.get(activePeerId); if (!sess) return; const msgId = genUUID(); sendPayload(sess, { type:'media', url, id:msgId }, `[이미지]`, msgId); closeAllPickers(); }
  function addMediaUrl() { const url = document.getElementById('mediaSearch')?.value?.trim(); if (!url) return; let favorites = []; try { favorites = JSON.parse(localStorage.getItem('p2p_media_fav')||'[]'); } catch(e) {} if (!favorites.includes(url)) { favorites.push(url); localStorage.setItem('p2p_media_fav', JSON.stringify(favorites)); } document.getElementById('mediaSearch').value = ''; filterMedia(); sendMedia(url); }
  async function uploadSticker(files) { if (!files || files.length===0) return; for (const file of files) { const reader = new FileReader(); reader.onload = (e) => { const url = e.target.result; let favorites = []; try { favorites = JSON.parse(localStorage.getItem('p2p_media_fav')||'[]'); } catch(e) {} favorites.push(url); localStorage.setItem('p2p_media_fav', JSON.stringify(favorites)); filterMedia(); sendMedia(url); }; reader.readAsDataURL(file); } }
  function filterMedia() { const query = document.getElementById('mediaSearch')?.value?.toLowerCase()||''; let favorites = []; try { favorites = JSON.parse(localStorage.getItem('p2p_media_fav')||'[]'); } catch(e) {} const grid = document.getElementById('mediaGrid'); grid.innerHTML = favorites.filter(u => u.toLowerCase().includes(query)).map(u => `<div class="picker-item" data-url="${u.replace(/"/g,'&quot;')}"><img src="${u.replace(/"/g,'&quot;')}" alt="media"></div>`).join(''); grid.querySelectorAll('.picker-item').forEach(item => item.addEventListener('click', () => { const url = item.getAttribute('data-url'); if (url) sendMedia(url); })); }
  function sendReadReceipt(peerId, msgId) { const sess = sessionsMap.get(peerId); if (!sess?.rootKey || !sess.confirmed || !sess.dc || sess.dc.readyState!=='open') return; try { encryptPayload(sess, { type:'read', id:msgId }).then(enc => sess.dc.send(JSON.stringify({ type:'msg', ...enc }))).catch(()=>{}); } catch(e) {} }
  function markAsRead(peerId, msgId) { const el = document.getElementById('msg-'+msgId); if (el) { const t = el.querySelector('.time'); if (t && !t.querySelector('.read-status')) t.innerHTML += ' <span class="read-status" style="color:var(--success);">✓✓</span>'; } }

  function handleFileStart(peerId, inner) { const sess = sessionsMap.get(peerId); if (!sess) return; sess.fileReceive = { id:inner.id, name:inner.name, size:inner.size, fek: fromBase64url(inner.fek), chunks:[], received:0 }; receiveMessage(peerId, `📥 ${inner.name} (${formatBytes(inner.size)}) 수신 중...`, 'other'); }
  function handleBinaryChunk(peerId, buf) { const sess = sessionsMap.get(peerId); if (!sess?.fileReceive) return; sess.fileReceive.chunks.push(new Uint8Array(buf)); sess.fileReceive.received += buf.byteLength; }
  async function assembleFile(peerId) { const sess = sessionsMap.get(peerId); if (!sess?.fileReceive) return; const blob = new Blob(sess.fileReceive.chunks); const iv = blob.slice(0,12); const ct = blob.slice(12); const key = await crypto.subtle.importKey('raw', sess.fileReceive.fek, 'AES-GCM', false, ['decrypt']); const plain = await crypto.subtle.decrypt({ name:'AES-GCM', iv: await iv.arrayBuffer() }, key, await ct.arrayBuffer()); const decBlob = new Blob([plain]); const url = URL.createObjectURL(decBlob); receiveMessage(peerId, `[파일: ${escapeHtml(sess.fileReceive.name)}]`, 'other'); sess.fileReceive = null; }
  async function handleFiles(files) { for (const f of files) await sendFile(f); }
  async function sendFile(file) { if (!activePeerId || isDestroyed(activePeerId)) return; const sess = sessionsMap.get(activePeerId); if (!sess?.dc || sess.dc.readyState!=='open' || !sess.rootKey || !sess.confirmed) { addMsg(activePeerId, '⚠️ 파일 전송 불가 (보안 세션 없음)', 'system'); return; } const fileId = genUUID(); const fek = await crypto.subtle.generateKey({ name:'AES-GCM', length:AES_LEN }, true, ['encrypt']); const iv = crypto.getRandomValues(new Uint8Array(12)); const fekRaw = await crypto.subtle.exportKey('raw', fek); const fileBuf = await file.arrayBuffer(); const ct = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, fek, fileBuf); const encData = new Uint8Array(iv.byteLength + ct.byteLength); encData.set(iv); encData.set(new Uint8Array(ct), iv.byteLength); const metaEnc = await encryptPayload(sess, { type:'file_start', id:fileId, name:file.name, size:encData.byteLength, fek:toBase64url(fekRaw) }); sess.dc.send(JSON.stringify({ type:'msg', ...metaEnc })); addMsg(activePeerId, `📤 ${file.name} 전송 중... (${formatBytes(encData.byteLength)})`, 'me'); const chunkSize = 64*1024; let offset = 0; while (offset < encData.byteLength) { const end = Math.min(offset+chunkSize, encData.byteLength); sess.dc.send(encData.slice(offset, end).buffer); offset = end; await new Promise(r => setTimeout(r, 5)); } const endEnc = await encryptPayload(sess, { type:'file_end', id:fileId }); sess.dc.send(JSON.stringify({ type:'msg', ...endEnc })); addMsg(activePeerId, `📤 ${file.name} 전송 완료`, 'me'); }

  // ─── 블러 & 보안 (강화) ────────────────────
  let securityLockLevel = 0, globalBlurTimer = null;
  const AUTO_BLUR_DELAY = 8000;
  function applyBlurToSensitiveElements() {
    document.querySelectorAll('#messages .bubble').forEach(el => {
      if (!el.closest('.msg.system') && !el.classList.contains('blur-target')) {
        el.classList.add('blur-target'); el.setAttribute('data-revealed','false');
      }
    });
  }
  function lockAllBlurs(d=15000) { document.querySelectorAll('.blur-target').forEach(el => { el.classList.add('locked'); el.classList.remove('revealed'); }); clearTimeout(globalBlurTimer); globalBlurTimer = setTimeout(() => document.querySelectorAll('.blur-target.locked').forEach(el => el.classList.remove('locked')), d); }

  let pressTimer = null, pressTarget = null;
  document.addEventListener('pointerdown', e => {
    if (!activePeerId || isDestroyed(activePeerId)) return;
    const sess = sessionsMap.get(activePeerId); if (!sess?.isOnline) return;
    const target = e.target.closest('.blur-target');
    if (target && !target.classList.contains('locked') && securityLockLevel < 2) {
      pressTarget = target;
      pressTimer = setTimeout(() => {
        target.classList.add('revealed'); target.setAttribute('data-revealed','true');
        if (target._revealTimer) clearTimeout(target._revealTimer);
        target._revealTimer = setTimeout(() => { target.classList.remove('revealed'); target.setAttribute('data-revealed','false'); delete target._revealTimer; }, AUTO_BLUR_DELAY);
        pressTimer = null; pressTarget = null;
      }, 600);
    }
  });
  document.addEventListener('pointerup', () => { clearTimeout(pressTimer); pressTimer=null; pressTarget=null; });
  document.addEventListener('pointercancel', () => { clearTimeout(pressTimer); pressTimer=null; pressTarget=null; });

  document.addEventListener('visibilitychange', () => { if (document.visibilityState==='hidden' && activePeerId) { clearRevealedMessages(activePeerId); sendClearRevealed(activePeerId); if (hasPendingDestroy(activePeerId)) trySendDestroy(activePeerId); } });
  window.addEventListener('beforeunload', () => { if (activePeerId) { sendClearRevealed(activePeerId); clearRevealedMessages(activePeerId); if (hasPendingDestroy(activePeerId)) trySendDestroy(activePeerId); } });
  window.addEventListener('pagehide', () => { if (activePeerId) { sendClearRevealed(activePeerId); if (hasPendingDestroy(activePeerId)) trySendDestroy(activePeerId); } });
  window.addEventListener('online', () => { if (activePeerId && hasPendingDestroy(activePeerId) && sessionsMap.get(activePeerId)?.isOnline) { trySendDestroy(activePeerId); } });

  // ─── 메시지 UI (DOM에 평문 직접 삽입하지 않음) ────
  function appendMessage(text, who, msgId) {
    const c = document.getElementById('messages'), d = document.createElement('div');
    d.className = 'msg ' + (who==='me'?'me':who==='other'?'other':'system');
    if (msgId) d.id = 'msg-'+msgId;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    if (who !== 'system') { bubble.classList.add('blur-target'); bubble.setAttribute('data-revealed','false'); }
    bubble.textContent = text; // textContent 사용 (XSS 방지)

    timeDiv.textContent = new Date().toLocaleTimeString();
    bubble.appendChild(timeDiv);
    d.appendChild(bubble);

  }
  function addMsg(peerId, text, who, msgId) { if (peerId !== activePeerId || isDestroyed(peerId)) return; appendMessage(text, who, msgId); }
  function addEncryptedMessage(peerId, rawData) {
    if (peerId !== activePeerId || isDestroyed(peerId)) return;
    const c = document.getElementById('messages'), d = document.createElement('div');
    d.className = 'msg system';
    const bubble = document.createElement('div');
    bubble.className = 'encrypted-bubble';
    bubble.textContent = '🔒 암호화된 메시지\n' + JSON.stringify(rawData, null, 2);
    d.appendChild(bubble);
    c.appendChild(d);
    c.scrollTop = c.scrollHeight;
  }
  function copyTextById(id) { const el = document.getElementById(id); const text = el.tagName==='INPUT'||el.tagName==='TEXTAREA'?el.value:el.textContent; navigator.clipboard.writeText(text).then(()=>{}).catch(()=>{ const ta=document.createElement('textarea'); ta.value=text; ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');}catch(e){} alert('링크가 복사되었습니다.'); }); }
  function notifyIfNeeded(content) { if (document.visibilityState==='hidden' && 'Notification' in window && Notification.permission==='granted') { new Notification('P2P 비밀채팅', { body:'[새 메시지]' }); } }

  // ─── 유틸리티 함수 ────────────────────────
  function buf2hex(b) { return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join(''); }
  function concatBufs(...bufs) { let len=bufs.reduce((a,b)=>a+b.byteLength,0), tmp=new Uint8Array(len), off=0; bufs.forEach(b=>{tmp.set(new Uint8Array(b),off);off+=b.byteLength;}); return tmp.buffer; }
  function genUUID() { return crypto.randomUUID(); }
  function formatBytes(b) { return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':b<1073741824?(b/1048576).toFixed(1)+' MB':(b/1073741824).toFixed(1)+' GB'; }
  function escapeHtml(s) { return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }
  function updateConn(ok) { document.getElementById('connDot').className = 'dot '+(ok?'on':'off'); document.getElementById('connLabel').textContent = ok?'연결됨':'오프라인'; }

  // ─── URL 해시 처리 ────────────────────────
  async function checkHash() {
    const h = location.hash.substring(1); if (!h) return;
    const p = new URLSearchParams(h);
    if (p.has('offer') && p.has('peer')) {
      const peerId = p.get('peer'); if (isDestroyed(peerId) || hasPendingDestroy(peerId)) { alert('이 대화는 삭제되었습니다.'); return; }
      const offer = decodeSDP(p.get('offer'));
      const contacts = await getContacts(); if (!contacts.find(c=>c.id===peerId)) await addContact(peerId, '상대방');
      activePeerId = peerId; const sess = getOrCreateSession(peerId); sess.isOfferer = false; initPC(peerId);
      await sess.pc.setRemoteDescription(offer); const ans = await sess.pc.createAnswer(); await sess.pc.setLocalDescription(ans); await waitIce(sess.pc);
      const answerB64 = encodeSDP(sess.pc.localDescription);
      showView('chatScreen'); document.getElementById('chatTitle').textContent = '상대방';
      document.getElementById('passwordPrompt').style.display = 'block';
      document.getElementById('answerModalLink').textContent = location.origin + location.pathname + '#answer=' + answerB64 + '&peer=' + peerId;
      document.getElementById('answerModal').classList.remove('hidden');
      renderContactList();
    } else if (p.has('answer') && p.has('peer')) {
      const peerId = p.get('peer'); if (isDestroyed(peerId) || hasPendingDestroy(peerId)) return;
      const answer = decodeSDP(p.get('answer'));
      const contacts = await getContacts(); if (!contacts.find(c=>c.id===peerId)) await addContact(peerId, '상대방');
      let sess = sessionsMap.get(peerId);
      if (!sess || !sess.pc) { sess = getOrCreateSession(peerId); sess.isOfferer = true; initPC(peerId); sess.dc = sess.pc.createDataChannel('chat', { ordered:true }); setupDC(peerId); }
      if (sess.pc) { await sess.pc.setRemoteDescription(answer); activePeerId = peerId; showView('chatScreen'); document.getElementById('chatTitle').textContent = contacts.find(c=>c.id===peerId)?.name||'채팅'; document.getElementById('passwordPrompt').style.display = 'block'; }
      renderContactList();
    }
  }
  window.addEventListener('hashchange', checkHash);

  // ─── 이벤트 리스너 바인딩 ──────────────────
  function bindEvents() {
    document.getElementById('btnNewChat').addEventListener('click', showNameModal);
    document.getElementById('btnJoinChat').addEventListener('click', showJoinPanel);
    document.getElementById('btnConfirmName').addEventListener('click', confirmNewChat);
    document.getElementById('btnCancelName').addEventListener('click', closeNameModal);
    document.getElementById('btnCopyOffer').addEventListener('click', ()=>copyTextById('offerLinkDisplay'));
    document.getElementById('btnApplyAnswer').addEventListener('click', applyAnswerLink);
    document.getElementById('btnOfferHome').addEventListener('click', goHome);
    document.getElementById('btnCreateAnswer').addEventListener('click', createAnswerFromOffer);
    document.getElementById('btnAnswerHome').addEventListener('click', goHome);
    document.getElementById('btnChatBack').addEventListener('click', goHome);
    document.getElementById('btnRename').addEventListener('click', renameChat);
    document.getElementById('btnDestroy').addEventListener('click', destroyActiveChat);
    document.getElementById('btnSubmitPassword').addEventListener('click', submitPassword);
    document.getElementById('btnSend').addEventListener('click', sendText);
    document.getElementById('btnEmojiPicker').addEventListener('click', ()=>togglePicker('emoji'));
    document.getElementById('btnMediaPicker').addEventListener('click', ()=>togglePicker('media'));
    document.getElementById('btnStickerUpload').addEventListener('click', ()=>document.getElementById('stickerFileInput').click());
    document.getElementById('btnFileAttach').addEventListener('click', ()=>document.getElementById('fileInput').click());
    document.getElementById('btnCopyAnswerModal').addEventListener('click', copyAnswerModalLink);
    document.getElementById('btnCloseAnswerModal').addEventListener('click', closeAnswerModal);
    document.getElementById('stickerFileInput').addEventListener('change', function(){ uploadSticker(this.files); this.value=''; });
    document.getElementById('fileInput').addEventListener('change', function(){ handleFiles(this.files); this.value=''; });
    document.getElementById('mediaSearch').addEventListener('keydown', function(e){ if(e.key==='Enter') addMediaUrl(); });
    document.getElementById('mediaSearch').addEventListener('input', filterMedia);
    document.getElementById('msgInput').addEventListener('keydown', function(e){ if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendText(); } });
    document.getElementById('chatPasswordInput').addEventListener('keydown', function(e){ if(e.key==='Enter') submitPassword(); });
    document.getElementById('peerNameInput').addEventListener('keydown', function(e){ if(e.key==='Enter') confirmNewChat(); });
    document.getElementById('nameModal').addEventListener('click', function(e){ if(e.target===this) closeNameModal(); });
    document.getElementById('answerModal').addEventListener('click', function(e){ if(e.target===this) closeAnswerModal(); });
  }

  // ─── 초기화 ───────────────────────────────
  async function init() {
    buildEmojiPicker(); filterMedia(); bindEvents();
    await renderContactList(); await checkHash();
    showView('simpleMode');
    setInterval(() => { if (activePeerId) { applyBlurToSensitiveElements(); document.querySelectorAll('.blur-target.revealed').forEach(el => { if (!el._revealTimer) { el.classList.remove('revealed'); el.setAttribute('data-revealed','false'); } }); } }, 3000);
  }
  init().catch(()=>{});
})();
</script>
