function getSess(pid){if(!sessions[pid])sessions[pid]={pc:null,dc:null,tyDC:null,tyKey:null,isOff:false,pw:null,root:null,sCK:null,rCK:null,sn:0,rn:0,oEK:null,tEPub:null,salt:null,oEDH:null,pEDH:null,oSK:null,pSK:null,hsDone:false,conf:false,online:false,recIds:new Set,pending:[],fileRcv:null,tyTimer:null,reconn:0,pCnf:null,dRetry:0,defTimer:0,vFp:false};return sessions[pid]}
function isDest(pid){return!!(localStorage.getItem(DESTROY+pid)||sessionStorage.getItem(DESTROY+pid))}
function markDest(pid){localStorage.setItem(DESTROY+pid,Date.now());sessionStorage.setItem(DESTROY+pid,Date.now());clrPend(pid);clearQ(pid);if(location.hash)history.replaceState(null,'',location.pathname)}

function waitIce(pc){return new Promise(r=>{if(pc.iceGatheringState==='complete')r();else pc.addEventListener('icegatheringstatechange',()=>{if(pc.iceGatheringState==='complete')r()})})}

// WebRTC
function initPC(pid){
  const s=sessions[pid];if(s.pc)s.pc.close();
  s.pc=new RTCPeerConnection({iceServers:ICE});
  s.pc.oniceconnectionstatechange=()=>{
    const st=s.pc.iceConnectionState;
    if(st==='connected'||st==='completed'){
      s.online=true;upConn(true);renderCon();s.reconn=0;
      if(hasPend(pid))trySendDestroy(pid);
      if(s.conf)flushQ(pid);
    }else if(st==='disconnected'||st==='failed'||st==='closed'){
      s.online=false;upConn(false);
      if(st==='failed'){
        if(s.reconn<3){s.reconn++;setTimeout(()=>{if(s.pc&&s.pc.iceConnectionState==='failed')try{s.pc.restartIce()}catch{}},2000)}
        else{s.hsDone=false;s.root=null;s.sCK=null;s.rCK=null;s.conf=false;clearQ(pid);if(pid===activePeerId)addMsg(pid,'⚠️ 연결 소실, 오프라인 메시지 폐기','system')}
      }
    }
  };
  s.pc.ondatachannel=e=>{if(e.channel.label==='chat'){s.dc=e.channel;setupDC(pid)}else if(e.channel.label==='typing'){s.tyDC=e.channel;setupTyDC(pid)}}
}
function setupDC(pid){
  const s=sessions[pid];if(!s?.dc)return;
  s.dc.onopen=()=>{
    if(isDest(pid))return;
    s.online=true;upConn(true);renderCon();
    if(hasPend(pid)){trySendDestroy(pid);return}
    if(s.hsDone){
      addMsg(pid,'🔄 연결 복구, 보안 재수립','system');
      s.hsDone=false;s.root=null;s.sCK=null;s.rCK=null;s.tyKey=null;s.conf=false;clearQ(pid);
      startEx(pid);
    }else if(!s.hsDone&&!s.root){if(!s.oEDH)startEx(pid)}else{flushQ(pid)}
  };
  s.dc.onmessage=e=>onMsg(pid,e);
  s.dc.onclose=()=>{s.online=false;upConn(false);renderCon()}
}
function setupTyDC(pid){
  const s=sessions[pid];if(!s?.tyDC)return;
  s.tyDC.onmessage=e=>{
    if(typeof e.data==='string'){try{const d=JSON.parse(e.data);if(d.type==='__destroy_req__'){markDest(d.peerId||pid);goHome();return}decTyp(s,d).then(st=>{if(pid===activePeerId)document.getElementById('typingIndicator').style.display=st==='1'?'block':'none'}).catch(()=>{})}catch{}}
  }
}

// 삭제 전파
function sendRaw(pid){const s=sessions[pid];if(!s)return false;let ok=false;const m=JSON.stringify({type:'__destroy_req__',peerId:pid,ts:Date.now()});[s.dc,s.tyDC].filter(c=>c&&c.readyState==='open').forEach(c=>{try{c.send(m);ok=true}catch{}});return ok}
async function trySendDestroy(pid){
  const s=sessions[pid];if(!s){markDest(pid);rmCon(pid);goHome();return}
  if(sendRaw(pid)){clrPend(pid);markDest(pid);if(activePeerId===pid)goHome();if(s.pc){s.pc.close();delete sessions[pid]}rmCon(pid);renderCon();return}
  if(s.root&&s.conf&&s.dc&&s.dc.readyState==='open'){
    try{
      const enc=await encAndSign(s,{type:'__destroy__',ts:Date.now(),id:uuid()});
      s.dc.send(JSON.stringify({type:'msg',...enc}));
      clrPend(pid);markDest(pid);if(activePeerId===pid)goHome();if(s.pc){s.pc.close();delete sessions[pid]}rmCon(pid);renderCon();return
    }catch{}
  }
  const d=Math.min(300*Math.pow(2,s.dRetry),30000);s.dRetry++;setTimeout(()=>trySendDestroy(pid),d)
}

// 더블 래칫 + ECDSA
async function genSign(){return await crypto.subtle.generateKey(ECDSA,true,['sign','verify'])}
async function signData(pr,data){const sig=await crypto.subtle.sign({name:'ECDSA',hash:'SHA-512'},pr,s2b(data));return b2b64(sig)}
async function verifySig(pu,data,sig64){const sig=b64toBuf(sig64);return await crypto.subtle.verify({name:'ECDSA',hash:'SHA-512'},pu,sig,s2b(data))}
async function startEx(pid){
  const s=sessions[pid];
  try{
    const kp=await crypto.subtle.generateKey(ECDH,true,['deriveKey','deriveBits']);s.oEDH={privateKey:kp.privateKey,publicKey:kp.publicKey};
    const sk=await genSign();s.oSK=sk;
    const pub=await crypto.subtle.exportKey('raw',s.oEDH.publicKey);
    const spub=await crypto.subtle.exportKey('spki',sk.publicKey);
    if(s.isOff){s.salt=crypto.getRandomValues(new Uint8Array(SALT_SIZE));if(s.dc&&s.dc.readyState==='open')s.dc.send(JSON.stringify({type:'__ecdhe__',salt:b2b64(s.salt.buffer),pubKey:b2b64(pub),signPubKey:b2b64(spub)}))}
    else{if(s.dc&&s.dc.readyState==='open')s.dc.send(JSON.stringify({type:'__ecdhe__',pubKey:b2b64(pub),signPubKey:b2b64(spub)}))}
  }catch(e){addMsg(pid,'키 교환 오류','system')}
}
async function handleEcdhe(pid,d){
  const s=sessions[pid];if(s.hsDone)return;
  try{
    if(d.salt)s.salt=new Uint8Array(b64toBuf(d.salt));
    s.pEDH=await crypto.subtle.importKey('raw',b64toBuf(d.pubKey),ECDH,true,[]);
    if(d.signPubKey)s.pSK=await crypto.subtle.importKey('spki',b64toBuf(d.signPubKey),ECDSA,true,['verify']);
    if(s.pw&&s.oEDH&&s.pEDH&&s.salt)await deriveKey(pid);
  }catch(e){addMsg(pid,'Ecdhe 처리 실패','system')}
}
async function submitPw(){
  if(!activePeerId)return;const s=sessions[activePeerId];if(!s)return;
  const pw=document.getElementById('chatPasswordInput').value.trim();if(!pw){document.getElementById('passwordError').textContent='암호 입력';document.getElementById('passwordError').style.display='block';return}
  s.pw=pw;
  if(s.salt&&s.oEDH&&s.pEDH)await deriveKey(activePeerId);
  else{document.getElementById('passwordError').textContent='연결 준비 중...';document.getElementById('passwordError').style.display='block'}
}
async function deriveKey(pid){
  const s=sessions[pid];
  try{
    const km=await crypto.subtle.importKey('raw',s2b(s.pw),'PBKDF2',false,['deriveKey']);
    s.auth=await crypto.subtle.deriveKey({name:'PBKDF2',salt:s.salt,iterations:PBKDF2_ITERS,hash:'SHA-512'},km,AES256,true,['encrypt','decrypt']);
    const dhBits=await crypto.subtle.deriveBits({name:'ECDH',public:s.pEDH},s.oEDH.privateKey,521);
    const authRaw=await crypto.subtle.exportKey('raw',s.auth);
    const ikm=cat(dhBits,s2b(s.pw));
    const hkdf=await crypto.subtle.importKey('raw',ikm,'HKDF',false,['deriveBits']);
    s.root=await crypto.subtle.deriveBits({name:'HKDF',hash:'SHA-512',salt:authRaw,info:s2b('root')},hkdf,256);
    s.oEK=s.oEDH;s.tEPub=s.pEDH;
    const tyRaw=new Uint8Array(s.root).slice(0,16);
    s.tyKey=await crypto.subtle.importKey('raw',tyRaw,AES128,false,['encrypt','decrypt']);
    s.hsDone=true;
    if(s.isOff)await sendConf(pid);
    if(s.pCnf){const p=s.pCnf;s.pCnf=null;await handleConf(pid,p)}
    if(pid===activePeerId){document.getElementById('securityCard').style.display='flex';document.getElementById('passwordPrompt').style.display='none';document.getElementById('passwordError').style.display='none';updateFp(s)}
  }catch(e){if(pid===activePeerId){document.getElementById('passwordError').textContent='키 생성 실패: '+e.message;document.getElementById('passwordError').style.display='block'}}
}
async function sendConf(pid){
  const s=sessions[pid];if(!s.root||!s.dc||s.dc.readyState!=='open')return;
  const nkp=await crypto.subtle.generateKey(ECDH,true,['deriveKey','deriveBits']);s.oEK=nkp;
  const nck=await dhR(s,nkp.privateKey,s.tEPub);s.sCK=nck;s.sn=0;
  const pub=await crypto.subtle.exportKey('raw',nkp.publicKey);
  const enc=await encAndSign(s,{type:'__confirm__',dhPub:b2b64(pub)});
  s.dc.send(JSON.stringify({type:'msg',...enc}));
}
async function handleConf(pid,d){
  const s=sessions[pid];if(!s.root){s.pCnf=d;return}
  if(d.sig&&s.pSK){const v=await verifySig(s.pSK,JSON.stringify({dhPub:d.dhPub}),d.sig);if(!v){addMsg(pid,'⚠️ 서명 위조 감지','system');return}}
  if(d.dhPub)await procRcvR(s,d.dhPub);
  s.conf=true;if(!s.isOff)await sendConf(pid);
  if(pid===activePeerId){document.getElementById('securityCard').style.display='flex';document.getElementById('passwordPrompt').style.display='none';updateFp(s)}
  flushQ(pid);
}
async function dhR(s,ourPriv,theirPub){const db=await crypto.subtle.deriveBits({name:'ECDH',public:theirPub},ourPriv,521);const ik=cat(db,s.root);const hk=await crypto.subtle.importKey('raw',ik,'HKDF',false,['deriveBits']);const ok=await crypto.subtle.deriveBits({name:'HKDF',hash:'SHA-512',salt:new Uint8Array(32),info:s2b('double-ratchet')},hk,512);s.root=ok.slice(0,32);return ok.slice(32,64)}
async function symR(ck){const c=await crypto.subtle.importKey('raw',ck,{name:'HMAC',hash:'SHA-512'},false,['sign']);const mk=await crypto.subtle.sign('HMAC',c,new Uint8Array([1]));const nk=await crypto.subtle.sign('HMAC',c,new Uint8Array([2]));return{msgKey:mk.slice(0,32),nextChainKey:nk.slice(0,32)}}
async function needSndR(s){if(!s.sCK){const nkp=await crypto.subtle.generateKey(ECDH,true,['deriveKey','deriveBits']);s.oEK=nkp;const nck=await dhR(s,nkp.privateKey,s.tEPub);s.sCK=nck;s.sn=0;const pub=await crypto.subtle.exportKey('raw',nkp.publicKey);return b2b64(pub)}return null}
async function encAndSign(s,obj){
  const dhPub=await needSndR(s);const {msgKey,nextChainKey}=await symR(s.sCK);s.sCK=nextChainKey;
  const seq=s.sn++;const iv=crypto.getRandomValues(new Uint8Array(16));
  const padLen=PAD_MIN+Math.floor(crypto.getRandomValues(new Uint8Array(1))[0]/256*(PAD_MAX-PAD_MIN));
  const padded={...obj,_pad:b2b64(crypto.getRandomValues(new Uint8Array(padLen)).buffer)};
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},await crypto.subtle.importKey('raw',msgKey,'AES-GCM',false,['encrypt']),s2b(JSON.stringify(padded)));
  const res={seq,iv:Array.from(new Uint8Array(iv)),ct:Array.from(new Uint8Array(ct))};if(dhPub)res.dhPub=dhPub;
  if(s.oSK)res.sig=await signData(s.oSK.privateKey,JSON.stringify(obj));
  return res;
}
async function procRcvR(s,dhPubB64){const pub=b64toBuf(dhPubB64);const pp=await crypto.subtle.importKey('raw',pub,ECDH,true,[]);const nck=await dhR(s,s.oEK.privateKey,pp);s.rCK=nck;s.rn=0;s.tEPub=pp}
async function decAndVerify(s,d){
  if(d.dhPub)await procRcvR(s,d.dhPub);if(!s.rCK)throw new Error('no rcv chain');
  const {seq,iv,ct}=d;if(seq<s.rn)return null;
  while(s.rn<seq){const {nextChainKey}=await symR(s.rCK);s.rCK=nextChainKey;s.rn++}
  const {msgKey,nextChainKey}=await symR(s.rCK);s.rCK=nextChainKey;s.rn=seq+1;
  const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:new Uint8Array(iv)},await crypto.subtle.importKey('raw',msgKey,'AES-GCM',false,['decrypt']),new Uint8Array(ct));
  const obj=JSON.parse(td.decode(plain));delete obj._pad;
  if(d.sig&&s.pSK){const v=await verifySig(s.pSK,JSON.stringify(obj),d.sig);if(!v)throw new Error('sig fail')}
  return obj;
}

// 디스플레이 암호화
async function getDisp(s,plain){
  const dk=await crypto.subtle.generateKey({name:'AES-GCM',length:128},true,['encrypt']);const iv=crypto.getRandomValues(new Uint8Array(12));
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},dk,s2b(plain));const raw=await crypto.subtle.exportKey('raw',dk);
  const rk=await crypto.subtle.importKey('raw',s.root.slice(0,16),'AES-GCM',false,['encrypt']);const kiv=crypto.getRandomValues(new Uint8Array(12));
  const ek=await crypto.subtle.encrypt({name:'AES-GCM',iv:kiv},rk,raw);
  return{iv:Array.from(iv),ct:Array.from(new Uint8Array(ct)),keyIv:Array.from(kiv),encKey:Array.from(new Uint8Array(ek))};
}
async function decDisp(s,cipher){
  const rk=await crypto.subtle.importKey('raw',s.root.slice(0,16),'AES-GCM',false,['decrypt']);
  const raw=await crypto.subtle.decrypt({name:'AES-GCM',iv:new Uint8Array(cipher.keyIv)},rk,new Uint8Array(cipher.encKey));
  const dk=await crypto.subtle.importKey('raw',raw,'AES-GCM',false,['decrypt']);
  const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:new Uint8Array(cipher.iv)},dk,new Uint8Array(cipher.ct));
  return td.decode(plain);
}
function makeBubble(s,cipher,who,mid,time,pid,timer){
  const b=document.createElement('div');b.className='bubble encrypted-msg';b.dataset.cipher=JSON.stringify(cipher);b.dataset.revealed='false';b.dataset.msgid=mid;
  let tb='';if(timer>0){const exp=Date.now()+timer*60*1000;addTimer(pid,mid,exp);const ds=timer>=1440?'1일':timer>=60?`${Math.floor(timer/60)}h`:`${timer}분`;tb=` <span class="timer-badge">⏳${ds}</span>`}
  b.innerHTML=`<span class="encrypted-placeholder">🔒 암호화${tb}</span><div class="time">${time}</div>`;
  const del=document.createElement('button');del.className='msg-delete-btn';del.textContent='✕';del.addEventListener('click',e=>{e.stopPropagation();delMsg(mid)});b.appendChild(del);
  let pt;
  b.addEventListener('pointerdown',e=>{if(isLocked||!s.root)return;pt=setTimeout(async()=>{if(b.dataset.revealed==='true')return;try{const plain=await decDisp(s,JSON.parse(b.dataset.cipher));b.innerHTML=`${esc(plain)}${tb}<div class="time">${time}</div>`;b.dataset.revealed='true';const d2=document.createElement('button');d2.className='msg-delete-btn';d2.textContent='✕';d2.addEventListener('click',ev=>{ev.stopPropagation();delMsg(mid)});b.appendChild(d2);setTimeout(()=>{if(b&&b.dataset.revealed==='true'){b.innerHTML=`<span class="encrypted-placeholder">🔒 암호화${tb}</span><div class="time">${time}</div>`;b.dataset.revealed='false';const d3=document.createElement('button');d3.className='msg-delete-btn';d3.textContent='✕';d3.addEventListener('click',e3=>{e3.stopPropagation();delMsg(mid)});b.appendChild(d3)}},3000)}catch{}},600)});
  b.addEventListener('pointerup',()=>clearTimeout(pt));b.addEventListener('pointercancel',()=>clearTimeout(pt));b.addEventListener('pointerleave',()=>clearTimeout(pt));
  return b;
}
function makeFileMsg(mid,who,fn,fs,pid,timer){
  const c=document.getElementById('messages'),d=document.createElement('div');d.className='msg '+(who==='me'?'me':who==='other'?'other':'system');d.id='file-msg-'+mid;
  const del=document.createElement('button');del.className='msg-delete-btn';del.textContent='✕';del.addEventListener('click',e=>{e.stopPropagation();delMsg(mid)});
  const sz=fs?fmtBytes(fs):'';d.innerHTML=`<div class="bubble"><div class="file-info">📎 ${esc(fn)}${sz?` (${sz})`:''}</div><div class="file-progress"><div class="file-progress-bar" id="file-bar-${mid}" style="width:0%"></div></div><div class="time">${new Date().toLocaleTimeString()}</div></div>`;
  d.querySelector('.bubble').appendChild(del);c.appendChild(d);c.scrollTop=c.scrollHeight;return d;
}
function updFileProg(mid,p){const b=document.getElementById('file-bar-'+mid);if(b)b.style.width=p+'%'}
function setFileDone(mid,url,fn){const d=document.getElementById('file-msg-'+mid);if(!d)return;const pg=d.querySelector('.file-progress');if(pg)pg.style.display='none';const fi=d.querySelector('.file-info');if(fi)fi.innerHTML=`📎 <a class="file-download" href="${url}" download="${esc(fn)}">${esc(fn)} 다운로드</a>`}
async function addEncDisp(pid,plain,who,mid,timer=0){
  if(pid!==activePeerId||isDest(pid)||isLocked)return;const s=sessions[pid];if(!s||!s.root){addMsgPlain(pid,plain,who,mid);return}
  try{
    const cipher=await getDisp(s,plain);const c=document.getElementById('messages'),d=document.createElement('div');
    d.className='msg '+(who==='me'?'me':who==='other'?'other':'system');if(mid)d.id='msg-'+mid;
    const time=new Date().toLocaleTimeString();const b=makeBubble(s,cipher,who,mid,time,pid,timer);d.appendChild(b);c.appendChild(d);c.scrollTop=c.scrollHeight;
  }catch(e){addMsgPlain(pid,plain,who,mid)}
}
function addMsgPlain(pid,text,who,mid){
  const c=document.getElementById('messages'),d=document.createElement('div');d.className='msg '+(who==='me'?'me':who==='other'?'other':'system');if(mid)d.id='msg-'+mid;
  const del=document.createElement('button');del.className='msg-delete-btn';del.textContent='✕';del.addEventListener('click',e=>{e.stopPropagation();delMsg(mid)});
  d.innerHTML=`<div class="bubble">${esc(text)}<div class="time">${new Date().toLocaleTimeString()}</div></div>`;d.querySelector('.bubble').appendChild(del);c.appendChild(d);c.scrollTop=c.scrollHeight;
}
function addMsg(pid,text,who,mid){if(pid!==activePeerId||isDest(pid)||isLocked)return;addMsgPlain(pid,text,who,mid)}
async function dispMsg(pid,text,who,mid){await addEncDisp(pid,text,who,mid)}

// 메시지 삭제
async function sendDelete(pid,mid){
  const s=sessions[pid];if(!s||!s.root||!s.conf)return;removeUI(mid);if(s.pending)s.pending=s.pending.filter(m=>m.msgId!==mid);
  const pl={type:'delete',id:mid};if(s.dc&&s.dc.readyState==='open'){try{const enc=await encAndSign(s,pl);s.dc.send(JSON.stringify({type:'msg',...enc}))}catch{}}
  else{try{const enc=await encAndSign(s,pl);const q=loadQ(pid);q.push(enc);saveQ(pid,q)}catch{}}
}
function delMsg(mid){const s=activePeerId?sessions[activePeerId]:null;if(s)sendDelete(activePeerId,mid).catch(()=>{})}
function removeUI(mid){const m=document.getElementById('msg-'+mid);if(m)m.remove();const f=document.getElementById('file-msg-'+mid);if(f)f.remove()}
function handleDel(pid,mid){const s=sessions[pid];if(!s)return;removeUI(mid);s.pending=s.pending.filter(m=>m.msgId!==mid);s.recIds.delete(mid)}

// 메시지 전송
async function sendText(){
  if(isLocked){alert('기기 잠금');return}if(!activePeerId||isDest(activePeerId))return;const s=sessions[activePeerId];if(!s)return;
  if(!s.root||!s.conf){alert('보안 세션 필요');return}const inp=document.getElementById('msgInput');const txt=inp.value.trim();if(!txt)return;
  const mid=uuid();const timer=selTimer;const pl={type:'text',content:txt,id:mid,timer};await sendPl(s,pl,txt,mid,timer);inp.value='';
}
async function sendPl(s,pl,display,mid,timer=0){
  if(s.dc&&s.dc.readyState==='open'&&s.root&&s.conf){
    try{const enc=await encAndSign(s,pl);s.dc.send(JSON.stringify({type:'msg',...enc}));await addEncDisp(activePeerId,display,'me',mid,timer);notify(display);schedClr();return}catch{}
  }
  if(s.root&&s.conf){try{const enc=await encAndSign(s,pl);const q=loadQ(activePeerId);q.push(enc);saveQ(activePeerId,q);await addEncDisp(activePeerId,display,'me',mid,timer);addMsg(activePeerId,'⏳ 오프라인 대기','system')}catch{addMsg(activePeerId,'암호화 실패','system')}}
}
function onMsg(pid,e){
  if(isDest(pid))return;if(hasPend(pid)){markDest(pid);goHome();return}const s=sessions[pid];if(!s)return;
  if(e.data instanceof ArrayBuffer){handleChunk(pid,e.data);return}
  try{const d=JSON.parse(e.data);if(d.type==='__ecdhe__'){handleEcdhe(pid,d);return}if(d.type==='__destroy_req__'){markDest(d.peerId||pid);goHome();return}
  if(d.type==='msg'){
    if(!s.root||!s.conf){addEncMsg(pid,d);return}
    decAndVerify(s,d).then(inner=>{if(!inner)return;if(inner.type==='__confirm__'){handleConf(pid,inner);return}
      if(inner.id&&s.recIds.has(inner.id))return;if(inner.id)s.recIds.add(inner.id);
      const tmr=inner.timer||0;
      switch(inner.type){
        case'text':recvEnc(pid,inner.content,'other',inner.id,tmr);sendRead(pid,inner.id);break;
        case'emoji':recvEnc(pid,inner.content,'other',inner.id,tmr);break;
        case'media':recvEnc(pid,`<img src="${inner.url}" style="max-width:200px;border-radius:12px;">`,'other',inner.id,tmr);break;
        case'read':markRead(pid,inner.id);break;
        case'file_start':fileStart(pid,inner);break;
        case'file_end':if(s.fileRcv&&s.fileRcv.id===inner.id)assembleFile(pid);break;
        case'delete':handleDel(pid,inner.id);break;
        case'__destroy__':markDest(pid);goHome();break;
      }
    }).catch(()=>addEncMsg(pid,d));
  }}catch{}
}
async function recvEnc(pid,plain,who,mid,tmr=0){const s=sessions[pid];if(!s)return;if(pid===activePeerId)await addEncDisp(pid,plain,who,mid,tmr);else{s.pending.push({content:plain,who,msgId:mid,timer:tmr});notify(plain);renderCon()}}
async function flushQ(pid){const s=sessions[pid];if(!s?.dc||s.dc.readyState!=='open'||!s.root||!s.conf)return;const q=loadQ(pid);if(!q.length)return;clearQ(pid);addMsg(pid,`📬 ${q.length}개 전송 중`,'system');for(const enc of q){try{s.dc.send(JSON.stringify({type:'msg',...enc}))}catch{const r=loadQ(pid);r.push(enc);saveQ(pid,r);break}}if(!loadQ(pid).length)addMsg(pid,'전송 완료','system')}
function addEncMsg(pid,raw){if(pid!==activePeerId||isDest(pid)||isLocked)return;const c=document.getElementById('messages'),d=document.createElement('div');d.className='msg system';d.innerHTML=`<div class="bubble"><strong>🔒 암호문</strong><br><span style="font-size:0.65rem;">${esc(JSON.stringify(raw))}</span></div>`;c.appendChild(d);c.scrollTop=c.scrollHeight}

// 파일 전송
async function handleFiles(files){for(const f of files)await sendFile(f)}
async function sendFile(file){
  const s=sessions[activePeerId];if(!s||!s.root||!s.conf||!s.dc||s.dc.readyState!=='open'){addMsg(activePeerId,'파일 전송 불가','system');return}
  const mid=uuid();const fek=await crypto.subtle.generateKey({name:'AES-GCM',length:256},true,['encrypt']);const rawFek=await crypto.subtle.exportKey('raw',fek);
  const iv=crypto.getRandomValues(new Uint8Array(12));const ab=await file.arrayBuffer();
  const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},fek,ab);const enc=new Uint8Array(iv.byteLength+ct.byteLength);enc.set(iv);enc.set(new Uint8Array(ct),iv.byteLength);
  const meta=await encAndSign(s,{type:'file_start',id:mid,name:file.name,size:enc.byteLength,fek:b2b64(rawFek)});
  s.dc.send(JSON.stringify({type:'msg',...meta}));makeFileMsg(mid,'me',file.name,file.size,activePeerId,selTimer);
  const cs=64*1024;let off=0;
  while(off<enc.byteLength){const end=Math.min(off+cs,enc.byteLength);s.dc.send(enc.slice(off,end).buffer);updFileProg(mid,Math.round((end/enc.byteLength)*100));off=end;await new Promise(r=>setTimeout(r,10))}
  const endEnc=await encAndSign(s,{type:'file_end',id:mid});s.dc.send(JSON.stringify({type:'msg',...endEnc}));setFileDone(mid,null,file.name);
}
function fileStart(pid,inner){const s=sessions[pid];if(!s)return;s.fileRcv={id:inner.id,name:inner.name,size:inner.size,fek:b64toBuf(inner.fek),chunks:[],recv:0};if(pid===activePeerId)makeFileMsg(inner.id,'other',inner.name,inner.size,pid);else{s.pending.push({content:`📥 ${inner.name} (${fmtBytes(inner.size)})`,who:'other',msgId:inner.id});renderCon()}}
function handleChunk(pid,buf){const s=sessions[pid];if(!s?.fileRcv)return;s.fileRcv.chunks.push(new Uint8Array(buf));s.fileRcv.recv+=buf.byteLength;if(pid===activePeerId)updFileProg(s.fileRcv.id,Math.round((s.fileRcv.recv/s.fileRcv.size)*100))}
async function assembleFile(pid){
  const s=sessions[pid];if(!s?.fileRcv)return;const fr=s.fileRcv;const blob=new Blob(fr.chunks);const iv=blob.slice(0,12);const ct=blob.slice(12);
  const key=await crypto.subtle.importKey('raw',fr.fek,'AES-GCM',false,['decrypt']);const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:await iv.arrayBuffer()},key,await ct.arrayBuffer());
  const url=URL.createObjectURL(new Blob([plain]));if(pid===activePeerId)setFileDone(fr.id,url,fr.name);
  else{const idx=s.pending.findIndex(m=>m.msgId===fr.id);if(idx>-1)s.pending[idx].content=`<a href="${url}" download="${esc(fr.name)}">📎 ${esc(fr.name)} 다운로드</a>`;notify(`${fr.name} 다운로드 준비`);renderCon()}s.fileRcv=null;
}

// 타이핑
async function encTyp(s,st){if(!s.tyKey)return null;const iv=crypto.getRandomValues(new Uint8Array(12));const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},s.tyKey,s2b(st));return{iv:Array.from(iv),ct:Array.from(new Uint8Array(ct))}}
async function decTyp(s,d){const iv=new Uint8Array(d.iv),ct=new Uint8Array(d.ct);const p=await crypto.subtle.decrypt({name:'AES-GCM',iv},s.tyKey,ct);return td.decode(p)}
function sendTyp(st){const s=sessions[activePeerId];if(s?.tyDC&&s.tyDC.readyState==='open'&&s.tyKey){encTyp(s,st?'1':'0').then(e=>e&&s.tyDC.send(JSON.stringify(e))).catch(()=>{})}}
document.getElementById('msgInput').addEventListener('input',()=>{sendTyp(true);const s=sessions[activePeerId];if(s){clearTimeout(s.tyTimer);s.tyTimer=setTimeout(()=>sendTyp(false),1500)}});

// 이모지/미디어
const EMO=['😀','😂','🥰','😎','🤔','👍','❤️','🔥','🎉','💯','😢','😡','🥺','🤯','✨','🍕','🚀','💻','📱','🎵'];
function buildEmoji(){document.getElementById('emojiGrid').innerHTML=EMO.map(e=>`<span class="emoji-item">${e}</span>`).join('')}
function togglePick(t){const p=document.getElementById(t+'Picker');const a=p.classList.contains('active');closeAllPicks();if(!a)p.classList.add('active')}
function closeAllPicks(){document.querySelectorAll('.picker-overlay').forEach(p=>p.classList.remove('active'))}
function sendEmoji(e){if(!activePeerId||isDest(activePeerId))return;const s=sessions[activePeerId];if(!s||!s.root||!s.conf)return;const mid=uuid();sendPl(s,{type:'emoji',content:e,id:mid},e,mid);closeAllPicks()}
function sendMedia(url){if(!activePeerId||isDest(activePeerId))return;const s=sessions[activePeerId];if(!s||!s.root||!s.conf)return;const mid=uuid();sendPl(s,{type:'media',url,id:mid},`<img src="${url}" style="max-width:200px;border-radius:12px;">`,mid);closeAllPicks()}
function addMediaUrl(){const u=document.getElementById('mediaSearch')?.value?.trim();if(!u)return;let fav=JSON.parse(localStorage.getItem('p2fav')||'[]');if(!fav.includes(u)){fav.push(u);localStorage.setItem('p2fav',JSON.stringify(fav))}document.getElementById('mediaSearch').value='';filterMedia();sendMedia(u)}
async function uploadSticker(files){if(!files||!files.length)return;for(const f of files){const r=new FileReader();r.onload=e=>{const u=e.target.result;let fav=JSON.parse(localStorage.getItem('p2fav')||'[]');fav.push(u);localStorage.setItem('p2fav',JSON.stringify(fav));filterMedia();sendMedia(u)};r.readAsDataURL(f)}}
function filterMedia(){const q=document.getElementById('mediaSearch')?.value?.toLowerCase()||'';const fav=JSON.parse(localStorage.getItem('p2fav')||'[]');const g=document.getElementById('mediaGrid');g.innerHTML=fav.filter(u=>u.toLowerCase().includes(q)).map(u=>`<div class="picker-item"><img src="${u}" alt="media"></div>`).join('')}
function sendRead(pid,mid){const s=sessions[pid];if(!s?.root||!s.conf||!s.dc||s.dc.readyState!=='open')return;try{encAndSign(s,{type:'read',id:mid}).then(e=>s.dc.send(JSON.stringify({type:'msg',...e}))).catch(()=>{})}catch{}}
function markRead(pid,mid){const el=document.getElementById('msg-'+mid);if(el){const t=el.querySelector('.time');if(t&&!t.querySelector('.read-status'))t.innerHTML+=' <span class="read-status" style="color:var(--success);">✓✓</span>'}}

// 기기 잠금
let lockPw=null,inaTimer=null,isLocked=false;
function resetInact(){if(isLocked)return;clearTimeout(inaTimer);inaTimer=setTimeout(lockDev,30000)}
function lockDev(){if(isLocked)return;const s=activePeerId?sessions[activePeerId]:null;if(!s?.pw)return;isLocked=true;lockPw=s.pw;document.getElementById('lockOverlay').classList.remove('hidden');clearRevealed();lockBubbles()}
function unlockDev(){const inp=document.getElementById('lockPasswordInput').value.trim();if(!inp||inp!==lockPw){alert('암호 불일치');return}isLocked=false;lockPw=null;document.getElementById('lockOverlay').classList.add('hidden');document.getElementById('lockPasswordInput').value='';resetInact()}
function lockBubbles(){document.querySelectorAll('.bubble[data-revealed="true"]').forEach(b=>{b.dataset.revealed='false';const t=b.querySelector('.time')?.textContent||'';b.innerHTML=`<span class="encrypted-placeholder">🔒 암호화</span><div class="time">${t}</div>`})}
function clearRevealed(){document.querySelectorAll('.bubble[data-revealed="true"]').forEach(b=>{b.dataset.revealed='false';const t=b.querySelector('.time')?.textContent||'';b.innerHTML=`<span class="encrypted-placeholder">🔒 암호화</span><div class="time">${t}</div>`})}
['click','keydown','touchstart','pointermove'].forEach(e=>document.addEventListener(e,resetInact,{passive:true}));

// 클립보드
let cbTimer=null;function schedClr(){clearTimeout(cbTimer);cbTimer=setTimeout(()=>{if(navigator.clipboard?.writeText)navigator.clipboard.writeText('').catch(()=>{})},10000)}

// 스크린샷 탐지
let lastVis=Date.now();document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden'){lastVis=Date.now();if(activePeerId&&sessions[activePeerId]?.root)lockBubbles()}else if(document.visibilityState==='visible'){if(Date.now()-lastVis<200)console.warn('⚠️ 의심 화면 전환')}});

// 삭제 로직
async function destroyChat(pid){const s=sessions[pid];if(!s){markDest(pid);rmCon(pid);goHome();return}setPend(pid);s.dRetry=0;if(activePeerId===pid)goHome();await trySendDestroy(pid);rmCon(pid)}
async function destroyActive(){if(activePeerId)await destroyChat(activePeerId)}

// devtools 탐지
(function(){let open=false;setInterval(()=>{const s=performance.now();debugger;if(performance.now()-s>160&&!open){open=true;for(const[,ss]of Object.entries(sessions)){ss.root=null;ss.sCK=null;ss.rCK=null;ss.tyKey=null}lockDev();alert('개발자 도구 감지')}},1000)})();

// URL 해시
async function chkHash(){const h=location.hash.substring(1);if(!h)return;const p=new URLSearchParams(h);if(p.has('offer')&&p.has('peer')){const pid=p.get('peer');if(isDest(pid)||hasPend(pid)){alert('삭제된 대화');return}const offer=decSDP(p.get('offer'));if(!getCon().find(c=>c.id===pid))addCon(pid,'상대방');activePeerId=pid;const s=getSess(pid);s.isOff=false;initPC(pid);await s.pc.setRemoteDescription(offer);const ans=await s.pc.createAnswer();await s.pc.setLocalDescription(ans);await waitIce(s.pc);const ansB64=encSDP(s.pc.localDescription);showView('chatScreen');document.getElementById('chatTitle').textContent='상대방';document.getElementById('passwordPrompt').style.display='block';document.getElementById('answerModalLink').textContent=location.origin+location.pathname+'#answer='+ansB64+'&peer='+pid;document.getElementById('answerModal').classList.remove('hidden');renderCon()}else if(p.has('answer')&&p.has('peer')){const pid=p.get('peer');if(isDest(pid)||hasPend(pid))return;const ans=decSDP(p.get('answer'));if(!getCon().find(c=>c.id===pid))addCon(pid,'상대방');let s=sessions[pid];if(!s||!s.pc){s=getSess(pid);s.isOff=true;initPC(pid);s.dc=s.pc.createDataChannel('chat',{ordered:true});setupDC(pid)}if(s.pc){await s.pc.setRemoteDescription(ans);activePeerId=pid;showView('chatScreen');document.getElementById('chatTitle').textContent=getCon().find(c=>c.id===pid)?.name||'채팅';document.getElementById('passwordPrompt').style.display='block'}renderCon()}}
window.addEventListener('hashchange',chkHash);

  document.getElementById('joinChatBtn').addEventListener('click',showJoin);
  document.getElementById('confirmNewChatBtn').addEventListener('click',newChat);
  document.getElementById('cancelNewChatBtn').addEventListener('click',closeName);
  document.getElementById('copyOfferLinkBtn').addEventListener('click',()=>copyById('offerLinkDisplay'));
  document.getElementById('applyAnswerBtn').addEventListener('click',applyAns);
  document.getElementById('offerHomeBtn').addEventListener('click',goHome);
  document.getElementById('createAnswerBtn').addEventListener('click',createAns);

  document.getElementById('submitPasswordBtn').addEventListener('click',submitPw);

  document.getElementById('stickerBtn').addEventListener('click',()=>document.getElementById('stickerFileInput').click());
  document.getElementById('stickerFileInput').addEventListener('change',e=>uploadSticker(e.target.files));
  document.getElementById('mediaSearch').addEventListener('keydown',e=>{if(e.key==='Enter')addMediaUrl()});
  document.getElementById('attachBtn').addEventListener('click',()=>document.getElementById('fileInput').click());
  document.getElementById('fileInput').addEventListener('change',e=>handleFiles(e.target.files));
  document.getElementById('sendBtn').addEventListener('click',sendText);
  document.getElementById('msgInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendText()}});
  document.getElementById('copyAnswerBtn').addEventListener('click',copyAnsLink);
  document.getElementById('closeAnswerModalBtn').addEventListener('click',closeAnsModal);
  document.getElementById('confirmDestroyBtn').addEventListener('click',confDestroy);
  document.getElementById('cancelDestroyBtn').addEventListener('click',hideDestroy);
  document.getElementById('unlockBtn').addEventListener('click',unlockDev);
  document.getElementById('emojiGrid').addEventListener('click',e=>{if(e.target.classList.contains('emoji-item'))sendEmoji(e.target.textContent)});
  document.getElementById('mediaGrid').addEventListener('click',e=>{const img=e.target.closest('.picker-item img');if(img)sendMedia(img.src)});
}
function copyById(id){const el=document.getElementById(id);const t=el.tagName==='INPUT'||el.tagName==='TEXTAREA'?el.value:el.textContent;navigator.clipboard.writeText(t).catch(()=>{});schedClr()}
function notify(c){if(document.visibilityState==='hidden'&&Notification.permission==='granted')new Notification('P2P 비밀채팅',{body:c})}

// 초기화
buildEmoji();renderCon();chkHash();showView('simpleMode');bind();resetInact();
})();
