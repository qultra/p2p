const ECDH_ALG = { name: 'ECDH', namedCurve: 'P-521' };
const PBKDF2_ITERS = 20000000;
const SALT_SIZE = 4096;
const AES_LEN = 256;
const HMAC_HASH = 'SHA-512';
const TYPING_AES_LEN = 128;
const PADDING_MIN = 256, PADDING_MAX = 512;

// ─── 세션 객체 ────────────────────────────────
function getOrCreateSession(peerId) {
  if (!sessions[peerId]) sessions[peerId] = {
    pc: null, dc: null, typingDC: null, typingKey: null, isOfferer: false, password: null,
    rootKey: null, sendChainKey: null, recvChainKey: null, sendMsgNum: 0, recvMsgNum: 0,
    ourEphemeralKeyPair: null, theirEphemeralPub: null,
    salt: null, ourEcdhPair: null, peerEcdhPub: null,
    handshakeDone: false, confirmed: false, isOnline: false,
    receivedMessageIds: new Set(), pendingMessages: [],
    fileReceive: null, typingTimer: null, reconnectAttempts: 0,
    pendingConfirm: null, destroyRetry: 0
  };
  return sessions[peerId];
}
function isDestroyed(peerId) { return !!(localStorage.getItem(DESTROY_PREFIX + peerId) || sessionStorage.getItem(DESTROY_PREFIX + peerId)); }
function markDestroyed(peerId) { localStorage.setItem(DESTROY_PREFIX + peerId, Date.now()); sessionStorage.setItem(DESTROY_PREFIX + peerId, Date.now()); clearPendingDestroy(peerId); clearOfflineQueue(peerId); if (location.hash) history.replaceState(null, '', location.pathname); }
setInterval(() => { if (activePeerId && isDestroyed(activePeerId)) goHome(); }, 500);

// ─── 연락처 ───────────────────────────────────
function getContacts() { try { return JSON.parse(localStorage.getItem('p2p_contacts') || '[]'); } catch (e) { return []; } }
function saveContacts(contacts) { localStorage.setItem('p2p_contacts', JSON.stringify(contacts)); }
function addContact(peerId, name) { let contacts = getContacts(); if (!contacts.find(c => c.id === peerId)) { contacts.push({ id: peerId, name }); saveContacts(contacts); } renderContactList(); }
function renameChat() { if (!activePeerId) return; const contacts = getContacts(); const c = contacts.find(c => c.id === activePeerId); if (!c) return; const newName = prompt('새 이름:', c.name); if (newName) { c.name = newName; saveContacts(contacts); document.getElementById('chatTitle').textContent = newName; renderContactList(); } }
function renderContactList() {
  const container = document.getElementById('contactList'); if (!container) return;
  const contacts = getContacts().filter(c => !isDestroyed(c.id));
  container.innerHTML = contacts.map(c => {
    const sess = sessions[c.id]; const online = sess && sess.isOnline;
    const unread = sess ? sess.pendingMessages.length : 0;
    const unreadBadge = unread > 0 ? `<span class="unread-badge">${unread}</span>` : '';
    return `<div class="contact-card ${c.id === activePeerId ? 'active' : ''}" data-peerid="${c.id}"><div class="contact-avatar">${escapeHtml(c.name).charAt(0)}<span class="contact-dot ${online ? 'on' : 'off'}"></span></div><div class="contact-info"><div class="contact-name">${escapeHtml(c.name)} ${unreadBadge}</div><div class="contact-status">${online ? '온라인' : '오프라인'}</div></div></div>`;
  }).join('');
  // attach click events
  container.querySelectorAll('.contact-card').forEach(card => {
    card.addEventListener('click', () => selectPeer(card.dataset.peerid));
  });
}

// ─── UI 전환 ──────────────────────────────────
function showView(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
  const target = document.getElementById(viewId);
  if (target) { target.classList.remove('hidden'); target.style.display = viewId === 'chatScreen' ? 'flex' : ''; }
}
async function selectPeer(peerId) {
  if (isDestroyed(peerId)) { alert('이 대화는 삭제되었습니다.'); return; }
  if (hasPendingDestroy(peerId)) { markDestroyed(peerId); alert('이 대화는 삭제 요청되었습니다.'); renderContactList(); return; }
  activePeerId = peerId; showView('chatScreen');
  document.getElementById('messages').innerHTML = '';
  const sess = getOrCreateSession(peerId);
  // load offline queue
  const queue = await loadOfflineQueue(peerId);
  if (queue.length > 0) {
    addMsg(peerId, `📬 ${queue.length}개의 저장된 메시지가 있습니다.`, 'system');
  }
  sess.pendingMessages.forEach(msg => { displayDecryptedMessage(peerId, msg.content, msg.who, msg.id); });
  sess.pendingMessages = [];
  document.getElementById('chatTitle').textContent = getContacts().find(c => c.id === peerId)?.name || '채팅';
  updateConn(sess.isOnline);
  const securityCard = document.getElementById('securityCard');
  const passPrompt = document.getElementById('passwordPrompt');
  if (sess.rootKey && sess.confirmed) {
    securityCard.style.display = 'flex';
    passPrompt.style.display = 'none';
  } else {
    securityCard.style.display = 'none';
    passPrompt.style.display = 'block';
  }
  renderContactList();
}
function goHome() { activePeerId = null; showView('simpleMode'); document.getElementById('messages').innerHTML = ''; document.getElementById('securityCard').style.display = 'none'; document.getElementById('passwordPrompt').style.display = 'block'; updateConn(false); renderContactList(); }

// ─── 모달 & 연결 패널 ─────────────────────────
function showNameModal() { document.getElementById('nameModal').classList.remove('hidden'); document.getElementById('peerNameInput').focus(); }
function closeNameModal() { document.getElementById('nameModal').classList.add('hidden'); }
async function confirmNewChat() {
  const name = document.getElementById('peerNameInput').value.trim();
  if (!name) return alert('이름을 입력해주세요.');
  closeNameModal();
  const peerId = genUUID(); addContact(peerId, name); activePeerId = peerId;
  const sess = getOrCreateSession(peerId); sess.isOfferer = true;
  showView('offerPanel'); document.getElementById('offerSpinner').style.display = 'inline-block';
  document.getElementById('offerLinkDisplay').textContent = '생성 중...';
  initPC(peerId);
  sess.dc = sess.pc.createDataChannel('chat', { ordered: true });
  sess.typingDC = sess.pc.createDataChannel('typing', { ordered: false, maxRetransmits: 0 });
  setupDC(peerId); setupTypingDC(peerId);
  sess.pc.createOffer().then(o => sess.pc.setLocalDescription(o)).then(() => waitIce(sess.pc).then(() => {
    document.getElementById('offerSpinner').style.display = 'none';
    const offerB64 = encodeSDP(sess.pc.localDescription);
    document.getElementById('offerLinkDisplay').textContent = location.origin + location.pathname + '#offer=' + offerB64 + '&peer=' + peerId;
  }));
  renderContactList();
}
function showJoinPanel() { showView('answerPanel'); }
async function createAnswerFromOffer() {
  const t = document.getElementById('remoteOfferSDP').value.trim(); if (!t) return;
  let offerStr = t; let peerId;
  if (t.startsWith('http')) { const u = new URL(t); const hp = new URLSearchParams(u.hash.substring(1)); if (!hp.has('offer')) { alert('올바른 초대 링크가 아닙니다.'); return; } offerStr = hp.get('offer'); peerId = hp.get('peer') || genUUID(); }
  else { peerId = genUUID(); }
  const offer = decodeSDP(offerStr); addContact(peerId, '상대방'); activePeerId = peerId;
  const sess = getOrCreateSession(peerId); sess.isOfferer = false; initPC(peerId);
  await sess.pc.setRemoteDescription(offer);
  const ans = await sess.pc.createAnswer(); await sess.pc.setLocalDescription(ans); await waitIce(sess.pc);
  const answerB64 = encodeSDP(sess.pc.localDescription);
  showView('chatScreen'); document.getElementById('chatTitle').textContent = '상대방';
  document.getElementById('passwordPrompt').style.display = 'block';
  document.getElementById('answerModalLink').textContent = location.origin + location.pathname + '#answer=' + answerB64 + '&peer=' + peerId;
  document.getElementById('answerModal').classList.remove('hidden');
  renderContactList();
}
function closeAnswerModal() { document.getElementById('answerModal').classList.add('hidden'); }
function copyAnswerModalLink() { const text = document.getElementById('answerModalLink').textContent; navigator.clipboard.writeText(text).then(() => alert('복사됨')).catch(() => prompt('복사:', text)); }
async function applyAnswerLink() {
  const l = document.getElementById('answerLinkInput').value.trim(); if (!l) return;
  if (!activePeerId || !sessions[activePeerId]?.pc || !sessions[activePeerId]?.isOfferer) { alert('먼저 "새 채팅 생성"을 눌러 연결을 시작한 후 Answer 링크를 적용하세요.'); return; }
  try {
    let answerStr = l; if (l.startsWith('http')) { const u = new URL(l); const hp = new URLSearchParams(u.hash.substring(1)); if (!hp.has('answer')) { alert('올바르지 않은 Answer 링크입니다.'); return; } answerStr = hp.get('answer'); }
    await sessions[activePeerId].pc.setRemoteDescription(decodeSDP(answerStr));
    showView('chatScreen'); document.getElementById('chatTitle').textContent = getContacts().find(c => c.id === activePeerId)?.name || '채팅';
    document.getElementById('passwordPrompt').style.display = 'block';
  } catch (e) { alert('Answer 링크 적용 실패'); }
}
function waitIce(pc) { return new Promise(r => { if (pc.iceGatheringState === 'complete') r(); else pc.addEventListener('icegatheringstatechange', () => { if (pc.iceGatheringState === 'complete') r(); }); }); }

// ─── WebRTC 연결 ──────────────────────────────
function initPC(peerId) {
  const sess = sessions[peerId];
  if (sess.pc) { sess.pc.close(); }
  sess.pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  sess.pc.oniceconnectionstatechange = () => {
    const state = sess.pc.iceConnectionState;
    if (state === 'connected' || state === 'completed') {
      sess.isOnline = true; updateConn(true); renderContactList();
      sess.reconnectAttempts = 0;
      if (hasPendingDestroy(peerId)) trySendDestroy(peerId);
    } else if (state === 'disconnected' || state === 'failed' || state === 'closed') {
      const wasOnline = sess.isOnline;
      sess.isOnline = false; updateConn(false);
      if (wasOnline) {
        sendClearRevealed(peerId);
        clearRevealedMessages(peerId);
      }
      if (state === 'failed') {
        if (sess.reconnectAttempts < 3) {
          sess.reconnectAttempts++;
          setTimeout(() => { if (sess.pc && sess.pc.iceConnectionState === 'failed') try { sess.pc.restartIce(); } catch (e) {} }, 2000);
        } else {
          sess.handshakeDone = false; sess.rootKey = null; sess.sendChainKey = null; sess.recvChainKey = null; sess.confirmed = false;
          addMsg(peerId, '⚠️ 연결이 완전히 끊어졌습니다. 재연결 시 보안 세션이 초기화됩니다.', 'system');
        }
      }
    }
  };
  sess.pc.ondatachannel = e => {
    if (e.channel.label === 'chat') { sess.dc = e.channel; setupDC(peerId); }
    else if (e.channel.label === 'typing') { sess.typingDC = e.channel; setupTypingDC(peerId); }
  };
}
function setupDC(peerId) {
  const sess = sessions[peerId]; if (!sess?.dc) return;
  sess.dc.onopen = () => {
    if (isDestroyed(peerId)) return;
    sess.isOnline = true; updateConn(true); renderContactList();
    if (hasPendingDestroy(peerId)) {
      trySendDestroy(peerId);
      return;
    }
    if (sess.handshakeDone) {
      addMsg(peerId, '🔄 연결이 복구되었습니다. 보안 세션을 재수립합니다.', 'system');
      sess.handshakeDone = false; sess.rootKey = null; sess.sendChainKey = null; sess.recvChainKey = null; sess.typingKey = null; sess.confirmed = false;
      startEcdhExchange(peerId);
    } else if (!sess.handshakeDone && !sess.rootKey) {
      if (!sess.ourEcdhPair) startEcdhExchange(peerId);
    }
  };
  sess.dc.onmessage = e => onMsg(peerId, e);
  sess.dc.onclose = () => {
    const wasOnline = sess.isOnline;
    sess.isOnline = false; updateConn(false); renderContactList();
    if (wasOnline) {
      sendClearRevealed(peerId);
      clearRevealedMessages(peerId);
    }
  };
}
function setupTypingDC(peerId) {
  const sess = sessions[peerId]; if (!sess?.typingDC) return;
  sess.typingDC.onmessage = e => {
    if (typeof e.data === 'string') {
      try { const enc = JSON.parse(e.data); if (enc.type === '__destroy_req__') { markDestroyed(enc.peerId || peerId); goHome(); return; } decryptTyping(sess, enc).then(state => { if (peerId === activePeerId) document.getElementById('typingIndicator').style.display = state === '1' ? 'block' : 'none'; }).catch(() => {}); } catch (ex) {}
    }
  };
}

// ─── 삭제 전파 ────────────────────────────────
function sendRawDestroy(peerId) {
  const sess = sessions[peerId];
  if (!sess) return false;
  let sent = false;
  const destroyMsg = JSON.stringify({ type: '__destroy_req__', peerId, ts: Date.now() });
  const channels = [sess.dc, sess.typingDC].filter(c => c && c.readyState === 'open');
  for (const ch of channels) {
    try { ch.send(destroyMsg); sent = true; } catch (e) {}
  }
  return sent;
}

async function trySendDestroy(peerId) {
  const sess = sessions[peerId];
  if (!sess) { markDestroyed(peerId); goHome(); return; }
  const rawSent = sendRawDestroy(peerId);
  if (rawSent) {
    clearPendingDestroy(peerId);
    markDestroyed(peerId);
    if (activePeerId === peerId) goHome();
    if (sess.pc) { sess.pc.close(); delete sessions[peerId]; }
    renderContactList();
    return;
  }
  if (sess.rootKey && sess.confirmed && sess.dc && sess.dc.readyState === 'open') {
    try {
      const destroyPayload = { type: '__destroy__', timestamp: Date.now(), id: genUUID() };
      const enc = await encryptPayload(sess, destroyPayload);
      sess.dc.send(JSON.stringify({ type: 'msg', ...enc }));
      clearPendingDestroy(peerId);
      markDestroyed(peerId);
      if (activePeerId === peerId) goHome();
      if (sess.pc) { sess.pc.close(); delete sessions[peerId]; }
      renderContactList();
      return;
    } catch (e) {}
  }
  if (sess.destroyRetry < 30) {
    sess.destroyRetry++;
    setTimeout(() => trySendDestroy(peerId), 300);
  } else {
    clearPendingDestroy(peerId);
    markDestroyed(peerId);
    if (activePeerId === peerId) goHome();
    if (sess.pc) { sess.pc.close(); delete sessions[peerId]; }
    renderContactList();
  }
}

// ─── 오프라인 시 열람 메시지 삭제 ──────────────
function sendClearRevealed(peerId) {
  const sess = sessions[peerId];
  if (!sess) return;
  const msg = JSON.stringify({ type: '__clear_revealed__' });
  [sess.dc, sess.typingDC].forEach(ch => {
    if (ch && ch.readyState === 'open') { try { ch.send(msg); } catch (e) {} }
  });
}
function clearRevealedMessages(peerId) {
  if (peerId !== activePeerId) return;
  const messagesDiv = document.getElementById('messages');
  if (!messagesDiv) return;
  const revealed = messagesDiv.querySelectorAll('.bubble[data-revealed="true"]');
  revealed.forEach(el => { const msgDiv = el.closest('.msg'); if (msgDiv) msgDiv.remove(); });
}

// ─── 더블 래칫 핵심 ──────────────────────────
async function startEcdhExchange(peerId) {
  const sess = sessions[peerId];
  try {
    const keyPair = await crypto.subtle.generateKey(ECDH_ALG, true, ['deriveKey','deriveBits']);
    sess.ourEcdhPair = { privateKey: keyPair.privateKey, publicKey: keyPair.publicKey };
    const pubRaw = await crypto.subtle.exportKey('raw', sess.ourEcdhPair.publicKey);
    if (sess.isOfferer) {
      sess.salt = crypto.getRandomValues(new Uint8Array(SALT_SIZE));
      if (sess.dc && sess.dc.readyState === 'open') sess.dc.send(JSON.stringify({ type: '__ecdhe__', salt: buf2b64(sess.salt.buffer), pubKey: buf2b64(pubRaw) }));
    } else {
      if (sess.dc && sess.dc.readyState === 'open') sess.dc.send(JSON.stringify({ type: '__ecdhe__', pubKey: buf2b64(pubRaw) }));
    }
  } catch (e) { addMsg(peerId, '보안 키 교환 시작 오류', 'system'); }
}
async function handleEcdheMessage(peerId, data) {
  const sess = sessions[peerId];
  if (sess.handshakeDone) return;
  try {
    if (data.salt) sess.salt = new Uint8Array(b642buf(data.salt));
    sess.peerEcdhPub = await crypto.subtle.importKey('raw', b642buf(data.pubKey), ECDH_ALG, true, []);
    if (sess.password && sess.ourEcdhPair && sess.peerEcdhPub && sess.salt) await deriveSessionKey(peerId);
  } catch (e) { addMsg(peerId, '키 교환 처리 실패', 'system'); }
}
async function submitPassword() {
  if (!activePeerId) { alert('대화 상대가 선택되지 않았습니다.'); return; }
  const sess = sessions[activePeerId];
  if (!sess) { alert('세션 정보를 찾을 수 없습니다.'); return; }
  const password = document.getElementById('chatPasswordInput').value.trim();
  if (!password) { document.getElementById('passwordError').textContent = '암호를 입력하세요.'; document.getElementById('passwordError').style.display = 'block'; return; }
  sess.password = password;
  if (sess.salt && sess.ourEcdhPair && sess.peerEcdhPub) {
    await deriveSessionKey(activePeerId);
  } else {
    document.getElementById('passwordError').textContent = '아직 보안 연결이 준비되지 않았습니다. 잠시 후 다시 시도해주세요.';
    document.getElementById('passwordError').style.display = 'block';
  }
}
async function deriveSessionKey(peerId) {
  const sess = sessions[peerId];
  try {
    const km = await crypto.subtle.importKey('raw', str2buf(sess.password), 'PBKDF2', false, ['deriveKey']);
    sess.authKey = await crypto.subtle.deriveKey({ name: 'PBKDF2', salt: sess.salt, iterations: PBKDF2_ITERS, hash: 'SHA-512' }, km, { name: 'AES-GCM', length: AES_LEN }, true, ['encrypt', 'decrypt']);
    const ecdhBits = await crypto.subtle.deriveBits({ name: 'ECDH', public: sess.peerEcdhPub }, sess.ourEcdhPair.privateKey, 521);
    const authRaw = await crypto.subtle.exportKey('raw', sess.authKey);
    const ikm = concatBufs(ecdhBits, str2buf(sess.password));
    const hkdfKey = await crypto.subtle.importKey('raw', ikm, 'HKDF', false, ['deriveBits']);
    const rootKey = await crypto.subtle.deriveBits({ name: 'HKDF', hash: 'SHA-512', salt: authRaw, info: str2buf('root') }, hkdfKey, 256);
    sess.rootKey = rootKey;
    sess.ourEphemeralKeyPair = sess.ourEcdhPair;
    sess.theirEphemeralPub = sess.peerEcdhPub;
    const typingKeyRaw = new Uint8Array(rootKey).slice(0, 16);
    sess.typingKey = await crypto.subtle.importKey('raw', typingKeyRaw, { name: 'AES-GCM', length: TYPING_AES_LEN }, false, ['encrypt', 'decrypt']);
    sess.handshakeDone = true;
    if (sess.isOfferer) await sendConfirmation(peerId);
    if (sess.pendingConfirm) {
      const pending = sess.pendingConfirm; sess.pendingConfirm = null;
      await handleConfirmation(peerId, pending);
    }
    if (peerId === activePeerId) {
      document.getElementById('securityCard').style.display = 'flex';
      document.getElementById('securityStatus').textContent = '🔒 보안 세션 활성';
      document.getElementById('passwordPrompt').style.display = 'none';
      document.getElementById('passwordError').style.display = 'none';
    }
  } catch (e) {
    if (peerId === activePeerId) {
      document.getElementById('passwordError').textContent = '세션 키 생성 실패: ' + e.message;
      document.getElementById('passwordError').style.display = 'block';
    }
  }
}
async function sendConfirmation(peerId) {
  const sess = sessions[peerId];
  if (!sess.rootKey || !sess.dc || sess.dc.readyState !== 'open') return;
  const newKeyPair = await crypto.subtle.generateKey(ECDH_ALG, true, ['deriveKey','deriveBits']);
  sess.ourEphemeralKeyPair = newKeyPair;
  const newChainKey = await dhRatchet(sess, newKeyPair.privateKey, sess.theirEphemeralPub);
  sess.sendChainKey = newChainKey; sess.sendMsgNum = 0;
  const pubRaw = await crypto.subtle.exportKey('raw', newKeyPair.publicKey);
  sess.dc.send(JSON.stringify({ type: '__confirm__', dhPub: buf2b64(pubRaw) }));
}
async function handleConfirmation(peerId, data) {
  const sess = sessions[peerId];
  if (!sess.rootKey) { sess.pendingConfirm = data; return; }
  if (data.dhPub) await processReceivedRatchet(sess, data.dhPub);
  sess.confirmed = true;
  if (!sess.isOfferer) await sendConfirmation(peerId);
  if (peerId === activePeerId) {
    document.getElementById('securityCard').style.display = 'flex';
    document.getElementById('securityStatus').textContent = '🔒 보안 세션 활성';
    document.getElementById('passwordPrompt').style.display = 'none';
    document.getElementById('passwordError').style.display = 'none';
  }
  flushOfflineQueue(peerId);
}
async function dhRatchet(sess, ourNewPriv, theirPub) {
  const dhBits = await crypto.subtle.deriveBits({ name: 'ECDH', public: theirPub }, ourNewPriv, 521);
  const ikm = concatBufs(dhBits, sess.rootKey);
  const hkdfKey = await crypto.subtle.importKey('raw', ikm, 'HKDF', false, ['deriveBits']);
  const okm = await crypto.subtle.deriveBits({ name: 'HKDF', hash: 'SHA-512', salt: new Uint8Array(32), info: str2buf('double-ratchet') }, hkdfKey, 512);
  sess.rootKey = okm.slice(0, 32);
  return okm.slice(32, 64);
}
async function symmetricRatchet(chainKey) {
  const ck = await crypto.subtle.importKey('raw', chainKey, { name: 'HMAC', hash: 'SHA-512' }, false, ['sign']);
  const msgKeySig = await crypto.subtle.sign('HMAC', ck, new Uint8Array([1]));
  const nextChainKeySig = await crypto.subtle.sign('HMAC', ck, new Uint8Array([2]));
  return { msgKey: msgKeySig.slice(0, 32), nextChainKey: nextChainKeySig.slice(0, 32) };
}
async function performSendingRatchetIfNeeded(sess) {
  if (!sess.sendChainKey) {
    const newKeyPair = await crypto.subtle.generateKey(ECDH_ALG, true, ['deriveKey','deriveBits']);
    sess.ourEphemeralKeyPair = newKeyPair;
    const newChainKey = await dhRatchet(sess, newKeyPair.privateKey, sess.theirEphemeralPub);
    sess.sendChainKey = newChainKey; sess.sendMsgNum = 0;
    const pubRaw = await crypto.subtle.exportKey('raw', newKeyPair.publicKey);
    return buf2b64(pubRaw);
  }
  return null;
}
async function encryptPayload(sess, obj) {
  const dhPub = await performSendingRatchetIfNeeded(sess);
  const { msgKey, nextChainKey } = await symmetricRatchet(sess.sendChainKey);
  sess.sendChainKey = nextChainKey;
  const seq = sess.sendMsgNum++;
  const iv = crypto.getRandomValues(new Uint8Array(16));
  const padLen = PADDING_MIN + Math.floor(crypto.getRandomValues(new Uint8Array(1))[0] / 256 * (PADDING_MAX - PADDING_MIN));
  const padded = { ...obj, _pad: buf2b64(crypto.getRandomValues(new Uint8Array(padLen)).buffer) };
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, await crypto.subtle.importKey('raw', msgKey, 'AES-GCM', false, ['encrypt']), str2buf(JSON.stringify(padded)));
  const result = { seq, iv: Array.from(new Uint8Array(iv)), ct: Array.from(new Uint8Array(ct)) };
  if (dhPub) result.dhPub = dhPub;
  return result;
}
async function processReceivedRatchet(sess, dhPubB64) {
  const pubRaw = b642buf(dhPubB64);
  const peerPub = await crypto.subtle.importKey('raw', pubRaw, ECDH_ALG, true, []);
  const newRecvChainKey = await dhRatchet(sess, sess.ourEphemeralKeyPair.privateKey, peerPub);
  sess.recvChainKey = newRecvChainKey; sess.recvMsgNum = 0;
  sess.theirEphemeralPub = peerPub;
}
async function decryptPayload(sess, d) {
  if (d.dhPub) await processReceivedRatchet(sess, d.dhPub);
  if (!sess.recvChainKey) throw new Error('수신 체인 없음');
  const { seq, iv, ct } = d;
  if (seq < sess.recvMsgNum) return null;
  while (sess.recvMsgNum < seq) {
    const { nextChainKey } = await symmetricRatchet(sess.recvChainKey);
    sess.recvChainKey = nextChainKey;
    sess.recvMsgNum++;
  }
  const { msgKey, nextChainKey } = await symmetricRatchet(sess.recvChainKey);
  sess.recvChainKey = nextChainKey;
  sess.recvMsgNum = seq + 1;
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: new Uint8Array(iv) }, await crypto.subtle.importKey('raw', msgKey, 'AES-GCM', false, ['decrypt']), new Uint8Array(ct));
  const obj = JSON.parse(textDecoder.decode(plain));
  delete obj._pad;
  return obj;
}

// ─── DOM 암호화 표시 (평문 노출 방지) ─────────
async function getDisplayCipher(sess, plainText) {
  // display encryption: random key, encrypt plain, encrypt key with root
  const displayKey = await crypto.subtle.generateKey({name:'AES-GCM', length:128}, true, ['encrypt']);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({name:'AES-GCM', iv}, displayKey, str2buf(plainText));
  const rawDisplayKey = await crypto.subtle.exportKey('raw', displayKey);
  // encrypt display key with root-derived key
  const rootEncKey = await crypto.subtle.importKey('raw', sess.rootKey.slice(0,16), 'AES-GCM', false, ['encrypt']);
  const keyIv = crypto.getRandomValues(new Uint8Array(12));
  const encKey = await crypto.subtle.encrypt({name:'AES-GCM', iv: keyIv}, rootEncKey, rawDisplayKey);
  return {
    iv: Array.from(new Uint8Array(iv)),
    ct: Array.from(new Uint8Array(ct)),
    keyIv: Array.from(new Uint8Array(keyIv)),
    encKey: Array.from(new Uint8Array(encKey))
  };
}
async function decryptDisplay(sess, cipher) {
  const rootEncKey = await crypto.subtle.importKey('raw', sess.rootKey.slice(0,16), 'AES-GCM', false, ['decrypt']);
  const rawKey = await crypto.subtle.decrypt({name:'AES-GCM', iv: new Uint8Array(cipher.keyIv)}, rootEncKey, new Uint8Array(cipher.encKey));
  const displayKey = await crypto.subtle.importKey('raw', rawKey, 'AES-GCM', false, ['decrypt']);
  const plain = await crypto.subtle.decrypt({name:'AES-GCM', iv: new Uint8Array(cipher.iv)}, displayKey, new Uint8Array(cipher.ct));
  return textDecoder.decode(plain);
}

function createEncryptedBubble(sess, cipher, who, msgId, time) {
  const bubble = document.createElement('div');
  bubble.className = 'bubble encrypted-msg';
  bubble.dataset.cipher = JSON.stringify(cipher);
  bubble.dataset.revealed = 'false';
  bubble.dataset.msgid = msgId;
  bubble.innerHTML = `<span class="encrypted-placeholder">🔒 암호화된 메시지</span><div class="time">${time}</div>`;
  // attach long-press to decrypt
  let pressTimer;
  bubble.addEventListener('pointerdown', (e) => {
    if (!sess.rootKey) return;
    pressTimer = setTimeout(async () => {
      if (bubble.dataset.revealed === 'true') return;
      try {
        const plain = await decryptDisplay(sess, JSON.parse(bubble.dataset.cipher));
        bubble.innerHTML = `${escapeHtml(plain)}<div class="time">${time}</div>`;
        bubble.dataset.revealed = 'true';
        setTimeout(() => {
          if (bubble && bubble.dataset.revealed === 'true') {
            bubble.innerHTML = `<span class="encrypted-placeholder">🔒 암호화된 메시지</span><div class="time">${time}</div>`;
            bubble.dataset.revealed = 'false';
          }
        }, 3000);
      } catch (e) { /* ignore */ }
    }, 600);
  });
  bubble.addEventListener('pointerup', () => clearTimeout(pressTimer));
  bubble.addEventListener('pointercancel', () => clearTimeout(pressTimer));
  bubble.addEventListener('pointerleave', () => clearTimeout(pressTimer));
  return bubble;
}

async function sendText() {
  if (!activePeerId || isDestroyed(activePeerId)) return;
  const sess = sessions[activePeerId]; if (!sess) return;
  if (!sess.rootKey || !sess.confirmed) { alert('보안 세션을 먼저 설정하세요.'); return; }
  const inp = document.getElementById('msgInput'); const txt = inp.value.trim(); if (!txt) return;
  const msgId = genUUID(); const payload = { type: 'text', content: txt, id: msgId };
  await sendPayload(sess, payload, txt, msgId); inp.value = '';
}
async function sendPayload(sess, payload, displayContent, msgId) {
  if (!sess.dc || sess.dc.readyState !== 'open' || !sess.rootKey || !sess.confirmed) {
    const queue = await loadOfflineQueue(activePeerId);
    queue.push({ payload, displayContent, id: msgId, ts: Date.now() });
    await saveOfflineQueue(activePeerId, queue);
    addEncryptedDisplay(activePeerId, displayContent, 'me', msgId);
    addMsg(activePeerId, '⏳ 오프라인-복구 시 자동 전송', 'system');
    return;
  }
  try {
    const enc = await encryptPayload(sess, payload);
    sess.dc.send(JSON.stringify({ type: 'msg', ...enc }));
    addEncryptedDisplay(activePeerId, displayContent, 'me', msgId);
    notifyIfNeeded(displayContent);
  } catch (e) {
    const queue = await loadOfflineQueue(activePeerId);
    queue.push({ payload, displayContent, id: msgId, ts: Date.now() });
    await saveOfflineQueue(activePeerId, queue);
    addEncryptedDisplay(activePeerId, displayContent, 'me', msgId);
    addMsg(activePeerId, '⚠️ 전송 실패, 오프라인 큐에 저장', 'system');
  }
}
async function addEncryptedDisplay(peerId, plainText, who, msgId) {
  if (peerId !== activePeerId || isDestroyed(peerId)) return;
  const sess = sessions[peerId];
  if (!sess || !sess.rootKey) {
    // fallback to plain (should not happen)
    appendMessageDirect(peerId, plainText, who, msgId);
    return;
  }
  try {
    const cipher = await getDisplayCipher(sess, plainText);
    const c = document.getElementById('messages');
    const d = document.createElement('div');
    d.className = 'msg ' + (who === 'me' ? 'me' : who === 'other' ? 'other' : 'system');
    if (msgId) d.id = 'msg-' + msgId;
    const time = new Date().toLocaleTimeString();
    const bubble = createEncryptedBubble(sess, cipher, who, msgId, time);
    d.appendChild(bubble);
    c.appendChild(d);
    c.scrollTop = c.scrollHeight;
  } catch (e) {
    appendMessageDirect(peerId, plainText, who, msgId);
  }
}
function appendMessageDirect(peerId, text, who, msgId) {
  const c = document.getElementById('messages'), d = document.createElement('div');

  c.appendChild(d); c.scrollTop = c.scrollHeight;

function addMsg(peerId, text, who, msgId) {
  if (peerId !== activePeerId || isDestroyed(peerId)) return;
  appendMessageDirect(peerId, text, who, msgId);
}
async function displayDecryptedMessage(peerId, text, who, msgId) {
  await addEncryptedDisplay(peerId, text, who, msgId);
}

function onMsg(peerId, e) {
  if (isDestroyed(peerId)) return;
  if (hasPendingDestroy(peerId)) { markDestroyed(peerId); goHome(); return; }
  const sess = sessions[peerId]; if (!sess) return;
  if (e.data instanceof ArrayBuffer) { handleBinaryChunk(peerId, e.data); return; }
  try {
    const d = JSON.parse(e.data);
    if (d.type === '__ecdhe__') { handleEcdheMessage(peerId, d); return; }
    if (d.type === '__confirm__') { handleConfirmation(peerId, d); return; }
    if (d.type === '__destroy_req__') { markDestroyed(d.peerId || peerId); goHome(); return; }
    if (d.type === '__clear_revealed__') { clearRevealedMessages(peerId); return; }
    if (d.type === 'msg') {
      if (!sess.rootKey || !sess.confirmed) { addEncryptedMessage(peerId, d); return; }
      decryptPayload(sess, d).then(inner => {
        if (!inner) return;
        if (inner.id && sess.receivedMessageIds.has(inner.id)) return;
        if (inner.id) sess.receivedMessageIds.add(inner.id);
        switch (inner.type) {
          case 'text': receiveEncrypted(peerId, inner.content, 'other', inner.id); sendReadReceipt(peerId, inner.id); break;
          case 'emoji': receiveEncrypted(peerId, inner.content, 'other', inner.id); break;
          case 'media': receiveEncrypted(peerId, `<img src="${inner.url}" style="max-width:200px;max-height:200px;border-radius:12px;">`, 'other', inner.id); break;
          case 'read': markAsRead(peerId, inner.id); break;
          case 'file_start': handleFileStart(peerId, inner); break;
          case 'file_end': if (sess.fileReceive && sess.fileReceive.id === inner.id) assembleFile(peerId); break;
          case '__destroy__': markDestroyed(peerId); goHome(); break;
        }
      }).catch(() => addEncryptedMessage(peerId, d));
    }
  } catch (e) {}
}
async function receiveEncrypted(peerId, plainContent, who, msgId) {
  const sess = sessions[peerId]; if (!sess) return;
  if (peerId === activePeerId) await addEncryptedDisplay(peerId, plainContent, who, msgId);
  else { sess.pendingMessages.push({ content: plainContent, who, msgId }); notifyIfNeeded(plainContent); renderContactList(); }
}
async function flushOfflineQueue(peerId) {
  const sess = sessions[peerId];
  if (!sess?.dc || sess.dc.readyState !== 'open' || !sess.rootKey || !sess.confirmed) return;
  const queue = await loadOfflineQueue(peerId);
  if (queue.length === 0) return;
  clearOfflineQueue(peerId);
  addMsg(peerId, `📬 ${queue.length}개의 대기 메시지 전송 중...`, 'system');
  for (const item of queue) {
    try {
      const enc = await encryptPayload(sess, item.payload);
      sess.dc.send(JSON.stringify({ type: 'msg', ...enc }));
    } catch (e) {
      const remaining = await loadOfflineQueue(peerId);
      remaining.push(item);
      await saveOfflineQueue(peerId, remaining);
      break;
    }
  }
  const finalQueue = await loadOfflineQueue(peerId);
  if (finalQueue.length === 0) addMsg(peerId, '📬 대기 메시지 전송 완료', 'system');
}
function addEncryptedMessage(peerId, rawData) {
  if (peerId !== activePeerId || isDestroyed(peerId)) return;
  const c = document.getElementById('messages'), d = document.createElement('div');
  d.className = 'msg system';
  d.innerHTML = `<div class="bubble"><strong>🔒 암호화된 메시지</strong><br><span style="font-size:0.7rem; word-break:break-all;">${escapeHtml(JSON.stringify(rawData))}</span></div>`;
  c.appendChild(d); c.scrollTop = c.scrollHeight;
}

async function encryptTyping(sess, state) { if (!sess.typingKey) return null; const iv = crypto.getRandomValues(new Uint8Array(12)); const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, sess.typingKey, str2buf(state)); return { iv: Array.from(new Uint8Array(iv)), ct: Array.from(new Uint8Array(ct)) }; }
async function decryptTyping(sess, data) { if (!sess.typingKey) throw new Error('no typing key'); const iv = new Uint8Array(data.iv), ct = new Uint8Array(data.ct); const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, sess.typingKey, ct); return textDecoder.decode(plain); }
function sendTyping(state) { const sess = sessions[activePeerId]; if (sess?.typingDC && sess.typingDC.readyState === 'open' && sess.typingKey) { encryptTyping(sess, state ? '1' : '0').then(enc => enc && sess.typingDC.send(JSON.stringify(enc))).catch(() => {}); } }
document.getElementById('msgInput').addEventListener('input', () => { sendTyping(true); const sess = sessions[activePeerId]; if (sess) { clearTimeout(sess.typingTimer); sess.typingTimer = setTimeout(() => sendTyping(false), 1500); } });

const EMOJI_LIST = ['😀','😂','🥰','😎','🤔','👍','❤️','🔥','🎉','💯','😢','😡','🥺','🤯','✨','🍕','🚀','💻','📱','🎵'];

function handleFileStart(peerId, inner) { const sess = sessions[peerId]; if (!sess) return; sess.fileReceive = { id: inner.id, name: inner.name, size: inner.size, fek: b642buf(inner.fek), chunks: [], received: 0 }; receiveEncrypted(peerId, `📥 ${inner.name} (${formatBytes(inner.size)}) 수신 중...`, 'other'); }
function handleBinaryChunk(peerId, buf) { const sess = sessions[peerId]; if (!sess?.fileReceive) return; sess.fileReceive.chunks.push(new Uint8Array(buf)); sess.fileReceive.received += buf.byteLength; }
async function assembleFile(peerId) { const sess = sessions[peerId]; if (!sess?.fileReceive) return; const blob = new Blob(sess.fileReceive.chunks); const iv = blob.slice(0, 12); const ct = blob.slice(12); const key = await crypto.subtle.importKey('raw', sess.fileReceive.fek, 'AES-GCM', false, ['decrypt']); const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: await iv.arrayBuffer() }, key, await ct.arrayBuffer()); const decBlob = new Blob([plain]); const url = URL.createObjectURL(decBlob); receiveEncrypted(peerId, `<a href="${url}" download="${escapeHtml(sess.fileReceive.name)}" style="color:var(--accent);">📎 ${escapeHtml(sess.fileReceive.name)} 다운로드</a>`, 'other'); sess.fileReceive = null; }
async function handleFiles(files) { for (const f of files) await sendFile(f); }
async function sendFile(file) { if (!activePeerId || isDestroyed(activePeerId)) return; const sess = sessions[activePeerId]; if (!sess?.dc || sess.dc.readyState !== 'open' || !sess.rootKey || !sess.confirmed) { addMsg(activePeerId, '⚠️ 파일 전송 불가 (보안 세션 없음)', 'system'); return; } const fileId = genUUID(); const fek = await crypto.subtle.generateKey({ name: 'AES-GCM', length: AES_LEN }, true, ['encrypt']); const iv = crypto.getRandomValues(new Uint8Array(12)); const fekRaw = await crypto.subtle.exportKey('raw', fek); const fileBuf = await file.arrayBuffer(); const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, fek, fileBuf); const encData = new Uint8Array(iv.byteLength + ct.byteLength); encData.set(iv); encData.set(new Uint8Array(ct), iv.byteLength); const metaEnc = await encryptPayload(sess, { type: 'file_start', id: fileId, name: file.name, size: encData.byteLength, fek: buf2b64(fekRaw) }); sess.dc.send(JSON.stringify({ type: 'msg', ...metaEnc })); addMsg(activePeerId, `📤 ${file.name} 전송 중... (${formatBytes(encData.byteLength)})`, 'me'); const chunkSize = 64 * 1024; let offset = 0; while (offset < encData.byteLength) { const end = Math.min(offset + chunkSize, encData.byteLength); sess.dc.send(encData.slice(offset, end).buffer); offset = end; await new Promise(r => setTimeout(r, 5)); } const endEnc = await encryptPayload(sess, { type: 'file_end', id: fileId }); sess.dc.send(JSON.stringify({ type: 'msg', ...endEnc })); addMsg(activePeerId, `📤 ${file.name} 전송 완료`, 'me'); }

async function checkHash() {
  const h = location.hash.substring(1); if (!h) return;
  const p = new URLSearchParams(h);
  if (p.has('offer') && p.has('peer')) {
    const peerId = p.get('peer'); if (isDestroyed(peerId) || hasPendingDestroy(peerId)) { alert('이 대화는 삭제되었습니다.'); return; }
    const offer = decodeSDP(p.get('offer'));
    if (!getContacts().find(c => c.id === peerId)) addContact(peerId, '상대방');
    activePeerId = peerId; const sess = getOrCreateSession(peerId); sess.isOfferer = false;
    initPC(peerId);
    await sess.pc.setRemoteDescription(offer);
    const ans = await sess.pc.createAnswer(); await sess.pc.setLocalDescription(ans); await waitIce(sess.pc);
    const answerB64 = encodeSDP(sess.pc.localDescription);
    showView('chatScreen'); document.getElementById('chatTitle').textContent = '상대방';
    document.getElementById('passwordPrompt').style.display = 'block';
    document.getElementById('answerModalLink').textContent = location.origin + location.pathname + '#answer=' + answerB64 + '&peer=' + peerId;
    document.getElementById('answerModal').classList.remove('hidden');
    renderContactList();
  } else if (p.has('answer') && p.has('peer')) {
    const peerId = p.get('peer'); if (isDestroyed(peerId) || hasPendingDestroy(peerId)) return;
    const answer = decodeSDP(p.get('answer'));
    if (!getContacts().find(c => c.id === peerId)) addContact(peerId, '상대방');
    let sess = sessions[peerId];
    if (!sess || !sess.pc) {
      sess = getOrCreateSession(peerId); sess.isOfferer = true;
      initPC(peerId); sess.dc = sess.pc.createDataChannel('chat', { ordered: true }); setupDC(peerId);
    }
    if (sess.pc) {
      await sess.pc.setRemoteDescription(answer);
      activePeerId = peerId; showView('chatScreen');
      document.getElementById('chatTitle').textContent = getContacts().find(c => c.id === peerId)?.name || '채팅';
      document.getElementById('passwordPrompt').style.display = 'block';
    }
    renderContactList();
  }
}

  document.getElementById('destroyChatBtn').addEventListener('click', destroyActiveChat);
  document.getElementById('submitPasswordBtn').addEventListener('click', submitPassword);
  document.getElementById('emojiBtn').addEventListener('click', () => togglePicker('emoji'));
  document.getElementById('mediaBtn').addEventListener('click', () => togglePicker('media'));
  document.getElementById('stickerBtn').addEventListener('click', () => document.getElementById('stickerFileInput').click());
  document.getElementById('stickerFileInput').addEventListener('change', (e) => uploadSticker(e.target.files));
  document.getElementById('mediaSearch').addEventListener('keydown', (e) => { if (e.key === 'Enter') addMediaUrl(); });
  document.getElementById('attachBtn').addEventListener('click', () => document.getElementById('fileInput').click());
  document.getElementById('fileInput').addEventListener('change', (e) => handleFiles(e.target.files));
  document.getElementById('sendBtn').addEventListener('click', sendText);
  document.getElementById('msgInput').addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); } });
  document.getElementById('copyAnswerBtn').addEventListener('click', copyAnswerModalLink);
  document.getElementById('closeAnswerModalBtn').addEventListener('click', closeAnswerModal);

  // emoji picker items
  document.getElementById('emojiGrid').addEventListener('click', (e) => {
    if (e.target.classList.contains('emoji-item')) sendEmoji(e.target.textContent);
  });
  // media picker items
  document.getElementById('mediaGrid').addEventListener('click', (e) => {
    const img = e.target.closest('.picker-item img');
    if (img) sendMedia(img.src);
  });
}
function copyTextById(id) {
  const el = document.getElementById(id);
  const text = el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' ? el.value : el.textContent;
  navigator.clipboard.writeText(text).then(() => {}).catch(() => {
    const ta = document.createElement('textarea'); ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    alert('링크가 복사되었습니다.');
  });
}

function notifyIfNeeded(content) {
  if (document.visibilityState === 'hidden' && 'Notification' in window && Notification.permission === 'granted') {
    new Notification('P2P 비밀채팅', { body: content });
  }
}

// 초기화
buildEmojiPicker();
renderContactList();
checkHash();
showView('simpleMode');
bindEvents();
})();
