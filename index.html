<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0, minimum-scale=1.0">
  <title>🔐 P2P 비밀 메신저</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'nonce-2726c7f26c'; connect-src *; media-src 'self'; img-src 'self' data: blob:; style-src 'self' 'nonce-2726c7f26c'; base-uri 'none'; form-action 'none'; referrer no-referrer;">
  <style nonce="2726c7f26c">
    :root {
      --bg: #06090f;
      --surface: #0f141e;
      --card: rgba(15, 20, 30, 0.9);
      --text: #e0e5f0;
      --sub: #8892b0;
      --accent: #5b8df0;
      --danger: #f97070;
      --success: #45d68a;
      --border: #1a2332;
      --radius: 20px;
      --radius-sm: 14px;
      --safe-bottom: env(safe-area-inset-bottom, 10px);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100dvh;
      padding: 8px;
      overscroll-behavior: none;
    }

    .container {
      width: 100%;
      max-width: 500px;
      height: 96dvh;
      background: var(--surface);
      border-radius: 28px;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--border);
      position: relative;
    }

    .header {
      padding: 12px 18px;
      background: rgba(8, 14, 24, 0.98);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 52px;
    }

    .header h1 {
      font-size: 1rem;
      font-weight: 700;
      background: linear-gradient(135deg, #90b4ff, #b794f4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-area {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      transition: 0.2s;
    }

    .dot.on {
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
    }

    .dot.off {
      background: var(--danger);
    }

    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
    }

    .main-content::-webkit-scrollbar {
      width: 3px;
    }

    .main-content::-webkit-scrollbar-thumb {
      background: #253040;
      border-radius: 2px;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(12px);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.06);
      color: white;
      border: 1px solid var(--border);
      padding: 13px 18px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: 0.2s;
      width: 100%;
      backdrop-filter: blur(8px);
      user-select: none;
      -webkit-user-select: none;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.14);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn.primary {
      background: var(--accent);
      border: none;
    }

    .btn.danger {
      background: var(--danger);
      border: none;
    }

    input,
    textarea {
      width: 100%;
      background: #0a0f18;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 16px;
      outline: none;
      user-select: text;
      -webkit-user-select: text;
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(91, 141, 240, 0.3);
    }

    .chat-screen {
      display: none;
      flex-direction: column;
      flex: 1;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 4px 0;
    }

    .msg {
      display: flex;
      flex-direction: column;
      animation: fadeUp 0.2s ease;
      position: relative;
    }

    .msg.system {
      align-items: center;
    }

    .msg.me {
      align-items: flex-end;
    }

    .msg.other {
      align-items: flex-start;
    }

    .bubble {
      max-width: 82%;
      padding: 10px 15px;
      border-radius: 18px;
      background: rgba(22, 30, 44, 0.85);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      word-break: break-word;
      position: relative;
      overflow: hidden;
      z-index: 1;
    }

    .msg.system .bubble {
      background: rgba(255, 255, 255, 0.04);
      border: none;
      font-size: 0.75rem;
      color: var(--sub);
    }

    .msg.me .bubble {
      background: linear-gradient(140deg, rgba(74, 130, 250, 0.55), rgba(124, 92, 240, 0.55));
      border-bottom-right-radius: 6px;
    }

    .msg.other .bubble {
      border-bottom-left-radius: 6px;
    }

    .msg .time {
      font-size: 0.6rem;
      color: var(--sub);
      margin-top: 2px;
      display: flex;
      justify-content: flex-end;
      gap: 6px;
    }

    .encrypted-placeholder {
      font-family: monospace;
      font-size: 0.7rem;
      color: #5b6e8c;
      padding: 4px;
      text-align: center;
    }

    .msg-delete-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 20px;
      height: 20px;
      font-size: 11px;
      color: white;
      background: rgba(0, 0, 0, 0.55);
      border: none;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 10;
    }

    .msg:hover .msg-delete-btn,
    .msg:active .msg-delete-btn {
      opacity: 1;
    }

    .timer-badge {
      font-size: 0.55rem;
      color: var(--accent);
      background: rgba(91, 141, 240, 0.15);
      border-radius: 8px;
      padding: 1px 6px;
      margin-left: 4px;
    }

    .input-bar {
      display: flex;
      gap: 6px;
      padding: 8px 0 0;
      align-items: flex-end;
      padding-bottom: var(--safe-bottom);
    }

    #msgInput {
      flex: 1;
      min-height: 42px;
      max-height: 100px;
      resize: none;
    }

    .send-btn {
      background: var(--accent);
      color: white;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      font-size: 1.2rem;
    }

    .hidden {
      display: none !important;
    }

    .text-center {
      text-align: center;
    }

    .text-sub {
      color: var(--sub);
      font-size: 0.8rem;
    }

    .mt {
      margin-top: 10px;
    }

    .mb {
      margin-bottom: 10px;
    }

    .link-box {
      word-break: break-all;
      background: #0a0f18;
      padding: 10px;
      border-radius: 12px;
      font-size: 0.68rem;
      margin: 6px 0;
      max-height: 65px;
      overflow-y: auto;
      color: #9aa4bf;
    }

    .chat-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
    }

    .chat-title {
      font-size: 0.9rem;
      font-weight: 600;
      flex: 1;
    }

    .lock-icon {
      font-size: 0.9rem;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
<div class="container" id="appContainer">
  <div class="header">
    <h1>🔐 P2P 비밀채팅</h1>
    <div class="status-area">
      <span id="connDot" class="dot off"></span>
      <span id="securityIcon" style="display:none;">🔒</span>
    </div>
  </div>
  <div class="main-content" id="mainArea">
    <!-- 홈 -->
    <div id="simpleMode" class="view">
      <div class="card text-center">
        <h3>서버 없이 완벽한 익명성</h3>
        <p class="text-sub mb">종단간 암호화 · 자동 파괴 타이머</p>
        <button type="button" class="btn primary" id="newChatBtn">✨ 새 채팅</button>
        <button type="button" class="btn mt" id="joinChatBtn">🔗 초대 링크로 참가</button>
      </div>
      <div style="font-size:0.8rem; color:var(--sub); margin:10px 0 6px; font-weight:600;">📋 대화 목록</div>
      <div class="contact-list" id="contactList"></div>
    </div>
    <!-- 이름 입력 모달 -->
    <div id="nameModal" class="modal hidden">
      <div class="modal-content">
        <h3>✨ 새 채팅</h3>
        <input type="text" id="peerNameInput" placeholder="상대방 이름">
        <div class="mt" style="display:flex;gap:8px;">
          <button type="button" class="btn primary" id="confirmNewChatBtn">확인</button>
          <button type="button" class="btn" id="cancelNewChatBtn">취소</button>
        </div>
      </div>
    </div>
    <!-- Offer 패널 -->
    <div id="offerPanel" class="view hidden">
      <div class="card text-center">
        <p><strong>연결 링크 생성 중...</strong></p>
        <div class="link-box" id="offerLinkDisplay">생성 중...</div>
        <button type="button" class="btn mt" id="copyOfferLinkBtn">링크 복사</button>
        <p class="text-sub mt">상대의 Answer 링크를 아래에 붙여넣으세요.</p>
        <input type="text" id="answerLinkInput" placeholder="Answer 링크">
        <button type="button" class="btn primary mt" id="applyAnswerBtn">연결 완료</button>
        <button type="button" class="btn mt" id="offerHomeBtn">홈으로</button>
      </div>
    </div>
    <!-- Answer 패널 -->
    <div id="answerPanel" class="view hidden">
      <div class="card"><strong>📥 초대 링크 붙여넣기</strong>
        <textarea id="remoteOfferSDP" rows="3" placeholder="방장에게 받은 전체 링크..."></textarea>
        <button type="button" class="btn primary mt" id="createAnswerBtn">연결 시작</button>
      </div>
      <button type="button" class="btn mt" id="answerHomeBtn">홈으로</button>
    </div>
    <!-- 채팅 화면 -->
    <div id="chatScreen" class="chat-screen">
      <div class="chat-header">
        <button type="button" class="btn primary" id="backToHomeBtn" style="width:auto;padding:8px 14px;">←</button>
        <span class="chat-title" id="chatTitle">채팅</span>
        <span id="chatSecurityIcon" style="display:none;">🔒</span>
        <button type="button" class="btn danger" id="destroyChatBtn" style="width:auto;padding:6px 10px;">🗑</button>
      </div>
      <!-- 암호 입력 (세션 시작 전) -->
      <div id="passwordPrompt" class="card text-center" style="margin:8px;">
        <strong>🔐 채팅방 암호 입력</strong>
        <input type="password" id="chatPasswordInput" placeholder="상대와 같은 암호">
        <button type="button" class="btn primary mt" id="submitPasswordBtn">암호 설정</button>
        <p id="passwordError" class="text-sub" style="color:var(--danger); display:none;"></p>
      </div>
      <!-- 수동 키 교환 (WebRTC 불가 시) -->
      <div id="manualSetupArea" class="card" style="margin:8px; display:none;">
        <strong>📤 키 교환</strong>
        <p class="text-sub">1. 상대에게 아래 내 공개키를 복사해 보내세요.</p>
        <button type="button" class="btn" id="copyMyKeysBtn">내 공개키 복사</button>
        <div class="link-box" id="myKeysDisplay"></div>
        <p class="text-sub mt">2. 상대의 공개키를 붙여넣으세요.</p>
        <textarea id="remoteKeysInput" rows="2" placeholder="상대방의 공개키 JSON"></textarea>
        <button type="button" class="btn primary mt" id="applyRemoteKeysBtn">키 교환 완료</button>
        <p id="manualError" class="text-sub" style="color:var(--danger); display:none;"></p>
      </div>
      <div id="messages"></div>
      <!-- 입력 바 -->
      <div class="input-bar" id="normalInputBar" style="padding:8px;">
        <textarea id="msgInput" rows="1" placeholder="메시지 (자동 5분 후 파괴)"></textarea>
        <button type="button" class="send-btn" id="sendBtn">➤</button>
      </div>
      <div class="input-bar" id="manualInputBar" style="display:none; padding:8px; flex-direction:column; gap:8px;">
        <textarea id="manualMsgInput" rows="2" placeholder="보낼 메시지"></textarea>
        <div style="display:flex; gap:8px;">
          <button type="button" class="btn primary" id="encryptManualBtn">🔐 암호화 복사</button>
          <button type="button" class="btn" id="clearManualBtn">지우기</button>
        </div>
        <textarea id="manualRecvInput" rows="2" placeholder="받은 암호문 붙여넣기"></textarea>
        <button type="button" class="btn primary" id="decryptManualBtn">🔓 복호화</button>
      </div>
      <input type="file" id="fileInput" class="hidden" multiple>
    </div>
  </div>
</div>

<!-- Answer 모달 -->
<div id="answerModal" class="modal hidden">
  <div class="modal-content"><h3>📤 Answer 링크</h3><p class="text-sub mb">이 링크를 상대에게 전송하세요.</p><div class="link-box" id="answerModalLink"></div><div style="display:flex; gap:8px; margin-top:12px;"><button type="button" class="btn primary" id="copyAnswerBtn">복사</button><button type="button" class="btn" id="closeAnswerModalBtn">닫기</button></div></div>
</div>
<!-- 삭제 확인 모달 -->
<div id="destroyConfirmModal" class="modal hidden">
  <div class="modal-content"><h3>⚠️ 채팅 삭제</h3><p>상대방도 삭제됩니다.</p><div style="display:flex; gap:8px; margin-top:16px;"><button type="button" class="btn danger" id="confirmDestroyBtn">삭제</button><button type="button" class="btn" id="cancelDestroyBtn">취소</button></div></div>
</div>

<script nonce="2726c7f26c">
document.addEventListener('DOMContentLoaded', () => {
  'use strict';

  // ─────────── 유틸 ───────────
  const te = new TextEncoder(), td = new TextDecoder();
  const b64url = b => btoa(String.fromCharCode(...new Uint8Array(b))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  const fromB64url = s => { s = s.replace(/-/g,'+').replace(/_/g,'/'); while(s.length%4)s+='='; return Uint8Array.from(atob(s),c=>c.charCodeAt(0)).buffer; };
  const encSDP = o => b64url(te.encode(JSON.stringify(o)));
  const decSDP = s => JSON.parse(td.decode(fromB64url(s)));
  const ICE = [{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun.cloudflare.com:3478'}];
  const sessions = {}; let activePeerId = null;
  const DESTROY = 'p2d_', PEND_DESTROY = 'p2pd_', TIMERS = 'p2timers';
  const storage = { getItem(k){ try{return localStorage.getItem(k)}catch{return null} }, setItem(k,v){ try{localStorage.setItem(k,v)}catch{} }, removeItem(k){ try{localStorage.removeItem(k)}catch{} } };
  try{if(Notification.permission==='default')Notification.requestPermission().catch(()=>{})}catch{}

  const h2b=b=>[...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
  const s2b=s=>te.encode(s); const b2b64=b=>btoa(String.fromCharCode(...new Uint8Array(b)));
  const b64toBuf=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0)).buffer;
  const cat=(...bufs)=>{let l=bufs.reduce((a,b)=>a+b.byteLength,0),t=new Uint8Array(l),o=0;bufs.forEach(b=>{t.set(new Uint8Array(b),o);o+=b.byteLength});return t.buffer};
  const uuid=()=>crypto.randomUUID?.()??'xx-4xxx'.replace(/[xy]/g,c=>(c=='x'?Math.random()*16|0:(Math.random()*16|0)&0x3|0x8).toString(16));
  const esc=s=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);

  let webrtcAvailable=false;
  try{webrtcAvailable=typeof RTCPeerConnection!=='undefined'&&new RTCPeerConnection({iceServers:[]})!==null}catch{}

  function getSess(pid){
    if(!sessions[pid]) sessions[pid]={pc:null,dc:null,tyKey:null,isOff:false,pw:null,root:null,dispKey:null,sCK:null,rCK:null,sn:0,rn:0,oEK:null,tEPub:null,salt:null,oEDH:null,pEDH:null,oSK:null,pSK:null,conf:false,online:false,recIds:new Set(),pending:[],manual:false,autoTimer:5};
    return sessions[pid];
  }

  function isDest(pid){return!!(storage.getItem(DESTROY+pid)||sessionStorage.getItem(DESTROY+pid))}
  function markDest(pid){storage.setItem(DESTROY+pid,Date.now());try{sessionStorage.setItem(DESTROY+pid,Date.now())}catch{}}

  function getCon(){try{return JSON.parse(storage.getItem('p2con')||'[]')}catch{return[]}}
  function saveCon(c){storage.setItem('p2con',JSON.stringify(c))}
  function addCon(id,nm){let c=getCon();if(!c.find(x=>x.id===id)){c.push({id,name:nm});saveCon(c)}renderCon()}
  function rmCon(id){saveCon(getCon().filter(x=>x.id!==id))}
  function renderCon(){
    const ct=document.getElementById('contactList'); if(!ct)return;
    ct.innerHTML=getCon().filter(c=>!isDest(c.id)).map(c=>{
      const s=sessions[c.id], on=s?.online||s?.manual;
      return `<div class="contact-card${c.id===activePeerId?' active':''}" data-pid="${c.id}">
        <div class="contact-avatar">${esc(c.name).charAt(0)}<span class="contact-dot${on?' on':' off'}"></span></div>
        <div class="contact-info"><div class="contact-name">${esc(c.name)}</div></div>
        <button type="button" class="contact-delete-btn" data-del="${c.id}">✕</button>
      </div>`;
    }).join('');
    ct.querySelectorAll('.contact-card').forEach(card=>{card.addEventListener('click',e=>{if(e.target.closest('.contact-delete-btn'))return;selectPeer(card.dataset.pid)})});
    ct.querySelectorAll('.contact-delete-btn').forEach(b=>{b.addEventListener('click',e=>{e.stopPropagation();showDestroy(b.dataset.del)})});
  }

  function showView(v){
    document.querySelectorAll('.view').forEach(x=>x.classList.add('hidden'));
    const t=document.getElementById(v); if(t){t.classList.remove('hidden'); t.style.display=v==='chatScreen'?'flex':'block'}
  }

  async function selectPeer(pid){
    if(isLocked){alert('기기 잠금');return}
    if(isDest(pid)){alert('삭제된 대화');return}
    activePeerId=pid; showView('chatScreen'); document.getElementById('messages').innerHTML='';
    const s=getSess(pid); document.getElementById('chatTitle').textContent=getCon().find(c=>c.id===pid)?.name||'채팅';
    updateUIForSession(s); renderCon();
  }

  function goHome(){activePeerId=null;showView('simpleMode');renderCon()}

  function updateUIForSession(s){
    const isManual=s&&s.manual;
    document.getElementById('passwordPrompt').style.display=(s&&!s.conf)?'block':'none';
    document.getElementById('manualSetupArea').style.display=(isManual&&!s.conf)?'block':'none';
    document.getElementById('normalInputBar').style.display=(!isManual&&s&&s.conf)?'flex':'none';
    document.getElementById('manualInputBar').style.display=(isManual&&s&&s.conf)?'flex':'none';
    document.getElementById('chatSecurityIcon').style.display=(s&&s.conf)?'inline':'none';
    document.getElementById('msgInput').placeholder=`메시지 (자동 ${s?.autoTimer||5}분 후 파괴)`;
  }

  let pendDel=null;
  function showDestroy(pid){pendDel=pid;document.getElementById('destroyConfirmModal').classList.remove('hidden')}
  function hideDestroy(){pendDel=null;document.getElementById('destroyConfirmModal').classList.add('hidden')}
  async function confDestroy(){if(!pendDel)return;hideDestroy();await destroyChat(pendDel)}

  // ─────────── 암호화 ───────────
  const ECDH={name:'ECDH',namedCurve:'P-521'}, ECDSA={name:'ECDSA',namedCurve:'P-521'}, AES256={name:'AES-GCM',length:256}, AES128={name:'AES-GCM',length:128};
  const PBK2_ITERS=20000000, SALT_SIZE=4096;
  async function genSign(){return await crypto.subtle.generateKey(ECDSA,true,['sign','verify'])}
  async function signData(pr,data){return b2b64(await crypto.subtle.sign({name:'ECDSA',hash:'SHA-512'},pr,s2b(data)))}
  async function verifySig(pu,data,sig64){try{return await crypto.subtle.verify({name:'ECDSA',hash:'SHA-512'},pu,b64toBuf(sig64),s2b(data))}catch{return false}}

  async function deriveKey(pid){
    const s=sessions[pid]; if(!s.pw||!s.oEDH||!s.pEDH||!s.salt)return;
    const km=await crypto.subtle.importKey('raw',s2b(s.pw),'PBKDF2',false,['deriveKey']);
    s.auth=await crypto.subtle.deriveKey({name:'PBKDF2',salt:s.salt,iterations:PBK2_ITERS,hash:'SHA-512'},km,AES256,true,['encrypt','decrypt']);
    const dhBits=await crypto.subtle.deriveBits({name:'ECDH',public:s.pEDH},s.oEDH.privateKey,521);
    const authRaw=await crypto.subtle.exportKey('raw',s.auth);
    const ikm=cat(dhBits,s2b(s.pw));
    const hkdf=await crypto.subtle.importKey('raw',ikm,'HKDF',false,['deriveBits']);
    s.root=await crypto.subtle.deriveBits({name:'HKDF',hash:'SHA-512',salt:authRaw,info:s2b('root')},hkdf,256);
    s.dispKey=s.root.slice(0,32);
    s.oEK=s.oEDH; s.tEPub=s.pEDH;
    s.sCK=null; s.rCK=null; s.sn=0; s.rn=0;
    // 자동 타이머 5분
    s.autoTimer=5;
    s.conf=true;
    if(pid===activePeerId){addSystemMsg(pid,'🔐 보안 세션 활성화');updateUIForSession(s)}
  }

  async function dhR(s,ourPriv,theirPub){
    const db=await crypto.subtle.deriveBits({name:'ECDH',public:theirPub},ourPriv,521);
    const ik=cat(db,s.root); const hk=await crypto.subtle.importKey('raw',ik,'HKDF',false,['deriveBits']);
    const ok=await crypto.subtle.deriveBits({name:'HKDF',hash:'SHA-512',salt:new Uint8Array(32),info:s2b('dr')},hk,512);
    s.root=ok.slice(0,32); return ok.slice(32,64);
  }
  async function symR(ck){
    const c=await crypto.subtle.importKey('raw',ck,{name:'HMAC',hash:'SHA-512'},false,['sign']);
    const mk=await crypto.subtle.sign('HMAC',c,new Uint8Array([1]));
    const nk=await crypto.subtle.sign('HMAC',c,new Uint8Array([2]));
    return{msgKey:mk.slice(0,32),nextChainKey:nk.slice(0,32)};
  }
  async function needSndR(s){
    if(!s.sCK){const nkp=await crypto.subtle.generateKey(ECDH,true,['deriveKey','deriveBits']);s.oEK=nkp;
      const nck=await dhR(s,nkp.privateKey,s.tEPub);s.sCK=nck;s.sn=0;return b2b64(await crypto.subtle.exportKey('raw',nkp.publicKey))}return null;
  }
  async function encAndSign(s,obj){
    const dhPub=await needSndR(s); const{msgKey,nextChainKey}=await symR(s.sCK); s.sCK=nextChainKey;
    const seq=s.sn++, iv=crypto.getRandomValues(new Uint8Array(16));
    const padLen=256+Math.floor(crypto.getRandomValues(new Uint8Array(1))[0]/256*256);
    const padded={...obj,_pad:b2b64(crypto.getRandomValues(new Uint8Array(padLen)).buffer)};
    const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},await crypto.subtle.importKey('raw',msgKey,'AES-GCM',false,['encrypt']),s2b(JSON.stringify(padded)));
    const res={seq,iv:Array.from(new Uint8Array(iv)),ct:Array.from(new Uint8Array(ct))};
    if(dhPub)res.dhPub=dhPub;
    if(s.oSK)res.sig=await signData(s.oSK.privateKey,JSON.stringify(obj));
    return res;
  }
  async function decAndVerify(s,d){
    if(d.dhPub){const pub=await crypto.subtle.importKey('raw',b64toBuf(d.dhPub),ECDH,true,[]);s.rCK=await dhR(s,s.oEK.privateKey,pub);s.rn=0;s.tEPub=pub;}
    if(!s.rCK)throw new Error('no rcv');
    const{seq,iv,ct}=d; while(s.rn<seq){const{nextChainKey}=await symR(s.rCK);s.rCK=nextChainKey;s.rn++}
    const{msgKey,nextChainKey}=await symR(s.rCK);s.rCK=nextChainKey;s.rn=seq+1;
    const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:new Uint8Array(iv)},await crypto.subtle.importKey('raw',msgKey,'AES-GCM',false,['decrypt']),new Uint8Array(ct));
    const obj=JSON.parse(td.decode(plain)); delete obj._pad;
    if(d.sig&&s.pSK){const v=await verifySig(s.pSK,JSON.stringify(obj),d.sig);if(!v)throw new Error('sig fail');else s.vFp=true;}
    return obj;
  }

  async function getDisp(s,plain){
    const dk=await crypto.subtle.generateKey({name:'AES-GCM',length:128},true,['encrypt']);
    const iv=crypto.getRandomValues(new Uint8Array(12)), ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},dk,s2b(plain));
    const raw=await crypto.subtle.exportKey('raw',dk), rk=await crypto.subtle.importKey('raw',s.dispKey.slice(0,16),'AES-GCM',false,['encrypt']);
    const kiv=crypto.getRandomValues(new Uint8Array(12)), ek=await crypto.subtle.encrypt({name:'AES-GCM',iv:kiv},rk,raw);
    return{iv:Array.from(iv),ct:Array.from(new Uint8Array(ct)),keyIv:Array.from(kiv),encKey:Array.from(new Uint8Array(ek))};
  }
  async function decDisp(s,cipher){
    const rk=await crypto.subtle.importKey('raw',s.dispKey.slice(0,16),'AES-GCM',false,['decrypt']);
    const raw=await crypto.subtle.decrypt({name:'AES-GCM',iv:new Uint8Array(cipher.keyIv)},rk,new Uint8Array(cipher.encKey));
    const dk=await crypto.subtle.importKey('raw',raw,'AES-GCM',false,['decrypt']);
    return td.decode(await crypto.subtle.decrypt({name:'AES-GCM',iv:new Uint8Array(cipher.iv)},dk,new Uint8Array(cipher.ct)));
  }

  function makeBubble(s,cipher,who,mid,time,timer){
    const b=document.createElement('div');b.className='bubble encrypted-msg';
    b.dataset.cipher=JSON.stringify(cipher); b.dataset.revealed='false'; b.dataset.msgid=mid;
    let tb=''; if(timer>0){const exp=Date.now()+timer*60*1000; addTimer(pid,mid,exp); tb=` <span class="timer-badge">⏳${timer}분</span>`}
    b.innerHTML=`<span class="encrypted-placeholder">🔒 길게 눌러 보기${tb}</span><div class="time">${time}</div>`;
    const del=document.createElement('button');del.className='msg-delete-btn';del.textContent='✕';
    del.addEventListener('click',e=>{e.stopPropagation();delMsg(mid)});b.appendChild(del);
    let pt; b.addEventListener('pointerdown',e=>{if(isLocked||!s.dispKey)return;pt=setTimeout(async()=>{
      if(b.dataset.revealed==='true')return;
      try{const plain=await decDisp(s,JSON.parse(b.dataset.cipher));
        b.innerHTML=`${esc(plain)}${tb}<div class="time">${time}</div>`;b.dataset.revealed='true';
        const d2=document.createElement('button');d2.className='msg-delete-btn';d2.textContent='✕';d2.addEventListener('click',ev=>{ev.stopPropagation();delMsg(mid)});b.appendChild(d2);
        setTimeout(()=>{if(b&&b.dataset.revealed==='true'){b.innerHTML=`<span class="encrypted-placeholder">🔒 길게 눌러 보기${tb}</span><div class="time">${time}</div>`;b.dataset.revealed='false'}},3000)}catch{}},600)});
    b.addEventListener('pointerup',()=>clearTimeout(pt));b.addEventListener('pointercancel',()=>clearTimeout(pt));
    return b;
  }

  async function addEncDisp(pid,plain,who,mid,timer){
    if(pid!==activePeerId||isDest(pid))return; const s=sessions[pid];
    if(!s||!s.dispKey){addMsgPlain(pid,plain,who,mid);return}
    try{const cipher=await getDisp(s,plain); const c=document.getElementById('messages'),d=document.createElement('div');
      d.className='msg '+(who==='me'?'me':who==='other'?'other':'system'); if(mid)d.id='msg-'+mid;
      d.appendChild(makeBubble(s,cipher,who,mid,new Date().toLocaleTimeString(),pid,timer));c.appendChild(d);c.scrollTop=c.scrollHeight}catch{addMsgPlain(pid,plain,who,mid)}
  }
  function addMsgPlain(pid,text,who,mid){
    const c=document.getElementById('messages'),d=document.createElement('div');d.className='msg '+(who==='me'?'me':who==='other'?'other':'system');if(mid)d.id='msg-'+mid;
    d.innerHTML=`<div class="bubble">${esc(text)}<div class="time">${new Date().toLocaleTimeString()}</div></div>`;c.appendChild(d);c.scrollTop=c.scrollHeight
  }
  function addSystemMsg(pid,text){addMsgPlain(pid,text,'system')}

  function delMsg(mid){const s=activePeerId?sessions[activePeerId]:null;if(s&&s.conf)sendDelete(activePeerId,mid)}
  function sendDelete(pid,mid){const s=sessions[pid];if(!s||!s.conf)return;removeUI(mid);if(s.manual)return;
    if(s.dc&&s.dc.readyState==='open')encAndSign(s,{type:'delete',id:mid}).then(e=>s.dc.send(JSON.stringify({type:'msg',...e}))).catch(()=>{})}
  function removeUI(mid){document.getElementById('msg-'+mid)?.remove()}

  // 자동 타이머 5분
  function getTimers(){try{return JSON.parse(storage.getItem(TIMERS)||'{}')}catch{return{}}}
  function saveTimers(t){storage.setItem(TIMERS,JSON.stringify(t))}
  function addTimer(pid,mid,exp){const t=getTimers();if(!t[pid])t[pid]={};t[pid][mid]=exp;saveTimers(t)}
  setInterval(()=>{const now=Date.now(),t=getTimers();let c=false;for(const p in t)for(const m in t[p])if(now>=t[p][m]){removeUI(m);delete t[p][m];c=true}if(c)saveTimers(t)},1000);

  // ─────────── WebRTC / 수동 키교환 ───────────
  async function startExchange(pid){
    const s=sessions[pid];
    const kp=await crypto.subtle.generateKey(ECDH,true,['deriveKey','deriveBits']); s.oEDH={privateKey:kp.privateKey,publicKey:kp.publicKey};
    const sk=await genSign(); s.oSK=sk; s.salt=crypto.getRandomValues(new Uint8Array(SALT_SIZE));
    const pubRaw=await crypto.subtle.exportKey('raw',s.oEDH.publicKey), signPub=await crypto.subtle.exportKey('spki',sk.publicKey);
    return {salt:b2b64(s.salt.buffer),pubKey:b2b64(pubRaw),signPubKey:b2b64(signPub)};
  }

  async function handleRemoteKeys(pid,remoteKeys){
    const s=sessions[pid];
    if(remoteKeys.salt)s.salt=new Uint8Array(b64toBuf(remoteKeys.salt));
    s.pEDH=await crypto.subtle.importKey('raw',b64toBuf(remoteKeys.pubKey),ECDH,true,[]);
    if(remoteKeys.signPubKey)s.pSK=await crypto.subtle.importKey('spki',b64toBuf(remoteKeys.signPubKey),ECDSA,true,['verify']);
    await deriveKey(pid);
  }

  // WebRTC
  function initPC(pid){
    const s=sessions[pid]; if(s.pc)s.pc.close();
    s.pc=new RTCPeerConnection({iceServers:ICE});
    s.pc.oniceconnectionstatechange=()=>{
      if(s.pc.iceConnectionState==='connected'||s.pc.iceConnectionState==='completed'){s.online=true;renderCon()}
      else if(s.pc.iceConnectionState==='failed'){s.online=false;s.conf=false;s.root=null;renderCon()}
    };
    s.pc.ondatachannel=e=>{if(e.channel.label==='chat'){s.dc=e.channel;setupDC(pid)}};
  }
  function setupDC(pid){
    const s=sessions[pid]; s.dc.onopen=async()=>{if(!s.oEDH){const keys=await startExchange(pid);s.dc.send(JSON.stringify({type:'keys',...keys}))}};
    s.dc.onmessage=e=>onMsg(pid,e);
  }
  async function onMsg(pid,e){
    if(e.data instanceof ArrayBuffer)return; try{const d=JSON.parse(e.data);
      if(d.type==='keys'&&!sessions[pid].pEDH){await handleRemoteKeys(pid,d);if(!sessions[pid].conf&&sessions[pid].pw)await deriveKey(pid)}
      else if(d.type==='msg'&&sessions[pid].conf){const inner=await decAndVerify(sessions[pid],d);
        if(inner){if(inner.id&&sessions[pid].recIds.has(inner.id))return;sessions[pid].recIds.add(inner.id);
          const tmr=sessions[pid].autoTimer||5;
          switch(inner.type){case'text':await addEncDisp(pid,inner.content,'other',inner.id,tmr);break}
        }
      }
    }catch{}
  }

  async function sendText(){
    const s=sessions[activePeerId]; if(!s||!s.conf)return alert('보안 세션이 아직 활성화되지 않았습니다.');
    const inp=s.manual?document.getElementById('manualMsgInput'):document.getElementById('msgInput');
    const txt=inp.value.trim(); if(!txt)return; const mid=uuid(), timer=s.autoTimer;
    const pl={type:'text',content:txt,id:mid,timer};
    if(s.manual){
      const enc=await encAndSign(s,pl); await navigator.clipboard.writeText(JSON.stringify(enc));
      await addEncDisp(activePeerId,txt,'me',mid,timer); inp.value=''; alert('암호문이 복사되었습니다.');
    }else{
      await addEncDisp(activePeerId,txt,'me',mid,timer);
      if(s.dc&&s.dc.readyState==='open'){const enc=await encAndSign(s,pl);s.dc.send(JSON.stringify({type:'msg',...enc}))}
      inp.value='';
    }
  }

  // 수동 키교환
  async function setupManualKeys(){
    const s=sessions[activePeerId]; s.manual=true; const keys=await startExchange(activePeerId);
    document.getElementById('myKeysDisplay').textContent=JSON.stringify(keys);
    document.getElementById('copyMyKeysBtn').onclick=()=>navigator.clipboard.writeText(JSON.stringify(keys)).then(()=>alert('복사됨'));
    document.getElementById('applyRemoteKeysBtn').onclick=async()=>{
      try{const remote=JSON.parse(document.getElementById('remoteKeysInput').value.trim());await handleRemoteKeys(activePeerId,remote);
        document.getElementById('manualError').style.display='none';updateUIForSession(s)}catch(e){document.getElementById('manualError').textContent=e.message;document.getElementById('manualError').style.display='block'}
    };
    document.getElementById('passwordPrompt').style.display='none';
    document.getElementById('manualSetupArea').style.display='block';
  }

  async function submitPw(){
    const s=sessions[activePeerId]; const pw=document.getElementById('chatPasswordInput').value.trim();
    if(!pw){document.getElementById('passwordError').textContent='암호를 입력하세요';document.getElementById('passwordError').style.display='block';return}
    s.pw=pw;
    if(s.manual){if(!s.oEDH)await setupManualKeys();else if(s.pEDH)await deriveKey(activePeerId)}
    else{if(s.oEDH&&s.pEDH)await deriveKey(activePeerId);else document.getElementById('passwordError').textContent='상대 연결 대기 중...';document.getElementById('passwordError').style.display='block'}
  }

  // 채팅 생성/참가
  async function newChat(name){
    const id=uuid();addCon(id,name);activePeerId=id; const s=getSess(id); s.isOff=true;
    if(webrtcAvailable){
      showView('offerPanel'); initPC(id); s.dc=s.pc.createDataChannel('chat',{ordered:true}); setupDC(id);
      s.pc.createOffer().then(o=>s.pc.setLocalDescription(o)).then(()=>waitIce(s.pc)).then(()=>{
        document.getElementById('offerLinkDisplay').textContent=location.origin+location.pathname+'#offer='+encSDP(s.pc.localDescription)+'&peer='+id;
      });
    }else{
      showView('chatScreen'); document.getElementById('chatTitle').textContent=name; s.manual=true;
      document.getElementById('passwordPrompt').style.display='block'; updateUIForSession(s);
    }renderCon();
  }
  async function joinViaLink(){
    const t=document.getElementById('remoteOfferSDP').value.trim(); if(!t)return;
    let offerS=t,pid; if(t.startsWith('http')){const u=new URL(t),hp=new URLSearchParams(u.hash.substring(1));offerS=hp.get('offer');pid=hp.get('peer')||uuid()}else pid=uuid();
    const offer=decSDP(offerS); addCon(pid,'상대방'); activePeerId=pid; const s=getSess(pid); s.isOff=false;
    initPC(pid); await s.pc.setRemoteDescription(offer); const ans=await s.pc.createAnswer(); await s.pc.setLocalDescription(ans); await waitIce(s.pc);
    showView('chatScreen'); document.getElementById('chatTitle').textContent='상대방';
    document.getElementById('passwordPrompt').style.display='block';
    document.getElementById('answerModalLink').textContent=location.origin+location.pathname+'#answer='+encSDP(s.pc.localDescription)+'&peer='+pid;
    document.getElementById('answerModal').classList.remove('hidden'); renderCon();
  }
  function waitIce(pc){return new Promise(r=>{if(pc.iceGatheringState==='complete')r();else pc.addEventListener('icegatheringstatechange',()=>{if(pc.iceGatheringState==='complete')r()})})}

  // 삭제
  async function destroyChat(pid){const s=sessions[pid];if(!s){markDest(pid);rmCon(pid);goHome();return}markDest(pid);if(activePeerId===pid)goHome();if(s.pc)s.pc.close();rmCon(pid);renderCon()}

  // ─────────── UI 바인딩 ───────────
  let isLocked=false,lockPw=null;
  function resetInact(){clearTimeout(inaTimer);inaTimer=setTimeout(()=>{if(activePeerId&&sessions[activePeerId]?.pw){isLocked=true;lockPw=sessions[activePeerId].pw;alert('기기 잠금')}},60000)}
  ['click','keydown'].forEach(e=>document.addEventListener(e,resetInact));

  function bind(){
    document.getElementById('newChatBtn').addEventListener('click',()=>{document.getElementById('nameModal').classList.remove('hidden');document.getElementById('peerNameInput').focus()});
    document.getElementById('confirmNewChatBtn').addEventListener('click',()=>{const nm=document.getElementById('peerNameInput').value.trim();if(nm){document.getElementById('nameModal').classList.add('hidden');newChat(nm)}});
    document.getElementById('cancelNewChatBtn').addEventListener('click',()=>document.getElementById('nameModal').classList.add('hidden'));
    document.getElementById('joinChatBtn').addEventListener('click',()=>{if(webrtcAvailable)showView('answerPanel');else alert('WebRTC 불가')});
    document.getElementById('createAnswerBtn').addEventListener('click',joinViaLink);
    document.getElementById('copyOfferLinkBtn').addEventListener('click',()=>navigator.clipboard.writeText(document.getElementById('offerLinkDisplay').textContent));
    document.getElementById('applyAnswerBtn').addEventListener('click',async()=>{const l=document.getElementById('answerLinkInput').value.trim();if(l){let as=l;if(l.startsWith('http')){const u=new URL(l);as=new URLSearchParams(u.hash.substring(1)).get('answer')}await sessions[activePeerId].pc.setRemoteDescription(decSDP(as));showView('chatScreen');document.getElementById('passwordPrompt').style.display='block'}});
    document.getElementById('offerHomeBtn').addEventListener('click',goHome);
    document.getElementById('answerHomeBtn').addEventListener('click',goHome);
    document.getElementById('backToHomeBtn').addEventListener('click',goHome);
    document.getElementById('destroyChatBtn').addEventListener('click',()=>showDestroy(activePeerId));
    document.getElementById('confirmDestroyBtn').addEventListener('click',confDestroy);
    document.getElementById('cancelDestroyBtn').addEventListener('click',hideDestroy);
    document.getElementById('submitPasswordBtn').addEventListener('click',submitPw);
    document.getElementById('sendBtn').addEventListener('click',sendText);
    document.getElementById('msgInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendText()}});
    document.getElementById('copyAnswerBtn').addEventListener('click',()=>navigator.clipboard.writeText(document.getElementById('answerModalLink').textContent));
    document.getElementById('closeAnswerModalBtn').addEventListener('click',()=>document.getElementById('answerModal').classList.add('hidden'));
    document.getElementById('encryptManualBtn').addEventListener('click',sendText);
    document.getElementById('decryptManualBtn').addEventListener('click',async()=>{const s=sessions[activePeerId];const enc=document.getElementById('manualRecvInput').value.trim();
      if(enc){const d=JSON.parse(enc);const inner=await decAndVerify(s,d);if(inner)await addEncDisp(activePeerId,inner.content,'other',inner.id,s.autoTimer);document.getElementById('manualRecvInput').value=''}});
  }

  // 초기화
  try{bind();renderCon();showView('simpleMode')}catch(e){alert('초기 오류: '+e.message)}
});
</script>
