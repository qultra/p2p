<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0, minimum-scale=1.0">
  <title>P2P 비밀 메신저 – 극한 보안 완전판</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src *; media-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; base-uri 'none'; form-action 'none'; referrer no-referrer;">
  <meta name="referrer" content="no-referrer">
  <style>
    :root {
      --bg: #06090f; --surface: #0f141e; --card: rgba(15,20,30,0.9);
      --text: #e0e5f0; --sub: #8892b0; --accent: #5b8df0; --danger: #f97070;
      --success: #45d68a; --border: #1a2332; --radius: 20px; --radius-sm: 14px;
      --safe-bottom: env(safe-area-inset-bottom, 10px);
    }
    * { margin:0; padding:0; box-sizing:border-box; user-select: none !important; -webkit-user-select: none !important; -moz-user-select: none !important; -webkit-touch-callout: none !important; -webkit-tap-highlight-color: transparent; -webkit-user-modify: read-only; }
    input, textarea { -webkit-user-modify: read-write !important; user-select: text !important; -webkit-user-select: text !important; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; justify-content: center; align-items: center;
      min-height: 100dvh; padding: 10px;
      overscroll-behavior: none;
    }
    .container {
      width: 100%; max-width: 520px; height: 95dvh;
      background: var(--surface); border-radius: 30px;
      box-shadow: 0 30px 70px rgba(0,0,0,0.7);
      display: flex; flex-direction: column; overflow: hidden;
      border: 1px solid var(--border); position: relative;
    }
    .header { padding:14px 20px; background:rgba(8,14,24,0.95); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; min-height:56px; }
    .header h1 { font-size:1.1rem; font-weight:700; background:linear-gradient(135deg,#90b4ff,#b794f4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .status-bar { display:flex; align-items:center; gap:7px; }
    .dot { width:10px; height:10px; border-radius:50%; transition:0.2s; }
    .dot.on { background:var(--success); box-shadow:0 0 10px var(--success); }
    .dot.off { background:var(--danger); }
    .main-content { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; }
    .main-content::-webkit-scrollbar { width:4px; } .main-content::-webkit-scrollbar-thumb { background:#253040; border-radius:2px; }
    .card { background:var(--card); backdrop-filter:blur(14px); border-radius:var(--radius); padding:18px; margin-bottom:12px; border:1px solid var(--border); }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; background:rgba(255,255,255,0.05); color:white; border:1px solid var(--border); padding:14px 20px; border-radius:var(--radius-sm); cursor:pointer; font-weight:600; font-size:0.95rem; transition:0.2s; width:100%; backdrop-filter:blur(10px); }
    .btn:hover { background:rgba(255,255,255,0.12); }
    .btn:active { transform:scale(0.97); }
    .btn.primary { background:var(--accent); border:none; }
    .btn.danger { background:var(--danger); border:none; }
    .btn-small { padding:8px 14px; font-size:0.8rem; width:auto; border-radius:12px; }
    input, textarea { width:100%; background:#0a0f18; color:var(--text); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px 15px; font-size:16px; outline:none; user-select:text; -webkit-user-select:text; }
    input:focus, textarea:focus { border-color:var(--accent); box-shadow: 0 0 0 2px rgba(91,141,240,0.3); }
    .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index:100; display:flex; align-items:center; justify-content:center; }
    .modal-content { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; width:90%; max-width:360px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
    .modal-content h3 { margin-bottom: 16px; font-size: 1.1rem; }
    #chatScreen { display:none; flex-direction:column; flex:1; }
    #messages { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px; padding:6px 0; }
    .msg { display:flex; flex-direction:column; animation:fadeUp 0.2s ease; }
    .msg.system { align-items:center; } .msg.me { align-items:flex-end; } .msg.other { align-items:flex-start; }
    .bubble { max-width:83%; padding:10px 16px; border-radius:20px; background:rgba(22,30,44,0.85); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.05); word-break:break-word; position:relative; overflow:hidden; z-index:1; }
    .encrypted-bubble { background:#0a0f18; border:1px solid var(--border); font-family:monospace; font-size:0.7rem; color:#94a3b8; white-space:pre-wrap; word-break:break-all; padding:10px; border-radius:12px; max-width:90%; }
    .msg.system .bubble { background:rgba(255,255,255,0.04); border:none; font-size:0.78rem; color:var(--sub); }
    .msg.me .bubble { background:linear-gradient(140deg,rgba(74,130,250,0.5),rgba(124,92,240,0.5)); border-bottom-right-radius:6px; }
    .msg.other .bubble { border-bottom-left-radius:6px; }
    .msg .time { font-size:0.65rem; color:var(--sub); margin-top:4px; display:flex; justify-content:flex-end; gap:6px; position:relative; z-index:5; }
    .input-bar { display:flex; gap:6px; padding:10px 0 0; align-items:flex-end; padding-bottom:var(--safe-bottom); }
    #msgInput { flex:1; min-height:44px; max-height:110px; resize:none; }
    .icon-btn { background:none; border:none; font-size:1.3rem; cursor:pointer; padding:10px; color:var(--accent); }
    .send-btn { background:var(--accent); color:white; width:44px; height:44px; display:flex; align-items:center; justify-content:center; border-radius:50%; cursor:pointer; flex-shrink:0; }
    .action-bar { display:flex; gap:4px; padding:4px 0 0; position:relative; flex-wrap:wrap; }
    .action-btn { background:rgba(255,255,255,0.05); border:1px solid var(--border); color:var(--text); padding:8px 14px; border-radius:14px; cursor:pointer; font-size:0.85rem; }
    .picker-overlay { display:none; position:absolute; bottom:100%; left:0; right:0; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:12px; max-height:220px; overflow-y:auto; z-index:20; margin-bottom:4px; }
    .picker-overlay.active { display:flex; flex-direction:column; gap:8px; }
    .picker-search { width:100%; background:#0a0f18; color:var(--text); border:1px solid var(--border); border-radius:12px; padding:10px 12px; font-size:16px; outline:none; margin-bottom:4px; }
    .picker-grid { display:flex; flex-wrap:wrap; gap:8px; }
    .picker-item { cursor:pointer; border-radius:8px; overflow:hidden; }
    .picker-item img { width:64px; height:64px; object-fit:cover; border-radius:8px; }
    .emoji-item { font-size:1.8rem; cursor:pointer; padding:6px 8px; border-radius:8px; }
    .hidden { display:none !important; }
    .text-center { text-align:center; } .text-sub { color:var(--sub); font-size:0.82rem; }
    .mt { margin-top:12px; } .mb { margin-bottom:12px; }
    .link-box { word-break:break-all; background:#0a0f18; padding:10px; border-radius:12px; font-size:0.72rem; margin:8px 0; max-height:75px; overflow-y:auto; color:#9aa4bf; }
    .fingerprint { font-family:monospace; font-size:0.6rem; background:#0a0f18; padding:6px; border-radius:8px; word-break:break-all; user-select:text !important; -webkit-user-select:text !important; }
    .chat-header { display:flex; align-items:center; gap:10px; padding:10px 16px; border-bottom:1px solid var(--border); }
    .chat-title { font-size:0.95rem; font-weight:600; flex:1; }
    .typing-indicator { font-size:0.75rem; color:var(--sub); padding:4px 16px; display:none; }
    .contact-list { display:flex; flex-direction:column; gap:8px; margin-top:12px; }
    .contact-card { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:16px; padding:14px 16px; cursor:pointer; display:flex; align-items:center; gap:12px; position:relative; }
    .contact-card.active { border-color:var(--accent); background:rgba(91,141,240,0.1); }
    .contact-avatar { width:44px; height:44px; border-radius:50%; background:rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0; position:relative; }
    .contact-dot { position:absolute; bottom:0; right:0; width:12px; height:12px; border-radius:50%; border:2px solid var(--surface); }
    .contact-dot.on { background:var(--success); } .contact-dot.off { background:var(--danger); }
    .contact-info { flex:1; min-width:0; }
    .contact-name { font-size:0.95rem; font-weight:600; }
    .contact-status { font-size:0.75rem; color:var(--sub); margin-top:2px; }
    .unread-badge { background:var(--danger); color:white; border-radius:12px; padding:2px 8px; font-size:0.7rem; font-weight:bold; margin-left:8px; }
    .svg-icon { width:20px; height:20px; fill:currentColor; flex-shrink:0; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spinner { width:20px; height:20px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block; }
  </style>
</head>
<body>
<div class="container">
  <div class="header"><h1>🔐 P2P 비밀채팅</h1><div class="status-bar"><span id="connDot" class="dot off"></span><span id="connLabel">오프라인</span></div></div>
  <div class="main-content" id="mainArea">
    <div id="simpleMode" class="view">
      <div class="card text-center">
        <h3 style="margin-bottom:4px;">서버 없이 완벽한 익명성</h3>
        <p class="text-sub mb">연결 끊겨도 자동 복구 · 오프라인 메시지 큐</p>
        <button class="btn primary" id="btnNewChat"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>새 채팅 생성</button>
        <button class="btn mt" id="btnJoin"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>초대 링크로 참가</button>
      </div>
      <div style="font-size:0.8rem; color:var(--sub); margin-bottom:8px; font-weight:600;">📋 대화 목록</div>
      <div class="contact-list" id="contactList"></div>
    </div>
    <div id="nameModal" class="modal hidden">
      <div class="modal-content"><h3>✨ 새 채팅</h3><input type="text" id="peerNameInput" placeholder="상대방 이름 입력"><div class="mt" style="display:flex;gap:8px;"><button class="btn primary" id="btnConfirmNewChat" style="flex:1;">확인</button><button class="btn" id="btnCloseNameModal" style="flex:1;">취소</button></div></div>
    </div>
    <div id="offerPanel" class="view hidden">
      <div class="card text-center">
        <div class="spinner mb" id="offerSpinner" style="display:none;"></div>
        <p><strong>연결 링크 생성 중...</strong></p>
        <p class="text-sub">생성된 링크를 상대에게 전송하세요.</p>
        <div class="link-box" id="offerLinkDisplay">생성 중...</div>
        <button class="btn mt" id="btnCopyOfferLink">링크 복사</button>
        <p class="text-sub mt">상대가 보낸 Answer 링크를 아래에 붙여넣으세요.</p>
        <input type="text" id="answerLinkInput" placeholder="Answer 링크 입력..."><button class="btn primary mt" id="btnApplyAnswerLink">연결 완료</button>
        <button class="btn mt" id="btnOfferGoHome">홈으로</button>
      </div>
    </div>
    <div id="answerPanel" class="view hidden">
      <div class="card"><strong>📥 초대 링크 붙여넣기</strong><textarea id="remoteOfferSDP" rows="3" placeholder="방장에게 받은 전체 링크..."></textarea><button class="btn primary mt" id="btnCreateAnswer">연결 시작</button></div>
      <button class="btn mt" id="btnAnswerGoHome">홈으로</button>
    </div>
    <div id="chatScreen" class="view hidden">
      <div class="chat-header">
        <button class="btn-small" id="btnChatBack"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></button>
        <span class="chat-title" id="chatTitle">채팅</span>
        <button class="btn-small" id="btnRenameChat"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg></button>
        <button class="btn-small danger" id="btnDestroyChat"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
      </div>
      <div id="securityCard" class="card" style="margin:0 0 4px; padding:6px 12px; font-size:0.7rem; display:none; align-items:center; gap:6px;">
        <span>🔒</span><span id="sessionFingerprint" class="fingerprint"></span>
      </div>
      <div id="passwordPrompt" class="card text-center" style="margin:8px;">
        <strong>🔐 채팅방 암호 입력</strong>
        <input type="password" id="chatPasswordInput" placeholder="상대와 공유한 암호" style="margin-top:8px;">
        <button class="btn primary mt" id="btnSubmitPassword">암호 설정</button>
        <p class="text-sub mt">암호가 없으면 수신된 암호문만 표시됩니다.</p>
        <p id="passwordError" class="text-sub" style="color:var(--danger); display:none;"></p>
      </div>
      <div id="messages"></div>
      <div id="typingIndicator" class="typing-indicator">상대방이 입력 중...</div>
      <div class="action-bar" style="position:relative; padding:0 8px;">
        <button class="action-btn" id="btnToggleEmojiPicker">😀</button>
        <button class="action-btn" id="btnToggleMediaPicker">🔗</button>
        <button class="action-btn" id="btnStickerUpload">📁</button>
        <div class="picker-overlay" id="emojiPicker"><div class="picker-grid" id="emojiGrid"></div></div>
        <div class="picker-overlay" id="mediaPicker">
          <input type="text" class="picker-search" placeholder="URL 입력 후 Enter" id="mediaSearch">
          <div class="picker-grid" id="mediaGrid"></div>
        </div>
        <input type="file" id="stickerFileInput" class="hidden" accept="image/*">
      </div>
      <div class="input-bar" style="padding:8px;">
        <button class="icon-btn" id="btnFileInput">📎</button>
        <textarea id="msgInput" rows="1" placeholder="메시지 (종단간 암호화)"></textarea>
        <button class="send-btn" id="btnSendText">➤</button>
      </div>
      <input type="file" id="fileInput" class="hidden" multiple>
    </div>
  </div>
</div>
<div id="answerModal" class="modal hidden">
  <div class="modal-content">
    <h3>📤 내 Answer 링크</h3>
    <p class="text-sub" style="margin-bottom:12px;">이 링크를 상대에게 전송하면 연결됩니다.</p>
    <div class="link-box" id="answerModalLink" style="margin-bottom:12px;"></div>
    <div style="display:flex; gap:8px;"><button class="btn primary" id="btnCopyAnswerLink">📋 복사</button><button class="btn" id="btnCloseAnswerModal">닫기</button></div>
  </div>
</div>

<script>
(function() {
  "use strict";

  // ─── 유틸리티 ────────────────────────────────
  const textEncoder = new TextEncoder();
  const textDecoder = new TextDecoder();
  const toBase64url = buf => btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
  const fromBase64url = str => { str = str.replace(/-/g,'+').replace(/_/g,'/'); while(str.length%4) str+='='; return Uint8Array.from(atob(str),c=>c.charCodeAt(0)).buffer; };
  const encodeSDP = obj => toBase64url(textEncoder.encode(JSON.stringify(obj)));
  const decodeSDP = str => JSON.parse(textDecoder.decode(fromBase64url(str)));

  const ICE_SERVERS = [
    { urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' },
    { urls: 'stun:stun.cloudflare.com:3478' }, { urls: 'stun:global.stun.twilio.com:3478' },
    { urls: 'stun:stun.freeswitch.org:3478' }, { urls: 'stun:stun.nextcloud.com:443' },
    { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
    { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
  ];

  const DESTROY_PREFIX = 'p2p_destroyed_';
  const PENDING_DESTROY_PREFIX = 'p2p_pending_destroy_';
  const EMOJI_LIST = ['😀','😂','🥰','😎','🤔','👍','❤️','🔥','🎉','💯','😢','😡','🥺','🤯','✨','🍕','🚀','💻','📱','🎵'];

  // ─── 상태 (클로저 은폐) ──────────────────────
  const sessions = new Map();
  let activePeerId = null;
  const messageStore = new Map(); // msgId -> { peerId, encData, type }
  const offlineQueue = new Map(); // peerId -> [{ payload, displayContent, id, ts }]

  // ─── 보조 함수 ─────────────────────────────
  const buf2hex = b => [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
  const str2buf = s => textEncoder.encode(s);
  const buf2b64 = b => btoa(String.fromCharCode(...new Uint8Array(b)));
  const b642buf = s => Uint8Array.from(atob(s),c=>c.charCodeAt(0)).buffer;
  const concatBufs = (...bufs) => { let len=bufs.reduce((a,b)=>a+b.byteLength,0), tmp=new Uint8Array(len), off=0; bufs.forEach(b=>{tmp.set(new Uint8Array(b),off);off+=b.byteLength;}); return tmp.buffer; };
  const genUUID = () => crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx'.replace(/[xy]/g,c=>{const r=crypto.getRandomValues(new Uint8Array(1))[0]%16;return(c=='x'?r:r&0x3|0x8).toString(16);});
  const formatBytes = b => b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':b<1073741824?(b/1048576).toFixed(1)+' MB':(b/1073741824).toFixed(1)+' GB';
  const escapeHtml = s => String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
  const updateConn = ok => { document.getElementById('connDot').className = 'dot '+(ok?'on':'off'); document.getElementById('connLabel').textContent = ok?'연결됨':'오프라인'; };

  function overwriteBuffer(buf) {
    if (buf && buf.byteLength) {
      const arr = new Uint8Array(buf);
      arr.fill(0);
      crypto.getRandomValues(arr);
    }
  }

  function isDestroyed(peerId) {
    return !!(localStorage.getItem(DESTROY_PREFIX + peerId) || sessionStorage.getItem(DESTROY_PREFIX + peerId));
  }
  function markDestroyed(peerId) {
    localStorage.setItem(DESTROY_PREFIX + peerId, Date.now());
    sessionStorage.setItem(DESTROY_PREFIX + peerId, Date.now());
    localStorage.removeItem(PENDING_DESTROY_PREFIX + peerId);
  }
  function setPendingDestroy(peerId) {
    localStorage.setItem(PENDING_DESTROY_PREFIX + peerId, Date.now().toString());
  }
  function clearPendingDestroy(peerId) {
    localStorage.removeItem(PENDING_DESTROY_PREFIX + peerId);
  }

  // ─── 연락처 관리 ──────────────────────────
  function getContacts() { try { return JSON.parse(localStorage.getItem('p2p_contacts') || '[]'); } catch(e) { return []; } }
  function saveContacts(contacts) { localStorage.setItem('p2p_contacts', JSON.stringify(contacts)); }
  function addContact(peerId, name) {
    let contacts = getContacts();
    if (!contacts.find(c => c.id === peerId)) {
      contacts.push({ id: peerId, name });
      saveContacts(contacts);
      renderContactList();
    }
  }
  function removeContact(peerId) {
    let contacts = getContacts().filter(c => c.id !== peerId);
    saveContacts(contacts);
  }

  function renderContactList() {
    const container = document.getElementById('contactList');
    if (!container) return;
    const contacts = getContacts().filter(c => !isDestroyed(c.id));
    container.innerHTML = contacts.map(c => {
      const sess = sessions.get(c.id);
      const online = sess && sess.isOnline;
      const unread = sess ? sess.pendingMessages.length : 0;
      const unreadBadge = unread > 0 ? `<span class="unread-badge">${unread}</span>` : '';
      return `<div class="contact-card ${c.id===activePeerId?'active':''}" data-peerid="${c.id}"><div class="contact-avatar">${escapeHtml(c.name).charAt(0)}<span class="contact-dot ${online?'on':'off'}"></span></div><div class="contact-info"><div class="contact-name">${escapeHtml(c.name)} ${unreadBadge}</div><div class="contact-status">${online?'온라인':'오프라인'}</div></div></div>`;
    }).join('');
  }

  // ─── 세션 관리 ─────────────────────────────
  function getOrCreateSession(peerId) {
    if (!sessions.has(peerId)) {
      sessions.set(peerId, {
        pc: null, dc: null, typingDC: null, typingKey: null, isOfferer: false, password: null,
        rootKey: null, sendChainKey: null, recvChainKey: null, sendMsgNum: 0, recvMsgNum: 0,
        ourEphemeralKeyPair: null, theirEphemeralPub: null,
        salt: null, ourEcdhPair: null, peerEcdhPub: null,
        handshakeDone: false, confirmed: false, isOnline: false,
        receivedMessageIds: new Set(), pendingMessages: [],
        fileReceive: null, typingTimer: null, reconnectAttempts: 0,
        pendingConfirm: null, destroyRetry: 0, authKey: null
      });
    }
    return sessions.get(peerId);
  }

  // ─── UI 전환 ──────────────────────────────
  function showView(viewId) {
    document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
    const target = document.getElementById(viewId);
    if (target) { target.classList.remove('hidden'); target.style.display = viewId==='chatScreen'?'flex':''; }
  }

  function goHome() {
    activePeerId = null;
    showView('simpleMode');
    document.getElementById('messages').innerHTML = '';
    document.getElementById('securityCard').style.display = 'none';
    document.getElementById('passwordPrompt').style.display = 'block';
    updateConn(false);
    renderContactList();
  }

  // ─── 메시지 저장소 (암호문 상시) ──────────
  function storeMessage(peerId, msgId, encData, type) {
    messageStore.set(msgId, { peerId, encData, type, timestamp: Date.now() });
    renderPlaceholder(msgId);
  }

  function renderPlaceholder(msgId) {
    const entry = messageStore.get(msgId);
    if (!entry) return;
    const messagesDiv = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg system';
    div.id = 'msg-'+msgId;
    div.setAttribute('data-msgid', msgId);
    const bubble = document.createElement('div');
    bubble.className = 'bubble encrypted-bubble';
    bubble.textContent = '🔒 암호화된 메시지 (길게 터치하여 확인)';
    div.appendChild(bubble);
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  async function revealMessage(msgId) {
    const entry = messageStore.get(msgId);
    if (!entry) return;
    const sess = sessions.get(entry.peerId);
    if (!sess || !sess.rootKey || !sess.confirmed) {
      alert('보안 세션이 없습니다. 암호를 먼저 입력해주세요.');
      return;
    }
    const bubble = document.querySelector(`#msg-${msgId} .bubble`);
    if (!bubble || bubble.dataset.revealed === 'true') return;
    try {
      let plaintext = '';
      const inner = await decryptPayload(sess, entry.encData);
      if (!inner) return;
      switch (inner.type) {
        case 'text': plaintext = inner.content; break;
        case 'emoji': plaintext = inner.content; break;
        case 'media': plaintext = `<img src="${escapeHtml(inner.url)}" style="max-width:200px;max-height:200px;border-radius:12px;">`; break;
        case 'file_start': plaintext = `📥 ${escapeHtml(inner.name)} (${formatBytes(inner.size)})`; break;
        case 'file_end': plaintext = '📎 파일 다운로드 준비 완료'; break;
        default: plaintext = '[알 수 없는 메시지]';
      }
      bubble.innerHTML = `${plaintext}<div class="time">${new Date().toLocaleTimeString()}</div>`;
      bubble.classList.remove('encrypted-bubble');
      bubble.dataset.revealed = 'true';
      setTimeout(() => {
        if (bubble.isConnected) {
          bubble.textContent = '🔒 암호화된 메시지 (길게 터치하여 확인)';
          bubble.classList.add('encrypted-bubble');
          bubble.dataset.revealed = 'false';
        }
      }, 3000);
    } catch(e) {
      bubble.textContent = '❌ 복호화 실패';
      bubble.classList.add('encrypted-bubble');
      bubble.dataset.revealed = 'false';
      setTimeout(() => {
        if (bubble.isConnected) bubble.textContent = '🔒 암호화된 메시지';
      }, 2000);
    }
  }

  // ─── 오프라인 큐 ──────────────────────────
  async function flushOfflineQueue(peerId) {
    const sess = sessions.get(peerId);
    if (!sess || !sess.dc || sess.dc.readyState !== 'open' || !sess.rootKey || !sess.confirmed) return;
    const queue = offlineQueue.get(peerId) || [];
    if (queue.length === 0) return;
    offlineQueue.delete(peerId);
    addSystemMsg(peerId, `📬 ${queue.length}개의 대기 메시지 전송 중...`);
    for (const item of queue) {
      try {
        const enc = await encryptPayload(sess, item.payload);
        sess.dc.send(JSON.stringify({ type:'msg', ...enc }));
        const entry = messageStore.get(item.id);
        if (entry) entry.encData = enc;
      } catch(e) {
        const remaining = offlineQueue.get(peerId) || [];
        remaining.push(item);
        offlineQueue.set(peerId, remaining);
        break;
      }
    }
  }

  function addSystemMsg(peerId, text) {
    if (peerId !== activePeerId || isDestroyed(peerId)) return;
    const messagesDiv = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg system';
    div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  // ─── 전송 로직 ────────────────────────────
  async function sendPayload(sess, payload, displayContent, msgId) {
    if (!sess.dc || sess.dc.readyState !== 'open' || !sess.rootKey || !sess.confirmed) {
      const queue = offlineQueue.get(activePeerId) || [];
      queue.push({ payload, displayContent, id: msgId, ts: Date.now() });
      offlineQueue.set(activePeerId, queue);
      storeMessage(activePeerId, msgId, null, 'sent');
      return;
    }
    try {
      const enc = await encryptPayload(sess, payload);
      sess.dc.send(JSON.stringify({ type:'msg', ...enc }));
      storeMessage(activePeerId, msgId, enc, 'sent');
    } catch(e) {
      const queue = offlineQueue.get(activePeerId) || [];
      queue.push({ payload, displayContent, id: msgId, ts: Date.now() });
      offlineQueue.set(activePeerId, queue);
      storeMessage(activePeerId, msgId, null, 'sent');
      addSystemMsg(activePeerId, '⚠️ 전송 실패, 복구 대기 중');
    }
  }

  function sendText() {
    if (!activePeerId || isDestroyed(activePeerId)) return;
    const sess = sessions.get(activePeerId);
    if (!sess) return;
    const inp = document.getElementById('msgInput');
    const txt = inp.value.trim();
    if (!txt) return;
    const msgId = genUUID();
    const payload = { type:'text', content:txt, id:msgId };
    sendPayload(sess, payload, txt, msgId);
    inp.value = '';
  }

  // ─── 이모지·미디어·파일 ──────────────────
  function buildEmojiPicker() {
    document.getElementById('emojiGrid').innerHTML = EMOJI_LIST.map(e => `<span class="emoji-item" data-emoji="${e}">${e}</span>`).join('');
  }
  function sendEmoji(emoji) {
    if (!activePeerId || isDestroyed(activePeerId)) return;
    const sess = sessions.get(activePeerId);
    if (!sess) return;
    const msgId = genUUID();
    sendPayload(sess, { type:'emoji', content:emoji, id:msgId }, emoji, msgId);
  }
  function sendMedia(url) {
    if (!activePeerId || isDestroyed(activePeerId)) return;
    const sess = sessions.get(activePeerId);
    if (!sess) return;
    const msgId = genUUID();
    sendPayload(sess, { type:'media', url, id:msgId }, url, msgId);
  }
  function addMediaUrl() {
    const url = document.getElementById('mediaSearch').value.trim();
    if (!url) return;
    let favs = JSON.parse(localStorage.getItem('p2p_media_fav')||'[]');
    if (!favs.includes(url)) { favs.push(url); localStorage.setItem('p2p_media_fav', JSON.stringify(favs)); }
    document.getElementById('mediaSearch').value = '';
    filterMedia();
    sendMedia(url);
  }
  function filterMedia() {
    const query = document.getElementById('mediaSearch').value.toLowerCase();
    const favs = JSON.parse(localStorage.getItem('p2p_media_fav')||'[]');
    document.getElementById('mediaGrid').innerHTML = favs.filter(u => u.toLowerCase().includes(query)).map(u => `<div class="picker-item"><img src="${escapeHtml(u)}" alt="media" data-url="${escapeHtml(u)}"></div>`).join('');
  }
  async function handleFiles(files) { for(const f of files) await sendFile(f); }
  async function sendFile(file) {
    if (!activePeerId || isDestroyed(activePeerId)) return;
    const sess = sessions.get(activePeerId);
    if (!sess || !sess.dc || sess.dc.readyState !== 'open' || !sess.rootKey || !sess.confirmed) {
      addSystemMsg(activePeerId, '⚠️ 파일 전송 불가 (보안 세션 없음)');
      return;
    }
    const fileId = genUUID();
    const fek = await crypto.subtle.generateKey({name:'AES-GCM',length:256},true,['encrypt','decrypt']);
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const fileBuf = await file.arrayBuffer();
    const ct = await crypto.subtle.encrypt({name:'AES-GCM',iv},fek,fileBuf);
    const encData = new Uint8Array(iv.byteLength+ct.byteLength);
    encData.set(iv); encData.set(new Uint8Array(ct),iv.byteLength);
    const metaEnc = await encryptPayload(sess, { type:'file_start', id:fileId, name:file.name, size:encData.byteLength, fek:buf2b64(await crypto.subtle.exportKey('raw',fek)) });
    sess.dc.send(JSON.stringify({ type:'msg', ...metaEnc }));
    storeMessage(activePeerId, fileId, metaEnc, 'sent');
    const chunkSize = 64*1024;
    for(let offset=0; offset<encData.byteLength; offset+=chunkSize) {
      sess.dc.send(encData.slice(offset, offset+chunkSize).buffer);
      await new Promise(r=>setTimeout(r,5));
    }
    const endEnc = await encryptPayload(sess, { type:'file_end', id:fileId });
    sess.dc.send(JSON.stringify({ type:'msg', ...endEnc }));
  }

  // ─── WebRTC 초기화 ───────────────────────
  function initPC(peerId) {
    const sess = getOrCreateSession(peerId);
    if (sess.pc) { sess.pc.close(); sess.pc = null; }
    sess.pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
    sess.pc.oniceconnectionstatechange = () => {
      const state = sess.pc.iceConnectionState;
      if (state === 'connected' || state === 'completed') {
        sess.isOnline = true; updateConn(true); renderContactList();
        sess.reconnectAttempts = 0;
        flushOfflineQueue(peerId);
        if (isDestroyed(peerId)) return;
        if (localStorage.getItem(PENDING_DESTROY_PREFIX+peerId)) trySendDestroy(peerId);
      } else if (state === 'disconnected' || state === 'failed' || state === 'closed') {
        sess.isOnline = false; updateConn(false);
        if (state === 'failed' && sess.reconnectAttempts < 3) {
          sess.reconnectAttempts++;
          setTimeout(() => { if(sess.pc && sess.pc.iceConnectionState==='failed') try{sess.pc.restartIce();}catch(e){} }, 2000);
        }
      }
    };
    sess.pc.ondatachannel = e => {
      if (e.channel.label === 'chat') { sess.dc = e.channel; setupDC(peerId); }
      else if (e.channel.label === 'typing') { sess.typingDC = e.channel; setupTypingDC(peerId); }
    };
  }

  function setupDC(peerId) {
    const sess = sessions.get(peerId);
    if (!sess || !sess.dc) return;
    sess.dc.onopen = () => {
      if (isDestroyed(peerId)) return;
      sess.isOnline = true; updateConn(true); renderContactList();
      if (!sess.handshakeDone && !sess.rootKey && !sess.ourEcdhPair) startEcdhExchange(peerId);
      flushOfflineQueue(peerId);
    };
    sess.dc.onmessage = e => onMsg(peerId, e);
    sess.dc.onclose = () => {
      sess.isOnline = false; updateConn(false); renderContactList();
    };
  }

  function setupTypingDC(peerId) {
    const sess = sessions.get(peerId);
    if (!sess || !sess.typingDC) return;
    sess.typingDC.onmessage = e => {
      if (typeof e.data === 'string') {
        try {
          const enc = JSON.parse(e.data);
          if (enc.type === '__destroy_req__') { handleRemoteDestroy(enc.peerId || peerId); return; }
          // typing indicator ...
        } catch(ex) {}
      }
    };
  }

  // ─── ECDH + Double Ratchet (동일) ────────
  const ECDH_ALG = { name:'ECDH', namedCurve:'P-521' };
  const PBKDF2_ITERS = 20000000;
  const SALT_SIZE = 4096;
  const AES_LEN = 256;
  const TYPING_AES_LEN = 128;
  const PADDING_MIN=256, PADDING_MAX=512;

  async function startEcdhExchange(peerId) {
    const sess = sessions.get(peerId);
    try {
      const keyPair = await crypto.subtle.generateKey(ECDH_ALG, true, ['deriveKey','deriveBits']);
      sess.ourEcdhPair = { privateKey:keyPair.privateKey, publicKey:keyPair.publicKey };
      const pubRaw = await crypto.subtle.exportKey('raw', sess.ourEcdhPair.publicKey);
      if (sess.isOfferer) {
        sess.salt = crypto.getRandomValues(new Uint8Array(SALT_SIZE));
        sess.dc.send(JSON.stringify({ type:'__ecdhe__', salt:buf2b64(sess.salt.buffer), pubKey:buf2b64(pubRaw) }));
      } else {
        sess.dc.send(JSON.stringify({ type:'__ecdhe__', pubKey:buf2b64(pubRaw) }));
      }
    } catch(e) { addSystemMsg(peerId, '보안 키 교환 시작 오류'); }
  }

  async function handleEcdheMessage(peerId, data) {
    const sess = sessions.get(peerId);
    if (sess.handshakeDone) return;
    try {
      if (data.salt) sess.salt = new Uint8Array(b642buf(data.salt));
      sess.peerEcdhPub = await crypto.subtle.importKey('raw', b642buf(data.pubKey), ECDH_ALG, true, []);
      if (sess.password && sess.ourEcdhPair && sess.peerEcdhPub && sess.salt) await deriveSessionKey(peerId);
    } catch(e) { addSystemMsg(peerId, '키 교환 처리 실패'); }
  }

  async function submitPassword() {
    if (!activePeerId) return;
    const sess = sessions.get(activePeerId);
    if (!sess) return;
    const password = document.getElementById('chatPasswordInput').value.trim();
    if (!password) {
      document.getElementById('passwordError').textContent = '암호를 입력하세요.';
      document.getElementById('passwordError').style.display = 'block';
      return;
    }
    sess.password = password;
    if (sess.salt && sess.ourEcdhPair && sess.peerEcdhPub) {
      await deriveSessionKey(activePeerId);
    } else {
      document.getElementById('passwordError').textContent = '아직 보안 연결이 준비되지 않았습니다.';
      document.getElementById('passwordError').style.display = 'block';
    }
  }

  async function deriveSessionKey(peerId) {
    const sess = sessions.get(peerId);
    try {
      const km = await crypto.subtle.importKey('raw', str2buf(sess.password), 'PBKDF2', false, ['deriveKey']);
      sess.authKey = await crypto.subtle.deriveKey({ name:'PBKDF2', salt:sess.salt, iterations:PBKDF2_ITERS, hash:'SHA-512' }, km, { name:'AES-GCM', length:AES_LEN }, true, ['encrypt','decrypt']);
      const ecdhBits = await crypto.subtle.deriveBits({ name:'ECDH', public:sess.peerEcdhPub }, sess.ourEcdhPair.privateKey, 521);
      const authRaw = await crypto.subtle.exportKey('raw', sess.authKey);
      const ikm = concatBufs(ecdhBits, str2buf(sess.password));
      const hkdfKey = await crypto.subtle.importKey('raw', ikm, 'HKDF', false, ['deriveBits']);
      const rootKey = await crypto.subtle.deriveBits({ name:'HKDF', hash:'SHA-512', salt:authRaw, info:str2buf('root') }, hkdfKey, 256);
      sess.rootKey = rootKey;
      sess.ourEphemeralKeyPair = sess.ourEcdhPair;
      sess.theirEphemeralPub = sess.peerEcdhPub;
      const typingKeyRaw = new Uint8Array(rootKey).slice(0,16);
      sess.typingKey = await crypto.subtle.importKey('raw', typingKeyRaw, { name:'AES-GCM', length:TYPING_AES_LEN }, false, ['encrypt','decrypt']);
      sess.handshakeDone = true;
      if (sess.isOfferer) await sendConfirmation(peerId);
      if (sess.pendingConfirm) {
        const pending = sess.pendingConfirm; sess.pendingConfirm = null;
        await handleConfirmation(peerId, pending);
      }
      if (peerId === activePeerId) {
        document.getElementById('securityCard').style.display = 'flex';
        document.getElementById('sessionFingerprint').textContent = buf2hex(sess.rootKey);
        document.getElementById('passwordPrompt').style.display = 'none';
        document.getElementById('passwordError').style.display = 'none';
      }
    } catch(e) {
      if (peerId === activePeerId) {
        document.getElementById('passwordError').textContent = '세션 키 생성 실패: '+e.message;
        document.getElementById('passwordError').style.display = 'block';
      }
    }
  }

  async function sendConfirmation(peerId) {
    const sess = sessions.get(peerId);
    if (!sess.rootKey || !sess.dc || sess.dc.readyState!=='open') return;
    const newKeyPair = await crypto.subtle.generateKey(ECDH_ALG, true, ['deriveKey','deriveBits']);
    sess.ourEphemeralKeyPair = newKeyPair;
    const newChainKey = await dhRatchet(sess, newKeyPair.privateKey, sess.theirEphemeralPub);
    sess.sendChainKey = newChainKey; sess.sendMsgNum = 0;
    const pubRaw = await crypto.subtle.exportKey('raw', newKeyPair.publicKey);
    sess.dc.send(JSON.stringify({ type:'__confirm__', dhPub:buf2b64(pubRaw) }));
  }

  async function handleConfirmation(peerId, data) {
    const sess = sessions.get(peerId);
    if (!sess.rootKey) { sess.pendingConfirm = data; return; }
    if (data.dhPub) await processReceivedRatchet(sess, data.dhPub);
    sess.confirmed = true;
    if (!sess.isOfferer) await sendConfirmation(peerId);
    if (peerId === activePeerId) {
      document.getElementById('securityCard').style.display = 'flex';
      document.getElementById('sessionFingerprint').textContent = buf2hex(sess.rootKey);
      document.getElementById('passwordPrompt').style.display = 'none';
    }
    flushOfflineQueue(peerId);
  }

  async function dhRatchet(sess, ourNewPriv, theirPub) {
    const dhBits = await crypto.subtle.deriveBits({ name:'ECDH', public:theirPub }, ourNewPriv, 521);
    const ikm = concatBufs(dhBits, sess.rootKey);
    const hkdfKey = await crypto.subtle.importKey('raw', ikm, 'HKDF', false, ['deriveBits']);
    const okm = await crypto.subtle.deriveBits({ name:'HKDF', hash:'SHA-512', salt:new Uint8Array(32), info:str2buf('double-ratchet') }, hkdfKey, 512);
    sess.rootKey = okm.slice(0,32);
    return okm.slice(32,64);
  }

  async function symmetricRatchet(chainKey) {
    const ck = await crypto.subtle.importKey('raw', chainKey, { name:'HMAC', hash:'SHA-512' }, false, ['sign']);
    const msgKeySig = await crypto.subtle.sign('HMAC', ck, new Uint8Array([1]));
    const nextChainKeySig = await crypto.subtle.sign('HMAC', ck, new Uint8Array([2]));
    return { msgKey: msgKeySig.slice(0,32), nextChainKey: nextChainKeySig.slice(0,32) };
  }

  async function performSendingRatchetIfNeeded(sess) {
    if (!sess.sendChainKey) {
      const newKeyPair = await crypto.subtle.generateKey(ECDH_ALG, true, ['deriveKey','deriveBits']);
      sess.ourEphemeralKeyPair = newKeyPair;
      const newChainKey = await dhRatchet(sess, newKeyPair.privateKey, sess.theirEphemeralPub);
      sess.sendChainKey = newChainKey; sess.sendMsgNum = 0;
      const pubRaw = await crypto.subtle.exportKey('raw', newKeyPair.publicKey);
      return buf2b64(pubRaw);
    }
    return null;
  }

  async function encryptPayload(sess, obj) {
    const dhPub = await performSendingRatchetIfNeeded(sess);
    const { msgKey, nextChainKey } = await symmetricRatchet(sess.sendChainKey);
    sess.sendChainKey = nextChainKey;
    const seq = sess.sendMsgNum++;
    const iv = crypto.getRandomValues(new Uint8Array(16));
    const padLen = PADDING_MIN + Math.floor(crypto.getRandomValues(new Uint8Array(1))[0]/256*(PADDING_MAX-PADDING_MIN));
    const padded = { ...obj, _pad:buf2b64(crypto.getRandomValues(new Uint8Array(padLen)).buffer) };
    const ct = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, await crypto.subtle.importKey('raw', msgKey, 'AES-GCM', false, ['encrypt']), str2buf(JSON.stringify(padded)));
    const result = { seq, iv:Array.from(new Uint8Array(iv)), ct:Array.from(new Uint8Array(ct)) };
    if (dhPub) result.dhPub = dhPub;
    return result;
  }

  async function processReceivedRatchet(sess, dhPubB64) {
    const pubRaw = b642buf(dhPubB64);
    const peerPub = await crypto.subtle.importKey('raw', pubRaw, ECDH_ALG, true, []);
    const newRecvChainKey = await dhRatchet(sess, sess.ourEphemeralKeyPair.privateKey, peerPub);
    sess.recvChainKey = newRecvChainKey; sess.recvMsgNum = 0;
    sess.theirEphemeralPub = peerPub;
  }

  async function decryptPayload(sess, d) {
    if (d.dhPub) await processReceivedRatchet(sess, d.dhPub);
    if (!sess.recvChainKey) throw new Error('수신 체인 없음');
    const { seq, iv, ct } = d;
    if (seq < sess.recvMsgNum) return null;
    while (sess.recvMsgNum < seq) {
      const { nextChainKey } = await symmetricRatchet(sess.recvChainKey);
      sess.recvChainKey = nextChainKey; sess.recvMsgNum++;
    }
    const { msgKey, nextChainKey } = await symmetricRatchet(sess.recvChainKey);
    sess.recvChainKey = nextChainKey; sess.recvMsgNum = seq+1;
    const plain = await crypto.subtle.decrypt({ name:'AES-GCM', iv:new Uint8Array(iv) }, await crypto.subtle.importKey('raw', msgKey, 'AES-GCM', false, ['decrypt']), new Uint8Array(ct));
    const obj = JSON.parse(textDecoder.decode(plain));
    delete obj._pad;
    return obj;
  }

  // ─── 메시지 수신 처리 ─────────────────────
  function onMsg(peerId, e) {
    if (isDestroyed(peerId)) return;
    const sess = sessions.get(peerId);
    if (!sess) return;
    if (e.data instanceof ArrayBuffer) { handleBinaryChunk(peerId, e.data); return; }
    try {
      const d = JSON.parse(e.data);
      if (d.type === '__ecdhe__') { handleEcdheMessage(peerId, d); return; }
      if (d.type === '__confirm__') { handleConfirmation(peerId, d); return; }
      if (d.type === '__destroy_req__') { handleRemoteDestroy(d.peerId || peerId); return; }
      if (d.type === 'msg') {
        if (!sess.rootKey || !sess.confirmed) {
          const msgId = genUUID();
          storeMessage(peerId, msgId, d, 'received');
          if (peerId === activePeerId) addSystemMsg(peerId, '🔒 암호화된 메시지 수신 (세션 설정 필요)');
          return;
        }
        // 메시지 ID 확인
        decryptPayload(sess, d).then(inner => {
          if (!inner) return;
          const msgId = inner.id || genUUID();
          if (inner.id && sess.receivedMessageIds.has(inner.id)) return;
          if (inner.id) sess.receivedMessageIds.add(inner.id);
          storeMessage(peerId, msgId, d, 'received');
        }).catch(() => {
          storeMessage(peerId, genUUID(), d, 'received');
        });
      }
    } catch(e) {}
  }

  // 파일 청크 처리
  function handleBinaryChunk(peerId, buf) {
    const sess = sessions.get(peerId);
    if (!sess || !sess.fileReceive) return;
    sess.fileReceive.chunks.push(new Uint8Array(buf));
    sess.fileReceive.received += buf.byteLength;
  }

  // ─── 극한 삭제 ──────────────────────────
  async function destroyChat(peerId) {
    const sess = sessions.get(peerId);
    // 세션 파괴
    if (sess) {
      if (sess.pc) { sess.pc.close(); sess.pc = null; }
      overwriteBuffer(sess.rootKey);
      overwriteBuffer(sess.sendChainKey);
      overwriteBuffer(sess.recvChainKey);
      Object.keys(sess).forEach(k => sess[k] = null);
      sessions.delete(peerId);
    }
    // 메시지 저장소 정리
    for (let [msgId, entry] of messageStore) {
      if (entry.peerId === peerId) {
        const domEl = document.getElementById('msg-'+msgId);
        if (domEl) domEl.remove();
        messageStore.delete(msgId);
      }
    }
    offlineQueue.delete(peerId);
    removeContact(peerId);
    markDestroyed(peerId);
    // 원격에 삭제 요청 전파
    if (sess?.dc?.readyState === 'open') {
      try { sess.dc.send(JSON.stringify({ type:'__destroy_req__', peerId })); } catch(e) {}
    }
    if (sess?.typingDC?.readyState === 'open') {
      try { sess.typingDC.send(JSON.stringify({ type:'__destroy_req__', peerId })); } catch(e) {}
    }
    // 실패 시 재시도 예약
    if (sess && !isDestroyed(peerId)) {
      setPendingDestroy(peerId);
    }
    if (activePeerId === peerId) goHome();
    renderContactList();
  }

  function handleRemoteDestroy(remotePeerId) {
    if (!isDestroyed(remotePeerId)) destroyChat(remotePeerId);
    if (activePeerId === remotePeerId) goHome();
  }

  function trySendDestroy(peerId) {
    const sess = sessions.get(peerId);
    if (!sess) { destroyChat(peerId); return; }
    // raw 전송 시도
    let sent = false;
    const destroyMsg = JSON.stringify({ type:'__destroy_req__', peerId, ts:Date.now() });
    [sess.dc, sess.typingDC].forEach(ch => {
      if (ch && ch.readyState === 'open') { try { ch.send(destroyMsg); sent = true; } catch(e) {} }
    });
    if (sent) {
      clearPendingDestroy(peerId);
      destroyChat(peerId);
      return;
    }
    // 재시도
    if (sess.destroyRetry < 30) {
      sess.destroyRetry++;
      setTimeout(() => trySendDestroy(peerId), 300);
    } else {
      clearPendingDestroy(peerId);
      destroyChat(peerId);
    }
  }

  // ─── UI 이벤트 바인딩 ────────────────────
  function bindEvents() {
    document.getElementById('btnNewChat').addEventListener('click', showNameModal);
    document.getElementById('btnJoin').addEventListener('click', showJoinPanel);
    document.getElementById('btnConfirmNewChat').addEventListener('click', confirmNewChat);
    document.getElementById('btnCloseNameModal').addEventListener('click', closeNameModal);
    document.getElementById('btnCopyOfferLink').addEventListener('click', ()=>copyTextById('offerLinkDisplay'));
    document.getElementById('btnApplyAnswerLink').addEventListener('click', applyAnswerLink);
    document.getElementById('btnOfferGoHome').addEventListener('click', goHome);
    document.getElementById('btnCreateAnswer').addEventListener('click', createAnswerFromOffer);
    document.getElementById('btnAnswerGoHome').addEventListener('click', goHome);
    document.getElementById('btnChatBack').addEventListener('click', goHome);
    document.getElementById('btnRenameChat').addEventListener('click', renameChat);
    document.getElementById('btnDestroyChat').addEventListener('click', ()=>{ if(activePeerId) destroyChat(activePeerId); });
    document.getElementById('btnSubmitPassword').addEventListener('click', submitPassword);
    document.getElementById('btnSendText').addEventListener('click', sendText);
    document.getElementById('btnToggleEmojiPicker').addEventListener('click', ()=>togglePicker('emoji'));
    document.getElementById('btnToggleMediaPicker').addEventListener('click', ()=>togglePicker('media'));
    document.getElementById('btnStickerUpload').addEventListener('click', ()=>document.getElementById('stickerFileInput').click());
    document.getElementById('btnFileInput').addEventListener('click', ()=>document.getElementById('fileInput').click());
    document.getElementById('fileInput').addEventListener('change', e=>handleFiles(e.target.files));
    document.getElementById('stickerFileInput').addEventListener('change', e=>uploadSticker(e.target.files));
    document.getElementById('mediaSearch').addEventListener('keydown', e=>{ if(e.key==='Enter') addMediaUrl(); });
    document.getElementById('msgInput').addEventListener('input', () => { /* typing indicator ... */ });
    document.getElementById('btnCopyAnswerLink').addEventListener('click', copyAnswerModalLink);
    document.getElementById('btnCloseAnswerModal').addEventListener('click', closeAnswerModal);
    // Emoji / Media picker item clicks (delegation)
    document.getElementById('emojiGrid').addEventListener('click', e => {
      const item = e.target.closest('.emoji-item');
      if (item) { sendEmoji(item.dataset.emoji); closeAllPickers(); }
    });
    document.getElementById('mediaGrid').addEventListener('click', e => {
      const img = e.target.closest('img');
      if (img && img.dataset.url) { sendMedia(img.dataset.url); closeAllPickers(); }
    });
    // Contact list click
    document.getElementById('contactList').addEventListener('click', e => {
      const card = e.target.closest('.contact-card');
      if (card && card.dataset.peerid) selectPeer(card.dataset.peerid);
    });
    // Message long-press reveal
    document.addEventListener('pointerdown', e => {
      if (!activePeerId || isDestroyed(activePeerId)) return;
      const bubble = e.target.closest('.bubble.encrypted-bubble');
      if (!bubble || bubble.dataset.revealed === 'true') return;
      const msgDiv = bubble.closest('[data-msgid]');
      if (!msgDiv) return;
      const msgId = msgDiv.getAttribute('data-msgid');
      window._revealTimer = setTimeout(() => revealMessage(msgId), 500);
    });
    document.addEventListener('pointerup', () => clearTimeout(window._revealTimer));
    document.addEventListener('pointercancel', () => clearTimeout(window._revealTimer));
    // Visibility: destroy pending
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden' && activePeerId && localStorage.getItem(PENDING_DESTROY_PREFIX+activePeerId)) {
        trySendDestroy(activePeerId);
      }
    });
    window.addEventListener('beforeunload', () => {
      if (activePeerId) {
        const sess = sessions.get(activePeerId);
        if (sess) overwriteBuffer(sess.rootKey);
      }
      messageStore.clear();
      sessions.clear();
      offlineQueue.clear();
    });
  }

  // ─── 기타 UI 함수 ─────────────────────────
  function showNameModal() { document.getElementById('nameModal').classList.remove('hidden'); }
  function closeNameModal() { document.getElementById('nameModal').classList.add('hidden'); }
  function confirmNewChat() {
    const name = document.getElementById('peerNameInput').value.trim();
    if (!name) return alert('이름을 입력하세요.');
    closeNameModal();
    const peerId = genUUID(); addContact(peerId, name); activePeerId = peerId;
    const sess = getOrCreateSession(peerId); sess.isOfferer = true;
    showView('offerPanel'); document.getElementById('offerSpinner').style.display = 'inline-block';
    document.getElementById('offerLinkDisplay').textContent = '생성 중...';
    initPC(peerId);
    sess.dc = sess.pc.createDataChannel('chat', { ordered:true });
    sess.typingDC = sess.pc.createDataChannel('typing', { ordered:false, maxRetransmits:0 });
    setupDC(peerId); setupTypingDC(peerId);
    sess.pc.createOffer().then(o => sess.pc.setLocalDescription(o)).then(() => waitIce(sess.pc).then(() => {
      document.getElementById('offerSpinner').style.display = 'none';
      const offerB64 = encodeSDP(sess.pc.localDescription);
      document.getElementById('offerLinkDisplay').textContent = location.origin+location.pathname+'#offer='+offerB64+'&peer='+peerId;
    }));
    renderContactList();
  }
  function showJoinPanel() { showView('answerPanel'); }
  async function createAnswerFromOffer() {
    const t = document.getElementById('remoteOfferSDP').value.trim(); if (!t) return;
    let offerStr = t; let peerId;
    if (t.startsWith('http')) {
      const u = new URL(t); const hp = new URLSearchParams(u.hash.substring(1));
      if (!hp.has('offer')) return alert('올바르지 않은 링크');
      offerStr = hp.get('offer'); peerId = hp.get('peer') || genUUID();
    } else { peerId = genUUID(); }
    const offer = decodeSDP(offerStr); addContact(peerId, '상대방'); activePeerId = peerId;
    const sess = getOrCreateSession(peerId); sess.isOfferer = false; initPC(peerId);
    await sess.pc.setRemoteDescription(offer);
    const ans = await sess.pc.createAnswer(); await sess.pc.setLocalDescription(ans); await waitIce(sess.pc);
    const answerB64 = encodeSDP(sess.pc.localDescription);
    showView('chatScreen'); document.getElementById('chatTitle').textContent = '상대방';
    document.getElementById('passwordPrompt').style.display = 'block';
    document.getElementById('answerModalLink').textContent = location.origin+location.pathname+'#answer='+answerB64+'&peer='+peerId;
    document.getElementById('answerModal').classList.remove('hidden');
    renderContactList();
  }
  function closeAnswerModal() { document.getElementById('answerModal').classList.add('hidden'); }
  function copyAnswerModalLink() { const text = document.getElementById('answerModalLink').textContent; navigator.clipboard.writeText(text).then(()=>{}); }
  async function applyAnswerLink() {
    const l = document.getElementById('answerLinkInput').value.trim(); if (!l) return;
    if (!activePeerId || !sessions.has(activePeerId) || !sessions.get(activePeerId).pc || !sessions.get(activePeerId).isOfferer) {
      alert('먼저 "새 채팅 생성"을 해주세요.'); return;
    }
    try {
      let answerStr = l;
      if (l.startsWith('http')) { const u = new URL(l); const hp = new URLSearchParams(u.hash.substring(1)); answerStr = hp.get('answer'); }
      await sessions.get(activePeerId).pc.setRemoteDescription(decodeSDP(answerStr));
      showView('chatScreen');
      document.getElementById('chatTitle').textContent = getContacts().find(c=>c.id===activePeerId)?.name||'채팅';
      document.getElementById('passwordPrompt').style.display = 'block';
    } catch(e) { alert('Answer 링크 적용 실패'); }
  }
  function renameChat() {
    if (!activePeerId) return;
    const contacts = getContacts();
    const c = contacts.find(c => c.id === activePeerId);
    if (!c) return;
    const newName = prompt('새 이름:', c.name);
    if (newName) { c.name = newName; saveContacts(contacts); document.getElementById('chatTitle').textContent = newName; renderContactList(); }
  }
  function selectPeer(peerId) {
    if (isDestroyed(peerId)) return alert('삭제된 대화입니다.');
    activePeerId = peerId; showView('chatScreen');
    document.getElementById('messages').innerHTML = '';
    document.getElementById('chatTitle').textContent = getContacts().find(c=>c.id===peerId)?.name||'채팅';
    updateConn((sessions.get(peerId)||{}).isOnline);
    const sess = sessions.get(peerId);
    if (sess && sess.rootKey && sess.confirmed) {
      document.getElementById('securityCard').style.display = 'flex';
      document.getElementById('sessionFingerprint').textContent = buf2hex(sess.rootKey);
      document.getElementById('passwordPrompt').style.display = 'none';
    } else {
      document.getElementById('securityCard').style.display = 'none';
      document.getElementById('passwordPrompt').style.display = 'block';
    }
    renderContactList();
  }

  function togglePicker(type) {
    const picker = document.getElementById(type+'Picker');
    const isActive = picker.classList.contains('active');
    closeAllPickers();
    if (!isActive) picker.classList.add('active');
  }
  function closeAllPickers() { document.querySelectorAll('.picker-overlay').forEach(p=>p.classList.remove('active')); }

  async function uploadSticker(files) {
    if (!files || !files.length) return;
    for (const file of files) {
      const reader = new FileReader();
      reader.onload = e => {
        const url = e.target.result;
        let favs = JSON.parse(localStorage.getItem('p2p_media_fav')||'[]');
        favs.push(url); localStorage.setItem('p2p_media_fav', JSON.stringify(favs));
        filterMedia();
        sendMedia(url);
      };
      reader.readAsDataURL(file);
    }
  }

  function copyTextById(id) {
    const el = document.getElementById(id);
    const text = el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' ? el.value : el.textContent;
    navigator.clipboard.writeText(text).then(()=>{}).catch(()=>{ prompt('복사:', text); });
  }

  function waitIce(pc) { return new Promise(r => { if(pc.iceGatheringState==='complete') r(); else pc.addEventListener('icegatheringstatechange', ()=>{ if(pc.iceGatheringState==='complete') r(); }); }); }

  // ─── URL 해시 처리 ────────────────────────
  async function checkHash() {
    const h = location.hash.substring(1); if (!h) return;
    const p = new URLSearchParams(h);
    if (p.has('offer') && p.has('peer')) {
      const peerId = p.get('peer'); if (isDestroyed(peerId)) return;
      const offer = decodeSDP(p.get('offer'));
      if (!getContacts().find(c=>c.id===peerId)) addContact(peerId, '상대방');
      activePeerId = peerId; const sess = getOrCreateSession(peerId); sess.isOfferer = false;
      initPC(peerId);
      await sess.pc.setRemoteDescription(offer);
      const ans = await sess.pc.createAnswer(); await sess.pc.setLocalDescription(ans); await waitIce(sess.pc);
      showView('chatScreen'); document.getElementById('chatTitle').textContent = '상대방';
      document.getElementById('passwordPrompt').style.display = 'block';
      document.getElementById('answerModalLink').textContent = location.origin+location.pathname+'#answer='+encodeSDP(sess.pc.localDescription)+'&peer='+peerId;
      document.getElementById('answerModal').classList.remove('hidden');
      renderContactList();
    } else if (p.has('answer') && p.has('peer')) {
      const peerId = p.get('peer'); if (isDestroyed(peerId)) return;
      const answer = decodeSDP(p.get('answer'));
      if (!getContacts().find(c=>c.id===peerId)) addContact(peerId, '상대방');
      let sess = sessions.get(peerId);
      if (!sess || !sess.pc) {
        sess = getOrCreateSession(peerId); sess.isOfferer = true;
        initPC(peerId); sess.dc = sess.pc.createDataChannel('chat',{ordered:true}); setupDC(peerId);
      }
      await sess.pc.setRemoteDescription(answer);
      activePeerId = peerId; showView('chatScreen');
      document.getElementById('chatTitle').textContent = getContacts().find(c=>c.id===peerId)?.name||'채팅';
      document.getElementById('passwordPrompt').style.display = 'block';
      renderContactList();
    }
  }
  window.addEventListener('hashchange', checkHash);

  // ─── 초기 실행 ────────────────────────────
  buildEmojiPicker();
  filterMedia();
  renderContactList();
  checkHash();
  showView('simpleMode');
  bindEvents();

  // 전역 노출 최소화 (onclick 대신 이벤트 리스너 사용하여 window 오염 방지)
})();
</script>
