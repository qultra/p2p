    function handleExp(pid,mid){removeUI(mid);const s=sessions[pid];if(s?.root&&s.confirmed)sendDelete(pid,mid);if(s)s.pending=s.pending.filter(m=>m.msgId!==mid)}
    setInterval(chkTimers,1000);

    // 암호화 상수
    const ECDH={name:'ECDH',namedCurve:'P-521'},PBK2={name:'PBKDF2',iterations:20000000,hash:'SHA-512'},AES256={name:'AES-GCM',length:256},AES128={name:'AES-GCM',length:128},ECDSA={name:'ECDSA',namedCurve:'P-521'},PAD_MIN=256,PAD_MAX=512,SALT_SIZE=4096;

    function isDest(pid){return!!(localStorage.getItem(DESTROY+pid)||sessionStorage.getItem(DESTROY+pid))}
    function markDest(pid){localStorage.setItem(DESTROY+pid,Date.now());sessionStorage.setItem(DESTROY+pid,Date.now());clrPend(pid);clearQ(pid);if(location.hash)history.replaceState(null,'',location.pathname)}

    function waitIce(pc){return new Promise(r=>{if(pc.iceGatheringState==='complete')r();else pc.addEventListener('icegatheringstatechange',()=>{if(pc.iceGatheringState==='complete')r()})})}

    // WebRTC
    function initPC(pid){
      const s=sessions[pid];if(s.pc)s.pc.close();
      s.pc=new RTCPeerConnection({iceServers:ICE});
      s.pc.oniceconnectionstatechange=()=>{
        const st=s.pc.iceConnectionState;
        if(st==='connected'||st==='completed'){
          s.online=true;upConn(true);renderCon();s.reconn=0;
          if(hasPend(pid))trySendDestroy(pid);
          if(s.conf)flushQ(pid);
        }else if(st==='disconnected'||st==='failed'||st==='closed'){
          s.online=false;upConn(false);
          if(st==='failed'){
            if(s.reconn<3){s.reconn++;setTimeout(()=>{if(s.pc&&s.pc.iceConnectionState==='failed')try{s.pc.restartIce()}catch{}},2000)}
            else{s.hsDone=false;s.root=null;s.sCK=null;s.rCK=null;s.conf=false;clearQ(pid);if(pid===activePeerId)addMsg(pid,'⚠️ 연결 소실, 오프라인 메시지 폐기','system')}
          }
        }
      };
      s.pc.ondatachannel=e=>{if(e.channel.label==='chat'){s.dc=e.channel;setupDC(pid)}else if(e.channel.label==='typing'){s.tyDC=e.channel;setupTyDC(pid)}}
    }
    function setupDC(pid){
      const s=sessions[pid];if(!s?.dc)return;
      s.dc.onopen=()=>{
        if(isDest(pid))return;
        s.online=true;upConn(true);renderCon();
        if(hasPend(pid)){trySendDestroy(pid);return}
        if(s.hsDone){
          addMsg(pid,'🔄 연결 복구, 보안 재수립','system');
          s.hsDone=false;s.root=null;s.sCK=null;s.rCK=null;s.tyKey=null;s.conf=false;clearQ(pid);
          startEx(pid);
        }else if(!s.hsDone&&!s.root){if(!s.oEDH)startEx(pid)}else{flushQ(pid)}
      };
      s.dc.onmessage=e=>onMsg(pid,e);
      s.dc.onclose=()=>{s.online=false;upConn(false);renderCon()}
    }
    function setupTyDC(pid){
      const s=sessions[pid];if(!s?.tyDC)return;
      s.tyDC.onmessage=e=>{
        if(typeof e.data==='string'){try{const d=JSON.parse(e.data);if(d.type==='__destroy_req__'){markDest(d.peerId||pid);goHome();return}decTyp(s,d).then(st=>{if(pid===activePeerId)document.getElementById('typingIndicator').style.display=st==='1'?'block':'none'}).catch(()=>{})}catch{}}
      }
    }

    // 삭제 전파
    function sendRaw(pid){const s=sessions[pid];if(!s)return false;let ok=false;const m=JSON.stringify({type:'__destroy_req__',peerId:pid,ts:Date.now()});[s.dc,s.tyDC].filter(c=>c&&c.readyState==='open').forEach(c=>{try{c.send(m);ok=true}catch{}});return ok}
    async function trySendDestroy(pid){
      const s=sessions[pid];if(!s){markDest(pid);rmCon(pid);goHome();return}
      if(sendRaw(pid)){clrPend(pid);markDest(pid);if(activePeerId===pid)goHome();if(s.pc){s.pc.close();delete sessions[pid]}rmCon(pid);renderCon();return}
      if(s.root&&s.conf&&s.dc&&s.dc.readyState==='open'){
        try{
          const enc=await encAndSign(s,{type:'__destroy__',ts:Date.now(),id:uuid()});
          s.dc.send(JSON.stringify({type:'msg',...enc}));
          clrPend(pid);markDest(pid);if(activePeerId===pid)goHome();if(s.pc){s.pc.close();delete sessions[pid]}rmCon(pid);renderCon();return
        }catch{}
      }
      const d=Math.min(300*Math.pow(2,s.dRetry),30000);s.dRetry++;setTimeout(()=>trySendDestroy(pid),d)
