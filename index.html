<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0, minimum-scale=1.0">
  <title>P2P 비밀 메신저 – 극한 보안 완전판</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src *; media-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; base-uri 'none'; form-action 'none'; referrer no-referrer; frame-ancestors 'none'; object-src 'none'; require-trusted-types-for 'script';">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
  <meta http-equiv="X-XSS-Protection" content="1; mode=block">
  <style>
    :root {
      --bg: #06090f; --surface: #0f141e; --card: rgba(15,20,30,0.9);
      --text: #e0e5f0; --sub: #8892b0; --accent: #5b8df0; --danger: #f97070;
      --success: #45d68a; --border: #1a2332; --radius: 20px; --radius-sm: 14px;
      --safe-bottom: env(safe-area-inset-bottom, 10px);
    }
    * {
      margin:0; padding:0; box-sizing:border-box;
      user-select: none !important;
      -webkit-user-select: none !important;
      -moz-user-select: none !important;
      -ms-user-select: none !important;
      -webkit-touch-callout: none !important;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-modify: read-only;
      -webkit-text-size-adjust: none;
    }
    ::selection { background: transparent !important; color: transparent !important; text-shadow: none !important; }
    ::-moz-selection { background: transparent !important; color: transparent !important; text-shadow: none !important; }
    ::-webkit-selection { background: transparent !important; color: transparent !important; text-shadow: none !important; }
    input, textarea, [contenteditable="true"] {
      -webkit-user-modify: read-write !important;
      user-select: text !important;
      -webkit-user-select: text !important;
    }
    input::selection, textarea::selection { background: var(--accent) !important; color: white !important; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; justify-content: center; align-items: center;
      min-height: 100dvh; padding: 10px;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
      overflow: hidden;
    }
    .container {
      width: 100%; max-width: 520px; height: 95dvh;
      background: var(--surface); border-radius: 30px;
      box-shadow: 0 30px 70px rgba(0,0,0,0.7);
      display: flex; flex-direction: column; overflow: hidden;
      border: 1px solid var(--border); position: relative;
      contain: strict;
    }
    .header {
      padding:14px 20px; background:rgba(8,14,24,0.95);
      backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
      min-height:56px; contain: layout style;
    }
    .header h1 {
      font-size:1.1rem; font-weight:700;
      background:linear-gradient(135deg,#90b4ff,#b794f4);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text;
    }
    .status-bar { display:flex; align-items:center; gap:7px; }
    .dot { width:10px; height:10px; border-radius:50%; transition:0.2s; }
    .dot.on { background:var(--success); box-shadow:0 0 10px var(--success); }
    .dot.off { background:var(--danger); }
    .main-content {
      flex:1; overflow-y:auto; padding:16px;
      display:flex; flex-direction:column;
      contain: strict;
      -webkit-overflow-scrolling: touch;
    }
    .main-content::-webkit-scrollbar { width:4px; }
    .main-content::-webkit-scrollbar-thumb { background:#253040; border-radius:2px; }
    .card {
      background:var(--card); backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      border-radius:var(--radius); padding:18px; margin-bottom:12px;
      border:1px solid var(--border); contain: layout style paint;
    }
    .btn {
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      background:rgba(255,255,255,0.05); color:white;
      border:1px solid var(--border); padding:14px 20px;
      border-radius:var(--radius-sm); cursor:pointer;
      font-weight:600; font-size:0.95rem; transition:0.2s;
      width:100%; backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      outline:none; -webkit-tap-highlight-color:transparent;
    }
    .btn:hover { background:rgba(255,255,255,0.12); }
    .btn:active { transform:scale(0.97); }
    .btn.primary { background:var(--accent); border:none; }
    .btn.danger { background:var(--danger); border:none; }
    .btn-small { padding:8px 14px; font-size:0.8rem; width:auto; border-radius:12px; }
    input, textarea {
      width:100%; background:#0a0f18; color:var(--text);
      border:1px solid var(--border); border-radius:var(--radius-sm);
      padding:14px 15px; font-size:16px; outline:none;
      user-select:text; -webkit-user-select:text;
      autocomplete:off; autocorrect:off; autocapitalize:off;
      spellcheck:false;
    }
    input:focus, textarea:focus {
      border-color:var(--accent);
      box-shadow: 0 0 0 2px rgba(91,141,240,0.3);
    }
    .modal {
      position:fixed; top:0; left:0; width:100%; height:100%;
      background:rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      -webkit-backdrop-filter:blur(4px);
      z-index:100; display:flex; align-items:center; justify-content:center;
    }
    .modal-content {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); padding:24px; width:90%;
      max-width:360px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      contain: layout style paint;
    }
    .modal-content h3 { margin-bottom: 16px; font-size: 1.1rem; }
    #chatScreen { display:none; flex-direction:column; flex:1; }
    #messages {
      flex:1; overflow-y:auto; display:flex; flex-direction:column;
      gap:10px; padding:6px 0; contain: strict;
      -webkit-overflow-scrolling: touch;
    }
    .msg {
      display:flex; flex-direction:column;
      animation:fadeUp 0.2s ease;
      contain: layout style paint;
    }
    .msg.system { align-items:center; }
    .msg.me { align-items:flex-end; }
    .msg.other { align-items:flex-start; }
    .bubble {
      max-width:83%; padding:10px 16px; border-radius:20px;
      background:rgba(22,30,44,0.85); backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,0.05);
      word-break:break-word; position:relative; overflow:hidden;
      z-index:1; contain: layout style paint;
    }
    /* 극한 블러: 오프라인/잠금 시 완전 가림 */
    .blur-target {
      filter: blur(18px) brightness(0.4) contrast(0.5);
      -webkit-filter: blur(18px) brightness(0.4) contrast(0.5);
      transition: filter 0.25s, -webkit-filter 0.25s;
      cursor: pointer;
      color: transparent !important;
      text-shadow: 0 0 30px rgba(0,0,0,0.9) !important;
      background-image: repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(255,255,255,0.01) 2px, rgba(255,255,255,0.01) 4px) !important;
    }
    .blur-target.revealed {
      filter: blur(0) brightness(1) contrast(1);
      -webkit-filter: blur(0) brightness(1) contrast(1);
      color: inherit !important;
      text-shadow: none !important;
      background-image: none !important;
    }
    .blur-target.locked {
      filter: blur(40px) brightness(0.1) contrast(0.1) opacity(0.3);
      -webkit-filter: blur(40px) brightness(0.1) contrast(0.1) opacity(0.3);
      cursor: not-allowed !important;
      pointer-events: auto !important;
    }
    /* 완전 파괴 모드 - 시각적 잔여물 제거 */
    .blur-target.shredded {
      filter: blur(80px) brightness(0) contrast(0) opacity(0) !important;
      -webkit-filter: blur(80px) brightness(0) contrast(0) opacity(0) !important;
      clip-path: inset(100%) !important;
      max-height: 0 !important; max-width: 0 !important;
      padding: 0 !important; margin: 0 !important;
      border: none !important; overflow: hidden !important;
      font-size: 0 !important; line-height: 0 !important;
      transform: scale(0) !important;
      position: absolute !important;
      pointer-events: none !important;
      visibility: hidden !important;
      opacity: 0 !important;
    }
    .msg.system .bubble {
      background:rgba(255,255,255,0.04); border:none;
      font-size:0.78rem; color:var(--sub);
    }
    .msg.me .bubble {
      background:linear-gradient(140deg,rgba(74,130,250,0.5),rgba(124,92,240,0.5));
      border-bottom-right-radius:6px;
    }
    .msg.other .bubble { border-bottom-left-radius:6px; }
    .msg .time {
      font-size:0.65rem; color:var(--sub); margin-top:4px;
      display:flex; justify-content:flex-end; gap:6px;
      position:relative; z-index:5;
    }
    .encrypted-bubble {
      background:#0a0f18; border:1px solid var(--border);
      font-family:monospace; font-size:0.7rem; color:#94a3b8;
      white-space:pre-wrap; word-break:break-all; padding:10px;
      border-radius:12px; max-width:90%;
    }
    .input-bar {
      display:flex; gap:6px; padding:10px 0 0;
      align-items:flex-end; padding-bottom:var(--safe-bottom);
      contain: layout style;
    }
    #msgInput { flex:1; min-height:44px; max-height:110px; resize:none; }
    .icon-btn {
      background:none; border:none; font-size:1.3rem;
      cursor:pointer; padding:10px; color:var(--accent);
      outline:none;
    }
    .send-btn {
      background:var(--accent); color:white; width:44px; height:44px;
      display:flex; align-items:center; justify-content:center;
      border-radius:50%; cursor:pointer; flex-shrink:0;
      outline:none;
    }
    .action-bar {
      display:flex; gap:4px; padding:4px 0 0;
      position:relative; flex-wrap:wrap; contain: layout style;
    }
    .action-btn {
      background:rgba(255,255,255,0.05); border:1px solid var(--border);
      color:var(--text); padding:8px 14px; border-radius:14px;
      cursor:pointer; font-size:0.85rem; outline:none;
    }
    .picker-overlay {
      display:none; position:absolute; bottom:100%; left:0; right:0;
      background:var(--surface); border:1px solid var(--border);
      border-radius:16px; padding:12px; max-height:220px;
      overflow-y:auto; z-index:20; margin-bottom:4px;
      contain: layout style paint;
    }
    .picker-overlay.active { display:flex; flex-direction:column; gap:8px; }
    .picker-search {
      width:100%; background:#0a0f18; color:var(--text);
      border:1px solid var(--border); border-radius:12px;
      padding:10px 12px; font-size:16px; outline:none; margin-bottom:4px;
    }
    .picker-grid { display:flex; flex-wrap:wrap; gap:8px; }
    .picker-item { cursor:pointer; border-radius:8px; overflow:hidden; }
    .picker-item img { width:64px; height:64px; object-fit:cover; border-radius:8px; }
    .emoji-item { font-size:1.8rem; cursor:pointer; padding:6px 8px; border-radius:8px; }
    .hidden { display:none !important; }
    .text-center { text-align:center; }
    .text-sub { color:var(--sub); font-size:0.82rem; }
    .mt { margin-top:12px; } .mb { margin-bottom:12px; }
    .link-box {
      word-break:break-all; background:#0a0f18; padding:10px;
      border-radius:12px; font-size:0.72rem; margin:8px 0;
      max-height:75px; overflow-y:auto; color:#9aa4bf;
      user-select:text; -webkit-user-select:text;
    }
    .fingerprint {
      font-family:monospace; font-size:0.6rem; background:#0a0f18;
      padding:6px; border-radius:8px; word-break:break-all;
      user-select:text !important; -webkit-user-select:text !important;
    }
    .chat-header {
      display:flex; align-items:center; gap:10px;
      padding:10px 16px; border-bottom:1px solid var(--border);
      contain: layout style;
    }
    .chat-title { font-size:0.95rem; font-weight:600; flex:1; }
    .typing-indicator {
      font-size:0.75rem; color:var(--sub); padding:4px 16px;
      display:none; contain: layout style;
    }
    .contact-list { display:flex; flex-direction:column; gap:8px; margin-top:12px; }
    .contact-card {
      background:rgba(255,255,255,0.03); border:1px solid var(--border);
      border-radius:16px; padding:14px 16px; cursor:pointer;
      display:flex; align-items:center; gap:12px; position:relative;
      contain: layout style;
    }
    .contact-card.active {
      border-color:var(--accent); background:rgba(91,141,240,0.1);
    }
    .contact-avatar {
      width:44px; height:44px; border-radius:50%;
      background:rgba(255,255,255,0.08); display:flex;
      align-items:center; justify-content:center;
      font-size:1.2rem; flex-shrink:0; position:relative;
    }
    .contact-dot {
      position:absolute; bottom:0; right:0; width:12px; height:12px;
      border-radius:50%; border:2px solid var(--surface);
    }
    .contact-dot.on { background:var(--success); }
    .contact-dot.off { background:var(--danger); }
    .contact-info { flex:1; min-width:0; }
    .contact-name { font-size:0.95rem; font-weight:600; }
    .contact-status { font-size:0.75rem; color:var(--sub); margin-top:2px; }
    .unread-badge {
      background:var(--danger); color:white; border-radius:12px;
      padding:2px 8px; font-size:0.7rem; font-weight:bold; margin-left:8px;
    }
    .svg-icon { width:20px; height:20px; fill:currentColor; flex-shrink:0; }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(8px); }
      to { opacity:1; transform:translateY(0); }
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spinner {
      width:20px; height:20px; border:3px solid var(--border);
      border-top-color:var(--accent); border-radius:50%;
      animation:spin 0.7s linear infinite; display:inline-block;
    }
    /* 보안 레이어: 화면 위에 덮어씌워지는 가상 보호막 */
    .security-overlay {
      position:fixed; top:0; left:0; width:100vw; height:100vh;
      pointer-events:none; z-index:9999;
      background:transparent;
      mix-blend-mode:normal;
    }
    /* 완전 삭제 시 전체 컨테이너에 적용 */
    .container.shredding {
      filter: blur(50px) brightness(0) contrast(0) !important;
      opacity: 0 !important;
      transition: all 0.3s !important;
      pointer-events: none !important;
    }
  </style>
</head>
<body>
<div class="container" id="mainContainer">
  <div class="header"><h1>🔐 P2P 비밀채팅</h1><div class="status-bar"><span id="connDot" class="dot off"></span><span id="connLabel">오프라인</span></div></div>
  <div class="main-content" id="mainArea">
    <div id="simpleMode" class="view">
      <div class="card text-center">
        <h3 style="margin-bottom:4px;">서버 없이 완벽한 익명성</h3>
        <p class="text-sub mb">연결 끊겨도 자동 복구 · 오프라인 메시지 큐</p>
        <button class="btn primary" onclick="showNameModal()"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>새 채팅 생성</button>
        <button class="btn mt" onclick="showJoinPanel()"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>초대 링크로 참가</button>
      </div>
      <div style="font-size:0.8rem; color:var(--sub); margin-bottom:8px; font-weight:600;">📋 대화 목록</div>
      <div class="contact-list" id="contactList"></div>
    </div>
    <div id="nameModal" class="modal hidden">
      <div class="modal-content"><h3>✨ 새 채팅</h3><input type="text" id="peerNameInput" placeholder="상대방 이름 입력" autocomplete="off"><div class="mt" style="display:flex;gap:8px;"><button class="btn primary" onclick="confirmNewChat()" style="flex:1;">확인</button><button class="btn" onclick="closeNameModal()" style="flex:1;">취소</button></div></div>
    </div>
    <div id="offerPanel" class="view hidden">
      <div class="card text-center">
        <div class="spinner mb" id="offerSpinner" style="display:none;"></div>
        <p><strong>연결 링크 생성 중...</strong></p>
        <p class="text-sub">생성된 링크를 상대에게 전송하세요.</p>
        <div class="link-box" id="offerLinkDisplay">생성 중...</div>
        <button class="btn mt" onclick="copyTextById('offerLinkDisplay')">링크 복사</button>
        <p class="text-sub mt">상대가 보낸 Answer 링크를 아래에 붙여넣으세요.</p>
        <input type="text" id="answerLinkInput" placeholder="Answer 링크 입력..." autocomplete="off"><button class="btn primary mt" onclick="applyAnswerLink()">연결 완료</button>
        <button class="btn mt" onclick="goHome()">홈으로</button>
      </div>
    </div>
    <div id="answerPanel" class="view hidden">
      <div class="card"><strong>📥 초대 링크 붙여넣기</strong><textarea id="remoteOfferSDP" rows="3" placeholder="방장에게 받은 전체 링크..." autocomplete="off"></textarea><button class="btn primary mt" onclick="createAnswerFromOffer()">연결 시작</button></div>
      <button class="btn mt" onclick="goHome()">홈으로</button>
    </div>
    <div id="chatScreen" class="view hidden">
      <div class="chat-header">
        <button class="btn-small" onclick="goHome()"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></button>
        <span class="chat-title" id="chatTitle">채팅</span>
        <button class="btn-small" onclick="renameChat()"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg></button>
        <button class="btn-small danger" onclick="destroyActiveChat()"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
      </div>
      <div id="securityCard" class="card" style="margin:0 0 4px; padding:6px 12px; font-size:0.7rem; display:none; align-items:center; gap:6px;">
        <span>🔒</span><span id="sessionFingerprint" class="fingerprint"></span>
      </div>
      <div id="passwordPrompt" class="card text-center" style="margin:8px;">
        <strong>🔐 채팅방 암호 입력</strong>
        <input type="password" id="chatPasswordInput" placeholder="상대와 공유한 암호" style="margin-top:8px;" autocomplete="off">
        <button class="btn primary mt" onclick="submitPassword()">암호 설정</button>
        <p class="text-sub mt">암호가 없으면 수신된 암호문만 표시됩니다.</p>
        <p id="passwordError" class="text-sub" style="color:var(--danger); display:none;"></p>
      </div>
      <div id="messages"></div>
      <div id="typingIndicator" class="typing-indicator">상대방이 입력 중...</div>
      <div class="action-bar" style="position:relative; padding:0 8px;">
        <button class="action-btn" onclick="togglePicker('emoji')">😀</button>
        <button class="action-btn" onclick="togglePicker('media')">🔗</button>
        <button class="action-btn" onclick="document.getElementById('stickerFileInput').click()">📁</button>
        <div class="picker-overlay" id="emojiPicker"><div class="picker-grid" id="emojiGrid"></div></div>
        <div class="picker-overlay" id="mediaPicker">
          <input type="text" class="picker-search" placeholder="URL 입력 후 Enter" id="mediaSearch" onkeydown="if(event.key==='Enter')addMediaUrl()" autocomplete="off">
          <div class="picker-grid" id="mediaGrid"></div>
        </div>
        <input type="file" id="stickerFileInput" class="hidden" accept="image/*" onchange="uploadSticker(this.files)">
      </div>
      <div class="input-bar" style="padding:8px;">
        <button class="icon-btn" onclick="document.getElementById('fileInput').click()" title="파일">📎</button>
        <textarea id="msgInput" rows="1" placeholder="메시지 (종단간 암호화)" autocomplete="off"></textarea>
        <button class="send-btn" onclick="sendText()">➤</button>
      </div>
      <input type="file" id="fileInput" class="hidden" multiple onchange="handleFiles(this.files)">
    </div>
  </div>
</div>
<div id="answerModal" class="modal hidden">
  <div class="modal-content">
    <h3>📤 내 Answer 링크</h3>
    <p class="text-sub" style="margin-bottom:12px;">이 링크를 상대에게 전송하면 연결됩니다.</p>
    <div class="link-box" id="answerModalLink" style="margin-bottom:12px;"></div>
    <div style="display:flex; gap:8px;"><button class="btn primary" onclick="copyAnswerModalLink()" style="flex:1;">📋 복사</button><button class="btn" onclick="closeAnswerModal()" style="flex:1;">닫기</button></div>
  </div>
</div>

<script>
// =====================================================================
//  P2P 비밀 메신저 – 극한 보안 완전판 (모든 문제 근본적 해결)

// ─── 개발자 도구 감지 및 방어 ──────────────────
const devToolsDetection = (() => {
  let devToolsOpen = false;
  const threshold = 160;
  const checkDevTools = () => {
    const widthThreshold = window.outerWidth - window.innerWidth > threshold;
    const heightThreshold = window.outerHeight - window.innerHeight > threshold;
    if (widthThreshold || heightThreshold) {
      if (!devToolsOpen) {
        devToolsOpen = true;
        onDevToolsDetected();
      }
    } else {
      devToolsOpen = false;
    }
  };
  const onDevToolsDetected = () => {
    // 즉시 모든 blur-target을 locked + shredded 상태로
    if (activePeerId) {
      document.querySelectorAll('.blur-target').forEach(el => {
        el.classList.add('locked', 'shredded');
        el.classList.remove('revealed');
        el.setAttribute('data-revealed', 'false');
      });
      clearRevealedMessages(activePeerId);
      sendClearRevealed(activePeerId);
    }
    // 추가 방어: 콘솔 클리어
    try { console.clear(); } catch(e) {}
    // 민감 변수 난독화
    securityLockLevel = 3;
    lockAllBlurs(60000);
  };
  setInterval(checkDevTools, 500);
  // console.log 감시
  const originalConsoleLog = console.log;
  console.log = function(...args) {
    if (devToolsOpen) return;
    // 민감 데이터 로깅 방지
    const safeArgs = args.map(a => typeof a === 'string' ? '[REDACTED]' : a);
    originalConsoleLog.apply(console, safeArgs);
  };
  // debugger 탐지
  const detectDebugger = () => {
    const start = performance.now();
    debugger;
    const end = performance.now();
    if (end - start > 100) onDevToolsDetected();
  };
  setInterval(detectDebugger, 2000);
  return { isDevToolsOpen: () => devToolsOpen };
})();

// ─── DOM 텍스트 추출 방어 ─────────────────────
const textProtection = {
  // 모든 텍스트 노드를 Shadow DOM으로 래핑 시도
  wrapTextNodes: (element) => {
    if (!element || element.nodeType === 3) return;
    const walker = document.createTreeWalker(element, NodeFilter.SHOW_TEXT, null, false);
    const textNodes = [];
    while (walker.nextNode()) textNodes.push(walker.currentNode);
    textNodes.forEach(node => {
      if (node.parentElement && !node.parentElement.closest('input,textarea,[contenteditable]')) {
        const span = document.createElement('span');
        span.setAttribute('data-protected', 'true');
        span.textContent = node.textContent;
        span.style.cssText = 'user-select:none;-webkit-user-select:none;pointer-events:none;';
        if (node.parentElement) {
          try { node.parentElement.replaceChild(span, node); } catch(e) {}
        }
      }
    });
  }
};

// ─── 전역 보안 상태 ───────────────────────────
let securityLockLevel = 0;
let globalBlurTimer = null;
const SHRED_DELAY = 15000;
const DESTROY_PREFIX = 'p2p_destroyed_';
const PENDING_DESTROY_PREFIX = 'p2p_pending_destroy_';

// ─── 암호화 유틸리티 ──────────────────────────
const textEncoder = new TextEncoder();
const textDecoder = new TextDecoder();
const toBase64url = buf => btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
const fromBase64url = str => { str = str.replace(/-/g,'+').replace(/_/g,'/'); while(str.length%4) str+='='; return Uint8Array.from(atob(str),c=>c.charCodeAt(0)).buffer; };
const encodeSDP = obj => toBase64url(textEncoder.encode(JSON.stringify(obj)));
const decodeSDP = str => JSON.parse(textDecoder.decode(fromBase64url(str)));
const buf2hex = b => [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
const str2buf = s => textEncoder.encode(s);
const buf2b64 = b => btoa(String.fromCharCode(...new Uint8Array(b)));
const b642buf = s => Uint8Array.from(atob(s),c=>c.charCodeAt(0)).buffer;
const concatBufs = (...bufs) => { let len=bufs.reduce((a,b)=>a+b.byteLength,0), tmp=new Uint8Array(len), off=0; bufs.forEach(b=>{tmp.set(new Uint8Array(b),off);off+=b.byteLength;}); return tmp.buffer; };
const genUUID = () => crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx'.replace(/[xy]/g,c=>{const r=crypto.getRandomValues(new Uint8Array(1))[0]%16;return(c=='x'?r:r&0x3|0x8).toString(16);});
function formatBytes(b) { return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':b<1073741824?(b/1048576).toFixed(1)+' MB':(b/1073741824).toFixed(1)+' GB'; }
function escapeHtml(s) { return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }

// ─── ICE 서버 ──────────────────────────────────

const ECDH_ALG = { name: 'ECDH', namedCurve: 'P-521' };

// ─── 세션 저장소 (WeakMap 기반 민감 데이터) ──
const sessionSecrets = new WeakMap();

// ─── 오프라인 큐 암호화 저장 ──────────────────
const queueEncryptionKey = (() => {
  // 세션별 고유 키 생성 (휘발성)
  let key = sessionStorage.getItem('_qk_');
  if (!key) {
    key = buf2b64(crypto.getRandomValues(new Uint8Array(32)).buffer);
    sessionStorage.setItem('_qk_', key);
  }
  return crypto.subtle.importKey('raw', b642buf(key), { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
})();

async function encryptQueueItem(item) {
  const key = await queueEncryptionKey;
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, str2buf(JSON.stringify(item)));
  return { iv: buf2b64(iv.buffer), ct: buf2b64(ct) };
}
async function decryptQueueItem(encItem) {
  try {
    const key = await queueEncryptionKey;
    const iv = new Uint8Array(b642buf(encItem.iv));
    const ct = new Uint8Array(b642buf(encItem.ct));
    const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
    return JSON.parse(textDecoder.decode(plain));
  } catch(e) { return null; }
}
async function saveOfflineQueue(peerId, queue) {
  try {
    const encrypted = await Promise.all(queue.map(item => encryptQueueItem(item)));
    localStorage.setItem(OFFLINE_QUEUE_PREFIX + peerId, JSON.stringify(encrypted));
  } catch(e) {}
}
async function loadOfflineQueue(peerId) {
  try {
    const raw = JSON.parse(localStorage.getItem(OFFLINE_QUEUE_PREFIX + peerId) || '[]');
    const decrypted = await Promise.all(raw.map(item => decryptQueueItem(item)));
    return decrypted.filter(item => item !== null);
  } catch(e) { return []; }
}
function clearOfflineQueue(peerId) { localStorage.removeItem(OFFLINE_QUEUE_PREFIX + peerId); }
function setPendingDestroy(peerId) {
  try { localStorage.setItem(PENDING_DESTROY_PREFIX + peerId, Date.now().toString()); } catch(e) {}
}
function clearPendingDestroy(peerId) { localStorage.removeItem(PENDING_DESTROY_PREFIX + peerId); }
function hasPendingDestroy(peerId) { return !!localStorage.getItem(PENDING_DESTROY_PREFIX + peerId); }

// ─── 파괴 상태 관리 ──────────────────────────
function isDestroyed(peerId) {
  return !!(localStorage.getItem(DESTROY_PREFIX + peerId) || sessionStorage.getItem(DESTROY_PREFIX + peerId));
}
function markDestroyed(peerId) {
  localStorage.setItem(DESTROY_PREFIX + peerId, Date.now());
  sessionStorage.setItem(DESTROY_PREFIX + peerId, Date.now());
  clearPendingDestroy(peerId);
  clearOfflineQueue(peerId);
  if (location.hash) history.replaceState(null, '', location.pathname);
  // 세션 객체 정리
  if (sessions[peerId]) {
    const sess = sessions[peerId];
    if (sess.pc) { try { sess.pc.close(); } catch(e) {} }
    delete sessions[peerId];
  }
}

// ─── 세션 객체 ────────────────────────────────
function getOrCreateSession(peerId) {
  if (!sessions[peerId]) {
    sessions[peerId] = {
      pc: null, dc: null, typingDC: null, typingKey: null,
      isOfferer: false, password: null,
      rootKey: null, sendChainKey: null, recvChainKey: null,
      sendMsgNum: 0, recvMsgNum: 0,
      ourEphemeralKeyPair: null, theirEphemeralPub: null,
      salt: null, ourEcdhPair: null, peerEcdhPub: null,
      authKey: null,
      handshakeDone: false, confirmed: false, isOnline: false,
      pendingMessages: [],
      fileReceive: null, typingTimer: null, reconnectAttempts: 0,
      pendingConfirm: null, destroyRetry: 0
    };
  }
  return sessions[peerId];
}

// ─── 연락처 관리 ──────────────────────────────
function getContacts() { try { return JSON.parse(localStorage.getItem('p2p_contacts') || '[]'); } catch(e) { return []; } }
function saveContacts(contacts) { localStorage.setItem('p2p_contacts', JSON.stringify(contacts)); }
function addContact(peerId, name) {
  let contacts = getContacts();
  if (!contacts.find(c => c.id === peerId)) {
    contacts.push({ id: peerId, name });
    saveContacts(contacts);
  }
  renderContactList();
}
function renameChat() {
  if (!activePeerId) return;
  const contacts = getContacts();
  const c = contacts.find(c => c.id === activePeerId);
  if (!c) return;
  const newName = prompt('새 이름:', c.name);
  if (newName) { c.name = newName; saveContacts(contacts); document.getElementById('chatTitle').textContent = newName; renderContactList(); }
}
function renderContactList() {
  const container = document.getElementById('contactList');
  if (!container) return;
  const contacts = getContacts().filter(c => !isDestroyed(c.id));
  container.innerHTML = contacts.map(c => {
    const sess = sessions[c.id];
    const online = sess && sess.isOnline;
    const unread = sess ? sess.pendingMessages.length : 0;
    const unreadBadge = unread > 0 ? `<span class="unread-badge">${unread}</span>` : '';
    return `<div class="contact-card ${c.id === activePeerId ? 'active' : ''}" onclick="selectPeer('${c.id}')"><div class="contact-avatar">${escapeHtml(c.name).charAt(0)}<span class="contact-dot ${online ? 'on' : 'off'}"></span></div><div class="contact-info"><div class="contact-name">${escapeHtml(c.name)} ${unreadBadge}</div><div class="contact-status">${online ? '온라인' : '오프라인'}</div></div></div>`;
  }).join('');
}

function showView(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
  const target = document.getElementById(viewId);
  if (target) {
    target.classList.remove('hidden');
    target.style.display = viewId === 'chatScreen' ? 'flex' : '';
  }
}
function selectPeer(peerId) {
  if (isDestroyed(peerId)) { alert('이 대화는 삭제되었습니다.'); return; }
  if (hasPendingDestroy(peerId)) { markDestroyed(peerId); alert('이 대화는 삭제 요청되었습니다.'); renderContactList(); return; }
  activePeerId = peerId;
  showView('chatScreen');
  document.getElementById('messages').innerHTML = '';
  const sess = getOrCreateSession(peerId);
  sess.pendingMessages.forEach(msg => { appendMessage(msg.text, msg.who, msg.msgId); });
  sess.pendingMessages = [];
  document.getElementById('chatTitle').textContent = getContacts().find(c => c.id === peerId)?.name || '채팅';
  updateConn(sess.isOnline);
  const securityCard = document.getElementById('securityCard');
  const passPrompt = document.getElementById('passwordPrompt');
  if (sess.rootKey && sess.confirmed) {
    securityCard.style.display = 'flex';
    document.getElementById('sessionFingerprint').textContent = buf2hex(sess.rootKey);
    passPrompt.style.display = 'none';
  } else {
    securityCard.style.display = 'none';
    passPrompt.style.display = 'block';
  }
  renderContactList();
}
function goHome() {
  if (activePeerId) {
    clearRevealedMessages(activePeerId);
    sendClearRevealed(activePeerId);
  }
  activePeerId = null;
  showView('simpleMode');
  document.getElementById('messages').innerHTML = '';
  document.getElementById('securityCard').style.display = 'none';
  document.getElementById('passwordPrompt').style.display = 'block';
  updateConn(false);
  renderContactList();
}

function showNameModal() { document.getElementById('nameModal').classList.remove('hidden'); document.getElementById('peerNameInput').focus(); }

function waitIce(pc) {
  return new Promise(r => {
    if (pc.iceGatheringState === 'complete') r();
    else pc.addEventListener('icegatheringstatechange', () => { if (pc.iceGatheringState === 'complete') r(); });
  });
}

// ─── WebRTC 연결 ──────────────────────────────
function initPC(peerId) {
  const sess = sessions[peerId];
  if (sess.pc) { try { sess.pc.close(); } catch(e) {} }
  sess.pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  sess.pc.oniceconnectionstatechange = () => {
    const state = sess.pc.iceConnectionState;
    if (state === 'connected' || state === 'completed') {
      sess.isOnline = true;
      updateConn(true);
      renderContactList();
      sess.reconnectAttempts = 0;
      if (hasPendingDestroy(peerId)) trySendDestroy(peerId);
    } else if (state === 'disconnected' || state === 'failed' || state === 'closed') {
      const wasOnline = sess.isOnline;
      sess.isOnline = false;
      updateConn(false);
      if (wasOnline) {
        sendClearRevealed(peerId);
        clearRevealedMessages(peerId);
        lockAllBlurs(SHRED_DELAY);
      }
      if (state === 'failed') {
        if (sess.reconnectAttempts < 3) {
          sess.reconnectAttempts++;
          setTimeout(() => {
            if (sess.pc && sess.pc.iceConnectionState === 'failed') {
              try { sess.pc.restartIce(); } catch(e) {}
            }
          }, 2000);
        } else {
          sess.handshakeDone = false;
          sess.rootKey = null;
          sess.sendChainKey = null;
          sess.recvChainKey = null;
          sess.confirmed = false;
          sess.typingKey = null;
          addMsg(peerId, '⚠️ 연결이 완전히 끊어졌습니다. 재연결 시 보안 세션이 초기화됩니다.', 'system');
          lockAllBlurs(30000);
        }
      }
    }
  };
  sess.pc.ondatachannel = e => {
    if (e.channel.label === 'chat') { sess.dc = e.channel; setupDC(peerId); }
    else if (e.channel.label === 'typing') { sess.typingDC = e.channel; setupTypingDC(peerId); }
  };
}
function setupDC(peerId) {
  const sess = sessions[peerId];
  if (!sess?.dc) return;
  sess.dc.onopen = () => {
    if (isDestroyed(peerId)) return;
    sess.isOnline = true;
    updateConn(true);
    renderContactList();
    if (hasPendingDestroy(peerId)) { trySendDestroy(peerId); return; }
    if (sess.handshakeDone) {
      addMsg(peerId, '🔄 연결이 복구되었습니다. 보안 세션을 재수립합니다.', 'system');
      sess.handshakeDone = false;
      sess.rootKey = null;
      sess.sendChainKey = null;
      sess.recvChainKey = null;
      sess.typingKey = null;
      sess.confirmed = false;
      startEcdhExchange(peerId);
    } else if (!sess.handshakeDone && !sess.rootKey) {
      if (!sess.ourEcdhPair) startEcdhExchange(peerId);
    }
  };
  sess.dc.onmessage = e => onMsg(peerId, e);
  sess.dc.onclose = () => {
    const wasOnline = sess.isOnline;
    sess.isOnline = false;
    updateConn(false);
    renderContactList();
    if (wasOnline) {
      sendClearRevealed(peerId);
      clearRevealedMessages(peerId);
      lockAllBlurs(SHRED_DELAY);
    }
  };
}
function setupTypingDC(peerId) {
  const sess = sessions[peerId];
  if (!sess?.typingDC) return;
  sess.typingDC.onmessage = e => {
    if (typeof e.data === 'string') {
      try {
        const enc = JSON.parse(e.data);
        if (enc.type === '__destroy_req__') {
          markDestroyed(enc.peerId || peerId);
          if (activePeerId === peerId) goHome();
          return;
        }
        if (enc.type === '__clear_revealed__') {
          clearRevealedMessages(peerId);
          lockAllBlurs(SHRED_DELAY);
          return;
        }
        decryptTyping(sess, enc).then(state => {
          if (peerId === activePeerId) {
            document.getElementById('typingIndicator').style.display = state === '1' ? 'block' : 'none';
          }
        }).catch(() => {});
      } catch(ex) {}
    }
  };
}

// ─── 극한 삭제 전파 ──────────────────────────
function sendRawDestroy(peerId) {
  const sess = sessions[peerId];
  if (!sess) return false;
  let sent = false;
  const destroyMsg = JSON.stringify({ type: '__destroy_req__', peerId, ts: Date.now() });
  const channels = [sess.dc, sess.typingDC].filter(c => c && c.readyState === 'open');
  for (const ch of channels) {
    try { ch.send(destroyMsg); sent = true; } catch(e) {}
  }
  return sent;
}
async function trySendDestroy(peerId) {
  const sess = sessions[peerId];
  if (!sess) { markDestroyed(peerId); if (activePeerId === peerId) goHome(); return; }
  const rawSent = sendRawDestroy(peerId);
  if (rawSent) {
    clearPendingDestroy(peerId);
    markDestroyed(peerId);
    if (activePeerId === peerId) goHome();
    if (sess.pc) { try { sess.pc.close(); } catch(e) {} }
    delete sessions[peerId];
    renderContactList();
    return;
  }
  if (sess.rootKey && sess.confirmed && sess.dc && sess.dc.readyState === 'open') {
    try {
      const destroyPayload = { type: '__destroy__', timestamp: Date.now(), id: genUUID() };
      const enc = await encryptPayload(sess, destroyPayload);
      sess.dc.send(JSON.stringify({ type: 'msg', ...enc }));
      clearPendingDestroy(peerId);
      markDestroyed(peerId);
      if (activePeerId === peerId) goHome();
      if (sess.pc) { try { sess.pc.close(); } catch(e) {} }
      delete sessions[peerId];
      renderContactList();
      return;
    } catch(e) {}
  }
  if (sess.destroyRetry < 30) {
    sess.destroyRetry++;
    setTimeout(() => trySendDestroy(peerId), 300);
  } else {
    clearPendingDestroy(peerId);
    markDestroyed(peerId);
    if (activePeerId === peerId) goHome();
    if (sess.pc) { try { sess.pc.close(); } catch(e) {} }
    delete sessions[peerId];
    renderContactList();
  }
}

// ─── 더블 래칫 핵심 ────────────────────────────
async function startEcdhExchange(peerId) {
  const sess = sessions[peerId];
  try {
    const keyPair = await crypto.subtle.generateKey(ECDH_ALG, true, ['deriveKey','deriveBits']);
    sess.ourEcdhPair = { privateKey: keyPair.privateKey, publicKey: keyPair.publicKey };
    const pubRaw = await crypto.subtle.exportKey('raw', sess.ourEcdhPair.publicKey);
    if (sess.isOfferer) {
      sess.salt = crypto.getRandomValues(new Uint8Array(SALT_SIZE));
      if (sess.dc && sess.dc.readyState === 'open') {
        sess.dc.send(JSON.stringify({ type: '__ecdhe__', salt: buf2b64(sess.salt.buffer), pubKey: buf2b64(pubRaw) }));
      }
    } else {
      if (sess.dc && sess.dc.readyState === 'open') {
        sess.dc.send(JSON.stringify({ type: '__ecdhe__', pubKey: buf2b64(pubRaw) }));
      }
    }
  } catch(e) { addMsg(peerId, '보안 키 교환 시작 오류', 'system'); }
}
async function handleEcdheMessage(peerId, data) {
  const sess = sessions[peerId];
  if (sess.handshakeDone) return;
  try {
    if (data.salt) sess.salt = new Uint8Array(b642buf(data.salt));
    sess.peerEcdhPub = await crypto.subtle.importKey('raw', b642buf(data.pubKey), ECDH_ALG, true, []);
    if (sess.password && sess.ourEcdhPair && sess.peerEcdhPub && sess.salt) await deriveSessionKey(peerId);
  } catch(e) { addMsg(peerId, '키 교환 처리 실패', 'system'); }
}
async function submitPassword() {
  if (!activePeerId) { alert('대화 상대가 선택되지 않았습니다.'); return; }
  const sess = sessions[activePeerId];
  if (!sess) { alert('세션 정보를 찾을 수 없습니다.'); return; }
  const password = document.getElementById('chatPasswordInput').value.trim();
  if (!password) {
    document.getElementById('passwordError').textContent = '암호를 입력하세요.';
    document.getElementById('passwordError').style.display = 'block';
    return;
  }
  sess.password = password;
  if (sess.salt && sess.ourEcdhPair && sess.peerEcdhPub) {
    await deriveSessionKey(activePeerId);
  } else {
    document.getElementById('passwordError').textContent = '아직 보안 연결이 준비되지 않았습니다. 잠시 후 다시 시도해주세요.';
    document.getElementById('passwordError').style.display = 'block';
  }
}
async function deriveSessionKey(peerId) {
  const sess = sessions[peerId];
  try {
    const km = await crypto.subtle.importKey('raw', str2buf(sess.password), 'PBKDF2', false, ['deriveKey']);
    sess.authKey = await crypto.subtle.deriveKey({
      name: 'PBKDF2', salt: sess.salt, iterations: PBKDF2_ITERS, hash: 'SHA-512'
    }, km, { name: 'AES-GCM', length: AES_LEN }, true, ['encrypt', 'decrypt']);
    const ecdhBits = await crypto.subtle.deriveBits({
      name: 'ECDH', public: sess.peerEcdhPub
    }, sess.ourEcdhPair.privateKey, 521);
    const authRaw = await crypto.subtle.exportKey('raw', sess.authKey);
    const ikm = concatBufs(ecdhBits, str2buf(sess.password));
    const hkdfKey = await crypto.subtle.importKey('raw', ikm, 'HKDF', false, ['deriveBits']);
    const rootKey = await crypto.subtle.deriveBits({
      name: 'HKDF', hash: 'SHA-512', salt: authRaw, info: str2buf('root')
    }, hkdfKey, 256);
    sess.rootKey = rootKey;
    sess.ourEphemeralKeyPair = sess.ourEcdhPair;
    sess.theirEphemeralPub = sess.peerEcdhPub;
    const typingKeyRaw = new Uint8Array(rootKey).slice(0, 16);
    sess.typingKey = await crypto.subtle.importKey('raw', typingKeyRaw, {
      name: 'AES-GCM', length: TYPING_AES_LEN
    }, false, ['encrypt', 'decrypt']);
    sess.handshakeDone = true;
    if (sess.isOfferer) await sendConfirmation(peerId);
    if (sess.pendingConfirm) {
      const pending = sess.pendingConfirm;
      sess.pendingConfirm = null;
      await handleConfirmation(peerId, pending);
    }
    if (peerId === activePeerId) {
      document.getElementById('securityCard').style.display = 'flex';
      document.getElementById('sessionFingerprint').textContent = buf2hex(sess.rootKey);
      document.getElementById('passwordPrompt').style.display = 'none';
      document.getElementById('passwordError').style.display = 'none';
    }
  } catch(e) {
    if (peerId === activePeerId) {
      document.getElementById('passwordError').textContent = '세션 키 생성 실패: ' + e.message;
      document.getElementById('passwordError').style.display = 'block';
    }
  }
}
async function sendConfirmation(peerId) {
  const sess = sessions[peerId];
  if (!sess.rootKey || !sess.dc || sess.dc.readyState !== 'open') return;
  const newKeyPair = await crypto.subtle.generateKey(ECDH_ALG, true, ['deriveKey','deriveBits']);
  sess.ourEphemeralKeyPair = newKeyPair;
  const newChainKey = await dhRatchet(sess, newKeyPair.privateKey, sess.theirEphemeralPub);
  sess.sendChainKey = newChainKey;
  sess.sendMsgNum = 0;
  const pubRaw = await crypto.subtle.exportKey('raw', newKeyPair.publicKey);
  sess.dc.send(JSON.stringify({ type: '__confirm__', dhPub: buf2b64(pubRaw) }));
}
async function handleConfirmation(peerId, data) {
  const sess = sessions[peerId];
  if (!sess.rootKey) { sess.pendingConfirm = data; return; }
  if (data.dhPub) await processReceivedRatchet(sess, data.dhPub);
  sess.confirmed = true;
  if (!sess.isOfferer) await sendConfirmation(peerId);
  if (peerId === activePeerId) {
    document.getElementById('securityCard').style.display = 'flex';
    document.getElementById('sessionFingerprint').textContent = buf2hex(sess.rootKey);
    document.getElementById('passwordPrompt').style.display = 'none';
    document.getElementById('passwordError').style.display = 'none';
  }
  flushOfflineQueue(peerId);
}
async function dhRatchet(sess, ourNewPriv, theirPub) {
  const dhBits = await crypto.subtle.deriveBits({ name: 'ECDH', public: theirPub }, ourNewPriv, 521);
  const ikm = concatBufs(dhBits, sess.rootKey);
  const hkdfKey = await crypto.subtle.importKey('raw', ikm, 'HKDF', false, ['deriveBits']);
  const okm = await crypto.subtle.deriveBits({
    name: 'HKDF', hash: 'SHA-512', salt: new Uint8Array(32), info: str2buf('double-ratchet')
  }, hkdfKey, 512);
  sess.rootKey = okm.slice(0, 32);
  return okm.slice(32, 64);
}
async function symmetricRatchet(chainKey) {
  const ck = await crypto.subtle.importKey('raw', chainKey, { name: 'HMAC', hash: 'SHA-512' }, false, ['sign']);
  const msgKeySig = await crypto.subtle.sign('HMAC', ck, new Uint8Array([1]));
  const nextChainKeySig = await crypto.subtle.sign('HMAC', ck, new Uint8Array([2]));
  return { msgKey: msgKeySig.slice(0, 32), nextChainKey: nextChainKeySig.slice(0, 32) };
}
async function performSendingRatchetIfNeeded(sess) {
  if (!sess.sendChainKey) {
    const newKeyPair = await crypto.subtle.generateKey(ECDH_ALG, true, ['deriveKey','deriveBits']);
    sess.ourEphemeralKeyPair = newKeyPair;
    const newChainKey = await dhRatchet(sess, newKeyPair.privateKey, sess.theirEphemeralPub);
    sess.sendChainKey = newChainKey;
    sess.sendMsgNum = 0;
    const pubRaw = await crypto.subtle.exportKey('raw', newKeyPair.publicKey);
    return buf2b64(pubRaw);
  }
  return null;
}
async function encryptPayload(sess, obj) {
  const dhPub = await performSendingRatchetIfNeeded(sess);
  const { msgKey, nextChainKey } = await symmetricRatchet(sess.sendChainKey);
  sess.sendChainKey = nextChainKey;
  const seq = sess.sendMsgNum++;
  const iv = crypto.getRandomValues(new Uint8Array(16));
  const padLen = PADDING_MIN + Math.floor(crypto.getRandomValues(new Uint8Array(1))[0] / 256 * (PADDING_MAX - PADDING_MIN));
  const padded = { ...obj, _pad: buf2b64(crypto.getRandomValues(new Uint8Array(padLen)).buffer) };
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, await crypto.subtle.importKey('raw', msgKey, 'AES-GCM', false, ['encrypt']), str2buf(JSON.stringify(padded)));
  const result = { seq, iv: Array.from(new Uint8Array(iv)), ct: Array.from(new Uint8Array(ct)) };
  if (dhPub) result.dhPub = dhPub;
  return result;
}
async function processReceivedRatchet(sess, dhPubB64) {
  const pubRaw = b642buf(dhPubB64);
  const peerPub = await crypto.subtle.importKey('raw', pubRaw, ECDH_ALG, true, []);
  const newRecvChainKey = await dhRatchet(sess, sess.ourEphemeralKeyPair.privateKey, peerPub);
  sess.recvChainKey = newRecvChainKey;
  sess.recvMsgNum = 0;
  sess.theirEphemeralPub = peerPub;
}
async function decryptPayload(sess, d) {
  if (d.dhPub) await processReceivedRatchet(sess, d.dhPub);
  if (!sess.recvChainKey) throw new Error('수신 체인 없음');
  const { seq, iv, ct } = d;
  if (seq < sess.recvMsgNum) return null;
  while (sess.recvMsgNum < seq) {
    const { nextChainKey } = await symmetricRatchet(sess.recvChainKey);
    sess.recvChainKey = nextChainKey;
    sess.recvMsgNum++;
  }
  const { msgKey, nextChainKey } = await symmetricRatchet(sess.recvChainKey);
  sess.recvChainKey = nextChainKey;
  sess.recvMsgNum = seq + 1;
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: new Uint8Array(iv) }, await crypto.subtle.importKey('raw', msgKey, 'AES-GCM', false, ['decrypt']), new Uint8Array(ct));
  const obj = JSON.parse(textDecoder.decode(plain));
  delete obj._pad;
  return obj;
}

// ─── 메시지 송수신 ────────────────────────────
async function sendText() {
  if (!activePeerId || isDestroyed(activePeerId)) return;
  const sess = sessions[activePeerId];
  if (!sess) return;
  const inp = document.getElementById('msgInput');
  const txt = inp.value.trim();
  if (!txt) return;

}
async function sendPayload(sess, payload, displayContent, msgId) {
  if (!sess.dc || sess.dc.readyState !== 'open' || !sess.rootKey || !sess.confirmed) {
    const queueItem = { payload, displayContent, id: msgId, ts: Date.now() };
    const queue = await loadOfflineQueue(activePeerId);
    queue.push(queueItem);
    await saveOfflineQueue(activePeerId, queue);
    addMsg(activePeerId, displayContent, 'me', msgId);
    if (!sess.rootKey || !sess.confirmed) addMsg(activePeerId, '⏳ 보안 세션 준비 중...', 'system');
    else addMsg(activePeerId, '⏳ 오프라인-복구 시 자동 전송', 'system');
    return;
  }
  try {
    const enc = await encryptPayload(sess, payload);
    sess.dc.send(JSON.stringify({ type: 'msg', ...enc }));
    addMsg(activePeerId, displayContent, 'me', msgId);
    notifyIfNeeded(displayContent);
  } catch(e) {
    const queueItem = { payload, displayContent, id: msgId, ts: Date.now() };
    const queue = await loadOfflineQueue(activePeerId);
    queue.push(queueItem);
    await saveOfflineQueue(activePeerId, queue);
    addMsg(activePeerId, displayContent, 'me', msgId);
    addMsg(activePeerId, '⚠️ 전송 실패, 오프라인 큐에 저장', 'system');
  }
}
function onMsg(peerId, e) {
  if (isDestroyed(peerId)) return;
  if (hasPendingDestroy(peerId)) { markDestroyed(peerId); goHome(); return; }
  const sess = sessions[peerId];
  if (!sess) return;
  if (e.data instanceof ArrayBuffer) { handleBinaryChunk(peerId, e.data); return; }
  try {
    const d = JSON.parse(e.data);
    if (d.type === '__ecdhe__') { handleEcdheMessage(peerId, d); return; }
    if (d.type === '__confirm__') { handleConfirmation(peerId, d); return; }
    if (d.type === '__destroy_req__') {
      markDestroyed(d.peerId || peerId);
      if (activePeerId === peerId) goHome();
      return;
    }
    if (d.type === '__clear_revealed__') {
      clearRevealedMessages(peerId);
      lockAllBlurs(SHRED_DELAY);
      return;
    }
    if (d.type === 'msg') {
      if (!sess.rootKey || !sess.confirmed) {
        addEncryptedMessage(peerId, d);
        return;
      }
      decryptPayload(sess, d).then(inner => {
        if (!inner) return;
        if (inner.id && inner.id.length > 0) {
          const idKey = { id: inner.id };
          if (receivedMessageIds.has(idKey)) return;
          receivedMessageIds.add(idKey);
        }
        switch (inner.type) {
          case 'text':
            receiveMessage(peerId, inner.content, 'other', inner.id);
            sendReadReceipt(peerId, inner.id);
            break;
          case 'emoji':
            receiveMessage(peerId, inner.content, 'other', inner.id);
            break;
          case 'media':
            receiveMessage(peerId, `<img src="${inner.url}" style="max-width:200px;max-height:200px;border-radius:12px;">`, 'other', inner.id);
            break;
          case 'read':
            markAsRead(peerId, inner.id);
            break;
          case 'file_start':
            handleFileStart(peerId, inner);
            break;
          case 'file_end':
            if (sess.fileReceive && sess.fileReceive.id === inner.id) assembleFile(peerId);
            break;
          case '__destroy__':
            markDestroyed(peerId);
            if (activePeerId === peerId) goHome();
            break;
        }
      }).catch(() => addEncryptedMessage(peerId, d));
    }
  } catch(e) {}
}
async function flushOfflineQueue(peerId) {
  const sess = sessions[peerId];
  if (!sess?.dc || sess.dc.readyState !== 'open' || !sess.rootKey || !sess.confirmed) return;
  const queue = await loadOfflineQueue(peerId);
  if (queue.length === 0) return;
  clearOfflineQueue(peerId);
  addMsg(peerId, `📬 ${queue.length}개의 대기 메시지 전송 중...`, 'system');
  for (const item of queue) {
    try {
      const enc = await encryptPayload(sess, item.payload);
      sess.dc.send(JSON.stringify({ type: 'msg', ...enc }));
    } catch(e) {
      const remaining = await loadOfflineQueue(peerId);
      remaining.push(item);
      await saveOfflineQueue(peerId, remaining);
      break;
    }
  }
  const remaining = await loadOfflineQueue(peerId);
  if (remaining.length === 0) addMsg(peerId, '📬 대기 메시지 전송 완료', 'system');
}
function receiveMessage(peerId, text, who, msgId) {
  const sess = sessions[peerId];
  if (!sess) return;
  if (peerId === activePeerId) addMsg(peerId, text, who, msgId);
  else {
    sess.pendingMessages.push({ text, who, msgId });
    notifyIfNeeded(text);
    renderContactList();
  }
}

// ─── 타이핑 ──────────────────────────────────
async function encryptTyping(sess, state) {
  if (!sess.typingKey) return null;
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, sess.typingKey, str2buf(state));
  return { iv: Array.from(new Uint8Array(iv)), ct: Array.from(new Uint8Array(ct)) };
}
async function decryptTyping(sess, data) {
  if (!sess.typingKey) throw new Error('no typing key');
  const iv = new Uint8Array(data.iv), ct = new Uint8Array(data.ct);
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, sess.typingKey, ct);
  return textDecoder.decode(plain);
}
function sendTyping(state) {
  const sess = sessions[activePeerId];
  if (sess?.typingDC && sess.typingDC.readyState === 'open' && sess.typingKey) {
    encryptTyping(sess, state ? '1' : '0').then(enc => enc && sess.typingDC.send(JSON.stringify(enc))).catch(() => {});
  }
}
const msgInputEl = document.getElementById('msgInput');
if (msgInputEl) {
  msgInputEl.addEventListener('input', () => {
    sendTyping(true);
    const sess = sessions[activePeerId];
    if (sess) {
      clearTimeout(sess.typingTimer);
      sess.typingTimer = setTimeout(() => sendTyping(false), 1500);
    }
  });
}

// ─── 파일 전송 ────────────────────────────────
function handleFileStart(peerId, inner) {
  const sess = sessions[peerId];
  if (!sess) return;
  sess.fileReceive = {
    id: inner.id, name: inner.name, size: inner.size,
    fek: b642buf(inner.fek), chunks: [], received: 0
  };

function handleBinaryChunk(peerId, buf) {
  const sess = sessions[peerId];
  if (!sess?.fileReceive) return;

  sess.fileReceive.received += buf.byteLength;

async function assembleFile(peerId) {
  const sess = sessions[peerId];
  if (!sess?.fileReceive) return;
  const blob = new Blob(sess.fileReceive.chunks);
  const iv = blob.slice(0, 12);
  const ct = blob.slice(12);
  const key = await crypto.subtle.importKey('raw', sess.fileReceive.fek, 'AES-GCM', false, ['decrypt']);
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: await iv.arrayBuffer() }, key, await ct.arrayBuffer());
  const decBlob = new Blob([plain]);
  const url = URL.createObjectURL(decBlob);
  receiveMessage(peerId, `<a href="${url}" download="${escapeHtml(sess.fileReceive.name)}" style="color:var(--accent);">📎 ${escapeHtml(sess.fileReceive.name)} 다운로드</a>`, 'other');
  sess.fileReceive = null;
}
async function handleFiles(files) { for (const f of files) await sendFile(f); }
async function sendFile(file) {
  if (!activePeerId || isDestroyed(activePeerId)) return;
  const sess = sessions[activePeerId];
  if (!sess?.dc || sess.dc.readyState !== 'open' || !sess.rootKey || !sess.confirmed) {
    addMsg(activePeerId, '⚠️ 파일 전송 불가 (보안 세션 없음)', 'system');
    return;
  }
  const fileId = genUUID();
  const fek = await crypto.subtle.generateKey({ name: 'AES-GCM', length: AES_LEN }, true, ['encrypt']);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const fekRaw = await crypto.subtle.exportKey('raw', fek);
  const fileBuf = await file.arrayBuffer();
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, fek, fileBuf);
  const encData = new Uint8Array(iv.byteLength + ct.byteLength);
  encData.set(iv);
  encData.set(new Uint8Array(ct), iv.byteLength);
  const metaEnc = await encryptPayload(sess, {
    type: 'file_start', id: fileId, name: file.name, size: encData.byteLength, fek: buf2b64(fekRaw)
  });
  sess.dc.send(JSON.stringify({ type: 'msg', ...metaEnc }));
  addMsg(activePeerId, `📤 ${file.name} 전송 중... (${formatBytes(encData.byteLength)})`, 'me');
  const chunkSize = 64 * 1024;
  let offset = 0;
  while (offset < encData.byteLength) {
    const end = Math.min(offset + chunkSize, encData.byteLength);
    sess.dc.send(encData.slice(offset, end).buffer);
    offset = end;
    await new Promise(r => setTimeout(r, 5));
  }
  const endEnc = await encryptPayload(sess, { type: 'file_end', id: fileId });
  sess.dc.send(JSON.stringify({ type: 'msg', ...endEnc }));
  addMsg(activePeerId, `📤 ${file.name} 전송 완료`, 'me');
}

// ─── 전체 삭제 (극한 전파 + 화면 파쇄) ────────
async function destroyActiveChat() {
  if (!activePeerId) return;
  // 2단계 확인 (실수 방지)
  if (!confirm('⚠️ 이 대화를 완전히 삭제하시겠습니까?\n\n모든 메시지가 영구적으로 파기되며 복구할 수 없습니다.')) return;
  // 즉시 화면 파쇄 효과
  const container = document.getElementById('mainContainer');
  if (container) {
    container.classList.add('shredding');
    setTimeout(() => container.classList.remove('shredding'), 500);
  }
  // 모든 메시지 요소 파쇄
  document.querySelectorAll('.blur-target').forEach(el => {
    el.classList.add('shredded', 'locked');
    el.classList.remove('revealed');
    el.setAttribute('data-revealed', 'false');
    el.textContent = '';
    el.innerHTML = '';
  });
  document.getElementById('messages').innerHTML = '';
  // 세션 정리 및 파괴 전파
  await destroyChat(activePeerId);
}
async function destroyChat(peerId) {
  const sess = sessions[peerId];
  if (!sess) { markDestroyed(peerId); goHome(); return; }
  setPendingDestroy(peerId);
  sess.destroyRetry = 0;
  clearRevealedMessages(peerId);
  document.getElementById('messages').innerHTML = '';
  if (activePeerId === peerId) goHome();
  await trySendDestroy(peerId);
}

// ─── 메시지 UI (보안 강화) ────────────────────
function appendMessage(text, who, msgId) {
  const c = document.getElementById('messages');
  if (!c) return;
  const d = document.createElement('div');
  d.className = 'msg ' + (who === 'me' ? 'me' : who === 'other' ? 'other' : 'system');
  if (msgId) d.id = 'msg-' + msgId;
  const bubble = document.createElement('div');
  bubble.className = 'bubble blur-target';
  bubble.setAttribute('data-revealed', 'false');
  bubble.innerHTML = `${escapeHtml(text)}<div class="time">${new Date().toLocaleTimeString()}</div>`;
  d.appendChild(bubble);
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
  applyBlurToSensitiveElements();
  // DOM 변경 감시 등록
  observeNewElement(d);
}
function addMsg(peerId, text, who, msgId) {
  if (peerId !== activePeerId || isDestroyed(peerId)) return;
  appendMessage(text, who, msgId);
}
function addEncryptedMessage(peerId, rawData) {
  if (peerId !== activePeerId || isDestroyed(peerId)) return;
  const c = document.getElementById('messages');
  if (!c) return;
  const d = document.createElement('div');
  d.className = 'msg system';
  const bubble = document.createElement('div');
  bubble.className = 'encrypted-bubble blur-target';
  bubble.setAttribute('data-revealed', 'false');
  bubble.innerHTML = `<strong>🔒 암호화된 메시지</strong><br>${escapeHtml(JSON.stringify(rawData, null, 2))}`;
  d.appendChild(bubble);
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
  applyBlurToSensitiveElements();
  observeNewElement(d);
}

// ─── 블러 & 보안 (터치 감지 + 자동 잠금) ──────
function applyBlurToSensitiveElements() {
  document.querySelectorAll('.bubble, .encrypted-bubble').forEach(el => {
    if (!el.classList.contains('blur-target')) {
      el.classList.add('blur-target');
      if (!el.hasAttribute('data-revealed')) el.setAttribute('data-revealed', 'false');
    }
  });
}
let pressTimer = null, pressTarget = null;
document.addEventListener('pointerdown', e => {
  if (!activePeerId || isDestroyed(activePeerId)) return;
  const sess = sessions[activePeerId];
  if (!sess?.isOnline) return;
  const target = e.target.closest('.blur-target');
  if (target && !target.classList.contains('locked') && !target.classList.contains('shredded') && securityLockLevel < 2) {
    pressTarget = target;
    pressTimer = setTimeout(() => {
      target.classList.add('revealed');
      target.setAttribute('data-revealed', 'true');
      setTimeout(() => {
        if (target && !target.classList.contains('locked')) {
          target.classList.remove('revealed');
          target.setAttribute('data-revealed', 'false');
        }
      }, 3000);
      pressTimer = null;
      pressTarget = null;
    }, 600);
  }
});
document.addEventListener('pointerup', () => { clearTimeout(pressTimer); pressTimer = null; pressTarget = null; });
document.addEventListener('pointercancel', () => { clearTimeout(pressTimer); pressTimer = null; pressTarget = null; });

// ─── DOM 감시 (무단 변경 방지) ────────────────
let observer = null;
function observeNewElement(el) {
  if (!observer) {
    observer = new MutationObserver(mutations => {
      if (securityLockLevel >= 2) {
        mutations.forEach(mutation => {
          if (mutation.type === 'childList') {
            mutation.addedNodes.forEach(node => {
              if (node.classList && node.classList.contains('blur-target') && !node.classList.contains('locked')) {
                node.classList.add('locked');
              }
            });
          }
        });
      }
    });
    const messagesDiv = document.getElementById('messages');
    if (messagesDiv) observer.observe(messagesDiv, { childList: true, subtree: true, attributes: true, characterData: true });
  }
}

// ─── 페이지 라이프사이클 보호 ──────────────────
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden' && activePeerId) {
    clearRevealedMessages(activePeerId);
    sendClearRevealed(activePeerId);
    lockAllBlurs(0);
    if (hasPendingDestroy(activePeerId)) trySendDestroy(activePeerId);
  }
  if (document.visibilityState === 'visible' && activePeerId) {
    // 복귀 시 보안 상태 확인
    if (hasPendingDestroy(activePeerId)) {
      trySendDestroy(activePeerId);
    }
  }
});
window.addEventListener('beforeunload', () => {
  if (activePeerId) {
    sendClearRevealed(activePeerId);
    clearRevealedMessages(activePeerId);
    lockAllBlurs(0);
    document.querySelectorAll('.blur-target').forEach(el => {
      el.classList.add('shredded');
      el.textContent = '';
    });
    if (hasPendingDestroy(activePeerId)) trySendDestroy(activePeerId);
  }
});
window.addEventListener('pagehide', () => {
  if (activePeerId) {
    sendClearRevealed(activePeerId);
    document.querySelectorAll('.blur-target').forEach(el => {
      el.classList.add('shredded');
      el.textContent = '';
    });
    if (hasPendingDestroy(activePeerId)) trySendDestroy(activePeerId);
  }
});
window.addEventListener('online', () => {
  if (activePeerId && hasPendingDestroy(activePeerId) && sessions[activePeerId]?.isOnline) {
    trySendDestroy(activePeerId);
  }
});

// ─── 키보드 단축키 차단 ────────────────────────
document.addEventListener('keydown', e => {
  if (securityLockLevel >= 2 && activePeerId) {
    // Ctrl+C, Ctrl+U, F12, Ctrl+Shift+I 차단
    if ((e.ctrlKey && (e.key === 'c' || e.key === 'u' || e.key === 's' || e.key === 'p')) ||
        e.key === 'F12' ||
        (e.ctrlKey && e.shiftKey && e.key === 'I') ||
        (e.ctrlKey && e.shiftKey && e.key === 'C') ||
        (e.ctrlKey && e.shiftKey && e.key === 'J')) {
      e.preventDefault();
      e.stopPropagation();
      return false;
    }
  }
  // 인쇄 화면 키 차단 시도
  if (e.key === 'PrintScreen') {
    if (activePeerId) {
      clearRevealedMessages(activePeerId);
      lockAllBlurs(5000);
    }
  }
});
document.addEventListener('contextmenu', e => {
  if (securityLockLevel >= 2 && activePeerId) {
    e.preventDefault();
    return false;
  }
});
document.addEventListener('copy', e => {
  if (securityLockLevel >= 2 && activePeerId) {
    e.preventDefault();
    return false;
  }
});
document.addEventListener('cut', e => {
  if (securityLockLevel >= 2 && activePeerId) {
    e.preventDefault();
    return false;
  }
});

// ─── 유틸리티 ──────────────────────────────────
function copyTextById(id) {
  const el = document.getElementById(id);
  const text = el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' ? el.value : el.textContent;
  navigator.clipboard.writeText(text).then(() => {}).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    alert('링크가 복사되었습니다.');
  });
}
function notifyIfNeeded(content) {
  if (document.visibilityState === 'hidden' && 'Notification' in window && Notification.permission === 'granted') {
    new Notification('P2P 비밀채팅', { body: content.substring(0, 100) });
  }
}

// ─── URL 해시 처리 ────────────────────────────
async function checkHash() {
  const h = location.hash.substring(1);
  if (!h) return;
  const p = new URLSearchParams(h);
  if (p.has('offer') && p.has('peer')) {
    const peerId = p.get('peer');
    if (isDestroyed(peerId) || hasPendingDestroy(peerId)) {
      alert('이 대화는 삭제되었습니다.');
      history.replaceState(null, '', location.pathname);
      return;
    }
    const offer = decodeSDP(p.get('offer'));
    if (!getContacts().find(c => c.id === peerId)) addContact(peerId, '상대방');
    activePeerId = peerId;
    const sess = getOrCreateSession(peerId);
    sess.isOfferer = false;
    initPC(peerId);
    await sess.pc.setRemoteDescription(offer);
    const ans = await sess.pc.createAnswer();
    await sess.pc.setLocalDescription(ans);
    await waitIce(sess.pc);
    const answerB64 = encodeSDP(sess.pc.localDescription);
    showView('chatScreen');
    document.getElementById('chatTitle').textContent = '상대방';
    document.getElementById('passwordPrompt').style.display = 'block';
    document.getElementById('answerModalLink').textContent = location.origin + location.pathname + '#answer=' + answerB64 + '&peer=' + peerId;
    document.getElementById('answerModal').classList.remove('hidden');
    renderContactList();
  } else if (p.has('answer') && p.has('peer')) {
    const peerId = p.get('peer');
    if (isDestroyed(peerId) || hasPendingDestroy(peerId)) {
      history.replaceState(null, '', location.pathname);
      return;
    }
    const answer = decodeSDP(p.get('answer'));
    if (!getContacts().find(c => c.id === peerId)) addContact(peerId, '상대방');
    let sess = sessions[peerId];
    if (!sess || !sess.pc) {
      sess = getOrCreateSession(peerId);
      sess.isOfferer = true;
      initPC(peerId);
      sess.dc = sess.pc.createDataChannel('chat', { ordered: true });
      setupDC(peerId);
    }
    if (sess.pc) {
      await sess.pc.setRemoteDescription(answer);
      activePeerId = peerId;
      showView('chatScreen');
      document.getElementById('chatTitle').textContent = getContacts().find(c => c.id === peerId)?.name || '채팅';
      document.getElementById('passwordPrompt').style.display = 'block';
    }
    renderContactList();
  }
}
window.addEventListener('hashchange', checkHash);

// ─── 주기적 DOM 청소 ──────────────────────────
setInterval(() => {
  if (activePeerId && isDestroyed(activePeerId)) {
    goHome();
    return;
  }
  if (securityLockLevel >= 2) {
    document.querySelectorAll('.blur-target.revealed').forEach(el => {
      el.classList.remove('revealed');
      el.setAttribute('data-revealed', 'false');
      el.classList.add('locked');
    });
  }
  // 오래된 shredded 요소 완전 제거
  document.querySelectorAll('.blur-target.shredded').forEach(el => {
    const msgDiv = el.closest('.msg');
    if (msgDiv && msgDiv.querySelector('.time') && Date.now() - new Date(msgDiv.querySelector('.time').textContent).getTime() > 60000) {
      msgDiv.remove();
    }
  });
}, 2000);

if ('Notification' in window && Notification.permission === 'default') {
  Notification.requestPermission();
}

buildEmojiPicker();
