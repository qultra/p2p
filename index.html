<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0, minimum-scale=1.0">
  <title>P2P 비밀 메신저 – 극한 보안 완전판</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src *; media-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; base-uri 'none'; form-action 'none'; referrer no-referrer;">
  <meta name="referrer" content="no-referrer">
  <style>
    :root {
      --bg: #06090f; --surface: #0f141e; --card: rgba(15,20,30,0.9);
      --text: #e0e5f0; --sub: #8892b0; --accent: #5b8df0; --danger: #f97070;
      --success: #45d68a; --border: #1a2332; --radius: 20px; --radius-sm: 14px;
      --safe-bottom: env(safe-area-inset-bottom, 10px);
      --bubble-me: linear-gradient(135deg, #4a82fa, #7c5cf0);
      --bubble-other: rgba(22,30,44,0.85);
      --bubble-system: rgba(255,255,255,0.04);
      --font-xs: 0.7rem; --font-sm: 0.82rem; --font-md: 0.95rem; --font-lg: 1.1rem;
    }
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; justify-content: center; align-items: center;
      height: 100dvh; padding: 8px; overflow: hidden;
      user-select: none; -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    .container {
      width: 100%; max-width: 560px; height: 100%;
      background: var(--surface); border-radius: 28px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.8);
      display: flex; flex-direction: column; overflow: hidden;
      border: 1px solid var(--border);
      backdrop-filter: blur(20px);
    }
    .header { padding:12px 18px; background:rgba(8,14,24,0.95); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; min-height:56px; }
    .header h1 { font-size:var(--font-lg); font-weight:700; background:linear-gradient(135deg,#a0c0ff,#c0a0ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing: -0.5px; }
    .status-bar { display:flex; align-items:center; gap:8px; }
    .dot { width:10px; height:10px; border-radius:50%; transition:0.3s; }
    .dot.on { background:var(--success); box-shadow:0 0 12px var(--success); }
    .dot.off { background:var(--danger); box-shadow:0 0 8px var(--danger); }
    .main-content { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; scroll-behavior: smooth; }
    .main-content::-webkit-scrollbar { width:5px; }
    .main-content::-webkit-scrollbar-thumb { background:#253040; border-radius:3px; }
    .card { background:var(--card); border-radius:var(--radius); padding:18px; margin-bottom:12px; border:1px solid var(--border); backdrop-filter:blur(10px); }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; background:rgba(255,255,255,0.05); color:white; border:1px solid var(--border); padding:14px 20px; border-radius:var(--radius-sm); cursor:pointer; font-weight:600; font-size:var(--font-md); transition:0.2s; width:100%; text-align:center; }
    .btn:hover { background:rgba(255,255,255,0.1); }
    .btn:active { transform:scale(0.97); }
    .btn.primary { background:var(--accent); border:none; }
    .btn.danger { background:var(--danger); border:none; }
    .btn-small { padding:8px 14px; font-size:var(--font-sm); width:auto; border-radius:12px; }
    .btn-icon { background:none; border:none; font-size:1.3rem; cursor:pointer; padding:8px; color:var(--accent); transition:0.2s; }
    .btn-icon:active { transform:scale(0.9); }
    input, textarea { width:100%; background:#0a0f18; color:var(--text); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px 15px; font-size:16px; outline:none; user-select:text; -webkit-user-select:text; transition:0.2s; }
    input:focus, textarea:focus { border-color:var(--accent); box-shadow: 0 0 0 2px rgba(91,141,240,0.3); }
    .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter: blur(6px); z-index:100; display:flex; align-items:center; justify-content:center; }
    .modal-content { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; width:90%; max-width:380px; box-shadow: 0 30px 50px rgba(0,0,0,0.6); }
    .modal-content h3 { margin-bottom: 16px; font-size: var(--font-lg); }
    #chatScreen { display:none; flex-direction:column; flex:1; }
    #messages { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:8px; padding:8px 0; }
    .msg { display:flex; flex-direction:column; animation:msgIn 0.2s ease; }
    .msg.system { align-items:center; } .msg.me { align-items:flex-end; } .msg.other { align-items:flex-start; }
    .bubble { max-width:82%; padding:10px 16px; border-radius:18px; position:relative; overflow:hidden; z-index:1; line-height:1.45; word-break:break-word; transition: filter 0.3s, opacity 0.3s; }
    .bubble.blur-target { filter: blur(10px); cursor: pointer; }
    .bubble.blur-target.revealed { filter: blur(0); }
    .bubble.blur-target.locked { filter: blur(18px); cursor: not-allowed; }
    .msg.system .bubble { background:var(--bubble-system); border:none; font-size:var(--font-xs); color:var(--sub); text-align:center; padding:6px 12px; border-radius:14px; max-width:90%; }
    .msg.me .bubble { background:var(--bubble-me); border-bottom-right-radius:4px; color:white; box-shadow:0 4px 12px rgba(74,130,250,0.3); }
    .msg.other .bubble { background:var(--bubble-other); border-bottom-left-radius:4px; border:1px solid rgba(255,255,255,0.04); }
    .msg .time { font-size:0.65rem; color:var(--sub); margin-top:4px; display:flex; justify-content:flex-end; gap:6px; align-items:center; }
    .msg .time .read-status { color:var(--success); font-size:0.7rem; }
    .input-bar { display:flex; gap:8px; padding:8px 12px; align-items:flex-end; padding-bottom:var(--safe-bottom); background:rgba(8,14,24,0.9); border-top:1px solid var(--border); }
    #msgInput { flex:1; min-height:42px; max-height:120px; resize:none; padding:12px; border-radius:24px; background:#0a0f18; }
    .send-btn { background:var(--accent); color:white; width:42px; height:42px; display:flex; align-items:center; justify-content:center; border-radius:50%; cursor:pointer; border:none; font-size:1.2rem; transition:0.2s; flex-shrink:0; }
    .send-btn:active { transform:scale(0.92); }
    .action-bar { display:flex; gap:6px; padding:0 12px 4px; flex-wrap:wrap; position:relative; }
    .action-btn { background:rgba(255,255,255,0.06); border:1px solid var(--border); color:var(--text); padding:8px 14px; border-radius:14px; cursor:pointer; font-size:var(--font-sm); }
    .picker-overlay { display:none; position:absolute; bottom:100%; left:0; right:0; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:12px; max-height:220px; overflow-y:auto; z-index:20; margin-bottom:4px; }
    .picker-overlay.active { display:flex; flex-direction:column; gap:8px; }
    .picker-grid { display:flex; flex-wrap:wrap; gap:8px; }
    .picker-item { cursor:pointer; border-radius:8px; overflow:hidden; }
    .picker-item img { width:64px; height:64px; object-fit:cover; border-radius:8px; }
    .emoji-item { font-size:1.8rem; cursor:pointer; padding:6px 8px; border-radius:8px; transition:0.1s; }
    .emoji-item:active { transform:scale(1.3); }
    .chat-header { display:flex; align-items:center; gap:12px; padding:10px 16px; border-bottom:1px solid var(--border); background:rgba(8,14,24,0.9); }
    .chat-title { font-size:var(--font-md); font-weight:600; flex:1; }
    .typing-indicator { font-size:0.75rem; color:var(--sub); padding:2px 16px; font-style:italic; display:none; }
    .contact-list { display:flex; flex-direction:column; gap:6px; margin-top:10px; }
    .contact-card { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:16px; padding:12px 16px; cursor:pointer; display:flex; align-items:center; gap:12px; transition:0.2s; }
    .contact-card:hover { background:rgba(255,255,255,0.06); }
    .contact-card.active { border-color:var(--accent); background:rgba(91,141,240,0.1); }
    .contact-avatar { width:44px; height:44px; border-radius:50%; background:rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0; position:relative; font-weight:600; }
    .contact-dot { position:absolute; bottom:0; right:0; width:12px; height:12px; border-radius:50%; border:2px solid var(--surface); }
    .contact-dot.on { background:var(--success); } .contact-dot.off { background:var(--danger); }
    .contact-info { flex:1; min-width:0; }
    .contact-name { font-size:var(--font-md); font-weight:600; }
    .contact-status { font-size:var(--font-xs); color:var(--sub); margin-top:2px; }
    .unread-badge { background:var(--danger); color:white; border-radius:12px; padding:2px 8px; font-size:0.7rem; font-weight:bold; margin-left:8px; }
    .svg-icon { width:20px; height:20px; fill:currentColor; flex-shrink:0; }
    .link-box { word-break:break-all; background:#0a0f18; padding:12px; border-radius:12px; font-size:0.72rem; margin:8px 0; max-height:80px; overflow-y:auto; color:#9aa4bf; font-family:monospace; user-select:text; }
    .fingerprint { font-family:monospace; font-size:0.6rem; background:#0a0f18; padding:6px; border-radius:8px; word-break:break-all; }
    @keyframes msgIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spinner { width:20px; height:20px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block; }
    .hidden { display:none !important; }
    .text-center { text-align:center; }
  </style>
</head>
<body>
<div class="container">
  <div class="header"><h1>🔐 P2P 비밀채팅</h1><div class="status-bar"><span id="connDot" class="dot off"></span><span id="connLabel">오프라인</span></div></div>
  <div class="main-content" id="mainArea">
    <div id="masterPasswordUI" class="card text-center" style="display:flex; flex-direction:column; gap:12px;">
      <strong>🔑 마스터 비밀번호 입력</strong>
      <input type="password" id="masterPasswordInput" placeholder="비밀번호 설정/입력" autocomplete="off">
      <button id="masterPasswordBtn" class="btn primary">잠금 해제</button>

    </div>
    <div id="simpleMode" class="view hidden">
      <div class="card text-center">
        <h3 style="margin-bottom:4px;">서버 없이 완벽한 익명성</h3>
        <p class="text-sub mb">연결 끊겨도 자동 복구 · 오프라인 메시지 큐</p>
        <button id="newChatBtn" class="btn primary"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>새 채팅 생성</button>
        <button id="joinChatBtn" class="btn mt"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>초대 링크로 참가</button>
      </div>
      <div style="font-size:0.8rem; color:var(--sub); margin-bottom:8px; font-weight:600;">📋 대화 목록</div>
      <div class="contact-list" id="contactList"></div>
    </div>
    <div id="nameModal" class="modal hidden">
      <div class="modal-content"><h3>✨ 새 채팅</h3><input type="text" id="peerNameInput" placeholder="상대방 이름 입력"><div class="mt" style="display:flex;gap:8px;"><button id="confirmNewChatBtn" class="btn primary" style="flex:1;">확인</button><button id="cancelNameModalBtn" class="btn" style="flex:1;">취소</button></div></div>
    </div>
    <div id="offerPanel" class="view hidden">
      <div class="card text-center">
        <div class="spinner mb" id="offerSpinner" style="display:none;"></div>
        <p><strong>연결 링크 생성 중...</strong></p>
        <p class="text-sub">생성된 링크를 상대에게 전송하세요.</p>
        <div class="link-box" id="offerLinkDisplay">생성 중...</div>
        <button id="copyOfferLinkBtn" class="btn mt">링크 복사</button>
        <p class="text-sub mt">상대가 보낸 Answer 링크를 아래에 붙여넣으세요.</p>
        <input type="text" id="answerLinkInput" placeholder="Answer 링크 입력..."><button id="applyAnswerBtn" class="btn primary mt">연결 완료</button>
        <button id="goHomeFromOfferBtn" class="btn mt">홈으로</button>

    </div>
    <div id="answerPanel" class="view hidden">
      <div class="card"><strong>📥 초대 링크 붙여넣기</strong><textarea id="remoteOfferSDP" rows="3" placeholder="방장에게 받은 전체 링크..."></textarea><button id="createAnswerBtn" class="btn primary mt">연결 시작</button></div>
      <button id="goHomeFromAnswerBtn" class="btn mt">홈으로</button>
    </div>
    <div id="chatScreen" class="view hidden">
      <div class="chat-header">
        <button id="backFromChatBtn" class="btn-small"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></button>
        <span class="chat-title" id="chatTitle">채팅</span>
        <button id="renameChatBtn" class="btn-small"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg></button>
        <button id="destroyChatBtn" class="btn-small danger"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
      </div>
      <div id="securityCard" class="card" style="margin:0 0 4px; padding:6px 12px; font-size:0.7rem; display:none; align-items:center; gap:6px;">
        <span>🔒</span><span id="sessionFingerprint" class="fingerprint"></span>
      </div>
      <div id="passwordPrompt" class="card text-center" style="margin:8px;">
        <strong>🔐 채팅방 암호 입력</strong>
        <input type="password" id="chatPasswordInput" placeholder="상대와 공유한 암호" style="margin-top:8px;">

      <div id="messages"></div>

<div id="answerModal" class="modal hidden">
  <div class="modal-content">
    <h3>📤 내 Answer 링크</h3>
    <p class="text-sub" style="margin-bottom:12px;">이 링크를 상대에게 전송하면 연결됩니다.</p>

    <div style="display:flex; gap:8px;"><button id="copyAnswerModalBtn" class="btn primary" style="flex:1;">📋 복사</button><button id="closeAnswerModalBtn" class="btn" style="flex:1;">닫기</button></div>

<script>
// =====================================================================
//  P2P 비밀 메신저 – 완전판 (보안 + 사용성 완벽 통합)
// =====================================================================
(function() {
  'use strict';
  // console 무력화 (디버깅 필요 시 주석 처리)
  const noop = function(){};
  Object.keys(console).forEach(k => { if (typeof console[k] === 'function') console[k] = noop; });
  // 우클릭/드래그/선택 방지
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('dragstart', e => e.preventDefault());
  document.addEventListener('selectstart', e => { if (!e.target.matches('input, textarea')) e.preventDefault(); });
})();

const textEncoder = new TextEncoder();
const textDecoder = new TextDecoder();
const toBase64url = buf => btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
const fromBase64url = str => { str = str.replace(/-/g,'+').replace(/_/g,'/'); while(str.length%4) str+='='; return Uint8Array.from(atob(str),c=>c.charCodeAt(0)).buffer; };
const encodeSDP = obj => toBase64url(textEncoder.encode(JSON.stringify(obj)));
const decodeSDP = str => JSON.parse(textDecoder.decode(fromBase64url(str)));

const ICE_SERVERS = [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' },
  { urls: 'stun:stun.cloudflare.com:3478' },
  { urls: 'stun:openrelay.metered.ca:80' },
  { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
  { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
];

const sessions = {};
let activePeerId = null;
const PREFIX = 'p2p_secure_';
const DESTROY_PREFIX = PREFIX + 'destroyed_';
const PENDING_DESTROY_PREFIX = PREFIX + 'penddestroy_';
const QUEUE_PREFIX = PREFIX + 'queue_';
const CONTACTS_KEY = PREFIX + 'contacts';
const MEDIA_FAV_KEY = PREFIX + 'media_fav';

// 마스터 암호화
let masterKey = null;
async function deriveMasterKey(password) {
  const keyMaterial = await crypto.subtle.importKey('raw', textEncoder.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: textEncoder.encode('p2p-master-salt'), iterations: 20000000, hash: 'SHA-512' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt', 'decrypt']
  );
}
async function encryptData(data) {
  if (!masterKey) throw new Error('no master key');
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, masterKey, textEncoder.encode(JSON.stringify(data)));
  return { iv: Array.from(new Uint8Array(iv)), ct: Array.from(new Uint8Array(ct)) };
}
async function decryptData(enc) {
  if (!masterKey) throw new Error('no master key');
  const iv = new Uint8Array(enc.iv);
  const ct = new Uint8Array(enc.ct);
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, masterKey, ct);
  return JSON.parse(textDecoder.decode(plain));
}
async function setItem(key, value) {
  try { localStorage.setItem(key, JSON.stringify(await encryptData(value))); } catch(e){}
}
async function getItem(key) {
  try { const raw = localStorage.getItem(key); return raw ? await decryptData(JSON.parse(raw)) : null; } catch(e){ return null; }
}

// 세션 관리
function getSession(peerId) {
  if (!sessions[peerId]) sessions[peerId] = {
    pc: null, dc: null, typingDC: null, typingKey: null, isOfferer: false, password: null,
    rootKey: null, sendChainKey: null, recvChainKey: null, sendMsgNum: 0, recvMsgNum: 0,
    ourEphPriv: null, theirEphPub: null, salt: null, ourEcdhPair: null, peerEcdhPub: null,
    handshakeDone: false, confirmed: false, isOnline: false,
    receivedIds: new Set(), pendingMessages: [],
    fileReceive: null, typingTimer: null, reconnectAttempts: 0,
    pendingConfirm: null, destroyRetry: 0
  };
  return sessions[peerId];
}
async function isDestroyed(peerId) { return !!(await getItem(DESTROY_PREFIX + peerId)); }
async function markDestroyed(peerId) {
  await setItem(DESTROY_PREFIX + peerId, Date.now());
  sessionStorage.setItem(DESTROY_PREFIX + peerId, '1');
  clearQueue(peerId);
  try { localStorage.removeItem(PENDING_DESTROY_PREFIX + peerId); } catch(e){}
  if (location.hash) history.replaceState(null, '', location.pathname);
}

// ============== WebRTC 연결 ==============
function initPC(peerId) {
  const sess = getSession(peerId);
  if (sess.pc) { sess.pc.close(); }
  sess.pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  sess.pc.oniceconnectionstatechange = async () => {
    const state = sess.pc.iceConnectionState;
    if (state === 'connected' || state === 'completed') {
      sess.isOnline = true; updateConnectionStatus(true);
      sess.reconnectAttempts = 0;
      if (peerId === activePeerId) renderContactList();
      if (await hasPendingDestroy(peerId)) trySendDestroy(peerId);
    } else if (state === 'disconnected' || state === 'failed' || state === 'closed') {
      const wasOnline = sess.isOnline;
      sess.isOnline = false; updateConnectionStatus(false);
      if (peerId === activePeerId) {
        clearRevealedMessages();
        renderContactList();
      }
      if (state === 'failed' && sess.reconnectAttempts < 5) {
        sess.reconnectAttempts++;
        setTimeout(() => { if (sess.pc && sess.pc.iceConnectionState === 'failed') try { sess.pc.restartIce(); } catch(e){} }, 2000);
      } else if (state === 'failed') {
        sess.handshakeDone = false; sess.rootKey = null; sess.sendChainKey = null; sess.recvChainKey = null; sess.confirmed = false;
        if (peerId === activePeerId) appendSystemMessage('⚠️ 연결이 끊어졌습니다. 재연결 시 보안 재수립이 필요합니다.');
      }
    }
  };
  sess.pc.ondatachannel = e => {
    if (e.channel.label === 'chat') { sess.dc = e.channel; setupDC(peerId); }
    else if (e.channel.label === 'typing') { sess.typingDC = e.channel; setupTypingDC(peerId); }
  };
}
function setupDC(peerId) {
  const sess = getSession(peerId); if (!sess?.dc) return;
  sess.dc.onopen = async () => {
    if (await isDestroyed(peerId)) return;
    sess.isOnline = true; updateConnectionStatus(true);
    if (peerId === activePeerId) renderContactList();
    if (await hasPendingDestroy(peerId)) { trySendDestroy(peerId); return; }
    if (!sess.handshakeDone && !sess.rootKey) startEcdhExchange(peerId);
    else if (sess.handshakeDone) {
      // 재연결 시 confirm 상태 유지지만 필요시 재협상 가능
      if (sess.confirmed) flushOfflineQueue(peerId);
    }
  };
  sess.dc.onmessage = e => onMsg(peerId, e);
  sess.dc.onclose = () => {
    sess.isOnline = false; updateConnectionStatus(false);
    if (peerId === activePeerId) { clearRevealedMessages(); renderContactList(); }
  };
}
function setupTypingDC(peerId) {
  const sess = getSession(peerId); if (!sess?.typingDC) return;
  sess.typingDC.onmessage = async e => {
    if (typeof e.data === 'string') {
      try {
        const d = JSON.parse(e.data);
        if (d.type === '__destroy_req__') { await markDestroyed(d.peerId || peerId); if (activePeerId === peerId) goHome(); return; }
        if (sess.typingKey) {
          const state = await decryptTyping(sess, d);
          if (peerId === activePeerId) document.getElementById('typingIndicator').style.display = state === '1' ? 'block' : 'none';
        }
      } catch(ex){}
    }
  };
}

// ============== 삭제 전파 ==============
function sendRawDestroy(peerId) {
  const sess = sessions[peerId]; if (!sess) return false;
  const msg = JSON.stringify({ type: '__destroy_req__', peerId, ts: Date.now() });
  let sent = false;
  [sess.dc, sess.typingDC].forEach(ch => { if (ch && ch.readyState === 'open') { try { ch.send(msg); sent = true; } catch(e){} } });
  return sent;
}
async function trySendDestroy(peerId) {
  const sess = sessions[peerId];
  if (!sess) { await markDestroyed(peerId); if (activePeerId === peerId) goHome(); return; }
  if (sendRawDestroy(peerId)) {
    await clearPendingDestroy(peerId); await markDestroyed(peerId);
    if (activePeerId === peerId) goHome();
    if (sess.pc) { sess.pc.close(); delete sessions[peerId]; }
    renderContactList(); return;
  }
  if (sess.rootKey && sess.confirmed && sess.dc && sess.dc.readyState === 'open') {
    try {
      const payload = { type: '__destroy__', ts: Date.now(), id: crypto.randomUUID() };
      const enc = await encryptPayload(sess, payload);
      sess.dc.send(JSON.stringify({ type: 'msg', ...enc }));
      await clearPendingDestroy(peerId); await markDestroyed(peerId);
      if (activePeerId === peerId) goHome();
      if (sess.pc) { sess.pc.close(); delete sessions[peerId]; }
      renderContactList(); return;
    } catch(e){}
  }
  if (sess.destroyRetry < 30) {
    sess.destroyRetry++;
    setTimeout(() => trySendDestroy(peerId), 500);
  } else {
    await clearPendingDestroy(peerId); await markDestroyed(peerId);
    if (activePeerId === peerId) goHome();
    if (sess.pc) { sess.pc.close(); delete sessions[peerId]; }
    renderContactList();
  }
}
async function destroyChat(peerId) {
  const sess = sessions[peerId];
  if (!sess) { await markDestroyed(peerId); goHome(); return; }
  await setPendingDestroy(peerId);
  sess.destroyRetry = 0;
  if (activePeerId === peerId) goHome();
  await trySendDestroy(peerId);
}

// ============== 더블 래칫 암호화 ==============
async function startEcdhExchange(peerId) {
  const sess = getSession(peerId);
  try {
    const kp = await crypto.subtle.generateKey({ name: 'ECDH', namedCurve: 'P-521' }, true, ['deriveKey','deriveBits']);
    sess.ourEcdhPair = kp;
    const pubRaw = await crypto.subtle.exportKey('raw', kp.publicKey);
    if (sess.isOfferer) {
      sess.salt = crypto.getRandomValues(new Uint8Array(4096));
      if (sess.dc && sess.dc.readyState === 'open') sess.dc.send(JSON.stringify({ type: '__ecdhe__', salt: buf2b64(sess.salt.buffer), pubKey: buf2b64(pubRaw) }));
    } else {
      if (sess.dc && sess.dc.readyState === 'open') sess.dc.send(JSON.stringify({ type: '__ecdhe__', pubKey: buf2b64(pubRaw) }));
    }
  } catch(e){ appendSystemMessage('키 교환 시작 오류'); }
}
async function handleEcdheMessage(peerId, data) {
  const sess = getSession(peerId);
  if (sess.handshakeDone) return;
  if (data.salt) sess.salt = new Uint8Array(b642buf(data.salt));
  sess.peerEcdhPub = await crypto.subtle.importKey('raw', b642buf(data.pubKey), { name: 'ECDH', namedCurve: 'P-521' }, true, []);
  if (sess.password && sess.ourEcdhPair && sess.peerEcdhPub && sess.salt) await deriveSessionKey(peerId);
}
async function submitPassword() {
  if (!activePeerId) return;
  const sess = getSession(activePeerId);
  const password = document.getElementById('chatPasswordInput').value.trim();
  if (!password) { document.getElementById('passwordError').textContent = '암호를 입력하세요.'; document.getElementById('passwordError').style.display = 'block'; return; }
  sess.password = password;
  if (sess.salt && sess.ourEcdhPair && sess.peerEcdhPub) await deriveSessionKey(activePeerId);
}
async function deriveSessionKey(peerId) {
  const sess = getSession(peerId);
  try {
    const km = await crypto.subtle.importKey('raw', textEncoder.encode(sess.password), 'PBKDF2', false, ['deriveKey']);
    const authKey = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: sess.salt, iterations: 20000000, hash: 'SHA-512' },
      km, { name: 'AES-GCM', length: 256 }, true, ['encrypt', 'decrypt']
    );
    const ecdhBits = await crypto.subtle.deriveBits({ name: 'ECDH', public: sess.peerEcdhPub }, sess.ourEcdhPair.privateKey, 521);
    const authRaw = await crypto.subtle.exportKey('raw', authKey);
    const ikm = concatBufs(ecdhBits, textEncoder.encode(sess.password));
    const hkdfKey = await crypto.subtle.importKey('raw', ikm, 'HKDF', false, ['deriveBits']);
    const rootKey = await crypto.subtle.deriveBits({ name: 'HKDF', hash: 'SHA-512', salt: authRaw, info: textEncoder.encode('root') }, hkdfKey, 256);
    sess.rootKey = rootKey;
    sess.ourEphPriv = sess.ourEcdhPair.privateKey;
    sess.theirEphPub = sess.peerEcdhPub;
    const typingRaw = new Uint8Array(rootKey).slice(0, 16);
    sess.typingKey = await crypto.subtle.importKey('raw', typingRaw, { name: 'AES-GCM', length: 128 }, false, ['encrypt', 'decrypt']);
    sess.handshakeDone = true;
    if (sess.isOfferer) await sendConfirmation(peerId);
    if (sess.pendingConfirm) { const p = sess.pendingConfirm; sess.pendingConfirm = null; await handleConfirmation(peerId, p); }
    if (peerId === activePeerId) {
      document.getElementById('securityCard').style.display = 'flex';
      document.getElementById('sessionFingerprint').textContent = buf2hex(rootKey);
      document.getElementById('passwordPrompt').style.display = 'none';
      document.getElementById('passwordError').style.display = 'none';
    }
  } catch(e) {
    if (peerId === activePeerId) { document.getElementById('passwordError').textContent = '키 생성 실패: ' + e.message; document.getElementById('passwordError').style.display = 'block'; }
  }
}
async function sendConfirmation(peerId) {
  const sess = getSession(peerId);
  if (!sess.rootKey || !sess.dc || sess.dc.readyState !== 'open') return;
  const newKp = await crypto.subtle.generateKey({ name: 'ECDH', namedCurve: 'P-521' }, true, ['deriveKey','deriveBits']);
  sess.ourEphPriv = newKp.privateKey;
  const newChain = await dhRatchet(sess, newKp.privateKey, sess.theirEphPub);
  sess.sendChainKey = newChain; sess.sendMsgNum = 0;
  const pubRaw = await crypto.subtle.exportKey('raw', newKp.publicKey);
  sess.dc.send(JSON.stringify({ type: '__confirm__', dhPub: buf2b64(pubRaw) }));
}
async function handleConfirmation(peerId, data) {
  const sess = getSession(peerId);
  if (!sess.rootKey) { sess.pendingConfirm = data; return; }
  if (data.dhPub) {
    const theirPub = await crypto.subtle.importKey('raw', b642buf(data.dhPub), { name: 'ECDH', namedCurve: 'P-521' }, true, []);
    sess.recvChainKey = await dhRatchet(sess, sess.ourEphPriv, theirPub); sess.recvMsgNum = 0;
    sess.theirEphPub = theirPub;
  }
  sess.confirmed = true;
  if (!sess.isOfferer) await sendConfirmation(peerId);
  if (peerId === activePeerId) {
    document.getElementById('securityCard').style.display = 'flex';
    document.getElementById('sessionFingerprint').textContent = buf2hex(sess.rootKey);
    document.getElementById('passwordPrompt').style.display = 'none';
    document.getElementById('passwordError').style.display = 'none';
  }
  flushOfflineQueue(peerId);
}
async function dhRatchet(sess, ourPriv, theirPub) {
  const dhBits = await crypto.subtle.deriveBits({ name: 'ECDH', public: theirPub }, ourPriv, 521);
  const ikm = concatBufs(dhBits, sess.rootKey);
  const hkdfKey = await crypto.subtle.importKey('raw', ikm, 'HKDF', false, ['deriveBits']);
  const okm = await crypto.subtle.deriveBits({ name: 'HKDF', hash: 'SHA-512', salt: new Uint8Array(32), info: textEncoder.encode('double-ratchet') }, hkdfKey, 512);
  sess.rootKey = okm.slice(0, 32);
  return okm.slice(32, 64);
}
async function symmetricRatchet(chainKey) {
  const ck = await crypto.subtle.importKey('raw', chainKey, { name: 'HMAC', hash: 'SHA-512' }, false, ['sign']);
  const mk = await crypto.subtle.sign('HMAC', ck, new Uint8Array([1]));
  const nk = await crypto.subtle.sign('HMAC', ck, new Uint8Array([2]));
  return { msgKey: mk.slice(0, 32), nextChainKey: nk.slice(0, 32) };
}
async function performSendingRatchet(sess) {
  if (!sess.sendChainKey) {
    const newKp = await crypto.subtle.generateKey({ name: 'ECDH', namedCurve: 'P-521' }, true, ['deriveKey','deriveBits']);
    const newChain = await dhRatchet(sess, newKp.privateKey, sess.theirEphPub);
    sess.sendChainKey = newChain; sess.sendMsgNum = 0;
    sess.ourEphPriv = newKp.privateKey;
    const pubRaw = await crypto.subtle.exportKey('raw', newKp.publicKey);
    return buf2b64(pubRaw);
  }
  return null;
}
async function encryptPayload(sess, obj) {
  const dhPub = await performSendingRatchet(sess);
  const { msgKey, nextChainKey } = await symmetricRatchet(sess.sendChainKey);
  sess.sendChainKey = nextChainKey;
  const seq = sess.sendMsgNum++;
  const iv = crypto.getRandomValues(new Uint8Array(16));
  const padLen = 256 + Math.floor(crypto.getRandomValues(new Uint8Array(1))[0]/256 * 256);
  const padded = { ...obj, _pad: buf2b64(crypto.getRandomValues(new Uint8Array(padLen)).buffer) };
  const key = await crypto.subtle.importKey('raw', msgKey, 'AES-GCM', false, ['encrypt']);
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, textEncoder.encode(JSON.stringify(padded)));
  const result = { seq, iv: Array.from(new Uint8Array(iv)), ct: Array.from(new Uint8Array(ct)) };
  if (dhPub) result.dhPub = dhPub;
  return result;
}
async function decryptPayload(sess, d) {
  if (d.dhPub) {
    const theirPub = await crypto.subtle.importKey('raw', b642buf(d.dhPub), { name: 'ECDH', namedCurve: 'P-521' }, true, []);
    sess.recvChainKey = await dhRatchet(sess, sess.ourEphPriv, theirPub); sess.recvMsgNum = 0;
    sess.theirEphPub = theirPub;
  }
  if (!sess.recvChainKey) throw new Error('no recv chain');
  const { seq, iv, ct } = d;
  while (sess.recvMsgNum < seq) {
    const { nextChainKey } = await symmetricRatchet(sess.recvChainKey);
    sess.recvChainKey = nextChainKey; sess.recvMsgNum++;
  }
  const { msgKey, nextChainKey } = await symmetricRatchet(sess.recvChainKey);
  sess.recvChainKey = nextChainKey; sess.recvMsgNum = seq + 1;
  const key = await crypto.subtle.importKey('raw', msgKey, 'AES-GCM', false, ['decrypt']);
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: new Uint8Array(iv) }, key, new Uint8Array(ct));
  const obj = JSON.parse(textDecoder.decode(plain));
  delete obj._pad;
  return obj;
}

// ============== 메시지 송수신 ==============
async function sendText() {
  if (!activePeerId || await isDestroyed(activePeerId)) return;
  const sess = sessions[activePeerId]; if (!sess) return;
  const inp = document.getElementById('msgInput'); const txt = inp.value.trim(); if (!txt) return;
  const msgId = crypto.randomUUID();
  await sendPayload(sess, { type: 'text', content: txt, id: msgId }, txt, 'me', msgId);
  inp.value = '';
}
async function sendPayload(sess, payload, displayText, who, msgId) {
  if (!sess.dc || sess.dc.readyState !== 'open' || !sess.rootKey || !sess.confirmed) {
    const queue = await getQueue(activePeerId);
    queue.push({ payload, displayText, id: msgId, who, ts: Date.now() });
    await setQueue(activePeerId, queue);
    appendMessage(displayText, who, msgId);
    appendSystemMessage('⏳ 오프라인 대기 중...');
    return;
  }
  try {
    const enc = await encryptPayload(sess, payload);
    sess.dc.send(JSON.stringify({ type: 'msg', ...enc }));
    appendMessage(displayText, who, msgId);
    notifyIfNeeded(displayText);
  } catch(e) {
    const queue = await getQueue(activePeerId);
    queue.push({ payload, displayText, id: msgId, who, ts: Date.now() });
    await setQueue(activePeerId, queue);
    appendMessage(displayText, who, msgId);
    appendSystemMessage('⚠️ 전송 실패, 대기열 저장');
  }
}
async function onMsg(peerId, e) {
  if (await isDestroyed(peerId)) return;
  if (await hasPendingDestroy(peerId)) { await markDestroyed(peerId); if (activePeerId === peerId) goHome(); return; }
  const sess = getSession(peerId);
  if (e.data instanceof ArrayBuffer) { handleBinaryChunk(peerId, e.data); return; }
  try {
    const d = JSON.parse(e.data);
    if (d.type === '__ecdhe__') { handleEcdheMessage(peerId, d); return; }
    if (d.type === '__confirm__') { handleConfirmation(peerId, d); return; }
    if (d.type === '__destroy_req__') { await markDestroyed(d.peerId || peerId); if (activePeerId === peerId) goHome(); return; }
    if (d.type === '__clear_revealed__') { if (activePeerId === peerId) clearRevealedMessages(); return; }
    if (d.type === 'msg') {
      if (!sess.rootKey || !sess.confirmed) { appendEncryptedMessage(d); return; }
      const inner = await decryptPayload(sess, d).catch(() => null);
      if (!inner) return;
      if (inner.id && sess.receivedIds.has(inner.id)) return;
      if (inner.id) sess.receivedIds.add(inner.id);
      switch (inner.type) {
        case 'text': receiveMessage(peerId, inner.content, 'other', inner.id); sendReadReceipt(peerId, inner.id); break;
        case 'emoji': receiveMessage(peerId, inner.content, 'other', inner.id); break;
        case 'media': receiveMessage(peerId, `<img src="${inner.url}" style="max-width:200px;max-height:200px;border-radius:12px;">`, 'other', inner.id); break;
        case 'read': markAsRead(inner.id); break;
        case 'file_start': handleFileStart(peerId, inner); break;
        case 'file_end': if (sess.fileReceive?.id === inner.id) assembleFile(peerId); break;
        case '__destroy__': await markDestroyed(peerId); if (activePeerId === peerId) goHome(); break;
      }
    }
  } catch(e){}
}
async function flushOfflineQueue(peerId) {
  const sess = getSession(peerId);
  if (!sess?.dc || sess.dc.readyState !== 'open' || !sess.rootKey || !sess.confirmed) return;
  const queue = await getQueue(peerId);
  if (!queue.length) return;
  clearQueue(peerId);
  appendSystemMessage(`📬 ${queue.length}개 대기 메시지 전송 중...`);
  for (const item of queue) {
    try {
      const enc = await encryptPayload(sess, item.payload);
      sess.dc.send(JSON.stringify({ type: 'msg', ...enc }));
    } catch(e) { break; }
  }
  appendSystemMessage('📬 대기 메시지 전송 완료');
}
function receiveMessage(peerId, text, who, msgId) {
  const sess = getSession(peerId);
  if (peerId === activePeerId) appendMessage(text, who, msgId);
  else { sess.pendingMessages.push({ text, who, msgId }); notifyIfNeeded(text); renderContactList(); }
}

// ============== UI 메시지 렌더링 ==============
function appendMessage(text, who, msgId) {
  if (!activePeerId) return;
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${who}`;
  if (msgId) div.id = 'msg-' + msgId;
  const bubble = document.createElement('div');
  bubble.className = 'bubble blur-target';
  bubble.innerHTML = escapeHtml(text);
  bubble.setAttribute('data-revealed', 'false');
  const timeSpan = document.createElement('div');
  timeSpan.className = 'time';
  timeSpan.textContent = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  div.appendChild(bubble);
  div.appendChild(timeSpan);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  // 탭 홀드로 보기
  let timer;
  const reveal = () => {
    bubble.classList.add('revealed');
    bubble.setAttribute('data-revealed', 'true');
    setTimeout(() => {
      bubble.classList.remove('revealed');
      bubble.setAttribute('data-revealed', 'false');
    }, 3000);
  };
  bubble.addEventListener('pointerdown', e => {
    if (bubble.classList.contains('locked')) return;
    timer = setTimeout(reveal, 600);
  });
  bubble.addEventListener('pointerup', () => clearTimeout(timer));
  bubble.addEventListener('pointercancel', () => clearTimeout(timer));
  bubble.addEventListener('pointerleave', () => clearTimeout(timer));
}
function appendSystemMessage(text) {
  if (!activePeerId) return;
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg system';
  div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}
function appendEncryptedMessage(data) {
  if (!activePeerId) return;
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg system';
  div.innerHTML = `<div class="bubble" style="font-family:monospace; font-size:0.7rem; color:#94a3b8;">🔒 암호화됨<br>${escapeHtml(JSON.stringify(data).substring(0,100))}</div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}
function clearRevealedMessages() {
  document.querySelectorAll('.bubble[data-revealed="true"]').forEach(b => b.parentElement?.remove());
}
function updateConnectionStatus(ok) {
  const dot = document.getElementById('connDot');
  const label = document.getElementById('connLabel');
  if (dot) dot.className = 'dot ' + (ok ? 'on' : 'off');
  if (label) label.textContent = ok ? '연결됨' : '오프라인';
}

// ============== 기타 기능 ==============
function sendEmoji(emoji) { if (!activePeerId) return; const sess = sessions[activePeerId]; if (!sess) return; sendPayload(sess, { type: 'emoji', content: emoji, id: crypto.randomUUID() }, emoji, 'me'); closeAllPickers(); }
function sendMedia(url) { if (!activePeerId) return; const sess = sessions[activePeerId]; if (!sess) return; sendPayload(sess, { type: 'media', url, id: crypto.randomUUID() }, `<img src="${url}" style="max-width:200px;max-height:200px;border-radius:12px;">`, 'me'); closeAllPickers(); }
async function addMediaUrl() {
  const url = document.getElementById('mediaSearch').value.trim(); if (!url) return;
  let favs = await getItem(MEDIA_FAV_KEY) || [];
  if (!favs.includes(url)) { favs.push(url); await setItem(MEDIA_FAV_KEY, favs); }
  document.getElementById('mediaSearch').value = '';
  filterMedia(); sendMedia(url);
}
async function uploadSticker(files) {
  if (!files || !files.length) return;
  for (const file of files) {
    const reader = new FileReader();
    reader.onload = async e => {
      const url = e.target.result;
      let favs = await getItem(MEDIA_FAV_KEY) || [];
      favs.push(url); await setItem(MEDIA_FAV_KEY, favs);
      filterMedia(); sendMedia(url);
    };
    reader.readAsDataURL(file);
  }
}
async function filterMedia() {
  const query = document.getElementById('mediaSearch').value.toLowerCase();
  const favs = await getItem(MEDIA_FAV_KEY) || [];
  document.getElementById('mediaGrid').innerHTML = favs.filter(u => u.toLowerCase().includes(query)).map(u => `<div class="picker-item"><img src="${u}" style="width:64px;height:64px;object-fit:cover;border-radius:8px;" onclick="sendMedia('${u}')"></div>`).join('');
}
async function sendReadReceipt(peerId, msgId) {
  const sess = sessions[peerId];
  if (!sess?.rootKey || !sess.confirmed || !sess.dc || sess.dc.readyState !== 'open') return;
  try { const enc = await encryptPayload(sess, { type: 'read', id: msgId }); sess.dc.send(JSON.stringify({ type: 'msg', ...enc })); } catch(e){}
}
function markAsRead(msgId) {
  const el = document.getElementById('msg-' + msgId);
  if (el) { const t = el.querySelector('.time'); if (t) t.innerHTML += ' <span class="read-status">✓✓</span>'; }
}
// 파일 처리
function handleFileStart(peerId, inner) {
  const sess = sessions[peerId]; if (!sess) return;
  sess.fileReceive = { id: inner.id, name: inner.name, size: inner.size, fek: b642buf(inner.fek), chunks: [], received: 0 };
  receiveMessage(peerId, `📥 ${inner.name} (${formatBytes(inner.size)}) 수신 중...`, 'other');
}
function handleBinaryChunk(peerId, buf) {
  const sess = sessions[peerId];
  if (!sess?.fileReceive) return;
  sess.fileReceive.chunks.push(new Uint8Array(buf));
  sess.fileReceive.received += buf.byteLength;
}
async function assembleFile(peerId) {
  const sess = sessions[peerId]; if (!sess?.fileReceive) return;
  const blob = new Blob(sess.fileReceive.chunks);
  const iv = blob.slice(0, 12);
  const ct = blob.slice(12);
  const key = await crypto.subtle.importKey('raw', sess.fileReceive.fek, 'AES-GCM', false, ['decrypt']);
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: await iv.arrayBuffer() }, key, await ct.arrayBuffer());
  const url = URL.createObjectURL(new Blob([plain]));
  receiveMessage(peerId, `<a href="${url}" download="${escapeHtml(sess.fileReceive.name)}" style="color:var(--accent);">📎 ${escapeHtml(sess.fileReceive.name)} 다운로드</a>`, 'other');
  sess.fileReceive = null;
}
async function handleFiles(files) { for (const f of files) await sendFile(f); }
async function sendFile(file) {
  if (!activePeerId || await isDestroyed(activePeerId)) return;
  const sess = sessions[activePeerId];
  if (!sess?.dc || sess.dc.readyState !== 'open' || !sess.rootKey || !sess.confirmed) { appendSystemMessage('⚠️ 파일 전송 불가'); return; }
  const fileId = crypto.randomUUID();
  const fek = await crypto.subtle.generateKey({ name: 'AES-GCM', length: 256 }, true, ['encrypt']);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const fekRaw = await crypto.subtle.exportKey('raw', fek);
  const fileBuf = await file.arrayBuffer();
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, fek, fileBuf);
  const encData = new Uint8Array(iv.byteLength + ct.byteLength);
  encData.set(iv, 0); encData.set(new Uint8Array(ct), iv.byteLength);
  const metaEnc = await encryptPayload(sess, { type: 'file_start', id: fileId, name: file.name, size: encData.byteLength, fek: buf2b64(fekRaw) });
  sess.dc.send(JSON.stringify({ type: 'msg', ...metaEnc }));
  appendMessage(`📤 ${file.name} 전송 중... (${formatBytes(encData.byteLength)})`, 'me');
  const chunkSize = 64*1024;
  for (let offset = 0; offset < encData.byteLength; offset += chunkSize) {
    const end = Math.min(offset + chunkSize, encData.byteLength);
    sess.dc.send(encData.slice(offset, end).buffer);
    await new Promise(r => setTimeout(r, 5));
  }
  const endEnc = await encryptPayload(sess, { type: 'file_end', id: fileId });
  sess.dc.send(JSON.stringify({ type: 'msg', ...endEnc }));
  appendMessage(`📤 ${file.name} 전송 완료`, 'me');
}
// 타이핑
async function encryptTyping(sess, state) {
  if (!sess.typingKey) return null;
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, sess.typingKey, textEncoder.encode(state));
  return { iv: Array.from(new Uint8Array(iv)), ct: Array.from(new Uint8Array(ct)) };
}
async function decryptTyping(sess, data) {
  if (!sess.typingKey) throw new Error('no typing key');
  const iv = new Uint8Array(data.iv), ct = new Uint8Array(data.ct);
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, sess.typingKey, ct);
  return textDecoder.decode(plain);
}
function sendTyping(state) {
  const sess = sessions[activePeerId];
  if (sess?.typingDC && sess.typingDC.readyState === 'open' && sess.typingKey) {
    encryptTyping(sess, state ? '1' : '0').then(enc => enc && sess.typingDC.send(JSON.stringify(enc)));
  }
}

// 유틸
function buf2hex(b) { return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join(''); }
function concatBufs(...bufs) { let len=bufs.reduce((a,b)=>a+b.byteLength,0), tmp=new Uint8Array(len), off=0; bufs.forEach(b=>{tmp.set(new Uint8Array(b),off);off+=b.byteLength;}); return tmp.buffer; }
function escapeHtml(s) { return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }
function buf2b64(b) { return btoa(String.fromCharCode(...new Uint8Array(b))); }
function b642buf(s) { return Uint8Array.from(atob(s),c=>c.charCodeAt(0)).buffer; }
function formatBytes(b) { return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(1)+' MB'; }
function notifyIfNeeded(content) { if (document.visibilityState === 'hidden' && Notification.permission === 'granted') new Notification('P2P 비밀채팅', { body: content }); }
function closeAllPickers() { document.querySelectorAll('.picker-overlay.active').forEach(p => p.classList.remove('active')); }
function togglePicker(type) {
  const picker = document.getElementById(type + 'Picker');
  if (picker.classList.contains('active')) closeAllPickers();
  else { closeAllPickers(); picker.classList.add('active'); }
}
function waitIce(pc) { return new Promise(r => { if (pc.iceGatheringState === 'complete') r(); else pc.addEventListener('icegatheringstatechange', () => { if (pc.iceGatheringState === 'complete') r(); }); }); }

// 연락처 목록 그리기
async function renderContactList() {
  const container = document.getElementById('contactList'); if (!container) return;
  const contacts = await getContacts();
  const alive = [];
  for (const c of contacts) { if (!(await isDestroyed(c.id))) alive.push(c); }
  container.innerHTML = alive.map(c => {
    const sess = sessions[c.id];
    const online = sess?.isOnline;
    const unread = sess?.pendingMessages?.length || 0;
    const badge = unread ? `<span class="unread-badge">${unread}</span>` : '';
    return `<div class="contact-card ${c.id === activePeerId ? 'active' : ''}" data-peer-id="${c.id}">
      <div class="contact-avatar">${escapeHtml(c.name).charAt(0)}<span class="contact-dot ${online ? 'on' : 'off'}"></span></div>
      <div class="contact-info"><div class="contact-name">${escapeHtml(c.name)} ${badge}</div><div class="contact-status">${online ? '온라인' : '오프라인'}</div></div>
    </div>`;
  }).join('');
  document.querySelectorAll('.contact-card').forEach(el => {
    el.addEventListener('click', () => selectPeer(el.dataset.peerId));
  });
}

// URL 해시 처리
async function checkHash() {
  const h = location.hash.substring(1); if (!h) return;
  const p = new URLSearchParams(h);
  if (p.has('offer') && p.has('peer')) {
    const peerId = p.get('peer'); if (await isDestroyed(peerId)) return;
    const offer = decodeSDP(p.get('offer'));
    if (!(await getContacts()).find(c => c.id === peerId)) await addContact(peerId, '상대방');
    activePeerId = peerId; const sess = getSession(peerId); sess.isOfferer = false;
    initPC(peerId);
    await sess.pc.setRemoteDescription(offer);
    const ans = await sess.pc.createAnswer(); await sess.pc.setLocalDescription(ans); await waitIce(sess.pc);
    const answerB64 = encodeSDP(sess.pc.localDescription);
    showView('chatScreen'); document.getElementById('chatTitle').textContent = '상대방';
    document.getElementById('passwordPrompt').style.display = 'block';
    document.getElementById('answerModalLink').textContent = location.origin + location.pathname + '#answer=' + answerB64 + '&peer=' + peerId;
    document.getElementById('answerModal').classList.remove('hidden');
    renderContactList();
  } else if (p.has('answer') && p.has('peer')) {
    const peerId = p.get('peer'); if (await isDestroyed(peerId)) return;
    const answer = decodeSDP(p.get('answer'));
    if (!(await getContacts()).find(c => c.id === peerId)) await addContact(peerId, '상대방');
    let sess = sessions[peerId];
    if (!sess || !sess.pc) {
      sess = getSession(peerId); sess.isOfferer = true;
      initPC(peerId); sess.dc = sess.pc.createDataChannel('chat', { ordered: true }); setupDC(peerId);
    }
    if (sess.pc) {
      await sess.pc.setRemoteDescription(answer);
      activePeerId = peerId; showView('chatScreen');
      const contacts = await getContacts(); document.getElementById('chatTitle').textContent = contacts.find(c => c.id === peerId)?.name || '채팅';
      document.getElementById('passwordPrompt').style.display = 'block';
    }
    renderContactList();
  }
}
window.addEventListener('hashchange', checkHash);

// 페이지 숨김/언로드 시 공개된 메시지 제거
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden' && activePeerId) {
    clearRevealedMessages();
    const sess = sessions[activePeerId];
    if (sess) {
      const msg = JSON.stringify({ type: '__clear_revealed__' });
      [sess.dc, sess.typingDC].forEach(ch => { if (ch?.readyState === 'open') try { ch.send(msg); } catch(e){} });
    }
  }
});
window.addEventListener('beforeunload', () => { if (activePeerId) clearRevealedMessages(); });

// 마스터 비밀번호 UI 초기화
document.getElementById('masterPasswordUI').style.display = 'flex';
document.getElementById('simpleMode').classList.add('hidden');
