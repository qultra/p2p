  // ─────────────── 암호화 ───────────────
  async function genSign(){return await crypto.subtle.generateKey(ECDSA,true,['sign','verify']);}
  async function signData(pr,data){const sig=await crypto.subtle.sign({name:'ECDSA',hash:'SHA-512'},pr,s2b(data));return b2b64(sig);}
  async function verifySig(pu,data,sig64){try{const sig=b64toBuf(sig64);return await crypto.subtle.verify({name:'ECDSA',hash:'SHA-512'},pu,sig,s2b(data));}catch{return false;}}
  async function deriveKey(pid){
    const s=sessions[pid];
    try{
      const km=await crypto.subtle.importKey('raw',s2b(s.pw),'PBKDF2',false,['deriveKey']);
      s.auth=await crypto.subtle.deriveKey({name:'PBKDF2',salt:s.salt,iterations:PBK2.iterations,hash:'SHA-512'},km,AES256,true,['encrypt','decrypt']);
      const dhBits=await crypto.subtle.deriveBits({name:'ECDH',public:s.pEDH},s.oEDH.privateKey,521);
      const authRaw=await crypto.subtle.exportKey('raw',s.auth);
      const ikm=cat(dhBits,s2b(s.pw));
      const hkdf=await crypto.subtle.importKey('raw',ikm,'HKDF',false,['deriveBits']);
      s.root=await crypto.subtle.deriveBits({name:'HKDF',hash:'SHA-512',salt:authRaw,info:s2b('root')},hkdf,256);
      s.dispKey=s.root.slice(0,32);
      s.oEK=s.oEDH;s.tEPub=s.pEDH;
      s.hsDone=true;s.conf=true;
      if(!s.manual&&s.isOff)await sendConf(pid);
      if(s.pCnf){const p=s.pCnf;s.pCnf=null;await handleConf(pid,p);}
      if(pid===activePeerId){
        document.getElementById('passwordPrompt').style.display='none';
        document.getElementById('securityProgress').style.display='none';
        setAutoStatus('✅ 보안 세션 완료 — 안전하게 채팅하세요',true);
      }
    }catch(e){
      if(pid===activePeerId){
        document.getElementById('passwordError').textContent='키 생성 실패. 다시 시도해주세요.';
        document.getElementById('passwordError').style.display='block';
      }
    }
  }
  async function dhR(s,ourPriv,theirPub){
    const db=await crypto.subtle.deriveBits({name:'ECDH',public:theirPub},ourPriv,521);
    const ik=cat(db,s.root);const hk=await crypto.subtle.importKey('raw',ik,'HKDF',false,['deriveBits']);
    const ok=await crypto.subtle.deriveBits({name:'HKDF',hash:'SHA-512',salt:new Uint8Array(32),info:s2b('double-ratchet')},hk,512);
    s.root=ok.slice(0,32);return ok.slice(32,64);
  }
  async function symR(ck){
    const c=await crypto.subtle.importKey('raw',ck,{name:'HMAC',hash:'SHA-512'},false,['sign']);
    const mk=await crypto.subtle.sign('HMAC',c,new Uint8Array([1]));
    const nk=await crypto.subtle.sign('HMAC',c,new Uint8Array([2]));
    return{msgKey:mk.slice(0,32),nextChainKey:nk.slice(0,32)};
  }
  async function needSndR(s){
    if(!s.sCK){
      const nkp=await crypto.subtle.generateKey(ECDH,true,['deriveKey','deriveBits']);s.oEK=nkp;
      const nck=await dhR(s,nkp.privateKey,s.tEPub);s.sCK=nck;s.sn=0;
      const pub=await crypto.subtle.exportKey('raw',nkp.publicKey);return b2b64(pub);
    }return null;
  }
  async function encAndSign(s,obj){
    const dhPub=await needSndR(s);const{msgKey,nextChainKey}=await symR(s.sCK);s.sCK=nextChainKey;
    const seq=s.sn++;const iv=crypto.getRandomValues(new Uint8Array(16));
    const padLen=PAD_MIN+Math.floor(crypto.getRandomValues(new Uint8Array(1))[0]/256*(PAD_MAX-PAD_MIN));
    const padded={...obj,_pad:b2b64(crypto.getRandomValues(new Uint8Array(padLen)).buffer)};
    const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},await crypto.subtle.importKey('raw',msgKey,'AES-GCM',false,['encrypt']),s2b(JSON.stringify(padded)));
    const res={seq,iv:Array.from(new Uint8Array(iv)),ct:Array.from(new Uint8Array(ct))};
    if(dhPub)res.dhPub=dhPub;if(s.oSK)res.sig=await signData(s.oSK.privateKey,JSON.stringify(obj));
    return res;
  }
  async function procRcvR(s,dhPubB64){
    const pub=b64toBuf(dhPubB64);const pp=await crypto.subtle.importKey('raw',pub,ECDH,true,[]);
    const nck=await dhR(s,s.oEK.privateKey,pp);s.rCK=nck;s.rn=0;s.tEPub=pp;
  }
  async function decAndVerify(s,d){
    if(d.dhPub)await procRcvR(s,d.dhPub);if(!s.rCK)throw new Error('no rcv chain');
    const{seq,iv,ct}=d;if(seq<s.rn)return null;
    while(s.rn<seq){const{nextChainKey}=await symR(s.rCK);s.rCK=nextChainKey;s.rn++;}
    const{msgKey,nextChainKey}=await symR(s.rCK);s.rCK=nextChainKey;s.rn=seq+1;
    const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:new Uint8Array(iv)},await crypto.subtle.importKey('raw',msgKey,'AES-GCM',false,['decrypt']),new Uint8Array(ct));
    const obj=JSON.parse(td.decode(plain));delete obj._pad;
    if(d.sig&&s.pSK){const v=await verifySig(s.pSK,JSON.stringify(obj),d.sig);if(!v)throw new Error('sig fail');}
    return obj;
  }

  // 디스플레이 암호화
  async function getDisp(s,plain){
    const dk=await crypto.subtle.generateKey({name:'AES-GCM',length:128},true,['encrypt']);
    const iv=crypto.getRandomValues(new Uint8Array(12));
    const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},dk,s2b(plain));
    const raw=await crypto.subtle.exportKey('raw',dk);
    const rk=await crypto.subtle.importKey('raw',s.dispKey.slice(0,16),'AES-GCM',false,['encrypt']);
    const kiv=crypto.getRandomValues(new Uint8Array(12));
    const ek=await crypto.subtle.encrypt({name:'AES-GCM',iv:kiv},rk,raw);
    return{iv:Array.from(iv),ct:Array.from(new Uint8Array(ct)),keyIv:Array.from(kiv),encKey:Array.from(new Uint8Array(ek))};
  }
  async function decDisp(s,cipher){
    const rk=await crypto.subtle.importKey('raw',s.dispKey.slice(0,16),'AES-GCM',false,['decrypt']);
    const raw=await crypto.subtle.decrypt({name:'AES-GCM',iv:new Uint8Array(cipher.keyIv)},rk,new Uint8Array(cipher.encKey));
    const dk=await crypto.subtle.importKey('raw',raw,'AES-GCM',false,['decrypt']);
    const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:new Uint8Array(cipher.iv)},dk,new Uint8Array(cipher.ct));
    return td.decode(plain);
  }

  function makeBubble(s,cipher,who,mid,time,pid,timer){
    const b=document.createElement('div');b.className='bubble encrypted-msg';
    b.dataset.cipher=JSON.stringify(cipher);b.dataset.revealed='false';b.dataset.msgid=mid;
    let tb='';if(timer>0){const exp=Date.now()+timer*60*1000;addTimer(pid,mid,exp);const ds=timer>=1440?'1일':timer>=60?`${Math.floor(timer/60)}시간`:`${timer}분`;tb=` <span class="timer-badge">⏳${ds}</span>`;}
    b.innerHTML=`<span class="encrypted-placeholder">🔒 길게 눌러서 확인${tb}</span><div class="time">${time}</div>`;
    const del=document.createElement('button');del.className='msg-delete-btn';del.textContent='✕';del.type='button';
    del.addEventListener('click',e=>{e.stopPropagation();delMsg(mid);});b.appendChild(del);
    let pt;
    b.addEventListener('pointerdown',e=>{if(isLocked||!s.dispKey)return;pt=setTimeout(async()=>{if(b.dataset.revealed==='true')return;try{const plain=await decDisp(s,JSON.parse(b.dataset.cipher));b.innerHTML=`${esc(plain)}${tb}<div class="time">${time}</div>`;b.dataset.revealed='true';const d2=document.createElement('button');d2.className='msg-delete-btn';d2.textContent='✕';d2.type='button';d2.addEventListener('click',ev=>{ev.stopPropagation();delMsg(mid);});b.appendChild(d2);setTimeout(()=>{if(b&&b.dataset.revealed==='true'){b.innerHTML=`<span class="encrypted-placeholder">🔒 길게 눌러서 확인${tb}</span><div class="time">${time}</div>`;b.dataset.revealed='false';const d3=document.createElement('button');d3.className='msg-delete-btn';d3.textContent='✕';d3.type='button';d3.addEventListener('click',e3=>{e3.stopPropagation();delMsg(mid);});b.appendChild(d3);}},3000);}catch{}},600);});
    b.addEventListener('pointerup',()=>clearTimeout(pt));b.addEventListener('pointercancel',()=>clearTimeout(pt));b.addEventListener('pointerleave',()=>clearTimeout(pt));
    return b;
  }

  async function addEncDisp(pid,plain,who,mid,timer=DEFAULT_TIMER){
    if(pid!==activePeerId||isDest(pid)||isLocked)return;
    const s=sessions[pid];if(!s||!s.dispKey){addMsgPlain(pid,plain,who,mid);return;}
    try{
      const cipher=await getDisp(s,plain);const c=document.getElementById('messages');
      const d=document.createElement('div');d.className='msg '+(who==='me'?'me':who==='other'?'other':'system');
      if(mid)d.id='msg-'+mid;const time=new Date().toLocaleTimeString();
      const b=makeBubble(s,cipher,who,mid,time,pid,timer);d.appendChild(b);
      c.appendChild(d);c.scrollTop=c.scrollHeight;
    }catch(e){addMsgPlain(pid,plain,who,mid);}
  }
  function addMsgPlain(pid,text,who,mid){
    const c=document.getElementById('messages');const d=document.createElement('div');
    d.className='msg '+(who==='me'?'me':who==='other'?'other':'system');if(mid)d.id='msg-'+mid;
    const del=document.createElement('button');del.className='msg-delete-btn';del.textContent='✕';del.type='button';
    del.addEventListener('click',e=>{e.stopPropagation();delMsg(mid);});
    d.innerHTML=`<div class="bubble">${esc(text)}<div class="time">${new Date().toLocaleTimeString()}</div></div>`;
    d.querySelector('.bubble').appendChild(del);c.appendChild(d);c.scrollTop=c.scrollHeight;
  }
  function addMsg(pid,text,who,mid){if(pid!==activePeerId||isDest(pid)||isLocked)return;addMsgPlain(pid,text,who,mid);}
  async function dispMsg(pid,text,who,mid){await addEncDisp(pid,text,who,mid);}
  function removeUI(mid){const m=document.getElementById('msg-'+mid);if(m)m.remove();}
  function sendDelete(pid,mid){const s=sessions[pid];if(!s||!s.root||!s.conf)return;if(s.manual){removeUI(mid);return;}removeUI(mid);if(s.pending)s.pending=s.pending.filter(m=>m.msgId!==mid);const pl={type:'delete',id:mid};if(s.dc&&s.dc.readyState==='open'){encAndSign(s,pl).then(enc=>s.dc.send(JSON.stringify({type:'msg',...enc}))).catch(()=>{});}}
  function delMsg(mid){const s=activePeerId?sessions[activePeerId]:null;if(s)sendDelete(activePeerId,mid);}
  function handleDel(pid,mid){const s=sessions[pid];if(!s)return;removeUI(mid);s.pending=s.pending.filter(m=>m.msgId!==mid);s.recIds.delete(mid);}

  // 메시지 전송
  async function sendText(){
    if(isLocked){alert('화면이 잠겨 있습니다');return;}
    if(!activePeerId||isDest(activePeerId))return;
    const s=sessions[activePeerId];
    if(!s||!s.root||!s.conf){
      // 자동으로 세션 수립 시도
      if(s&&s.pw&&!s.conf){
        setAutoStatus('⏳ 보안 세션 수립 중... 잠시 후 다시 시도해주세요',false);
        if(s.salt&&s.oEDH&&s.pEDH)await deriveKey(activePeerId);
      }
      if(!s||!s.conf){alert('보안 세션이 아직 준비되지 않았습니다. 비밀번호를 확인해주세요.');return;}
    }
    const inp=document.getElementById('msgInput');const txt=inp.value.trim();if(!txt)return;
    const mid=uuid();const timer=s.autoTimer?DEFAULT_TIMER:0;
    const pl={type:'text',content:txt,id:mid,timer};
    await sendPl(s,pl,txt,mid,timer);inp.value='';
  }
  async function sendPl(s,pl,display,mid,timer=DEFAULT_TIMER){
    if(s.manual)return;
    if(s.dc&&s.dc.readyState==='open'&&s.root&&s.conf){
      try{const enc=await encAndSign(s,pl);s.dc.send(JSON.stringify({type:'msg',...enc}));await addEncDisp(activePeerId,display,'me',mid,timer);return;}catch{}
    }
    if(s.root&&s.conf){
      try{const enc=await encAndSign(s,pl);const q=loadQ(activePeerId);q.push(enc);saveQ(activePeerId,q);await addEncDisp(activePeerId,display,'me',mid,timer);addMsg(activePeerId,'⏳ 오프라인 — 연결되면 자동 전송됩니다','system');}catch{addMsg(activePeerId,'전송 실패','system');}
    }
  }

  async function recvEnc(pid,plain,who,mid,tmr=DEFAULT_TIMER){
    const s=sessions[pid];if(!s)return;
    if(pid===activePeerId)await addEncDisp(pid,plain,who,mid,tmr);
    else{s.pending.push({content:plain,who,msgId:mid,timer:tmr});renderCon();}
  }

  // WebRTC
  function showName(){document.getElementById('nameModal').classList.remove('hidden');document.getElementById('peerNameInput').focus();}
  function closeName(){document.getElementById('nameModal').classList.add('hidden');}
  function showJoin(){showView('answerPanel');}
  function waitIce(pc){return new Promise(resolve=>{if(pc.iceGatheringState==='complete')resolve();else pc.addEventListener('icegatheringstatechange',()=>{if(pc.iceGatheringState==='complete')resolve();});});}
  function initPC(pid){
    const s=sessions[pid];if(s.pc)s.pc.close();
    s.pc=new RTCPeerConnection({iceServers:ICE});
    s.pc.oniceconnectionstatechange=()=>{
      const st=s.pc.iceConnectionState;
      if(st==='connected'||st==='completed'){s.online=true;upConn(true);renderCon();s.reconn=0;if(hasPend(pid))trySendDestroy(pid);if(s.conf)flushQ(pid);}
      else if(st==='disconnected'||st==='failed'||st==='closed'){s.online=false;upConn(false);if(st==='failed'&&s.reconn<3){s.reconn++;setTimeout(()=>{if(s.pc&&s.pc.iceConnectionState==='failed')try{s.pc.restartIce();}catch{}},2000);}}
    };
    s.pc.ondatachannel=e=>{if(e.channel.label==='chat'){s.dc=e.channel;setupDC(pid);}else if(e.channel.label==='typing'){s.tyDC=e.channel;setupTyDC(pid);}};
  }
  function setupDC(pid){
    const s=sessions[pid];if(!s?.dc)return;
    s.dc.onopen=()=>{if(isDest(pid))return;s.online=true;upConn(true);renderCon();if(hasPend(pid)){trySendDestroy(pid);return;}if(s.hsDone){s.hsDone=false;s.root=null;s.dispKey=null;s.sCK=null;s.rCK=null;s.conf=false;clearQ(pid);startEx(pid);}else if(!s.hsDone&&!s.root){if(!s.oEDH)startEx(pid);}else{flushQ(pid);}};
    s.dc.onmessage=e=>onMsg(pid,e);s.dc.onclose=()=>{s.online=false;upConn(false);renderCon();};
  }
  function setupTyDC(pid){
    const s=sessions[pid];if(!s?.tyDC)return;
    s.tyDC.onmessage=e=>{if(typeof e.data==='string'){try{const d=JSON.parse(e.data);if(d.type==='__destroy_req__'){markDest(d.peerId||pid);goHome();return;}}catch{}}};
  }
  async function startEx(pid){
    const s=sessions[pid];
    try{
      const kp=await crypto.subtle.generateKey(ECDH,true,['deriveKey','deriveBits']);s.oEDH={privateKey:kp.privateKey,publicKey:kp.publicKey};
      const sk=await genSign();s.oSK=sk;
      const pub=await crypto.subtle.exportKey('raw',s.oEDH.publicKey);const spub=await crypto.subtle.exportKey('spki',sk.publicKey);
      if(s.isOff){s.salt=crypto.getRandomValues(new Uint8Array(SALT_SIZE));if(s.dc&&s.dc.readyState==='open')s.dc.send(JSON.stringify({type:'__ecdhe__',salt:b2b64(s.salt.buffer),pubKey:b2b64(pub),signPubKey:b2b64(spub)}));}
      else{if(s.dc&&s.dc.readyState==='open')s.dc.send(JSON.stringify({type:'__ecdhe__',pubKey:b2b64(pub),signPubKey:b2b64(spub)}));}
    }catch(e){addMsg(pid,'키 교환 오류','system');}
  }
  async function handleEcdhe(pid,d){
    const s=sessions[pid];if(s.hsDone)return;
    try{
      if(d.salt)s.salt=new Uint8Array(b64toBuf(d.salt));s.pEDH=await crypto.subtle.importKey('raw',b64toBuf(d.pubKey),ECDH,true,[]);
      if(d.signPubKey)s.pSK=await crypto.subtle.importKey('spki',b64toBuf(d.signPubKey),ECDSA,true,['verify']);
      if(s.pw&&s.oEDH&&s.pEDH&&s.salt)await deriveKey(pid);
    }catch(e){addMsg(pid,'키 처리 실패','system');}
  }
  async function sendConf(pid){
    const s=sessions[pid];if(!s.root||!s.dc||s.dc.readyState!=='open')return;
    const nkp=await crypto.subtle.generateKey(ECDH,true,['deriveKey','deriveBits']);s.oEK=nkp;
    const nck=await dhR(s,nkp.privateKey,s.tEPub);s.sCK=nck;s.sn=0;
    const pub=await crypto.subtle.exportKey('raw',nkp.publicKey);
    const enc=await encAndSign(s,{type:'__confirm__',dhPub:b2b64(pub)});s.dc.send(JSON.stringify({type:'msg',...enc}));
  }
  async function handleConf(pid,d){
    const s=sessions[pid];if(!s.root){s.pCnf=d;return;}
    if(d.sig&&s.pSK){const v=await verifySig(s.pSK,JSON.stringify({dhPub:d.dhPub}),d.sig);if(!v){addMsg(pid,'⚠️ 서명 검증 실패','system');return;}}
    if(d.dhPub)await procRcvR(s,d.dhPub);s.conf=true;if(!s.isOff)await sendConf(pid);
    if(pid===activePeerId){document.getElementById('passwordPrompt').style.display='none';setAutoStatus('✅ 보안 세션 완료',true);}
    flushQ(pid);
  }
  async function flushQ(pid){
    const s=sessions[pid];if(!s?.dc||s.dc.readyState!=='open'||!s.root||!s.conf)return;
    const q=loadQ(pid);if(!q.length)return;clearQ(pid);addMsg(pid,`📬 ${q.length}개 메시지 전송 중`,'system');
    for(const enc of q){try{s.dc.send(JSON.stringify({type:'msg',...enc}));}catch{const r=loadQ(pid);r.push(enc);saveQ(pid,r);break;}}
    if(!loadQ(pid).length)addMsg(pid,'✅ 모두 전송 완료','system');
  }
  function onMsg(pid,e){
    if(isDest(pid))return;if(hasPend(pid)){markDest(pid);goHome();return;}const s=sessions[pid];if(!s)return;
    if(e.data instanceof ArrayBuffer)return;
    try{
      const d=JSON.parse(e.data);if(d.type==='__ecdhe__'){handleEcdhe(pid,d);return;}
      if(d.type==='__destroy_req__'){markDest(d.peerId||pid);goHome();return;}
      if(d.type==='msg'){if(!s.root||!s.conf)return;
        decAndVerify(s,d).then(inner=>{if(!inner)return;if(inner.id&&s.recIds.has(inner.id))return;if(inner.id)s.recIds.add(inner.id);
          const tmr=inner.timer||DEFAULT_TIMER;
          switch(inner.type){case'text':recvEnc(pid,inner.content,'other',inner.id,tmr);break;case'delete':handleDel(pid,inner.id);break;case'__confirm__':handleConf(pid,inner);break;case'__destroy__':markDest(pid);goHome();break;}
        }).catch(()=>{});
      }
    }catch{}
  }

  // 비밀번호 제출 → 자동 키 교환
  async function submitPw(){
    if(!activePeerId)return;const s=sessions[activePeerId];if(!s)return;
    const pw=document.getElementById('chatPasswordInput').value.trim();
    if(!pw){document.getElementById('passwordError').textContent='비밀번호를 입력해주세요';document.getElementById('passwordError').style.display='block';return;}
    s.pw=pw;document.getElementById('passwordError').style.display='none';
    document.getElementById('securityProgress').style.display='block';
    document.getElementById('progressFill').style.width='30%';
    setAutoStatus('🔐 보안 세션 수립 중...',false);

    if(!s.oEDH){
      // 자동 키 생성
      const kp=await crypto.subtle.generateKey(ECDH,true,['deriveKey','deriveBits']);s.oEDH={privateKey:kp.privateKey,publicKey:kp.publicKey};
      const sk=await genSign();s.oSK=sk;s.salt=crypto.getRandomValues(new Uint8Array(SALT_SIZE));
    }
    if(!webrtcAvailable||s.manual){
      // 수동 모드: 공개키 교환 필요
      const pubRaw=await crypto.subtle.exportKey('raw',s.oEDH.publicKey);
      const signPub=await crypto.subtle.exportKey('spki',s.oSK.publicKey);
      const myPubData={salt:b2b64(s.salt.buffer),pubKey:b2b64(pubRaw),signPubKey:b2b64(signPub)};
      document.getElementById('progressFill').style.width='60%';
      setAutoStatus('📋 상대방의 공개키가 필요합니다. 아래 키를 복사해서 상대에게 보내고, 상대의 키를 받아 붙여넣으세요.',false);
      // 공개키 표시 및 입력창 추가
      const pp=document.getElementById('passwordPrompt');
      pp.innerHTML=`
        <strong>🔑 키 교환</strong>
        <p class="text-sub mb8">1. 내 공개키 복사 → 상대에게 전달<br>2. 상대의 공개키를 붙여넣기</p>
        <button type="button" class="btn mt8" id="copyMyPubInline">📋 내 공개키 복사</button>
        <textarea id="remotePubInline" rows="3" placeholder="상대방의 공개키(JSON)를 여기에 붙여넣으세요" class="mt8"></textarea>
        <button type="button" class="btn primary mt8" id="applyRemoteInline">✅ 키 교환 완료</button>
        <div class="progress-bar mt8"><div class="progress-fill" style="width:60%;" id="progressFill2"></div></div>
      `;
      document.getElementById('copyMyPubInline').onclick=async()=>{await navigator.clipboard.writeText(JSON.stringify(myPubData));alert('복사되었습니다! 상대방에게 전달하세요.');};
      document.getElementById('applyRemoteInline').onclick=async()=>{
        const remoteStr=document.getElementById('remotePubInline').value.trim();if(!remoteStr)return;
        try{const remote=JSON.parse(remoteStr);if(remote.salt)s.salt=new Uint8Array(b64toBuf(remote.salt));s.pEDH=await crypto.subtle.importKey('raw',b64toBuf(remote.pubKey),ECDH,true,[]);if(remote.signPubKey)s.pSK=await crypto.subtle.importKey('spki',b64toBuf(remote.signPubKey),ECDSA,true,['verify']);await deriveKey(activePeerId);}catch(e){alert('키 적용 실패: '+e.message);}
      };
    }else{
      // WebRTC 모드: 자동 진행
      document.getElementById('progressFill').style.width='80%';
      if(s.isOff){
        const pub=await crypto.subtle.exportKey('raw',s.oEDH.publicKey);
        const spub=await crypto.subtle.exportKey('spki',s.oSK.publicKey);
        if(s.dc&&s.dc.readyState==='open')s.dc.send(JSON.stringify({type:'__ecdhe__',salt:b2b64(s.salt.buffer),pubKey:b2b64(pub),signPubKey:b2b64(spub)}));
        setAutoStatus('⏳ 상대방의 응답을 기다리는 중...',false);
      }
    }
  }

  // WebRTC 채팅 생성
  async function newWebRTCChat(){
    const nm=document.getElementById('peerNameInput').value.trim();if(!nm)return alert('이름을 입력하세요');
    closeName();const id=uuid();addCon(id,nm);activePeerId=id;const s=getSess(id);s.isOff=true;
    showView('offerPanel');document.getElementById('offerLinkDisplay').textContent='생성 중...';
    initPC(id);s.dc=s.pc.createDataChannel('chat',{ordered:true});s.tyDC=s.pc.createDataChannel('typing',{ordered:false,maxRetransmits:0});
    setupDC(id);setupTyDC(id);
    s.pc.createOffer().then(o=>s.pc.setLocalDescription(o)).then(()=>waitIce(s.pc)).then(()=>{
      const offer=encSDP(s.pc.localDescription);document.getElementById('offerLinkDisplay').textContent=location.origin+location.pathname+'#offer='+offer+'&peer='+id;
    }).catch(()=>{document.getElementById('offerLinkDisplay').textContent='생성 실패. 다시 시도해주세요.';});
    renderCon();
  }
  async function createAns(){
    const t=document.getElementById('remoteOfferSDP').value.trim();if(!t)return;
    let offerS=t,pid;if(t.startsWith('http')){const u=new URL(t);const hp=new URLSearchParams(u.hash.substring(1));if(!hp.has('offer')){alert('잘못된 링크');return;}offerS=hp.get('offer');pid=hp.get('peer')||uuid();}else{pid=uuid();}
    try{const offer=decSDP(offerS);addCon(pid,'상대방');activePeerId=pid;const s=getSess(pid);s.isOff=false;initPC(pid);await s.pc.setRemoteDescription(offer);const ans=await s.pc.createAnswer();await s.pc.setLocalDescription(ans);await waitIce(s.pc);const ansB64=encSDP(s.pc.localDescription);showView('chatScreen');document.getElementById('chatTitle').textContent='상대방';document.getElementById('passwordPrompt').style.display='block';document.getElementById('answerModalLink').textContent=location.origin+location.pathname+'#answer='+ansB64+'&peer='+pid;document.getElementById('answerModal').classList.remove('hidden');}catch(e){alert('연결 실패');}
    renderCon();
  }
  async function applyAns(){
    const l=document.getElementById('answerLinkInput').value.trim();if(!l)return;
    if(!activePeerId||!sessions[activePeerId]?.pc||!sessions[activePeerId]?.isOff){alert('먼저 새 채팅을 생성하세요');return;}
    try{let as=l;if(l.startsWith('http')){const u=new URL(l);const hp=new URLSearchParams(u.hash.substring(1));if(!hp.has('answer')){alert('잘못된 링크');return;}as=hp.get('answer');}await sessions[activePeerId].pc.setRemoteDescription(decSDP(as));showView('chatScreen');document.getElementById('chatTitle').textContent=getCon().find(c=>c.id===activePeerId)?.name||'채팅';document.getElementById('passwordPrompt').style.display='block';}catch(e){alert('Answer 적용 실패');}
  }
  function closeAnsModal(){document.getElementById('answerModal').classList.add('hidden');}
  function copyAnsLink(){navigator.clipboard.writeText(document.getElementById('answerModalLink').textContent).catch(()=>{});}

  // 삭제
  function sendRaw(pid){const s=sessions[pid];if(!s)return false;let ok=false;const m=JSON.stringify({type:'__destroy_req__',peerId:pid,ts:Date.now()});[s.dc,s.tyDC].filter(c=>c&&c.readyState==='open').forEach(c=>{try{c.send(m);ok=true;}catch{}});return ok;}
  async function trySendDestroy(pid){const s=sessions[pid];if(!s){markDest(pid);rmCon(pid);goHome();return;}if(sendRaw(pid)){clrPend(pid);markDest(pid);if(activePeerId===pid)goHome();if(s.pc){s.pc.close();delete sessions[pid];}rmCon(pid);renderCon();return;}if(s.root&&s.conf&&s.dc&&s.dc.readyState==='open'){try{const enc=await encAndSign(s,{type:'__destroy__',ts:Date.now(),id:uuid()});s.dc.send(JSON.stringify({type:'msg',...enc}));clrPend(pid);markDest(pid);if(activePeerId===pid)goHome();if(s.pc){s.pc.close();delete sessions[pid];}rmCon(pid);renderCon();return;}catch{}}const d=Math.min(300*Math.pow(2,s.dRetry),30000);s.dRetry++;setTimeout(()=>trySendDestroy(pid),d);}
  async function destroyChat(pid){const s=sessions[pid];if(!s){markDest(pid);rmCon(pid);goHome();return;}setPend(pid);s.dRetry=0;if(activePeerId===pid)goHome();await trySendDestroy(pid);rmCon(pid);}

  // 기기 잠금
  let lockPw=null,inaTimer=null,isLocked=false;
  function resetInact(){if(isLocked)return;clearTimeout(inaTimer);inaTimer=setTimeout(lockDev,60000);}
  function lockDev(){if(isLocked)return;const s=activePeerId?sessions[activePeerId]:null;if(!s?.pw)return;isLocked=true;lockPw=s.pw;document.getElementById('lockOverlay').classList.remove('hidden');clearRevealed();lockBubbles();}
  function unlockDev(){const inp=document.getElementById('lockPasswordInput').value.trim();if(!inp||inp!==lockPw){alert('비밀번호가 일치하지 않습니다');return;}isLocked=false;lockPw=null;document.getElementById('lockOverlay').classList.add('hidden');document.getElementById('lockPasswordInput').value='';resetInact();}
  function lockBubbles(){document.querySelectorAll('.bubble[data-revealed="true"]').forEach(b=>{b.dataset.revealed='false';const t=b.querySelector('.time')?.textContent||'';b.innerHTML=`<span class="encrypted-placeholder">🔒 길게 눌러서 확인</span><div class="time">${t}</div>`;});}
  function clearRevealed(){document.querySelectorAll('.bubble[data-revealed="true"]').forEach(b=>{b.dataset.revealed='false';const t=b.querySelector('.time')?.textContent||'';b.innerHTML=`<span class="encrypted-placeholder">🔒 길게 눌러서 확인</span><div class="time">${t}</div>`;});}
  ['click','keydown','touchstart','pointermove'].forEach(e=>document.addEventListener(e,resetInact,{passive:true}));

  // URL 해시
  async function chkHash(){if(!webrtcAvailable)return;const h=location.hash.substring(1);if(!h)return;const p=new URLSearchParams(h);if(p.has('offer')&&p.has('peer')){const pid=p.get('peer');if(isDest(pid)||hasPend(pid)){alert('삭제된 대화');return;}const offer=decSDP(p.get('offer'));if(!getCon().find(c=>c.id===pid))addCon(pid,'상대방');activePeerId=pid;const s=getSess(pid);s.isOff=false;initPC(pid);await s.pc.setRemoteDescription(offer);const ans=await s.pc.createAnswer();await s.pc.setLocalDescription(ans);await waitIce(s.pc);const ansB64=encSDP(s.pc.localDescription);showView('chatScreen');document.getElementById('chatTitle').textContent='상대방';document.getElementById('passwordPrompt').style.display='block';document.getElementById('answerModalLink').textContent=location.origin+location.pathname+'#answer='+ansB64+'&peer='+pid;document.getElementById('answerModal').classList.remove('hidden');renderCon();}else if(p.has('answer')&&p.has('peer')){const pid=p.get('peer');if(isDest(pid)||hasPend(pid))return;const ans=decSDP(p.get('answer'));if(!getCon().find(c=>c.id===pid))addCon(pid,'상대방');let s=sessions[pid];if(!s||!s.pc){s=getSess(pid);s.isOff=true;initPC(pid);s.dc=s.pc.createDataChannel('chat',{ordered:true});setupDC(pid);}if(s.pc){await s.pc.setRemoteDescription(ans);activePeerId=pid;showView('chatScreen');document.getElementById('chatTitle').textContent=getCon().find(c=>c.id===pid)?.name||'채팅';document.getElementById('passwordPrompt').style.display='block';}renderCon();}}
  window.addEventListener('hashchange',chkHash);

  function copyById(id){const el=document.getElementById(id);const t=el.tagName==='INPUT'||el.tagName==='TEXTAREA'?el.value:el.textContent;navigator.clipboard.writeText(t).catch(()=>{});}

  // 이벤트 바인딩
  function bind(){
    document.getElementById('newChatBtn').addEventListener('click',()=>{
      if(!webrtcAvailable){const nm=prompt('상대방 이름을 입력하세요:');if(!nm)return;const id=uuid();addCon(id,nm);activePeerId=id;const s=getSess(id);s.manual=true;showView('chatScreen');document.getElementById('chatTitle').textContent=nm;document.getElementById('passwordPrompt').style.display='block';updateUIForSession(s);renderCon();}else{showName();}
    });
    document.getElementById('joinChatBtn').addEventListener('click',()=>{if(!webrtcAvailable)alert('이 브라우저에서는 WebRTC를 사용할 수 없습니다. 새 채팅을 만들어 수동 모드로 이용하세요.');else showJoin();});
    document.getElementById('confirmNewChatBtn').addEventListener('click',()=>{if(!webrtcAvailable)return;newWebRTCChat();});
    document.getElementById('cancelNewChatBtn').addEventListener('click',closeName);
    document.getElementById('copyOfferLinkBtn').addEventListener('click',()=>copyById('offerLinkDisplay'));
    document.getElementById('applyAnswerBtn').addEventListener('click',applyAns);
    document.getElementById('offerHomeBtn').addEventListener('click',goHome);
    document.getElementById('createAnswerBtn').addEventListener('click',createAns);
    document.getElementById('answerHomeBtn').addEventListener('click',goHome);
    document.getElementById('backToHomeBtn').addEventListener('click',goHome);
    document.getElementById('renameChatBtn').addEventListener('click',()=>{if(activePeerId)renameChat();});
    document.getElementById('destroyChatBtn').addEventListener('click',()=>showDestroy(activePeerId));
    document.getElementById('submitPasswordBtn').addEventListener('click',submitPw);
    document.getElementById('sendBtn').addEventListener('click',sendText);
    document.getElementById('msgInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendText();}});
    document.getElementById('copyAnswerBtn').addEventListener('click',copyAnsLink);
    document.getElementById('closeAnswerModalBtn').addEventListener('click',closeAnsModal);
    document.getElementById('confirmDestroyBtn').addEventListener('click',confDestroy);
    document.getElementById('cancelDestroyBtn').addEventListener('click',hideDestroy);
    document.getElementById('unlockBtn').addEventListener('click',unlockDev);
  }

  try{bind();renderCon();if(webrtcAvailable)chkHash().catch(()=>{});showView('simpleMode');}catch(e){alert('초기화 오류: '+e.message);}
});
</script>
