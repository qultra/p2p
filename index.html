// =====================================================================
//  P2P 비밀 메신저 – 극한 보안 완전판 (상용급 UI/UX)

(() => {

// ─── 암호화 유틸 ──────────────────────────────
const textEncoder = new TextEncoder(), textDecoder = new TextDecoder();
const toBase64url = buf => btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
const fromBase64url = str => { str = str.replace(/-/g,'+').replace(/_/g,'/'); while(str.length%4) str+='='; return Uint8Array.from(atob(str),c=>c.charCodeAt(0)).buffer; };
const encodeSDP = obj => toBase64url(textEncoder.encode(JSON.stringify(obj)));
const decodeSDP = str => JSON.parse(textDecoder.decode(fromBase64url(str)));
const buf2b64 = b => btoa(String.fromCharCode(...new Uint8Array(b)));
const b642buf = s => Uint8Array.from(atob(s),c=>c.charCodeAt(0)).buffer;
const concatBufs = (...bufs) => { let len = bufs.reduce((a,b)=>a+b.byteLength,0), tmp = new Uint8Array(len), off=0; bufs.forEach(b=>{tmp.set(new Uint8Array(b),off);off+=b.byteLength;}); return tmp.buffer; };
const genUUID = () => crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx'.replace(/[xy]/g,c=>{const r=crypto.getRandomValues(new Uint8Array(1))[0]%16;return(c=='x'?r:r&0x3|0x8).toString(16);});
const formatBytes = b => b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':b<1073741824?(b/1048576).toFixed(1)+' MB':(b/1073741824).toFixed(1)+' GB';
const escapeHtml = s => String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);

const ICE_SERVERS = [
  { urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' },
  { urls: 'stun:stun.cloudflare.com:3478' }, { urls: 'stun:global.stun.twilio.com:3478' },
  { urls: 'stun:stun.freeswitch.org:3478' }, { urls: 'stun:stun.nextcloud.com:443' },
  { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
  { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
];

const sessions = {};
let activePeerId = null;
const DESTROY_PREFIX = 'p2p_destroy_enc_';
const PENDING_DESTROY_PREFIX = 'p2p_pending_enc_';
const OFFLINE_QUEUE_PREFIX = 'p2p_queue_enc_';
let masterKey = null;

if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();

// ─── 마스터 비밀번호 & 저장소 암호화 ──────────────
async function deriveMasterKey(password) {
  const keyMaterial = await crypto.subtle.importKey('raw', textEncoder.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: textEncoder.encode('p2p-secret-salt'), iterations: 20000000, hash: 'SHA-512' },
    keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
  );
}
async function encryptForStorage(data) {
  if (!masterKey) throw new Error('no master key');
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, masterKey, textEncoder.encode(JSON.stringify(data)));
  return { iv: Array.from(new Uint8Array(iv)), ct: Array.from(new Uint8Array(ct)) };
}
async function decryptFromStorage(enc) {
  if (!masterKey) throw new Error('no master key');
  const iv = new Uint8Array(enc.iv), ct = new Uint8Array(enc.ct);
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, masterKey, ct);
  return JSON.parse(textDecoder.decode(plain));
}
async function setStorage(key, value) {
  try { const enc = await encryptForStorage(value); localStorage.setItem(key, JSON.stringify(enc)); } catch(e){}
}
async function getStorage(key) {
  try { const raw = localStorage.getItem(key); if (!raw) return null; return await decryptFromStorage(JSON.parse(raw)); } catch(e) { return null; }
}

// ─── 세션 관리 ────────────────────────────────
function getSession(peerId) {
  if (!sessions[peerId]) sessions[peerId] = {
    pc: null, dc: null, typingDC: null, typingKey: null, isOfferer: false, password: null,
    rootKey: null, sendChainKey: null, recvChainKey: null, sendMsgNum: 0, recvMsgNum: 0,
    ourEphemeralKeyPair: null, theirEphemeralPub: null,
    salt: null, ourEcdhPair: null, peerEcdhPub: null,
    handshakeDone: false, confirmed: false, isOnline: false,
    receivedMessageIds: new Set(), pendingMessages: [],
    fileReceive: null, typingTimer: null, reconnectAttempts: 0,
    pendingConfirm: null, destroyRetry: 0
  };
  return sessions[peerId];
}
async function isDestroyed(peerId) { return !!(await getStorage(DESTROY_PREFIX + peerId)) || !!sessionStorage.getItem(DESTROY_PREFIX + peerId); }
async function markDestroyed(peerId) {
  await setStorage(DESTROY_PREFIX + peerId, Date.now());
  sessionStorage.setItem(DESTROY_PREFIX + peerId, '1');
  clearPendingDestroy(peerId);
  clearOfflineQueue(peerId);
  if (location.hash) history.replaceState(null, '', location.pathname);
}
function clearPendingDestroy(peerId) { localStorage.removeItem(PENDING_DESTROY_PREFIX + peerId); }
async function hasPendingDestroy(peerId) { return !!(await getStorage(PENDING_DESTROY_PREFIX + peerId)); }
async function setPendingDestroy(peerId) { await setStorage(PENDING_DESTROY_PREFIX + peerId, Date.now().toString()); }
async function saveOfflineQueue(peerId, queue) { await setStorage(OFFLINE_QUEUE_PREFIX + peerId, queue); }
async function loadOfflineQueue(peerId) { return await getStorage(OFFLINE_QUEUE_PREFIX + peerId) || []; }
function clearOfflineQueue(peerId) { localStorage.removeItem(OFFLINE_QUEUE_PREFIX + peerId); }

// ─── 웹RTC 초기화 ──────────────────────────────
function initPC(peerId) {
  const sess = getSession(peerId);
  if (sess.pc) sess.pc.close();
  sess.pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  sess.pc.oniceconnectionstatechange = () => {
    const state = sess.pc.iceConnectionState;
    if (state === 'connected' || state === 'completed') {
      sess.isOnline = true; updateConn(true); renderContactList();
      if (hasPendingDestroy(peerId)) trySendDestroy(peerId);
    } else if (state === 'disconnected' || state === 'failed' || state === 'closed') {
      sess.isOnline = false; updateConn(false);
      if (state === 'failed' && sess.reconnectAttempts < 3) {
        sess.reconnectAttempts++; setTimeout(() => { try { sess.pc?.restartIce(); } catch(e){} }, 2000);
      }
    }
  };
  sess.pc.ondatachannel = e => {
    if (e.channel.label === 'chat') { sess.dc = e.channel; setupDC(peerId); }
    else if (e.channel.label === 'typing') { sess.typingDC = e.channel; setupTypingDC(peerId); }
  };
}
function setupDC(peerId) {
  const sess = getSession(peerId); if (!sess.dc) return;
  sess.dc.onopen = async () => {
    if (await isDestroyed(peerId)) return;
    sess.isOnline = true; updateConn(true); renderContactList();
    if (await hasPendingDestroy(peerId)) { trySendDestroy(peerId); return; }
    if (sess.handshakeDone) {
      appendSystemMsg('🔄 연결 복구됨. 보안 세션 재수립...');
      sess.handshakeDone = false; sess.rootKey = null; sess.sendChainKey = null; sess.recvChainKey = null; sess.confirmed = false;
      startEcdhExchange(peerId);
    } else if (!sess.handshakeDone && !sess.rootKey) {
      if (!sess.ourEcdhPair) startEcdhExchange(peerId);
    }
  };
  sess.dc.onmessage = e => onMsg(peerId, e);
  sess.dc.onclose = () => { sess.isOnline = false; updateConn(false); renderContactList(); };
}
function setupTypingDC(peerId) {
  const sess = getSession(peerId); if (!sess.typingDC) return;
  sess.typingDC.onmessage = e => {
    if (typeof e.data === 'string') {
      try { const enc = JSON.parse(e.data); if (enc.type === '__destroy_req__') { markDestroyed(enc.peerId || peerId); goHome(); return; } decryptTyping(sess, enc).then(state => { if (peerId === activePeerId) document.getElementById('typingIndicator').style.display = state === '1' ? 'block' : 'none'; }).catch(()=>{}); } catch(ex) {}
    }
  };
}

// ─── 더블 래칫 암호화 ──────────────────────────
async function startEcdhExchange(peerId) {
  const sess = getSession(peerId);
  try {
    const keyPair = await crypto.subtle.generateKey({ name: 'ECDH', namedCurve: 'P-521' }, true, ['deriveKey','deriveBits']);
    sess.ourEcdhPair = { privateKey: keyPair.privateKey, publicKey: keyPair.publicKey };
    const pubRaw = await crypto.subtle.exportKey('raw', keyPair.publicKey);
    if (sess.isOfferer) {
      sess.salt = crypto.getRandomValues(new Uint8Array(4096));
      if (sess.dc && sess.dc.readyState === 'open') sess.dc.send(JSON.stringify({ type: '__ecdhe__', salt: buf2b64(sess.salt.buffer), pubKey: buf2b64(pubRaw) }));
    } else {
      if (sess.dc && sess.dc.readyState === 'open') sess.dc.send(JSON.stringify({ type: '__ecdhe__', pubKey: buf2b64(pubRaw) }));
    }
  } catch(e) { appendSystemMsg('키 교환 오류'); }
}
async function handleEcdheMessage(peerId, data) {
  const sess = getSession(peerId);
  if (sess.handshakeDone) return;
  try {
    if (data.salt) sess.salt = new Uint8Array(b642buf(data.salt));
    sess.peerEcdhPub = await crypto.subtle.importKey('raw', b642buf(data.pubKey), { name: 'ECDH', namedCurve: 'P-521' }, true, ['deriveBits']);
    if (sess.password && sess.ourEcdhPair && sess.peerEcdhPub && sess.salt) await deriveSessionKey(peerId);
  } catch(e) { appendSystemMsg('키 교환 실패'); }
}
async function submitPassword() {
  if (!activePeerId) return;
  const sess = getSession(activePeerId);
  const password = document.getElementById('chatPasswordInput').value.trim();
  if (!password) { document.getElementById('passwordError').textContent = '암호를 입력하세요.'; document.getElementById('passwordError').style.display = 'block'; return; }
  sess.password = password;
  if (sess.salt && sess.ourEcdhPair && sess.peerEcdhPub) await deriveSessionKey(activePeerId);
  else document.getElementById('passwordError').textContent = '연결 준비 중...'; document.getElementById('passwordError').style.display = 'block';
}
async function deriveSessionKey(peerId) {
  const sess = getSession(peerId);
  try {
    const km = await crypto.subtle.importKey('raw', textEncoder.encode(sess.password), 'PBKDF2', false, ['deriveKey']);
    sess.authKey = await crypto.subtle.deriveKey({ name: 'PBKDF2', salt: sess.salt, iterations: 20000000, hash: 'SHA-512' }, km, { name: 'AES-GCM', length: 256 }, true, ['encrypt','decrypt']);
    const ecdhBits = await crypto.subtle.deriveBits({ name: 'ECDH', public: sess.peerEcdhPub }, sess.ourEcdhPair.privateKey, 521);
    const authRaw = await crypto.subtle.exportKey('raw', sess.authKey);
    const ikm = concatBufs(ecdhBits, textEncoder.encode(sess.password));
    const hkdfKey = await crypto.subtle.importKey('raw', ikm, 'HKDF', false, ['deriveBits']);
    const rootKey = await crypto.subtle.deriveBits({ name: 'HKDF', hash: 'SHA-512', salt: authRaw, info: textEncoder.encode('root') }, hkdfKey, 256);
    sess.rootKey = await crypto.subtle.importKey('raw', rootKey, { name: 'AES-GCM', length: 256 }, true, ['encrypt','decrypt']);
    sess.ourEphemeralKeyPair = sess.ourEcdhPair;
    sess.theirEphemeralPub = sess.peerEcdhPub;
    const typingKeyRaw = new Uint8Array(rootKey).slice(0, 16);
    sess.typingKey = await crypto.subtle.importKey('raw', typingKeyRaw, { name: 'AES-GCM', length: 128 }, false, ['encrypt','decrypt']);
    sess.handshakeDone = true;
    if (sess.isOfferer) await sendConfirmation(peerId);
    if (sess.pendingConfirm) { const pend = sess.pendingConfirm; sess.pendingConfirm = null; await handleConfirmation(peerId, pend); }
    if (peerId === activePeerId) {
      document.getElementById('securityCard').style.display = 'flex';
      document.getElementById('sessionFingerprint').textContent = [...new Uint8Array(rootKey)].map(x => x.toString(16).padStart(2,'0')).join('');
      document.getElementById('passwordPrompt').style.display = 'none';
      document.getElementById('passwordError').style.display = 'none';
    }
  } catch(e) { document.getElementById('passwordError').textContent = '키 생성 실패'; document.getElementById('passwordError').style.display = 'block'; }
}
async function sendConfirmation(peerId) {
  const sess = getSession(peerId);
  if (!sess.rootKey || !sess.dc || sess.dc.readyState !== 'open') return;
  const newKeyPair = await crypto.subtle.generateKey({ name: 'ECDH', namedCurve: 'P-521' }, true, ['deriveKey','deriveBits']);
  sess.ourEphemeralKeyPair = newKeyPair;
  const newChainKey = await dhRatchet(sess, newKeyPair.privateKey, sess.theirEphemeralPub);
  sess.sendChainKey = newChainKey; sess.sendMsgNum = 0;
  const pubRaw = await crypto.subtle.exportKey('raw', newKeyPair.publicKey);
  sess.dc.send(JSON.stringify({ type: '__confirm__', dhPub: buf2b64(pubRaw) }));
}
async function handleConfirmation(peerId, data) {
  const sess = getSession(peerId);
  if (!sess.rootKey) { sess.pendingConfirm = data; return; }
  if (data.dhPub) await processReceivedRatchet(sess, data.dhPub);
  sess.confirmed = true;
  if (!sess.isOfferer) await sendConfirmation(peerId);
  if (peerId === activePeerId) {
    document.getElementById('securityCard').style.display = 'flex';
    const raw = await crypto.subtle.exportKey('raw', sess.rootKey);
    document.getElementById('sessionFingerprint').textContent = [...new Uint8Array(raw)].map(x => x.toString(16).padStart(2,'0')).join('');
    document.getElementById('passwordPrompt').style.display = 'none';
  }
  flushOfflineQueue(peerId);
}
async function dhRatchet(sess, ourPriv, theirPub) {
  const dhBits = await crypto.subtle.deriveBits({ name: 'ECDH', public: theirPub }, ourPriv, 521);
  const rootRaw = await crypto.subtle.exportKey('raw', sess.rootKey);
  const ikm = concatBufs(dhBits, rootRaw);
  const hkdfKey = await crypto.subtle.importKey('raw', ikm, 'HKDF', false, ['deriveBits']);
  const okm = await crypto.subtle.deriveBits({ name: 'HKDF', hash: 'SHA-512', salt: new Uint8Array(32), info: textEncoder.encode('ratchet') }, hkdfKey, 512);
  sess.rootKey = await crypto.subtle.importKey('raw', okm.slice(0,32), { name: 'AES-GCM', length: 256 }, true, ['encrypt','decrypt']);
  return okm.slice(32,64);
}
async function symmetricRatchet(chainKey) {
  const ck = await crypto.subtle.importKey('raw', chainKey, { name: 'HMAC', hash: 'SHA-512' }, false, ['sign']);
  const mkSig = await crypto.subtle.sign('HMAC', ck, new Uint8Array([1]));
  const nkSig = await crypto.subtle.sign('HMAC', ck, new Uint8Array([2]));
  return { msgKey: mkSig.slice(0,32), nextChainKey: nkSig.slice(0,32) };
}
async function performSendingRatchetIfNeeded(sess) {
  if (!sess.sendChainKey) {
    const newKeyPair = await crypto.subtle.generateKey({ name: 'ECDH', namedCurve: 'P-521' }, true, ['deriveKey','deriveBits']);
    sess.ourEphemeralKeyPair = newKeyPair;
    const chainKey = await dhRatchet(sess, newKeyPair.privateKey, sess.theirEphemeralPub);
    sess.sendChainKey = chainKey; sess.sendMsgNum = 0;
    const pubRaw = await crypto.subtle.exportKey('raw', newKeyPair.publicKey);
    return buf2b64(pubRaw);
  }
  return null;
}
async function encryptPayload(sess, obj) {
  const dhPub = await performSendingRatchetIfNeeded(sess);
  const { msgKey, nextChainKey } = await symmetricRatchet(sess.sendChainKey);
  sess.sendChainKey = nextChainKey;
  const seq = sess.sendMsgNum++;
  const iv = crypto.getRandomValues(new Uint8Array(16));
  const padLen = 256 + Math.floor(crypto.getRandomValues(new Uint8Array(1))[0] / 256 * (512-256));
  const padded = { ...obj, _pad: buf2b64(crypto.getRandomValues(new Uint8Array(padLen)).buffer) };
  const msgKeyObj = await crypto.subtle.importKey('raw', msgKey, 'AES-GCM', false, ['encrypt']);
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, msgKeyObj, textEncoder.encode(JSON.stringify(padded)));
  const res = { seq, iv: Array.from(new Uint8Array(iv)), ct: Array.from(new Uint8Array(ct)) };
  if (dhPub) res.dhPub = dhPub;
  return res;
}
async function processReceivedRatchet(sess, dhPubB64) {
  const pubRaw = b642buf(dhPubB64);
  const peerPub = await crypto.subtle.importKey('raw', pubRaw, { name: 'ECDH', namedCurve: 'P-521' }, true, ['deriveBits']);
  sess.recvChainKey = await dhRatchet(sess, sess.ourEphemeralKeyPair.privateKey, peerPub);
  sess.recvMsgNum = 0; sess.theirEphemeralPub = peerPub;
}
async function decryptPayload(sess, d) {
  if (d.dhPub) await processReceivedRatchet(sess, d.dhPub);
  if (!sess.recvChainKey) throw new Error('no recv chain');
  const { seq, iv, ct } = d;
  if (seq < sess.recvMsgNum) return null;
  while (sess.recvMsgNum < seq) {
    const { nextChainKey } = await symmetricRatchet(sess.recvChainKey);
    sess.recvChainKey = nextChainKey; sess.recvMsgNum++;
  }
  const { msgKey, nextChainKey } = await symmetricRatchet(sess.recvChainKey);
  sess.recvChainKey = nextChainKey; sess.recvMsgNum = seq + 1;
  const msgKeyObj = await crypto.subtle.importKey('raw', msgKey, 'AES-GCM', false, ['decrypt']);
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: new Uint8Array(iv) }, msgKeyObj, new Uint8Array(ct));
  return JSON.parse(textDecoder.decode(plain));
}

// ─── 메시지 UI (캔버스 말풍선) ──────────────────
function drawBubbleCanvas(text, who, time, read) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const padding = 14, maxWidth = 280;
  ctx.font = '15px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
  const lines = [];
  let cur = '';
  text.split(' ').forEach(w => {
    if (ctx.measureText(cur + w + ' ').width > maxWidth && cur) { lines.push(cur.trimEnd()); cur = w + ' '; }
    else cur += w + ' ';
  });
  lines.push(cur.trimEnd());
  const lineHeight = 22;
  const timeHeight = time ? 20 : 0;
  const height = lines.length * lineHeight + padding * 2 + timeHeight;
  const width = Math.min(maxWidth, Math.ceil(Math.max(...lines.map(l => ctx.measureText(l).width)))) + padding * 2 + 30;
  canvas.width = width; canvas.height = height;
  ctx.clearRect(0, 0, width, height);
  // 배경
  ctx.fillStyle = who === 'me' ? '#3a5fe5' : '#1f2937';
  ctx.beginPath();
  if (who === 'me') ctx.roundRect(2, 2, width-4, height-4, 16);
  else ctx.roundRect(2, 2, width-4, height-4, 16);
  ctx.fill();
  // 텍스트
  ctx.fillStyle = who === 'me' ? '#ffffff' : '#e6ecf5';
  ctx.font = '15px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif';
  lines.forEach((line, i) => ctx.fillText(line, padding, padding + (i+1)*lineHeight));
  // 시간 & 읽음 표시
  if (time) {
    ctx.font = '11px -apple-system, sans-serif';
    ctx.fillStyle = who === 'me' ? 'rgba(255,255,255,0.8)' : 'rgba(255,255,255,0.4)';
    ctx.fillText(time, width - padding - 45, height - 8);
    if (read && who === 'me') {
      ctx.fillStyle = '#45d68a';
      ctx.fillText('✓✓', width - padding - 15, height - 8);
    }
  }
  return canvas;
}
function renderMessage(text, who, msgId) {
  const container = document.getElementById('messages');
  if (!container) return;
  const row = document.createElement('div');
  row.className = `msg-row ${who}`;
  if (msgId) row.id = 'msg-' + msgId;
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const canvas = drawBubbleCanvas(text, who, time, false);
  canvas.className = 'msg-canvas blur-overlay';
  canvas.setAttribute('data-revealed', 'false');
  let timer;
  const reveal = () => { canvas.classList.add('revealed'); setTimeout(() => canvas.classList.remove('revealed'), 3000); };
  canvas.addEventListener('pointerdown', () => { timer = setTimeout(reveal, 600); });
  canvas.addEventListener('pointerup', () => clearTimeout(timer));
  canvas.addEventListener('pointercancel', () => clearTimeout(timer));
  row.appendChild(canvas);
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}
function appendSystemMsg(text) {
  const container = document.getElementById('messages');
  if (!container) return;
  const row = document.createElement('div');
  row.className = 'msg-row system';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  row.appendChild(bubble);
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

// ─── 메시지 송수신 ──────────────────────────────
async function sendText() {
  if (!activePeerId || await isDestroyed(activePeerId)) return;
  const sess = getSession(activePeerId);
  const inp = document.getElementById('msgInput'); const text = inp.value.trim(); if (!text) return;
  const msgId = genUUID(); await sendPayload(sess, { type: 'text', content: text, id: msgId }, text, msgId);
  inp.value = '';
}
async function sendPayload(sess, payload, displayText, msgId) {
  if (!sess.dc || sess.dc.readyState !== 'open' || !sess.rootKey || !sess.confirmed) {
    const queue = await loadOfflineQueue(activePeerId);
    queue.push({ payload, displayText, id: msgId, ts: Date.now() });
    await saveOfflineQueue(activePeerId, queue);
    renderMessage(displayText, 'me', msgId);
    appendSystemMsg('⏳ 오프라인 – 연결 시 전송');
    return;
  }
  try {
    const enc = await encryptPayload(sess, payload);
    sess.dc.send(JSON.stringify({ type: 'msg', ...enc }));
    renderMessage(displayText, 'me', msgId);
    notifyIfNeeded(displayText);
  } catch(e) { /* fallback to queue */ }
}
async function onMsg(peerId, e) {
  if (await isDestroyed(peerId)) return;
  if (await hasPendingDestroy(peerId)) { await markDestroyed(peerId); goHome(); return; }
  const sess = getSession(peerId);
  if (e.data instanceof ArrayBuffer) { handleBinaryChunk(peerId, e.data); return; }
  try {
    const d = JSON.parse(e.data);
    if (d.type === '__ecdhe__') { handleEcdheMessage(peerId, d); return; }
    if (d.type === '__confirm__') { handleConfirmation(peerId, d); return; }
    if (d.type === '__destroy_req__') { markDestroyed(d.peerId || peerId); goHome(); return; }
    if (d.type === 'msg') {
      if (!sess.rootKey || !sess.confirmed) { appendSystemMsg('🔒 암호화된 메시지 수신'); return; }
      const inner = await decryptPayload(sess, d);
      if (!inner || (inner.id && sess.receivedMessageIds.has(inner.id))) return;
      if (inner.id) sess.receivedMessageIds.add(inner.id);
      switch (inner.type) {
        case 'text': receiveMessage(peerId, inner.content, 'other', inner.id); sendReadReceipt(peerId, inner.id); break;
        case 'emoji': receiveMessage(peerId, inner.content, 'other', inner.id); break;
        case 'media': receiveMessage(peerId, `<img src="${inner.url}" style="max-width:200px;max-height:200px;border-radius:12px;">`, 'other', inner.id); break;
        case 'read': markAsRead(peerId, inner.id); break;
        case '__destroy__': await markDestroyed(peerId); goHome(); break;
      }
    }
  } catch(e) {}
}
async function flushOfflineQueue(peerId) {
  const sess = getSession(peerId);
  if (!sess?.dc || sess.dc.readyState !== 'open' || !sess.rootKey || !sess.confirmed) return;
  const queue = await loadOfflineQueue(peerId);
  if (queue.length === 0) return;
  clearOfflineQueue(peerId);
  appendSystemMsg(`📬 ${queue.length}개 메시지 전송 중...`);
  for (const item of queue) {
    try {
      const enc = await encryptPayload(sess, item.payload);
      sess.dc.send(JSON.stringify({ type: 'msg', ...enc }));
    } catch(e) { break; }
  }
}
function receiveMessage(peerId, text, who, msgId) {
  const sess = getSession(peerId);
  if (peerId === activePeerId) renderMessage(text, who, msgId);
  else { sess.pendingMessages.push({ text, who, msgId }); notifyIfNeeded(text); renderContactList(); }
  updateLastMsg(peerId, text.substring(0, 40));
}

// ─── 이모지 / 미디어 / 스티커 / 파일 ──────────────
const EMOJI_LIST = ['😀','😂','🥰','😎','🤔','👍','❤️','🔥','🎉','💯','😢','😡','🥺','🤯','✨','🍕','🚀','💻','📱','🎵'];
function buildEmojiPicker() {
  const grid = document.getElementById('emojiGrid');
  EMOJI_LIST.forEach(e => {
    const span = document.createElement('span'); span.className = 'emoji-item'; span.textContent = e;
    span.addEventListener('click', () => sendEmoji(e)); grid.appendChild(span);
  });
}
function sendEmoji(emoji) { if (!activePeerId || isDestroyed(activePeerId)) return; const sess = getSession(activePeerId); if (!sess) return; const msgId = genUUID(); sendPayload(sess, { type: 'emoji', content: emoji, id: msgId }, emoji, msgId); closeAllPickers(); }
function sendMedia(url) { if (!activePeerId || isDestroyed(activePeerId)) return; const sess = getSession(activePeerId); if (!sess) return; const msgId = genUUID(); sendPayload(sess, { type: 'media', url, id: msgId }, `<img src="${url}" style="max-width:200px;max-height:200px;border-radius:12px;">`, msgId); closeAllPickers(); }
function addMediaUrl() { const url = document.getElementById('mediaSearch')?.value?.trim(); if (!url) return; let favorites = JSON.parse(localStorage.getItem('p2p_media_fav') || '[]'); if (!favorites.includes(url)) { favorites.push(url); localStorage.setItem('p2p_media_fav', JSON.stringify(favorites)); } document.getElementById('mediaSearch').value = ''; filterMedia(); sendMedia(url); }
async function uploadSticker(files) { if (!files || files.length === 0) return; for (const file of files) { const reader = new FileReader(); reader.onload = (e) => { const url = e.target.result; let favorites = JSON.parse(localStorage.getItem('p2p_media_fav') || '[]'); favorites.push(url); localStorage.setItem('p2p_media_fav', JSON.stringify(favorites)); filterMedia(); sendMedia(url); }; reader.readAsDataURL(file); } }
function filterMedia() { const query = document.getElementById('mediaSearch')?.value?.toLowerCase() || ''; const favorites = JSON.parse(localStorage.getItem('p2p_media_fav') || '[]'); const grid = document.getElementById('mediaGrid'); grid.innerHTML = favorites.filter(u => u.toLowerCase().includes(query)).map(u => `<div class="picker-item" onclick="sendMedia('${u}')"><img src="${u}" style="width:64px;height:64px;object-fit:cover;border-radius:8px;"></div>`).join(''); }
function handleFiles(files) { for (const f of files) sendFile(f); }
async function sendFile(file) { if (!activePeerId || await isDestroyed(activePeerId)) return; const sess = getSession(activePeerId); if (!sess?.dc || sess.dc.readyState !== 'open' || !sess.rootKey || !sess.confirmed) { appendSystemMsg('⚠️ 파일 전송 불가 (보안 세션 없음)'); return; } const fileId = genUUID(); const fek = await crypto.subtle.generateKey({ name: 'AES-GCM', length: 256 }, true, ['encrypt']); const iv = crypto.getRandomValues(new Uint8Array(12)); const fekRaw = await crypto.subtle.exportKey('raw', fek); const fileBuf = await file.arrayBuffer(); const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, fek, fileBuf); const encData = new Uint8Array(iv.byteLength + ct.byteLength); encData.set(iv); encData.set(new Uint8Array(ct), iv.byteLength); const metaEnc = await encryptPayload(sess, { type: 'file_start', id: fileId, name: file.name, size: encData.byteLength, fek: buf2b64(fekRaw) }); sess.dc.send(JSON.stringify({ type: 'msg', ...metaEnc })); renderMessage(`📤 ${file.name} 전송 중... (${formatBytes(encData.byteLength)})`, 'me'); const chunkSize = 64 * 1024; let offset = 0; while (offset < encData.byteLength) { const end = Math.min(offset + chunkSize, encData.byteLength); sess.dc.send(encData.slice(offset, end).buffer); offset = end; await new Promise(r => setTimeout(r, 5)); } const endEnc = await encryptPayload(sess, { type: 'file_end', id: fileId }); sess.dc.send(JSON.stringify({ type: 'msg', ...endEnc })); renderMessage(`📤 ${file.name} 전송 완료`, 'me'); }
function handleFileStart(peerId, inner) { const sess = getSession(peerId); if (!sess) return; sess.fileReceive = { id: inner.id, name: inner.name, size: inner.size, fek: b642buf(inner.fek), chunks: [], received: 0 }; receiveMessage(peerId, `📥 ${inner.name} (${formatBytes(inner.size)}) 수신 중...`, 'other'); }
function handleBinaryChunk(peerId, buf) { const sess = getSession(peerId); if (!sess?.fileReceive) return; sess.fileReceive.chunks.push(new Uint8Array(buf)); sess.fileReceive.received += buf.byteLength; }
async function assembleFile(peerId) { const sess = getSession(peerId); if (!sess?.fileReceive) return; const blob = new Blob(sess.fileReceive.chunks); const iv = blob.slice(0, 12); const ct = blob.slice(12); const key = await crypto.subtle.importKey('raw', sess.fileReceive.fek, 'AES-GCM', false, ['decrypt']); const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: await iv.arrayBuffer() }, key, await ct.arrayBuffer()); const decBlob = new Blob([plain]); const url = URL.createObjectURL(decBlob); receiveMessage(peerId, `<a href="${url}" download="${escapeHtml(sess.fileReceive.name)}" style="color:var(--accent);">📎 ${escapeHtml(sess.fileReceive.name)} 다운로드</a>`, 'other'); sess.fileReceive = null; }

// ─── 읽음 확인 / 타이핑 ──────────────────────────
async function sendReadReceipt(peerId, msgId) { const sess = getSession(peerId); if (!sess?.rootKey || !sess.confirmed || !sess.dc || sess.dc.readyState !== 'open') return; try { const enc = await encryptPayload(sess, { type: 'read', id: msgId }); sess.dc.send(JSON.stringify({ type: 'msg', ...enc })); } catch(e) {} }
function markAsRead(peerId, msgId) { const el = document.getElementById('msg-' + msgId); if (el) { const time = el.querySelector('.msg-time'); if (time && !time.querySelector('.read-check')) time.innerHTML += ' <span class="read-check"></span>'; } }
async function encryptTyping(sess, state) { if (!sess.typingKey) return null; const iv = crypto.getRandomValues(new Uint8Array(12)); const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, sess.typingKey, textEncoder.encode(state)); return { iv: Array.from(new Uint8Array(iv)), ct: Array.from(new Uint8Array(ct)) }; }
async function decryptTyping(sess, data) { if (!sess.typingKey) throw new Error('no typing key'); const iv = new Uint8Array(data.iv), ct = new Uint8Array(data.ct); const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, sess.typingKey, ct); return textDecoder.decode(plain); }
function sendTyping(state) { const sess = sessions[activePeerId]; if (sess?.typingDC && sess.typingDC.readyState === 'open' && sess.typingKey) { encryptTyping(sess, state ? '1' : '0').then(enc => enc && sess.typingDC.send(JSON.stringify(enc))).catch(() => {}); } }

// ─── 삭제 전파 ──────────────────────────────────
function sendRawDestroy(peerId) {
  const sess = getSession(peerId);
  let sent = false;
  const msg = JSON.stringify({ type: '__destroy_req__', peerId, ts: Date.now() });
  [sess.dc, sess.typingDC].forEach(ch => { if (ch && ch.readyState === 'open') { try { ch.send(msg); sent = true; } catch(e){} } });
  return sent;
}
async function trySendDestroy(peerId) {
  const sess = getSession(peerId);
  if (!sess) { await markDestroyed(peerId); goHome(); return; }
  if (sendRawDestroy(peerId)) { await clearPendingDestroy(peerId); await markDestroyed(peerId); if (activePeerId === peerId) goHome(); return; }
  if (sess.rootKey && sess.confirmed && sess.dc?.readyState === 'open') {
    try { const enc = await encryptPayload(sess, { type: '__destroy__', id: genUUID() }); sess.dc.send(JSON.stringify({ type: 'msg', ...enc })); await markDestroyed(peerId); if (activePeerId === peerId) goHome(); return; } catch(e) {}
  }
  if (sess.destroyRetry < 50) { sess.destroyRetry++; setTimeout(() => trySendDestroy(peerId), 500); }
  else { await markDestroyed(peerId); if (activePeerId === peerId) goHome(); }
}
async function destroyChat(peerId) {
  const sess = getSession(peerId);
  if (!sess) { await markDestroyed(peerId); goHome(); return; }
  await setPendingDestroy(peerId);
  sess.destroyRetry = 0;
  if (activePeerId === peerId) goHome();
  await trySendDestroy(peerId);
}

// ─── 기타 UI 이벤트 ──────────────────────────────
function closeAllPickers() { document.querySelectorAll('.picker-overlay.active').forEach(p => p.classList.remove('active')); }
function togglePicker(type) { const picker = document.getElementById(type + 'Picker'); const isActive = picker.classList.contains('active'); closeAllPickers(); if (!isActive) picker.classList.add('active'); }

// ─── 모든 버튼 이벤트 바인딩 ────────────────────────
document.getElementById('newChatBtn').addEventListener('click', () => {
  document.getElementById('nameModal').classList.remove('hidden');
  document.getElementById('peerNameInput').focus();
});
document.getElementById('cancelNameModalBtn').addEventListener('click', () => document.getElementById('nameModal').classList.add('hidden'));

  const name = document.getElementById('peerNameInput').value.trim();
  if (!name) return alert('이름을 입력하세요.');
  document.getElementById('nameModal').classList.add('hidden');
  const peerId = genUUID(); await addContact(peerId, name); activePeerId = peerId;
  const sess = getSession(peerId); sess.isOfferer = true;

  sess.dc = sess.pc.createDataChannel('chat', { ordered: true });

  setupDC(peerId); setupTypingDC(peerId);
  sess.pc.createOffer().then(o => sess.pc.setLocalDescription(o)).then(() => waitIce(sess.pc).then(() => {

  }));

});
document.getElementById('joinChatBtn').addEventListener('click', () => showView('answerPanel'));
document.getElementById('goHomeFromOfferBtn').addEventListener('click', goHome);
document.getElementById('goHomeFromAnswerBtn').addEventListener('click', goHome);
document.getElementById('copyOfferLinkBtn').addEventListener('click', () => {
  const text = document.getElementById('offerLinkDisplay').textContent;
  navigator.clipboard.writeText(text).catch(() => prompt('복사:', text));
});
document.getElementById('createAnswerBtn').addEventListener('click', async () => {
  const t = document.getElementById('remoteOfferSDP').value.trim(); if (!t) return;
  let offerStr = t; let peerId;
  if (t.startsWith('http')) { const u = new URL(t); const hp = new URLSearchParams(u.hash.substring(1)); if (!hp.has('offer')) { alert('올바르지 않은 링크'); return; } offerStr = hp.get('offer'); peerId = hp.get('peer') || genUUID(); }
  else peerId = genUUID();
  const offer = decodeSDP(offerStr); await addContact(peerId, '상대방'); activePeerId = peerId;
  const sess = getSession(peerId); sess.isOfferer = false; initPC(peerId);
  await sess.pc.setRemoteDescription(offer);
  const ans = await sess.pc.createAnswer(); await sess.pc.setLocalDescription(ans); await waitIce(sess.pc);
  const answerB64 = encodeSDP(sess.pc.localDescription);
  showView('chatScreen'); document.getElementById('chatTitle').innerHTML = `<div class="avatar">상</div><div class="name">상대방</div>`;
  document.getElementById('passwordPrompt').style.display = 'block';
  document.getElementById('answerModalLink').textContent = location.origin + location.pathname + '#answer=' + answerB64 + '&peer=' + peerId;
  document.getElementById('answerModal').classList.remove('hidden');
  renderContactList();
});
document.getElementById('closeAnswerModalBtn').addEventListener('click', () => document.getElementById('answerModal').classList.add('hidden'));
document.getElementById('copyAnswerModalBtn').addEventListener('click', () => {
  const text = document.getElementById('answerModalLink').textContent;
  navigator.clipboard.writeText(text).then(() => alert('복사됨')).catch(() => prompt('복사:', text));
});
document.getElementById('applyAnswerBtn').addEventListener('click', async () => {
  const l = document.getElementById('answerLinkInput').value.trim(); if (!l) return;
  if (!activePeerId || !sessions[activePeerId]?.pc || !sessions[activePeerId]?.isOfferer) { alert('먼저 Offer를 생성하세요.'); return; }
  try {
    let answerStr = l; if (l.startsWith('http')) { const u = new URL(l); const hp = new URLSearchParams(u.hash.substring(1)); if (!hp.has('answer')) { alert('올바르지 않은 Answer 링크'); return; } answerStr = hp.get('answer'); }
    await sessions[activePeerId].pc.setRemoteDescription(decodeSDP(answerStr));
    showView('chatScreen'); const contacts = await getContacts(); const c = contacts.find(c => c.id === activePeerId);
    document.getElementById('chatTitle').innerHTML = `<div class="avatar">${(c?.name||'?')[0]}</div><div class="name">${c?.name||'채팅'}</div>`;
    document.getElementById('passwordPrompt').style.display = 'block';
  } catch(e) { alert('Answer 적용 실패'); }
});
document.getElementById('backFromChatBtn').addEventListener('click', goHome);
document.getElementById('renameChatBtn').addEventListener('click', async () => {
  if (!activePeerId) return;
  const contacts = await getContacts();
  const c = contacts.find(c => c.id === activePeerId);
  if (!c) return;

});
document.getElementById('destroyChatBtn').addEventListener('click', () => { if (activePeerId) destroyChat(activePeerId); });

document.getElementById('mediaPickerBtn').addEventListener('click', () => togglePicker('media'));

document.getElementById('msgInput').addEventListener('input', () => { sendTyping(true); const sess = sessions[activePeerId]; if (sess) { clearTimeout(sess.typingTimer); sess.typingTimer = setTimeout(() => sendTyping(false), 1500); } });
document.getElementById('mediaSearch').addEventListener('keydown', e => { if (e.key === 'Enter') addMediaUrl(); });

function waitIce(pc) { return new Promise(r => { if (pc.iceGatheringState === 'complete') r(); else pc.addEventListener('icegatheringstatechange', () => { if (pc.iceGatheringState === 'complete') r(); }); }); }
function notifyIfNeeded(content) { if (document.visibilityState === 'hidden' && 'Notification' in window && Notification.permission === 'granted') { new Notification('P2P 비밀채팅', { body: content }); } }

// ─── 해시 처리 ────────────────────────────────────
async function checkHash() {
  const h = location.hash.substring(1); if (!h) return;
  const p = new URLSearchParams(h);
  if (p.has('offer') && p.has('peer')) {
    const peerId = p.get('peer'); if (await isDestroyed(peerId)) { alert('삭제된 대화'); return; }
    const offer = decodeSDP(p.get('offer'));
    if (!(await getContacts()).find(c => c.id === peerId)) await addContact(peerId, '상대방');
    activePeerId = peerId; const sess = getSession(peerId); sess.isOfferer = false; initPC(peerId);
    await sess.pc.setRemoteDescription(offer);
    const ans = await sess.pc.createAnswer(); await sess.pc.setLocalDescription(ans); await waitIce(sess.pc);
    const answerB64 = encodeSDP(sess.pc.localDescription);
    showView('chatScreen'); document.getElementById('chatTitle').innerHTML = `<div class="avatar">상</div><div class="name">상대방</div>`;
    document.getElementById('passwordPrompt').style.display = 'block';
    document.getElementById('answerModalLink').textContent = location.origin + location.pathname + '#answer=' + answerB64 + '&peer=' + peerId;
    document.getElementById('answerModal').classList.remove('hidden');
    renderContactList();
  } else if (p.has('answer') && p.has('peer')) {
    const peerId = p.get('peer'); if (await isDestroyed(peerId)) return;
    const answer = decodeSDP(p.get('answer'));
    if (!(await getContacts()).find(c => c.id === peerId)) await addContact(peerId, '상대방');
    let sess = sessions[peerId];
    if (!sess || !sess.pc) { sess = getSession(peerId); sess.isOfferer = true; initPC(peerId); sess.dc = sess.pc.createDataChannel('chat', { ordered: true }); setupDC(peerId); }
    if (sess.pc) {
      await sess.pc.setRemoteDescription(answer);
      activePeerId = peerId; showView('chatScreen');
      const contacts = await getContacts(); const c = contacts.find(c => c.id === peerId);
      document.getElementById('chatTitle').innerHTML = `<div class="avatar">${(c?.name||'?')[0]}</div><div class="name">${c?.name||'채팅'}</div>`;
      document.getElementById('passwordPrompt').style.display = 'block';
    }
    renderContactList();
  }
}
window.addEventListener('hashchange', checkHash);
