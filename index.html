<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0, minimum-scale=1.0">
  <title>P2P 비밀 메신저 – 완전판</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'nonce-abc123'; connect-src *; media-src 'self'; img-src 'self' data: blob:; style-src 'self' 'nonce-abc123'; base-uri 'none'; form-action 'none'; referrer no-referrer;">
  <meta name="referrer" content="no-referrer">
  <style nonce="abc123">
    :root {
      --bg: #080e15;
      --surface: #111922;
      --card: rgba(18, 25, 35, 0.9);
      --text: #e4e8f0;
      --sub: #8b95a5;
      --accent: #4f8cff;
      --danger: #ff5c5c;
      --success: #2dd4bf;
      --border: #1e293b;
      --radius: 24px;
      --radius-sm: 16px;
      --safe-bottom: env(safe-area-inset-bottom, 8px);
      --bubble-mine: linear-gradient(145deg, #1e3a5f, #162a4a);
      --bubble-other: #1b2432;
      --shadow: 0 4px 14px rgba(0,0,0,0.4);
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    * { margin:0; padding:0; box-sizing:border-box; user-select: none; -webkit-user-select: none; -moz-user-select: none; -webkit-touch-callout: none; -webkit-tap-highlight-color: transparent; }
    body, html { height:100%; overflow: hidden; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; justify-content: center; align-items: center;
      height: 100dvh; padding: 8px;
      overscroll-behavior: none;
    }
    .app-container {
      width: 100%; max-width: 480px; height: 100%;
      background: var(--surface); border-radius: 28px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.8);
      display: flex; flex-direction: column; overflow: hidden;
      border: 1px solid var(--border); position: relative;
    }
    /* ─── 헤더 ─── */
    .header { padding:12px 18px; background:rgba(8,14,24,0.95); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; min-height:52px; }
    .header h1 { font-size:1rem; font-weight:700; background:linear-gradient(135deg,#9bb5ff,#c4b5fd); -webkit-background-clip:text; -webkit-text-fill-color:transparent; letter-spacing: -0.3px; }
    .status-pill { display:flex; align-items:center; gap:6px; background:rgba(255,255,255,0.04); padding:5px 12px; border-radius:20px; font-size:0.8rem; }
    .dot { width:9px; height:9px; border-radius:50%; transition:0.2s; }
    .dot.on { background:var(--success); box-shadow:0 0 8px var(--success); }
    .dot.off { background:var(--danger); }
    /* ─── 메인 화면 ─── */
    .main-content { flex:1; overflow-y:auto; padding:14px 14px; display:flex; flex-direction:column; }
    .view { display:flex; flex-direction:column; height:100%; }
    .hidden { display:none !important; }
    .card { background:var(--card); backdrop-filter:blur(10px); border-radius:var(--radius); padding:18px; margin-bottom:12px; border:1px solid var(--border); box-shadow: var(--shadow); }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; background:rgba(255,255,255,0.06); color:white; border:1px solid var(--border); padding:13px 18px; border-radius:var(--radius-sm); cursor:pointer; font-weight:600; font-size:0.9rem; transition:var(--transition); width:100%; backdrop-filter:blur(10px); letter-spacing: -0.2px; }
    .btn:hover { background:rgba(255,255,255,0.12); }
    .btn:active { transform:scale(0.97); }
    .btn.primary { background:var(--accent); border:none; box-shadow:0 4px 12px rgba(79,140,255,0.3); }
    .btn.danger { background:var(--danger); border:none; }
    .btn-small { padding:7px 12px; font-size:0.78rem; width:auto; border-radius:12px; }
    input, textarea { width:100%; background:#0b1119; color:var(--text); border:1px solid var(--border); border-radius:var(--radius-sm); padding:13px 14px; font-size:15px; outline:none; transition:var(--transition); }
    input:focus, textarea:focus { border-color:var(--accent); box-shadow: 0 0 0 3px rgba(79,140,255,0.25); }
    .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index:100; display:flex; align-items:center; justify-content:center; }
    .modal-content { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:22px; width:90%; max-width:340px; box-shadow: 0 25px 50px rgba(0,0,0,0.6); }
    .modal-content h3 { margin-bottom:14px; font-size:1.05rem; }
    /* ─── 채팅 화면 ─── */
    #chatScreen { display:none; flex-direction:column; flex:1; }
    .chat-header { display:flex; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid var(--border); background:rgba(8,14,24,0.9); backdrop-filter:blur(12px); }
    .chat-title { font-size:0.95rem; font-weight:600; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .msg-list { flex:1; overflow-y:auto; padding:14px 8px; display:flex; flex-direction:column; gap:10px; }
    .msg { display:flex; flex-direction:column; animation:msgIn 0.25s ease; }
    .msg.system { align-items:center; }
    .msg.mine { align-items:flex-end; }
    .msg.other { align-items:flex-start; }
    .bubble {
      max-width:80%; padding:10px 15px; border-radius:20px;
      position:relative; word-break:break-word; line-height:1.4;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      font-size:0.92rem;
    }
    .msg.mine .bubble {
      background:var(--bubble-mine);
      border-bottom-right-radius: 6px;
      color:#fff;
    }
    .msg.other .bubble {
      background:var(--bubble-other);
      border-bottom-left-radius: 6px;
      border:1px solid rgba(255,255,255,0.05);
    }
    .msg.system .bubble {
      background:rgba(255,255,255,0.04);
      border-radius:20px; padding:6px 16px;
      font-size:0.75rem; color:var(--sub);
    }
    .time-tick {
      display:flex; justify-content:flex-end; align-items:center;
      gap:6px; font-size:0.62rem; color:var(--sub); margin-top:3px;
      padding-right:4px;
    }
    .read-status { color:var(--success); font-size:0.7rem; }
    .canvas-bubble { display:block; max-width:100%; height:auto; border-radius: inherit; }
    .canvas-bubble.blurred { filter: blur(12px); transition: filter 0.3s; }
    .canvas-bubble.locked { filter: blur(22px); pointer-events:auto; }
    .typing-indicator { font-size:0.7rem; color:var(--sub); padding:4px 16px; display:none; font-style:italic; }
    .input-area { display:flex; gap:6px; padding:8px 10px; align-items:flex-end; background:rgba(0,0,0,0.3); border-top:1px solid var(--border); }
    #msgInput { flex:1; min-height:42px; max-height:110px; resize:none; background:rgba(255,255,255,0.04); border-radius:22px; padding:10px 16px; line-height:1.4; }
    .send-btn { background:var(--accent); color:white; width:42px; height:42px; display:flex; align-items:center; justify-content:center; border-radius:50%; cursor:pointer; flex-shrink:0; transition:var(--transition); font-size:1.2rem; }
    .send-btn:active { transform:scale(0.92); }
    .attach-btn { background:rgba(255,255,255,0.05); border:none; color:var(--sub); font-size:1.4rem; padding:8px; cursor:pointer; border-radius:50%; }
    .action-bar { display:flex; gap:4px; padding:4px 10px; background:rgba(0,0,0,0.2); }
    .action-btn { background:rgba(255,255,255,0.04); border:1px solid var(--border); color:var(--text); padding:6px 12px; border-radius:20px; cursor:pointer; font-size:0.8rem; }
    /* 피커 */
    .picker-overlay { display:none; position:absolute; bottom:100%; left:0; right:0; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:10px; max-height:200px; overflow-y:auto; z-index:20; margin-bottom:4px; }
    .picker-overlay.active { display:flex; flex-direction:column; gap:6px; }
    .picker-grid { display:flex; flex-wrap:wrap; gap:6px; }
    .emoji-item { font-size:1.6rem; cursor:pointer; padding:4px 8px; border-radius:10px; }
    .picker-item img { width:56px; height:56px; object-fit:cover; border-radius:10px; }
    /* 컨택 리스트 */
    .contact-list { display:flex; flex-direction:column; gap:8px; margin-top:12px; }
    .contact-card { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:18px; padding:14px; cursor:pointer; display:flex; align-items:center; gap:12px; transition:var(--transition); }
    .contact-card:hover, .contact-card.active { border-color:var(--accent); background:rgba(79,140,255,0.08); }
    .contact-avatar { width:44px; height:44px; border-radius:50%; background:rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:center; font-size:1.2rem; font-weight:600; color:var(--accent); }
    .contact-info { flex:1; min-width:0; }
    .contact-name { font-weight:600; }
    .contact-preview { font-size:0.75rem; color:var(--sub); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .unread-badge { background:var(--danger); color:white; border-radius:12px; padding:2px 8px; font-size:0.7rem; font-weight:bold; margin-left:6px; }
    .fingerprint { font-family:monospace; font-size:0.6rem; background:#0a0f18; padding:4px 8px; border-radius:8px; user-select:text; -webkit-user-select:text; }
    .spinner { width:22px; height:22px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.6s linear infinite; display:inline-block; }
    @keyframes msgIn { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
    @keyframes spin { to{transform:rotate(360deg);} }
    .svg-icon { width:18px; height:18px; fill:currentColor; flex-shrink:0; }
    /* 보안 카드 */
    .security-strip { display:flex; align-items:center; gap:8px; padding:6px 12px; background:rgba(79,140,255,0.08); font-size:0.7rem; border-bottom:1px solid var(--border); }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header"><h1>🔐 P2P 비밀채팅</h1><div class="status-pill"><span id="connDot" class="dot off"></span><span id="connLabel">오프라인</span></div></div>
  <div class="main-content" id="mainArea">

    <!-- 메인 리스트 -->

      <div class="card" style="text-align:center;">
        <h3 style="margin-bottom:6px;">익명 P2P 채팅</h3>

        <button id="joinChatBtn" class="btn" style="margin-top:10px;"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>초대 받기</button>

      <div class="modal-content"><h3>✨ 새 채팅</h3><input type="text" id="peerNameInput" placeholder="상대방 이름"><div style="display:flex; gap:8px; margin-top:14px;"><button id="confirmNewChatBtn" class="btn primary" style="flex:1;">확인</button><button id="cancelNameModalBtn" class="btn" style="flex:1;">취소</button></div></div>

      <button id="goHomeFromAnswerBtn" class="btn mt">홈</button>

    <!-- 채팅 화면 -->

        <span class="chat-title" id="chatTitle">채팅</span>
        <button id="renameChatBtn" class="btn-small"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg></button>
        <button id="destroyChatBtn" class="btn-small danger"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>

</div>
<!-- Answer 모달 -->

<script nonce="abc123">
(function() {
  'use strict';
  const noop = ()=>{};
  Object.keys(console).forEach(k => { if (typeof console[k] === 'function') console[k] = noop; });
  document.addEventListener('contextmenu', e => e.preventDefault());
  document.addEventListener('dragstart', e => e.preventDefault());
  document.addEventListener('selectstart', e => { if (!e.target.matches('input,textarea')) e.preventDefault(); });
  window.onbeforeprint = () => document.body.innerHTML = '';
})();

const textEncoder = new TextEncoder();
const textDecoder = new TextDecoder();
const toBase64url = b => btoa(String.fromCharCode(...new Uint8Array(b))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
const fromBase64url = s => { s = s.replace(/-/g,'+').replace(/_/g,'/'); while(s.length%4) s+='='; return Uint8Array.from(atob(s),c=>c.charCodeAt(0)).buffer; };
const encodeSDP = o => toBase64url(textEncoder.encode(JSON.stringify(o)));
const decodeSDP = s => JSON.parse(textDecoder.decode(fromBase64url(s)));

const ICE_SERVERS = [
  { urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' },
  { urls: 'stun:stun.cloudflare.com:3478' }, { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
];

const sessions = {};
let activePeerId = null;
const DESTROY_PREFIX = 'p2p_destroyed_';
const OFFLINE_QUEUE_PREFIX = 'p2p_offline_queue_';
if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();

// 마스터 키
let masterKey = null;
async function deriveMasterKey(pw) {
  const km = await crypto.subtle.importKey('raw', textEncoder.encode(pw), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name:'PBKDF2', salt:textEncoder.encode('p2p-master-salt'), iterations:20000000, hash:'SHA-512' }, km, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']);
}
async function encryptForStorage(data) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({name:'AES-GCM', iv}, masterKey, textEncoder.encode(JSON.stringify(data)));
  return { iv:Array.from(new Uint8Array(iv)), ct:Array.from(new Uint8Array(ct)) };
}
async function decryptFromStorage(enc) {
  const iv = new Uint8Array(enc.iv), ct = new Uint8Array(enc.ct);
  const plain = await crypto.subtle.decrypt({name:'AES-GCM', iv}, masterKey, ct);
  return JSON.parse(textDecoder.decode(plain));
}
async function setStorage(key, val) { try { const e = await encryptForStorage(val); localStorage.setItem(key, JSON.stringify(e)); } catch{} }
async function getStorage(key) { try { const r = localStorage.getItem(key); return r ? await decryptFromStorage(JSON.parse(r)) : null; } catch{ return null; } }

// 세션 관리
function getSession(peerId) {
  if (!sessions[peerId]) sessions[peerId] = {
    pc:null, dc:null, typingDC:null, typingKey:null, isOfferer:false, password:null,
    rootKey:null, sendChainKey:null, recvChainKey:null, sendMsgNum:0, recvMsgNum:0,
    ourEphemeralKeyPair:null, theirEphemeralPub:null,
    salt:null, ourEcdhPair:null, peerEcdhPub:null,
    handshakeDone:false, confirmed:false, isOnline:false,
    receivedMessageIds:new Set(), pendingMessages:[],
    fileReceive:null, typingTimer:null, reconnectAttempts:0,
    pendingConfirm:null, destroyRetry:0, destroyTimer:null
  };
  return sessions[peerId];
}
async function isDestroyed(pid) { return !!sessionStorage.getItem(DESTROY_PREFIX+pid) || !!(await getStorage(DESTROY_PREFIX+pid)); }
async function markDestroyed(pid) { await setStorage(DESTROY_PREFIX+pid, Date.now()); sessionStorage.setItem(DESTROY_PREFIX+pid,'1'); clearOfflineQueue(pid); if (location.hash) history.replaceState(null,'',location.pathname); }
async function saveOfflineQueue(pid, q) { await setStorage(OFFLINE_QUEUE_PREFIX+pid, q); }
async function loadOfflineQueue(pid) { return await getStorage(OFFLINE_QUEUE_PREFIX+pid) || []; }
function clearOfflineQueue(pid) { localStorage.removeItem(OFFLINE_QUEUE_PREFIX+pid); }

// 연락처
async function getContacts() { return await getStorage('p2p_contacts') || []; }
async function saveContacts(c) { await setStorage('p2p_contacts', c); }
async function addContact(pid, name) { let c = await getContacts(); if (!c.find(x=>x.id===pid)) { c.push({id:pid, name}); await saveContacts(c); } renderContactList(); }
async function renameChat() { if(!activePeerId) return; let c = await getContacts(); let f = c.find(x=>x.id===activePeerId); if(f){ let n = prompt('이름',f.name); if(n){f.name=n; await saveContacts(c); document.getElementById('chatTitle').textContent=n; renderContactList(); } } }
async function renderContactList() {
  let container = document.getElementById('contactList'); if(!container) return;
  let contacts = await getContacts(); let filtered = [];
  for (let c of contacts) if (!(await isDestroyed(c.id))) filtered.push(c);
  container.innerHTML = filtered.map(c => {
    let sess = sessions[c.id], online = sess?.isOnline, unread = sess?.pendingMessages.length || 0;

// WebRTC
function initPC(pid) {
  let sess=getSession(pid); if(sess.pc) sess.pc.close();
  sess.pc = new RTCPeerConnection({iceServers:ICE_SERVERS});
  sess.pc.oniceconnectionstatechange = () => {
    let st = sess.pc.iceConnectionState;
    if(st==='connected'||st==='completed') { sess.isOnline=true; updateConn(true); renderContactList(); }
    else if(st==='disconnected'||st==='failed'||st==='closed') {
      sess.isOnline=false; updateConn(false);
      if(st==='failed') {
        if(sess.reconnectAttempts<3) { sess.reconnectAttempts++; setTimeout(()=>{ if(sess.pc&&sess.pc.iceConnectionState==='failed') try{sess.pc.restartIce();}catch{}},2000); }
        else { sess.handshakeDone=false; sess.rootKey=null; sess.confirmed=false; appendSystemMessage('⚠️ 연결 끊김'); }
      }
    }
  };
  sess.pc.ondatachannel = e => {
    if(e.channel.label==='chat'){ sess.dc=e.channel; setupDC(pid); }
    else if(e.channel.label==='typing'){ sess.typingDC=e.channel; setupTypingDC(pid); }
  };
}
function setupDC(pid) {
  let sess=getSession(pid); if(!sess?.dc) return;
  sess.dc.onopen = async ()=>{
    if(await isDestroyed(pid)) return;
    sess.isOnline=true; updateConn(true); renderContactList();
    if(sess.handshakeDone) { appendSystemMessage('🔄 재연결됨'); startEcdhExchange(pid); }
    else if(!sess.handshakeDone&&!sess.rootKey) startEcdhExchange(pid);
  };
  sess.dc.onmessage = e => onMsg(pid, e);
  sess.dc.onclose = ()=>{ sess.isOnline=false; updateConn(false); };
}
function setupTypingDC(pid) {
  let sess=getSession(pid); if(!sess?.typingDC) return;
  sess.typingDC.onmessage = async e => {
    if(typeof e.data==='string'){
      try{ let d=JSON.parse(e.data); if(d.type==='__destroy_req__'){ await markDestroyed(d.peerId||pid); goHome(); } else decryptTyping(sess,d).then(st=>{ if(pid===activePeerId) document.getElementById('typingIndicator').style.display=st==='1'?'block':'none'; }).catch(()=>{}); }catch{}
    }
  };
}

// 암호화
async function startEcdhExchange(pid) {
  let sess=getSession(pid);
  try{
    let kp=await crypto.subtle.generateKey({name:'ECDH',namedCurve:'P-521'},true,['deriveKey','deriveBits']);
    sess.ourEcdhPair = {privateKey:kp.privateKey, publicKey:kp.publicKey};
    let pubRaw=await crypto.subtle.exportKey('raw',kp.publicKey);
    if(sess.isOfferer){ sess.salt=crypto.getRandomValues(new Uint8Array(4096)); sess.dc?.send(JSON.stringify({type:'__ecdhe__',salt:buf2b64(sess.salt.buffer),pubKey:buf2b64(pubRaw)})); }
    else sess.dc?.send(JSON.stringify({type:'__ecdhe__',pubKey:buf2b64(pubRaw)}));
  }catch{ appendSystemMessage('키 교환 오류'); }
}
async function handleEcdheMessage(pid,data){
  let sess=getSession(pid); if(sess.handshakeDone) return;
  if(data.salt) sess.salt=new Uint8Array(b642buf(data.salt));
  sess.peerEcdhPub=await crypto.subtle.importKey('raw',b642buf(data.pubKey),{name:'ECDH',namedCurve:'P-521'},true,[]);
  if(sess.password&&sess.ourEcdhPair&&sess.peerEcdhPub&&sess.salt) await deriveSessionKey(pid);
}
async function submitPassword(){
  if(!activePeerId) return;
  let sess=getSession(activePeerId), pw=document.getElementById('chatPasswordInput').value.trim();
  if(!pw) return;
  sess.password=pw;
  if(sess.salt&&sess.ourEcdhPair&&sess.peerEcdhPub) await deriveSessionKey(activePeerId);
}
async function deriveSessionKey(pid){
  let sess=getSession(pid);
  try{
    let km=await crypto.subtle.importKey('raw',textEncoder.encode(sess.password),'PBKDF2',false,['deriveKey']);
    sess.authKey=await crypto.subtle.deriveKey({name:'PBKDF2',salt:sess.salt,iterations:20000000,hash:'SHA-512'},km,{name:'AES-GCM',length:256},true,['encrypt','decrypt']);
    let ecdhBits=await crypto.subtle.deriveBits({name:'ECDH',public:sess.peerEcdhPub},sess.ourEcdhPair.privateKey,521);
    let authRaw=await crypto.subtle.exportKey('raw',sess.authKey);
    let ikm=concatBufs(ecdhBits,textEncoder.encode(sess.password));
    let hkdfKey=await crypto.subtle.importKey('raw',ikm,'HKDF',false,['deriveBits']);
    let rootKey=await crypto.subtle.deriveBits({name:'HKDF',hash:'SHA-512',salt:authRaw,info:textEncoder.encode('root')},hkdfKey,256);
    sess.rootKey=await crypto.subtle.importKey('raw',rootKey,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
    sess.ourEphemeralKeyPair=sess.ourEcdhPair; sess.theirEphemeralPub=sess.peerEcdhPub;
    let typingRaw=new Uint8Array(rootKey).slice(0,16);
    sess.typingKey=await crypto.subtle.importKey('raw',typingRaw,{name:'AES-GCM',length:128},false,['encrypt','decrypt']);
    sess.handshakeDone=true;
    if(sess.isOfferer) await sendConfirmation(pid);
    if(sess.pendingConfirm){ let p=sess.pendingConfirm; sess.pendingConfirm=null; await handleConfirmation(pid,p); }
    if(pid===activePeerId){
      document.getElementById('securityStrip').style.display='flex';
      document.getElementById('sessionFingerprint').textContent=buf2hex(rootKey);
      document.getElementById('passwordPrompt').style.display='none';
    }
  }catch(e){ document.getElementById('passwordError').style.display='block'; }
}
async function sendConfirmation(pid){
  let sess=getSession(pid); if(!sess.rootKey||!sess.dc||sess.dc.readyState!=='open') return;
  let kp=await crypto.subtle.generateKey({name:'ECDH',namedCurve:'P-521'},true,['deriveKey','deriveBits']);
  sess.ourEphemeralKeyPair=kp;
  let newChain=await dhRatchet(sess,kp.privateKey,sess.theirEphemeralPub); sess.sendChainKey=newChain; sess.sendMsgNum=0;
  let pubRaw=await crypto.subtle.exportKey('raw',kp.publicKey);
  sess.dc.send(JSON.stringify({type:'__confirm__',dhPub:buf2b64(pubRaw)}));
}
async function handleConfirmation(pid,data){
  let sess=getSession(pid); if(!sess.rootKey){ sess.pendingConfirm=data; return; }
  if(data.dhPub) await processReceivedRatchet(sess,data.dhPub);
  sess.confirmed=true; if(!sess.isOfferer) await sendConfirmation(pid);
  if(pid===activePeerId){ document.getElementById('securityStrip').style.display='flex'; document.getElementById('passwordPrompt').style.display='none'; }
  flushOfflineQueue(pid);
}
async function dhRatchet(sess,ourPriv,theirPub){
  let dhBits=await crypto.subtle.deriveBits({name:'ECDH',public:theirPub},ourPriv,521);
  let rootRaw=await crypto.subtle.exportKey('raw',sess.rootKey);
  let ikm=concatBufs(dhBits,rootRaw);
  let hkdfKey=await crypto.subtle.importKey('raw',ikm,'HKDF',false,['deriveBits']);
  let okm=await crypto.subtle.deriveBits({name:'HKDF',hash:'SHA-512',salt:new Uint8Array(32),info:textEncoder.encode('double-ratchet')},hkdfKey,512);
  sess.rootKey=await crypto.subtle.importKey('raw',okm.slice(0,32),{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
  return okm.slice(32,64);
}
async function symmetricRatchet(ck){ let key=await crypto.subtle.importKey('raw',ck,{name:'HMAC',hash:'SHA-512'},false,['sign']); let mk=await crypto.subtle.sign('HMAC',key,new Uint8Array([1])); let nk=await crypto.subtle.sign('HMAC',key,new Uint8Array([2])); return {msgKey:mk.slice(0,32),nextChainKey:nk.slice(0,32)}; }
async function encryptPayload(sess,obj){
  let dhPub=null;
  if(!sess.sendChainKey){ let kp=await crypto.subtle.generateKey({name:'ECDH',namedCurve:'P-521'},true,['deriveKey','deriveBits']); sess.ourEphemeralKeyPair=kp; sess.sendChainKey=await dhRatchet(sess,kp.privateKey,sess.theirEphemeralPub); sess.sendMsgNum=0; dhPub=await crypto.subtle.exportKey('raw',kp.publicKey); dhPub=buf2b64(dhPub); }
  let {msgKey,nextChainKey}=await symmetricRatchet(sess.sendChainKey); sess.sendChainKey=nextChainKey;
  let seq=sess.sendMsgNum++, iv=crypto.getRandomValues(new Uint8Array(16));
  let padLen=256+Math.floor(crypto.getRandomValues(new Uint8Array(1))[0]/256*256);
  let padded={...obj,_pad:buf2b64(crypto.getRandomValues(new Uint8Array(padLen)).buffer)};
  let mk=await crypto.subtle.importKey('raw',msgKey,'AES-GCM',false,['encrypt']);
  let ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},mk,textEncoder.encode(JSON.stringify(padded)));
  let res={seq,iv:Array.from(new Uint8Array(iv)),ct:Array.from(new Uint8Array(ct))}; if(dhPub) res.dhPub=dhPub; return res;
}
async function processReceivedRatchet(sess,dhPubB64){ let pubRaw=b642buf(dhPubB64); let peerPub=await crypto.subtle.importKey('raw',pubRaw,{name:'ECDH',namedCurve:'P-521'},true,[]); sess.recvChainKey=await dhRatchet(sess,sess.ourEphemeralKeyPair.privateKey,peerPub); sess.recvMsgNum=0; sess.theirEphemeralPub=peerPub; }
async function decryptPayload(sess,d){ if(d.dhPub) await processReceivedRatchet(sess,d.dhPub); if(!sess.recvChainKey) throw new Error('no recv'); let {seq,iv,ct}=d; while(sess.recvMsgNum<seq){ let {nextChainKey}=await symmetricRatchet(sess.recvChainKey); sess.recvChainKey=nextChainKey; sess.recvMsgNum++; } let {msgKey,nextChainKey}=await symmetricRatchet(sess.recvChainKey); sess.recvChainKey=nextChainKey; sess.recvMsgNum=seq+1; let mk=await crypto.subtle.importKey('raw',msgKey,'AES-GCM',false,['decrypt']); let plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:new Uint8Array(iv)},mk,new Uint8Array(ct)); let obj=JSON.parse(textDecoder.decode(plain)); delete obj._pad; return obj; }

// 송수신
async function sendText(){
  if(!activePeerId||await isDestroyed(activePeerId)) return;
  let sess=getSession(activePeerId), inp=document.getElementById('msgInput'), txt=inp.value.trim(); if(!txt) return;
  let msgId=crypto.randomUUID(); await sendPayload(sess,{type:'text',content:txt,id:msgId},txt,msgId); inp.value='';
}
async function sendPayload(sess,payload,display,msgId){
  if(!sess.dc||sess.dc.readyState!=='open'||!sess.rootKey||!sess.confirmed){
    let q=await loadOfflineQueue(activePeerId); q.push({payload,display,id:msgId,ts:Date.now()}); await saveOfflineQueue(activePeerId,q);
    appendDecryptedMessage(display,'mine',msgId); return;
  }
  try{
    let enc=await encryptPayload(sess,payload); sess.dc.send(JSON.stringify({type:'msg',...enc}));
    appendDecryptedMessage(display,'mine',msgId); notifyIfNeeded(display);
  }catch(e){ /* offline queue */ }
}
async function onMsg(pid,e){
  if(await isDestroyed(pid)) return;
  let sess=getSession(pid); if(!sess) return;
  if(e.data instanceof ArrayBuffer){ handleBinaryChunk(pid,e.data); return; }
  try{
    let d=JSON.parse(e.data);
    if(d.type==='__ecdhe__'){ handleEcdheMessage(pid,d); return; }
    if(d.type==='__confirm__'){ handleConfirmation(pid,d); return; }
    if(d.type==='__destroy_req__'){ await markDestroyed(d.peerId||pid); goHome(); return; }
    if(d.type==='msg'){
      if(!sess.rootKey||!sess.confirmed){ appendEncryptedMessage(d); return; }
      let inner=await decryptPayload(sess,d); if(!inner||(inner.id&&sess.receivedMessageIds.has(inner.id))) return;
      if(inner.id) sess.receivedMessageIds.add(inner.id);
      switch(inner.type){
        case'text':case'emoji': receiveMessage(pid,inner.content,'other',inner.id); break;
        case'media': receiveMessage(pid,`<img src="${inner.url}" style="max-width:180px;border-radius:12px;">`,'other',inner.id); break;
        case'file_start': handleFileStart(pid,inner); break;
        case'file_end': if(sess.fileReceive&&sess.fileReceive.id===inner.id) assembleFile(pid); break;
        case'__destroy__': await markDestroyed(pid); goHome(); break;
      }
    }
  }catch{ appendEncryptedMessage(JSON.parse(e.data)); }
}
function appendDecryptedMessage(text,who,msgId){
  let c=document.getElementById('messages'), d=document.createElement('div');
  d.className=`msg ${who}`; d.id=msgId?'msg-'+msgId:'';
  let canvas=document.createElement('canvas'); let ctx=canvas.getContext('2d');
  ctx.font='15px Inter, Segoe UI, sans-serif'; let maxW=260, padding=16;
  let words=text.split(' '), lines=[], cur='';
  words.forEach(w=>{ let t=cur+w+' '; if(ctx.measureText(t).width>maxW&&cur){ lines.push(cur.trimEnd()); cur=w+' '; } else cur=t; });
  lines.push(cur.trimEnd()); let lh=22;
  canvas.width=maxW+padding*2; canvas.height=lines.length*lh+padding*2;
  ctx.fillStyle=who==='mine'?'#1e3a5f':'#1b2432'; ctx.beginPath(); ctx.roundRect(0,0,canvas.width,canvas.height,18); ctx.fill();
  ctx.fillStyle='#e4e8f0'; lines.forEach((l,i)=>ctx.fillText(l,padding,padding+(i+1)*lh-4));
  canvas.className='canvas-bubble blurred';
  let timeDiv=document.createElement('div'); timeDiv.className='time-tick'; timeDiv.textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  d.appendChild(canvas); d.appendChild(timeDiv);
  let timer; canvas.addEventListener('pointerdown',()=>{ if(!canvas.classList.contains('locked')) timer=setTimeout(()=>{canvas.classList.remove('blurred');canvas.classList.add('revealed');setTimeout(()=>canvas.classList.add('blurred'),3000);},600); });
  canvas.addEventListener('pointerup',()=>clearTimeout(timer));
  c.appendChild(d); c.scrollTop=c.scrollHeight;
}
function appendEncryptedMessage(data){ let c=document.getElementById('messages'), d=document.createElement('div'); d.className='msg system'; d.innerHTML=`<div class="bubble">🔒 ${escapeHtml(JSON.stringify(data))}</div>`; c.appendChild(d); }
function appendSystemMessage(t){ if(!activePeerId) return; let c=document.getElementById('messages'), d=document.createElement('div'); d.className='msg system'; d.innerHTML=`<div class="bubble">${escapeHtml(t)}</div>`; c.appendChild(d); }
async function flushOfflineQueue(pid){ let sess=getSession(pid); if(!sess?.dc||sess.dc.readyState!=='open'||!sess.rootKey||!sess.confirmed) return; let q=await loadOfflineQueue(pid); if(!q.length) return; clearOfflineQueue(pid); for(let item of q){ try{ let enc=await encryptPayload(sess,item.payload); sess.dc.send(JSON.stringify({type:'msg',...enc})); }catch(e){ let r=await loadOfflineQueue(pid); r.push(item); await saveOfflineQueue(pid,r); break; } } }
function receiveMessage(pid,text,who,msgId){ let sess=getSession(pid); if(pid===activePeerId) appendDecryptedMessage(text,who,msgId); else{ sess.pendingMessages.push({text,who,msgId}); notifyIfNeeded(text); renderContactList(); } }

async function destroyChat(pid){ let sess=getSession(pid); if(!sess) return; await markDestroyed(pid); if(sess.pc) sess.pc.close(); delete sessions[pid]; if(activePeerId===pid) goHome(); renderContactList(); }

// 유틸
function buf2hex(b){ return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join(''); }
function concatBufs(...bufs){ let len=bufs.reduce((a,b)=>a+b.byteLength,0), tmp=new Uint8Array(len), off=0; bufs.forEach(b=>{tmp.set(new Uint8Array(b),off);off+=b.byteLength;}); return tmp.buffer; }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }
function updateConn(ok){ document.getElementById('connDot').className='dot '+(ok?'on':'off'); document.getElementById('connLabel').textContent=ok?'연결됨':'오프라인'; }
function waitIce(pc){ return new Promise(r=>{ if(pc.iceGatheringState==='complete') r(); else pc.addEventListener('icegatheringstatechange',()=>{ if(pc.iceGatheringState==='complete') r(); }); }); }
function buf2b64(b){ return btoa(String.fromCharCode(...new Uint8Array(b))); }
function b642buf(s){ return Uint8Array.from(atob(s),c=>c.charCodeAt(0)).buffer; }
function notifyIfNeeded(t){ if(document.visibilityState==='hidden'&&Notification.permission==='granted') new Notification('P2P 채팅',{body:t}); }
async function checkHash(){
  let h=location.hash.substring(1); if(!h) return;
  let p=new URLSearchParams(h);
  if(p.has('offer')&&p.has('peer')){
    let pid=p.get('peer'); if(await isDestroyed(pid)) return;
    let offer=decodeSDP(p.get('offer')); await addContact(pid,'상대방'); activePeerId=pid;
    let sess=getSession(pid); sess.isOfferer=false; initPC(pid);
    await sess.pc.setRemoteDescription(offer); let ans=await sess.pc.createAnswer(); await sess.pc.setLocalDescription(ans); await waitIce(sess.pc);
    showView('chatScreen'); document.getElementById('answerModalLink').textContent=location.origin+location.pathname+'#answer='+encodeSDP(sess.pc.localDescription)+'&peer='+pid;
    document.getElementById('answerModal').classList.remove('hidden'); renderContactList();
  } else if(p.has('answer')&&p.has('peer')){
    let pid=p.get('peer'); if(await isDestroyed(pid)) return;
    let answer=decodeSDP(p.get('answer')); await addContact(pid,'상대방');
    let sess=getSession(pid); if(!sess.pc){ sess.isOfferer=true; initPC(pid); sess.dc=sess.pc.createDataChannel('chat',{ordered:true}); setupDC(pid); }
    await sess.pc.setRemoteDescription(answer); activePeerId=pid; showView('chatScreen'); renderContactList();
  }
}
window.addEventListener('hashchange', checkHash);

// 초기화
showView('simpleMode'); document.getElementById('simpleMode').classList.add('hidden');
document.getElementById('masterPasswordUI').style.display='flex';
