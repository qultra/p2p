<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🔒 인스타 DM 비밀 북마크릿</title>
  <style>
    :root {
      --bg: #0a0e14; --surface: #141b22; --text: #cdd6e0; --accent: #5190f0;
      --border: #1e293b; --radius: 16px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; justify-content: center; align-items: center;
      min-height: 100dvh; padding: 16px;
    }
    .container {
      width: 100%; max-width: 480px; background: var(--surface);
      border-radius: var(--radius); padding: 24px 20px;
      border: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 20px;
    }
    h1 { font-size: 1.4rem; text-align: center; letter-spacing: -0.5px; }
    .code-box {
      background: #0f172a; border: 1px solid var(--border);
      border-radius: 12px; padding: 12px; font-family: 'Courier New', monospace;
      font-size: 0.7rem; word-break: break-all; line-height: 1.4;
      max-height: 280px; overflow-y: auto; color: #b0bec5;
    }
    button {
      background: var(--accent); color: white; border: none;
      padding: 14px; border-radius: 12px; font-size: 1rem;
      font-weight: 600; cursor: pointer; width: 100%;
      transition: 0.2s; user-select: none; -webkit-user-select: none;
    }
    button:active { transform: scale(0.97); }
    button.copy-btn { background: #2e3b4e; margin-top: 8px; }
    .steps {
      font-size: 0.85rem; color: #8b98a5;
      border-left: 3px solid var(--accent); padding-left: 16px;
    }
    .steps li { margin: 6px 0; }
    hr { border: none; border-top: 1px solid var(--border); }
  </style>
</head>
<body>
<div class="container">
  <h1>🔏 인스타 DM 비밀 채팅</h1>
  <p style="text-align:center;color:#8895a5;font-size:0.9rem;">
    아래 북마크릿 코드를 복사하여 <strong>새 북마크의 URL</strong>에 붙여넣으세요.
  </p>
  <div class="code-box" id="codeDisplay">로딩 중...</div>
  <button id="copyBtn">📋 코드 복사</button>

  <hr>
  <div class="steps">
    <h3>📌 사용법</h3>
    <ol>
      <li>상대와 <strong>똑같은 비밀번호</strong>를 미리 약속합니다.</li>
      <li>인스타그램 웹 DM 화면에서 이 북마크를 <strong>클릭</strong>합니다.</li>
      <li>처음 한 번 비밀번호를 입력하면, 전송 버튼 옆에 <strong>🔒 전송</strong> 버튼이 생깁니다.</li>
      <li>평문을 입력하고 <strong>🔒 전송</strong>을 누르면 암호문(🔒:...)으로 자동 전송됩니다.</li>
      <li>상대가 보낸 암호문은 자동으로 복호화되어 평문으로 표시됩니다.</li>
    </ol>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  // 간결한 북마크릿 코드 생성 (인스타그램 DM 특화)
  const bookmarklet = `javascript:(function(){
    if(window.__encInjected) return;
    window.__encInjected=true;

    var te=new TextEncoder(),td=new TextDecoder();
    var b64=b=>btoa(String.fromCharCode(...new Uint8Array(b))).replace(/\\+/g,'-').replace(/\\//g,'_').replace(/=/g,'');
    var db64=s=>{s=s.replace(/-/g,'+').replace(/_/g,'/');while(s.length%4)s+='=';return Uint8Array.from(atob(s),c=>c.charCodeAt(0)).buffer;};

    async function k(pw,s){var m=await crypto.subtle.importKey('raw',te.encode(pw),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:s,iterations:250000,hash:'SHA-256'},m,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);}
    async function e(pw,pt){var s=crypto.getRandomValues(new Uint8Array(16)),key=await k(pw,s),iv=crypto.getRandomValues(new Uint8Array(12)),ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,te.encode(pt)),c=new Uint8Array(16+12+ct.byteLength);c.set(s,0);c.set(iv,16);c.set(new Uint8Array(ct),28);return '🔒:'+b64(c.buffer);}
    async function d(pw,full){if(!full.startsWith('🔒:'))throw new Error();var b=db64(full.slice(2)),s=b.slice(0,16),iv=b.slice(16,28),ct=b.slice(28),key=await k(pw,s),pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);return td.decode(pt);}

    var pw=sessionStorage.getItem('__encPw');
    if(!pw){pw=prompt('비밀번호를 입력하세요:','');if(!pw){window.__encInjected=false;return;}sessionStorage.setItem('__encPw',pw);}

    var intv=setInterval(function(){
      var inp=document.querySelector('[contenteditable="true"][role="textbox"]');
      var snd=document.querySelector('[data-testid="send-button"], [aria-label="Send"]');
      if(inp&&snd&&!document.getElementById('__encBtn')){
        clearInterval(intv);
        var btn=document.createElement('button');btn.id='__encBtn';btn.textContent='🔒 전송';
        btn.style='margin-left:6px;padding:8px 12px;background:#5190f0;color:white;border:none;border-radius:16px;font-weight:bold;cursor:pointer;font-size:14px;';
        snd.parentNode.insertBefore(btn,snd.nextSibling);
        btn.onclick=async function(ev){ev.preventDefault();ev.stopPropagation();var t=inp.textContent.trim();if(t){try{var c=await e(pw,t);inp.textContent=c;inp.dispatchEvent(new Event('input',{bubbles:true}));setTimeout(function(){snd.click();},80);}catch(ex){alert('오류: '+ex);}}};
      }
    },600);
    setTimeout(function(){clearInterval(intv);},12000);

    var obs=new MutationObserver(function(ms){
      ms.forEach(function(m){
        m.addedNodes.forEach(function(n){
          if(n.nodeType===1){
            var msgs=n.querySelectorAll?n.querySelectorAll('div[dir="auto"]'):[];
            if(n.matches&&n.matches('div[dir="auto"]')) msgs=[n];
            msgs.forEach(async function(el){
              if(el.dataset.__dec)return;var t=el.textContent.trim();
              if(t.startsWith('🔒:')){try{el.textContent=await d(pw,t);el.style.color='#4fd68a';el.dataset.__dec=1;}catch(e){}}
            });
          }
        });
      });
    });
    obs.observe(document.body,{childList:true,subtree:true});
  })();`.replace(/\s+/g, ' '); // 공백을 최소화하여 한 줄로

  document.getElementById('codeDisplay').textContent = bookmarklet;
  document.getElementById('copyBtn').addEventListener('click', () => {
    navigator.clipboard.writeText(bookmarklet).then(() => {
      alert('✅ 북마크릿 코드가 복사되었습니다!\n이제 브라우저 북마크의 URL에 붙여넣으세요.');
    }).catch(() => {
      // fallback
      document.getElementById('codeDisplay').select();
      document.execCommand('copy');
      alert('✅ 코드가 선택되었습니다. 수동으로 복사해주세요.');
    });
  });
});
</script>
</body>
</html>
