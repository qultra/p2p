<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0, minimum-scale=1.0">
  <title>P2P 비밀 메신저 – 최종 완전판</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; connect-src *; media-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; base-uri 'none'; form-action 'none'; referrer no-referrer;">
  <meta name="referrer" content="no-referrer">
  <style>
    :root {
      --bg: #06090f; --surface: #0f141e; --card: rgba(15,20,30,0.9);
      --text: #e0e5f0; --sub: #8892b0; --accent: #5b8df0; --danger: #f97070;
      --success: #45d68a; --border: #1a2332; --radius: 20px; --radius-sm: 14px;
      --safe-bottom: env(safe-area-inset-bottom, 10px);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    input, textarea { user-select: text !important; -webkit-user-select: text !important; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; justify-content: center; align-items: center;
      min-height: 100dvh; padding: 10px;
    }
    .container {
      width: 100%; max-width: 520px; height: 95dvh;
      background: var(--surface); border-radius: 30px;
      box-shadow: 0 30px 70px rgba(0,0,0,0.7);
      display: flex; flex-direction: column; overflow: hidden;
      border: 1px solid var(--border);
    }
    .header { padding:14px 20px; background:rgba(8,14,24,0.95); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .header h1 { font-size:1.1rem; background:linear-gradient(135deg,#90b4ff,#b794f4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .dot { width:10px; height:10px; border-radius:50%; }
    .dot.on { background:var(--success); } .dot.off { background:var(--danger); }
    .main-content { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; }
    .card { background:var(--card); backdrop-filter:blur(14px); border-radius:var(--radius); padding:18px; margin-bottom:12px; border:1px solid var(--border); }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; background:rgba(255,255,255,0.05); color:white; border:1px solid var(--border); padding:14px 20px; border-radius:var(--radius-sm); cursor:pointer; font-weight:600; width:100%; }
    .btn.primary { background:var(--accent); border:none; } .btn.danger { background:var(--danger); border:none; }
    input, textarea { width:100%; background:#0a0f18; color:var(--text); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px; font-size:16px; }
    .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); z-index:100; display:flex; align-items:center; justify-content:center; }
    .modal-content { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; width:90%; max-width:360px; }
    #chatScreen { display:none; flex-direction:column; flex:1; }
    #messages { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px; }
    .msg { display:flex; flex-direction:column; animation:fadeUp 0.2s; }
    .msg.system { align-items:center; } .msg.me { align-items:flex-end; } .msg.other { align-items:flex-start; }
    .bubble { max-width:83%; padding:10px 16px; border-radius:20px; background:rgba(22,30,44,0.85); border:1px solid rgba(255,255,255,0.05); }
    .msg.me .bubble { background:linear-gradient(140deg,rgba(74,130,250,0.5),rgba(124,92,240,0.5)); }
    .input-bar { display:flex; gap:6px; padding:10px 0; }
    #msgInput { flex:1; min-height:44px; resize:none; }
    .send-btn { background:var(--accent); width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; }
    .hidden { display:none !important; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .spinner { width:20px; height:20px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
<div class="container">
  <div class="header"><h1>🔐 P2P 비밀채팅</h1><div class="status-bar"><span id="connDot" class="dot off"></span><span id="connLabel">오프라인</span></div></div>
  <div class="main-content" id="mainArea">
    <!-- 홈 -->
    <div id="simpleMode" class="view">
      <div class="card text-center">
        <h3>서버 없이 익명성 보장</h3>
        <button class="btn primary" onclick="showNameModal()">새 채팅 생성</button>
        <button class="btn mt" onclick="showJoinPanel()">초대 링크로 참가</button>
      </div>
      <div id="contactList" class="contact-list"></div>
    </div>
    <!-- 모달들 -->
    <div id="nameModal" class="modal hidden"><div class="modal-content"><h3>새 채팅</h3><input id="peerNameInput" placeholder="이름"><button class="btn primary" onclick="confirmNewChat()">확인</button><button class="btn" onclick="closeNameModal()">취소</button></div></div>
    <div id="offerPanel" class="view hidden"><div class="card"><div id="offerSpinner" class="spinner" style="display:none"></div><p>연결 링크 생성 중...</p><div id="offerLinkDisplay"></div><button class="btn" onclick="copyTextById('offerLinkDisplay')">복사</button><input id="answerLinkInput" placeholder="Answer 링크"><button class="btn primary" onclick="applyAnswerLink()">연결 완료</button><button class="btn" onclick="goHome()">홈</button></div></div>
    <div id="answerPanel" class="view hidden"><div class="card"><textarea id="remoteOfferSDP" rows="3" placeholder="방장 링크..."></textarea><button class="btn primary" onclick="createAnswerFromOffer()">연결 시작</button></div><button class="btn" onclick="goHome()">홈</button></div>
    <!-- 채팅 화면 -->
    <div id="chatScreen" class="view hidden">
      <div class="chat-header"><button onclick="goHome()">←</button><span id="chatTitle">채팅</span><button onclick="renameChat()">✏️</button><button class="danger" onclick="destroyActiveChat()">🗑</button></div>
      <div id="securityCard" style="display:none"><span>🔒</span><span id="sessionFingerprint"></span></div>
      <div id="passwordPrompt"><input type="password" id="chatPasswordInput" placeholder="암호 입력"><button class="btn primary" onclick="submitPassword()">암호 설정</button><p id="passwordError" style="color:red;display:none"></p></div>
      <div id="messages"></div>
      <div class="action-bar"><button onclick="togglePicker('emoji')">😀</button><button onclick="togglePicker('media')">🔗</button><button onclick="document.getElementById('stickerFileInput').click()">📁</button></div>
      <div class="input-bar"><textarea id="msgInput" placeholder="메시지"></textarea><button class="send-btn" onclick="sendText()">➤</button></div>
    </div>
  </div>
</div>

<script>
// ──────────────────────────────────────────────
//  P2P 비밀 메신저 – 완전판 (모든 버그 수정)
// ──────────────────────────────────────────────
const textEncoder = new TextEncoder();
const textDecoder = new TextDecoder();
const toBase64url = buf => btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
const fromBase64url = str => { str = str.replace(/-/g,'+').replace(/_/g,'/'); while(str.length%4) str+='='; return Uint8Array.from(atob(str),c=>c.charCodeAt(0)).buffer; };
const encodeSDP = obj => toBase64url(textEncoder.encode(JSON.stringify(obj)));
const decodeSDP = str => JSON.parse(textDecoder.decode(fromBase64url(str)));

const ICE_SERVERS = [{ urls: 'stun:stun.l.google.com:19302' },{ urls: 'stun:stun1.l.google.com:19302' },{ urls: 'stun:stun.cloudflare.com:3478' },{ urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' }];

const sessions = {};
let activePeerId = null;

// 유틸
const buf2hex = b => [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
const str2buf = s => textEncoder.encode(s);
const buf2b64 = b => btoa(String.fromCharCode(...new Uint8Array(b)));
const b642buf = s => Uint8Array.from(atob(s),c=>c.charCodeAt(0)).buffer;
const concatBufs = (...bufs) => { let len=bufs.reduce((a,b)=>a+b.byteLength,0), tmp=new Uint8Array(len), off=0; bufs.forEach(b=>{tmp.set(new Uint8Array(b),off);off+=b.byteLength;}); return tmp.buffer; };
const genUUID = () => crypto.randomUUID?.() || 'xxxxxxxx-xxxx-4xxx-yxxx'.replace(/[xy]/g,c=>{const r=crypto.getRandomValues(new Uint8Array(1))[0]%16;return(c=='x'?r:r&0x3|0x8).toString(16);});
function escapeHtml(s) { return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }
function updateConn(ok) { document.getElementById('connDot').className = 'dot ' + (ok ? 'on' : 'off'); document.getElementById('connLabel').textContent = ok ? '연결됨' : '오프라인'; }

// 암호화 상수
const ECDH_ALG = { name: 'ECDH', namedCurve: 'P-521' };
const AES_LEN = 256;

// 세션
function getOrCreateSession(peerId) {
  if (!sessions[peerId]) sessions[peerId] = {
    pc:null, dc:null, typingKey:null, isOfferer:false, password:null,
    rootKey:null, sendChainKey:null, recvChainKey:null, sendMsgNum:0, recvMsgNum:0,
    ourEphemeralKeyPair:null, theirEphemeralPub:null,
    salt:null, ourEcdhPair:null, peerEcdhPub:null,
    handshakeDone:false, confirmed:false, isOnline:false,
    pendingOutbox:[], receivedMessageIds:new Set(), pendingMessages:[]
  };
  return sessions[peerId];
}

// 연락처
let contacts = JSON.parse(localStorage.getItem('p2p_contacts')||'[]');
function saveContacts() { localStorage.setItem('p2p_contacts', JSON.stringify(contacts)); }
function renderContactList() {
  const container = document.getElementById('contactList');
  container.innerHTML = contacts.map(c => {
    const sess = sessions[c.id];
    return `<div class="contact-card" onclick="selectPeer('${c.id}')">${c.name} ${sess?.isOnline?'🟢':'🔴'}</div>`;
  }).join('');
}

// UI
function showView(id) {
  document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));
  const el = document.getElementById(id);
  if (el) { el.classList.remove('hidden'); el.style.display = id==='chatScreen'?'flex':''; }
}
function selectPeer(peerId) {
  activePeerId = peerId; showView('chatScreen');
  document.getElementById('chatTitle').textContent = contacts.find(c=>c.id===peerId)?.name||'채팅';
  const sess = getOrCreateSession(peerId);
  document.getElementById('passwordPrompt').style.display = sess.confirmed?'none':'block';
  document.getElementById('securityCard').style.display = sess.confirmed?'flex':'none';
  document.getElementById('messages').innerHTML = '';
}
function goHome() { activePeerId = null; showView('simpleMode'); }

// 연결
function initPC(peerId) {
  const sess = sessions[peerId];
  if (sess.pc) sess.pc.close();
  sess.pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  sess.pc.oniceconnectionstatechange = () => {
    const state = sess.pc.iceConnectionState;
    sess.isOnline = (state==='connected'||state==='completed');
    updateConn(sess.isOnline);
    if (state==='failed') { sess.handshakeDone=false; sess.rootKey=null; sess.confirmed=false; }
  };
  sess.pc.ondatachannel = e => {
    if (e.channel.label==='chat') { sess.dc=e.channel; setupDC(peerId); }
  };
}
function setupDC(peerId) {
  const sess = sessions[peerId];
  sess.dc.onopen = () => {
    sess.isOnline = true; updateConn(true);
    if (sess.handshakeDone) {
      sess.handshakeDone=false; sess.rootKey=null; sess.confirmed=false;
      startEcdhExchange(peerId);
    } else if (!sess.rootKey && !sess.ourEcdhPair) startEcdhExchange(peerId);
  };
  sess.dc.onmessage = e => onMsg(peerId, e);
}

// 모달
function showNameModal() { document.getElementById('nameModal').classList.remove('hidden'); }
function closeNameModal() { document.getElementById('nameModal').classList.add('hidden'); }
function confirmNewChat() {
  const name = document.getElementById('peerNameInput').value.trim();
  if (!name) return;
  closeNameModal();
  const peerId = genUUID(); contacts.push({ id:peerId, name }); saveContacts();
  activePeerId = peerId;
  const sess = getOrCreateSession(peerId); sess.isOfferer = true;
  showView('offerPanel');
  initPC(peerId);
  sess.dc = sess.pc.createDataChannel('chat', { ordered: true });
  setupDC(peerId);
  sess.pc.createOffer().then(o=>sess.pc.setLocalDescription(o)).then(()=>waitIce(sess.pc).then(()=>{
    document.getElementById('offerLinkDisplay').textContent = location.origin+location.pathname+'#offer='+encodeSDP(sess.pc.localDescription)+'&peer='+peerId;
  }));
}
function showJoinPanel() { showView('answerPanel'); }
async function createAnswerFromOffer() {
  const t = document.getElementById('remoteOfferSDP').value.trim(); if (!t) return;
  let offerStr = t, peerId;
  if (t.startsWith('http')) {
    const u = new URL(t); const hp = new URLSearchParams(u.hash.substring(1));
    offerStr = hp.get('offer'); peerId = hp.get('peer')||genUUID();
  } else peerId = genUUID();
  const offer = decodeSDP(offerStr);
  if (!contacts.find(c=>c.id===peerId)) { contacts.push({ id:peerId, name:'상대방' }); saveContacts(); }
  activePeerId = peerId;
  const sess = getOrCreateSession(peerId); sess.isOfferer = false;
  initPC(peerId);
  await sess.pc.setRemoteDescription(offer);
  const ans = await sess.pc.createAnswer(); await sess.pc.setLocalDescription(ans);
  await waitIce(sess.pc);
  showView('chatScreen');
  document.getElementById('passwordPrompt').style.display = 'block';
}
async function applyAnswerLink() {
  const l = document.getElementById('answerLinkInput').value.trim(); if (!l) return;
  if (!activePeerId || !sessions[activePeerId]?.isOfferer) return;
  let answerStr = l;
  if (l.startsWith('http')) { const u = new URL(l); answerStr = new URLSearchParams(u.hash.substring(1)).get('answer'); }
  await sessions[activePeerId].pc.setRemoteDescription(decodeSDP(answerStr));
  showView('chatScreen');
}
function waitIce(pc) { return new Promise(r=>{ if (pc.iceGatheringState==='complete') r(); else pc.addEventListener('icegatheringstatechange',()=>{ if(pc.iceGatheringState==='complete') r(); }); }); }

// URL 해시
async function checkHash() {
  const h = location.hash.substring(1); if (!h) return;
  const p = new URLSearchParams(h);
  if (p.has('offer') && p.has('peer')) {
    const peerId = p.get('peer'); const offer = decodeSDP(p.get('offer'));
    if (!contacts.find(c=>c.id===peerId)) { contacts.push({ id:peerId, name:'상대방' }); saveContacts(); }
    activePeerId = peerId; const sess = getOrCreateSession(peerId); sess.isOfferer = false;
    initPC(peerId); await sess.pc.setRemoteDescription(offer);
    const ans = await sess.pc.createAnswer(); await sess.pc.setLocalDescription(ans); await waitIce(sess.pc);
    showView('chatScreen'); document.getElementById('passwordPrompt').style.display = 'block';
  } else if (p.has('answer') && p.has('peer')) {
    const peerId = p.get('peer'); const answer = decodeSDP(p.get('answer'));
    if (!contacts.find(c=>c.id===peerId)) { contacts.push({ id:peerId, name:'상대방' }); saveContacts(); }
    let sess = sessions[peerId];
    if (!sess?.pc) { sess = getOrCreateSession(peerId); sess.isOfferer = true; initPC(peerId); sess.dc = sess.pc.createDataChannel('chat'); setupDC(peerId); }
    await sess.pc.setRemoteDescription(answer);
    activePeerId = peerId; showView('chatScreen'); document.getElementById('passwordPrompt').style.display = 'block';
  }
}
window.addEventListener('hashchange', checkHash);

// ─── 더블 래칫 암호화 ────────────────────────
async function startEcdhExchange(peerId) {
  const sess = sessions[peerId];
  const keyPair = await crypto.subtle.generateKey(ECDH_ALG, true, ['deriveKey','deriveBits']);
  sess.ourEcdhPair = { privateKey: keyPair.privateKey, publicKey: keyPair.publicKey };
  const pubRaw = await crypto.subtle.exportKey('raw', sess.ourEcdhPair.publicKey);
  if (sess.isOfferer) {
    sess.salt = crypto.getRandomValues(new Uint8Array(4096));
    sess.dc.send(JSON.stringify({ type:'__ecdhe__', salt:buf2b64(sess.salt.buffer), pubKey:buf2b64(pubRaw) }));
  } else {
    sess.dc.send(JSON.stringify({ type:'__ecdhe__', pubKey:buf2b64(pubRaw) }));
  }
}
async function handleEcdheMessage(peerId, data) {
  const sess = sessions[peerId];
  if (sess.handshakeDone) return;
  if (data.salt) sess.salt = new Uint8Array(b642buf(data.salt));
  sess.peerEcdhPub = await crypto.subtle.importKey('raw', b642buf(data.pubKey), ECDH_ALG, true, []);
  if (sess.password && sess.ourEcdhPair && sess.peerEcdhPub && sess.salt) await deriveSessionKey(peerId);
}

async function submitPassword() {
  if (!activePeerId) { alert('채팅을 먼저 선택해주세요.'); return; }
  const sess = sessions[activePeerId];
  if (!sess) { alert('세션 오류'); return; }
  const pw = document.getElementById('chatPasswordInput').value.trim();
  if (!pw) { document.getElementById('passwordError').textContent='암호를 입력하세요.'; document.getElementById('passwordError').style.display='block'; return; }
  sess.password = pw;
  if (sess.salt && sess.ourEcdhPair && sess.peerEcdhPub) {
    document.getElementById('passwordError').style.display = 'none';
    await deriveSessionKey(activePeerId);
  } else {
    document.getElementById('passwordError').textContent = '연결 준비 중... 잠시 후 다시 시도하세요.';
    document.getElementById('passwordError').style.display = 'block';
  }
}

async function deriveSessionKey(peerId) {
  const sess = sessions[peerId];
  try {
    const km = await crypto.subtle.importKey('raw', str2buf(sess.password), 'PBKDF2', false, ['deriveKey']);
    const authKey = await crypto.subtle.deriveKey({ name:'PBKDF2', salt:sess.salt, iterations:20000000, hash:'SHA-512' }, km, { name:'AES-GCM', length:AES_LEN }, true, ['encrypt','decrypt']);
    const ecdhBits = await crypto.subtle.deriveBits({ name:'ECDH', public:sess.peerEcdhPub }, sess.ourEcdhPair.privateKey, 521);
    const authRaw = await crypto.subtle.exportKey('raw', authKey);
    const ikm = concatBufs(ecdhBits, str2buf(sess.password));
    const hkdfKey = await crypto.subtle.importKey('raw', ikm, 'HKDF', false, ['deriveBits']);
    const rootKey = await crypto.subtle.deriveBits({ name:'HKDF', hash:'SHA-512', salt:authRaw, info:str2buf('root') }, hkdfKey, 256);

    sess.rootKey = rootKey;
    sess.ourEphemeralKeyPair = sess.ourEcdhPair;
    sess.theirEphemeralPub = sess.peerEcdhPub;
    sess.sendChainKey = null; sess.recvChainKey = null;
    sess.sendMsgNum = 0; sess.recvMsgNum = 0;
    const typingRaw = new Uint8Array(rootKey).slice(0, 16);
    sess.typingKey = await crypto.subtle.importKey('raw', typingRaw, { name:'AES-GCM', length:128 }, false, ['encrypt','decrypt']);
    sess.handshakeDone = true;
    sendConfirmation(peerId);
  } catch (e) {
    if (peerId === activePeerId) {
      document.getElementById('passwordError').textContent = '세션 키 생성 실패: '+e.message;
      document.getElementById('passwordError').style.display = 'block';
    }
  }
}

async function dhRatchet(sess, ourPriv, theirPub) {
  const dhBits = await crypto.subtle.deriveBits({ name:'ECDH', public:theirPub }, ourPriv, 521);
  const ikm = concatBufs(dhBits, sess.rootKey);
  const hkdfKey = await crypto.subtle.importKey('raw', ikm, 'HKDF', false, ['deriveBits']);
  const okm = await crypto.subtle.deriveBits({ name:'HKDF', hash:'SHA-512', salt:new Uint8Array(32), info:str2buf('double-ratchet') }, hkdfKey, 512);
  sess.rootKey = okm.slice(0, 32);
  return okm.slice(32, 64);
}
async function symmetricRatchet(chainKey) {
  const ck = await crypto.subtle.importKey('raw', chainKey, { name:'HMAC', hash:'SHA-512' }, false, ['sign']);
  const mk = await crypto.subtle.sign('HMAC', ck, new Uint8Array([1]));
  const nk = await crypto.subtle.sign('HMAC', ck, new Uint8Array([2]));
  return { msgKey: mk.slice(0,32), nextChainKey: nk.slice(0,32) };
}

async function encryptPayload(sess, obj) {
  let dhPub = null;
  if (!sess.sendChainKey) {
    const kp = await crypto.subtle.generateKey(ECDH_ALG, true, ['deriveKey','deriveBits']);
    sess.ourEphemeralKeyPair = kp;
    sess.sendChainKey = await dhRatchet(sess, kp.privateKey, sess.theirEphemeralPub);
    sess.sendMsgNum = 0;
    dhPub = buf2b64(await crypto.subtle.exportKey('raw', kp.publicKey));
  }
  const { msgKey, nextChainKey } = await symmetricRatchet(sess.sendChainKey);
  sess.sendChainKey = nextChainKey;
  const seq = sess.sendMsgNum++;
  const iv = crypto.getRandomValues(new Uint8Array(16));
  const pad = buf2b64(crypto.getRandomValues(new Uint8Array(256+Math.floor(Math.random()*256))).buffer);
  const padded = { ...obj, _pad:pad };
  const ct = await crypto.subtle.encrypt({ name:'AES-GCM', iv }, await crypto.subtle.importKey('raw', msgKey, 'AES-GCM', false, ['encrypt']), str2buf(JSON.stringify(padded)));
  const result = { seq, iv:Array.from(new Uint8Array(iv)), ct:Array.from(new Uint8Array(ct)) };
  if (dhPub) result.dhPub = dhPub;
  return result;
}

async function decryptPayload(sess, d) {
  if (d.dhPub) {
    const pubRaw = b642buf(d.dhPub);
    sess.theirEphemeralPub = await crypto.subtle.importKey('raw', pubRaw, ECDH_ALG, true, []);
    sess.recvChainKey = await dhRatchet(sess, sess.ourEphemeralKeyPair.privateKey, sess.theirEphemeralPub);
    sess.recvMsgNum = 0;
  }
  if (!sess.recvChainKey) throw new Error('no recv chain');
  const { seq, iv, ct } = d;
  if (seq < sess.recvMsgNum) return null;
  while (sess.recvMsgNum < seq) {
    const { nextChainKey } = await symmetricRatchet(sess.recvChainKey);
    sess.recvChainKey = nextChainKey;
    sess.recvMsgNum++;
  }
  const { msgKey, nextChainKey } = await symmetricRatchet(sess.recvChainKey);
  sess.recvChainKey = nextChainKey;
  sess.recvMsgNum = seq + 1;
  const plain = await crypto.subtle.decrypt({ name:'AES-GCM', iv:new Uint8Array(iv) }, await crypto.subtle.importKey('raw', msgKey, 'AES-GCM', false, ['decrypt']), new Uint8Array(ct));
  const obj = JSON.parse(textDecoder.decode(plain));
  delete obj._pad;
  return obj;
}

async function sendConfirmation(peerId) {
  const sess = sessions[peerId];
  if (!sess.rootKey || !sess.dc) return;
  const kp = await crypto.subtle.generateKey(ECDH_ALG, true, ['deriveKey','deriveBits']);
  sess.ourEphemeralKeyPair = kp;
  sess.sendChainKey = await dhRatchet(sess, kp.privateKey, sess.theirEphemeralPub);
  sess.sendMsgNum = 0;
  const pubRaw = await crypto.subtle.exportKey('raw', kp.publicKey);
  sess.dc.send(JSON.stringify({ type:'__confirm__', dhPub:buf2b64(pubRaw) }));
}

async function handleConfirmation(peerId, data) {
  const sess = sessions[peerId];
  if (!sess.rootKey) return;
  if (data.dhPub) {
    const pubRaw = b642buf(data.dhPub);
    sess.theirEphemeralPub = await crypto.subtle.importKey('raw', pubRaw, ECDH_ALG, true, []);
    sess.recvChainKey = await dhRatchet(sess, sess.ourEphemeralKeyPair.privateKey, sess.theirEphemeralPub);
    sess.recvMsgNum = 0;
  }
  sess.confirmed = true;
  if (peerId === activePeerId) {
    document.getElementById('securityCard').style.display = 'flex';
    document.getElementById('sessionFingerprint').textContent = buf2hex(sess.rootKey).slice(0,16)+'…';
    document.getElementById('passwordPrompt').style.display = 'none';
    document.getElementById('passwordError').style.display = 'none';
  }
  flushOutbox(peerId);
}

// ─── 메시지 ───────────────────────────────────
function sendText() {
  if (!activePeerId) return;
  const sess = sessions[activePeerId];
  const txt = document.getElementById('msgInput').value.trim();
  if (!txt) return;
  const msgId = genUUID();
  sendPayload(sess, { type:'text', content:txt, id:msgId }, txt, msgId);
  document.getElementById('msgInput').value = '';
}
async function sendPayload(sess, payload, displayContent, msgId) {
  if (!sess.dc || sess.dc.readyState!=='open' || !sess.rootKey || !sess.confirmed) {
    if (sess.rootKey && sess.confirmed) sess.pendingOutbox.push({ payload, id:msgId, displayContent });
    return;
  }
  try {
    const enc = await encryptPayload(sess, payload);
    sess.dc.send(JSON.stringify({ type:'msg', ...enc }));
    addMsg(displayContent, 'me', msgId);
  } catch (e) { sess.pendingOutbox.push({ payload, id:msgId, displayContent }); }
}
function onMsg(peerId, e) {
  const sess = sessions[peerId];
  if (!sess) return;
  try {
    const d = JSON.parse(e.data);
    if (d.type==='__ecdhe__') handleEcdheMessage(peerId, d);
    else if (d.type==='__confirm__') handleConfirmation(peerId, d);
    else if (d.type==='msg') {
      if (!sess.rootKey || !sess.confirmed) return;
      decryptPayload(sess, d).then(inner => {
        if (!inner || (inner.id && sess.receivedMessageIds.has(inner.id))) return;
        if (inner.id) sess.receivedMessageIds.add(inner.id);
        if (inner.type==='text') addMsg(inner.content, 'other', inner.id);
      }).catch(() => {});
    }
  } catch (ex) {}
}
async function flushOutbox(peerId) {
  const sess = sessions[peerId];
  if (!sess?.dc || sess.dc.readyState!=='open' || !sess.rootKey || !sess.confirmed || !sess.pendingOutbox.length) return;
  const q = [...sess.pendingOutbox]; sess.pendingOutbox = [];
  for (const m of q) {
    try {
      const enc = await encryptPayload(sess, m.payload);
      sess.dc.send(JSON.stringify({ type:'msg', ...enc }));
    } catch (e) { sess.pendingOutbox.unshift(m); break; }
  }
}

// UI 헬퍼
function addMsg(text, who, msgId) {
  if (!activePeerId) return;
  const c = document.getElementById('messages');
  const d = document.createElement('div');
  d.className = 'msg ' + who;
  if (msgId) d.id = 'msg-'+msgId;
  d.innerHTML = `<div class="bubble">${escapeHtml(text)}<div class="time">${new Date().toLocaleTimeString()}</div></div>`;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

// 초기화
renderContactList();
checkHash();
showView('simpleMode');
