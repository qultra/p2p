<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0, minimum-scale=1.0">
  <title>P2P 비밀 메신저 – 극한 보안 완전판</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src *; media-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; base-uri 'none'; form-action 'none'; referrer no-referrer; frame-src 'none'; child-src 'none'; object-src 'none';">
  <meta name="referrer" content="no-referrer">
  <style>
    :root {
      --bg: #06090f; --surface: #0f141e; --card: rgba(15,20,30,0.9);
      --text: #e0e5f0; --sub: #8892b0; --accent: #5b8df0; --danger: #f97070;
      --success: #45d68a; --border: #1a2332; --radius: 20px; --radius-sm: 14px;
      --safe-bottom: env(safe-area-inset-bottom, 10px);
    }
    * {
      margin: 0; padding: 0; box-sizing: border-box;
      user-select: none !important; -webkit-user-select: none !important;
      -moz-user-select: none !important; -webkit-touch-callout: none !important;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-modify: read-only;
      -webkit-user-drag: none !important;
    }
    input, textarea {
      -webkit-user-modify: read-write !important;
      user-select: text !important; -webkit-user-select: text !important;
    }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; justify-content: center; align-items: center;
      min-height: 100dvh; padding: 10px;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: none;
    }
    .container {
      width: 100%; max-width: 520px; height: 95dvh;
      background: var(--surface); border-radius: 30px;
      box-shadow: 0 30px 70px rgba(0,0,0,0.7);
      display: flex; flex-direction: column; overflow: hidden;
      border: 1px solid var(--border); position: relative;
    }
    .header { padding:14px 20px; background:rgba(8,14,24,0.95); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; min-height:56px; }
    .header h1 { font-size:1.1rem; font-weight:700; background:linear-gradient(135deg,#90b4ff,#b794f4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .status-bar { display:flex; align-items:center; gap:7px; }
    .dot { width:10px; height:10px; border-radius:50%; transition:0.2s; }
    .dot.on { background:var(--success); box-shadow:0 0 10px var(--success); }
    .dot.off { background:var(--danger); }
    .main-content { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; }
    .main-content::-webkit-scrollbar { width:4px; } .main-content::-webkit-scrollbar-thumb { background:#253040; border-radius:2px; }
    .card { background:var(--card); backdrop-filter:blur(14px); border-radius:var(--radius); padding:18px; margin-bottom:12px; border:1px solid var(--border); }
    .btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; background:rgba(255,255,255,0.05); color:white; border:1px solid var(--border); padding:14px 20px; border-radius:var(--radius-sm); cursor:pointer; font-weight:600; font-size:0.95rem; transition:0.2s; width:100%; backdrop-filter:blur(10px); }
    .btn:hover { background:rgba(255,255,255,0.12); }
    .btn:active { transform:scale(0.97); }
    .btn.primary { background:var(--accent); border:none; }
    .btn.danger { background:var(--danger); border:none; }
    .btn-small { padding:8px 14px; font-size:0.8rem; width:auto; border-radius:12px; }
    input, textarea { width:100%; background:#0a0f18; color:var(--text); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px 15px; font-size:16px; outline:none; user-select:text; -webkit-user-select:text; }
    input:focus, textarea:focus { border-color:var(--accent); box-shadow: 0 0 0 2px rgba(91,141,240,0.3); }
    .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index:100; display:flex; align-items:center; justify-content:center; }
    .modal-content { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; width:90%; max-width:360px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
    .modal-content h3 { margin-bottom: 16px; font-size: 1.1rem; }
    #chatScreen { display:none; flex-direction:column; flex:1; }
    #messages { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px; padding:6px 0; }
    .msg { display:flex; flex-direction:column; animation:fadeUp 0.2s ease; }
    .msg.system { align-items:center; } .msg.me { align-items:flex-end; } .msg.other { align-items:flex-start; }
    .bubble { max-width:83%; padding:10px 16px; border-radius:20px; background:rgba(22,30,44,0.85); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.05); word-break:break-word; position:relative; overflow:hidden; z-index:1; }
    .blur-target { filter: blur(12px); transition: filter 0.3s; cursor: pointer; }
    .blur-target.revealed { filter: blur(0); }
    .blur-target.locked { filter: blur(22px); cursor: not-allowed; pointer-events: auto; }
    .msg.system .bubble { background:rgba(255,255,255,0.04); border:none; font-size:0.78rem; color:var(--sub); }
    .msg.me .bubble { background:linear-gradient(140deg,rgba(74,130,250,0.5),rgba(124,92,240,0.5)); border-bottom-right-radius:6px; }
    .msg.other .bubble { border-bottom-left-radius:6px; }
    .msg .time { font-size:0.65rem; color:var(--sub); margin-top:4px; display:flex; justify-content:flex-end; gap:6px; position:relative; z-index:5; }
    .encrypted-bubble { background:#0a0f18; border:1px solid var(--border); font-family:monospace; font-size:0.7rem; color:#94a3b8; white-space:pre-wrap; word-break:break-all; padding:10px; border-radius:12px; max-width:90%; }
    .input-bar { display:flex; gap:6px; padding:10px 0 0; align-items:flex-end; padding-bottom:var(--safe-bottom); }
    #msgInput { flex:1; min-height:44px; max-height:110px; resize:none; }
    .icon-btn { background:none; border:none; font-size:1.3rem; cursor:pointer; padding:10px; color:var(--accent); }
    .send-btn { background:var(--accent); color:white; width:44px; height:44px; display:flex; align-items:center; justify-content:center; border-radius:50%; cursor:pointer; flex-shrink:0; }
    .action-bar { display:flex; gap:4px; padding:4px 0 0; position:relative; flex-wrap:wrap; }
    .action-btn { background:rgba(255,255,255,0.05); border:1px solid var(--border); color:var(--text); padding:8px 14px; border-radius:14px; cursor:pointer; font-size:0.85rem; }
    .picker-overlay { display:none; position:absolute; bottom:100%; left:0; right:0; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:12px; max-height:220px; overflow-y:auto; z-index:20; margin-bottom:4px; }
    .picker-overlay.active { display:flex; flex-direction:column; gap:8px; }
    .picker-search { width:100%; background:#0a0f18; color:var(--text); border:1px solid var(--border); border-radius:12px; padding:10px 12px; font-size:16px; outline:none; margin-bottom:4px; }
    .picker-grid { display:flex; flex-wrap:wrap; gap:8px; }
    .picker-item { cursor:pointer; border-radius:8px; overflow:hidden; }
    .picker-item img { width:64px; height:64px; object-fit:cover; border-radius:8px; }
    .emoji-item { font-size:1.8rem; cursor:pointer; padding:6px 8px; border-radius:8px; }
    .hidden { display:none !important; }
    .text-center { text-align:center; } .text-sub { color:var(--sub); font-size:0.82rem; }
    .mt { margin-top:12px; } .mb { margin-bottom:12px; }
    .link-box { word-break:break-all; background:#0a0f18; padding:10px; border-radius:12px; font-size:0.72rem; margin:8px 0; max-height:75px; overflow-y:auto; color:#9aa4bf; }
    .fingerprint { font-family:monospace; font-size:0.6rem; background:#0a0f18; padding:6px; border-radius:8px; word-break:break-all; user-select:text !important; -webkit-user-select:text !important; }
    .chat-header { display:flex; align-items:center; gap:10px; padding:10px 16px; border-bottom:1px solid var(--border); }
    .chat-title { font-size:0.95rem; font-weight:600; flex:1; }
    .typing-indicator { font-size:0.75rem; color:var(--sub); padding:4px 16px; display:none; }
    .contact-list { display:flex; flex-direction:column; gap:8px; margin-top:12px; }
    .contact-card { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:16px; padding:14px 16px; cursor:pointer; display:flex; align-items:center; gap:12px; position:relative; }
    .contact-card.active { border-color:var(--accent); background:rgba(91,141,240,0.1); }
    .contact-avatar { width:44px; height:44px; border-radius:50%; background:rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0; position:relative; }
    .contact-dot { position:absolute; bottom:0; right:0; width:12px; height:12px; border-radius:50%; border:2px solid var(--surface); }
    .contact-dot.on { background:var(--success); } .contact-dot.off { background:var(--danger); }
    .contact-info { flex:1; min-width:0; }
    .contact-name { font-size:0.95rem; font-weight:600; }
    .contact-status { font-size:0.75rem; color:var(--sub); margin-top:2px; }
    .unread-badge { background:var(--danger); color:white; border-radius:12px; padding:2px 8px; font-size:0.7rem; font-weight:bold; margin-left:8px; }
    .svg-icon { width:20px; height:20px; fill:currentColor; flex-shrink:0; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spinner { width:20px; height:20px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block; }
  </style>
</head>
<body oncontextmenu="return false">
<div class="container" id="mainContainer">
  <div class="header"><h1>🔐 P2P 비밀채팅</h1><div class="status-bar"><span id="connDot" class="dot off"></span><span id="connLabel">오프라인</span></div></div>
  <div class="main-content" id="mainArea">
    <div id="simpleMode" class="view">
      <div class="card text-center">
        <h3 style="margin-bottom:4px;">서버 없이 완벽한 익명성</h3>
        <p class="text-sub mb">연결 끊겨도 자동 복구 · 오프라인 메시지 큐</p>
        <button class="btn primary" onclick="showNameModal()"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>새 채팅 생성</button>
        <button class="btn mt" onclick="showJoinPanel()"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>초대 링크로 참가</button>
      </div>
      <div style="font-size:0.8rem; color:var(--sub); margin-bottom:8px; font-weight:600;">📋 대화 목록</div>
      <div class="contact-list" id="contactList"></div>
    </div>
    <div id="nameModal" class="modal hidden">
      <div class="modal-content"><h3>✨ 새 채팅</h3><input type="text" id="peerNameInput" placeholder="상대방 이름 입력"><div class="mt" style="display:flex;gap:8px;"><button class="btn primary" onclick="confirmNewChat()" style="flex:1;">확인</button><button class="btn" onclick="closeNameModal()" style="flex:1;">취소</button></div></div>
    </div>
    <div id="offerPanel" class="view hidden">
      <div class="card text-center">
        <div class="spinner mb" id="offerSpinner" style="display:none;"></div>
        <p><strong>연결 링크 생성 중...</strong></p>
        <p class="text-sub">생성된 링크를 상대에게 전송하세요.</p>
        <div class="link-box" id="offerLinkDisplay">생성 중...</div>
        <button class="btn mt" onclick="copyTextById('offerLinkDisplay')">링크 복사</button>
        <p class="text-sub mt">상대가 보낸 Answer 링크를 아래에 붙여넣으세요.</p>
        <input type="text" id="answerLinkInput" placeholder="Answer 링크 입력..."><button class="btn primary mt" onclick="applyAnswerLink()">연결 완료</button>
        <button class="btn mt" onclick="goHome()">홈으로</button>
      </div>
    </div>
    <div id="answerPanel" class="view hidden">
      <div class="card"><strong>📥 초대 링크 붙여넣기</strong><textarea id="remoteOfferSDP" rows="3" placeholder="방장에게 받은 전체 링크..."></textarea><button class="btn primary mt" onclick="createAnswerFromOffer()">연결 시작</button></div>
      <button class="btn mt" onclick="goHome()">홈으로</button>
    </div>
    <div id="chatScreen" class="view hidden">
      <div class="chat-header">
        <button class="btn-small" onclick="goHome()"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></button>
        <span class="chat-title" id="chatTitle">채팅</span>
        <button class="btn-small" onclick="renameChat()"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg></button>
        <button class="btn-small danger" onclick="destroyActiveChat()"><svg class="svg-icon" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
      </div>
      <div id="securityCard" class="card" style="margin:0 0 4px; padding:6px 12px; font-size:0.7rem; display:none; align-items:center; gap:6px;">
        <span>🔒</span><span id="sessionFingerprint" class="fingerprint"></span>
      </div>
      <div id="passwordPrompt" class="card text-center" style="margin:8px;">
        <strong>🔐 채팅방 암호 입력</strong>
        <input type="password" id="chatPasswordInput" placeholder="상대와 공유한 암호" style="margin-top:8px;">
        <button class="btn primary mt" onclick="submitPassword()">암호 설정</button>
        <p class="text-sub mt">암호가 없으면 수신된 암호문만 표시됩니다.</p>
        <p id="passwordError" class="text-sub" style="color:var(--danger); display:none;"></p>
      </div>
      <div id="messages"></div>
      <div id="typingIndicator" class="typing-indicator">상대방이 입력 중...</div>
      <div class="action-bar" style="position:relative; padding:0 8px;">
        <button class="action-btn" onclick="togglePicker('emoji')">😀</button>
        <button class="action-btn" onclick="togglePicker('media')">🔗</button>
        <button class="action-btn" onclick="document.getElementById('stickerFileInput').click()">📁</button>
        <div class="picker-overlay" id="emojiPicker"><div class="picker-grid" id="emojiGrid"></div></div>
        <div class="picker-overlay" id="mediaPicker">
          <input type="text" class="picker-search" placeholder="URL 입력 후 Enter" id="mediaSearch" onkeydown="if(event.key==='Enter')addMediaUrl()">
          <div class="picker-grid" id="mediaGrid"></div>
        </div>
        <input type="file" id="stickerFileInput" class="hidden" accept="image/*" onchange="uploadSticker(this.files)">
      </div>
      <div class="input-bar" style="padding:8px;">
        <button class="icon-btn" onclick="document.getElementById('fileInput').click()" title="파일">📎</button>
        <textarea id="msgInput" rows="1" placeholder="메시지 (종단간 암호화)"></textarea>
        <button class="send-btn" onclick="sendText()">➤</button>
      </div>
      <input type="file" id="fileInput" class="hidden" multiple onchange="handleFiles(this.files)">
    </div>
  </div>
</div>
<div id="answerModal" class="modal hidden">
  <div class="modal-content">
    <h3>📤 내 Answer 링크</h3>
    <p class="text-sub" style="margin-bottom:12px;">이 링크를 상대에게 전송하면 연결됩니다.</p>
    <div class="link-box" id="answerModalLink" style="margin-bottom:12px;"></div>
    <div style="display:flex; gap:8px;"><button class="btn primary" onclick="copyAnswerModalLink()" style="flex:1;">📋 복사</button><button class="btn" onclick="closeAnswerModal()" style="flex:1;">닫기</button></div>
  </div>
</div>

<script>
// =====================================================================
//  P2P 비밀 메신저 – 극한 보안 완전판
//  모든 삭제/보안/암호화를 웹 최대치로 구현
// =====================================================================
(function() {
'use strict';

// ─── 개발자 도구 방어 (DevTools Detection & Disruption) ────
const antiDebug = {
  _interval: null,
  start: function() {
    // debugger 무한 루프는 브라우저를 멈추게 하므로, 대신 주기적 disruption 사용
    // 민감 모드에서만 활성화
    if (this._interval) return;
    this._interval = setInterval(() => {
      // console 객체 오염: 로깅 방해
      const noop = function(){};
      const methods = ['log','info','warn','error','debug','dir','table','trace','group','groupEnd','time','timeEnd','assert','clear'];
      methods.forEach(m => { try { console[m] = noop; } catch(e) {} });
      // debugger 삽입 - 디버거가 열려있으면 break 걸림 (무한 루프는 피함)
      try { debugger; } catch(e) {}
    }, 1000);
  },
  stop: function() {
    if (this._interval) { clearInterval(this._interval); this._interval = null; }
  }
};

// DOM 검사 방어 (개발자 도구로 요소 강조 감지)
const domGuard = new MutationObserver((mutations) => {
  // 대규모 DOM 변경이 감지되면(개발자 도구로 조작 시) 민감 데이터 클리어
  if (mutations.length > 50 && activePeerId && !isDestroyed(activePeerId)) {
    const sess = sessions[activePeerId];
    if (sess && sess.isOnline) {
      // 의심스러운 대규모 DOM 조작 감지 시 블러 재적용
      applyBlurToSensitiveElements();
      lockAllBlurs(30000);
    }
  }
});
domGuard.observe(document.documentElement, { childList: true, subtree: true, attributes: true, characterData: false });

// 키보드 단축키 차단 (F12, Ctrl+Shift+I 등)
document.addEventListener('keydown', function(e) {
  if (e.key === 'F12' ||
      (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) ||
      (e.ctrlKey && e.key === 'U') ||
      (e.ctrlKey && e.key === 's')) {
    e.preventDefault();
    e.stopPropagation();
    return false;
  }
}, true);

// 우클릭 완전 차단
document.addEventListener('contextmenu', function(e) { e.preventDefault(); e.stopPropagation(); return false; }, true);

// 드래그 앤 드롭으로 텍스트 추출 방지
document.addEventListener('dragstart', function(e) { e.preventDefault(); return false; }, true);
document.addEventListener('selectstart', function(e) {
  // 입력 필드 외의 선택 차단
  const tag = e.target.tagName;
  if (tag !== 'INPUT' && tag !== 'TEXTAREA') {
    e.preventDefault();
    return false;
  }
}, true);

// clipboard 접근 제한 (복사는 의도된 버튼으로만)
document.addEventListener('copy', function(e) {
  const allowedIds = ['offerLinkDisplay','answerModalLink','sessionFingerprint'];
  const targetId = e.target.id || '';
  const parentId = (e.target.closest && e.target.closest('[id]') && e.target.closest('[id]').id) || '';
  if (!allowedIds.includes(targetId) && !allowedIds.includes(parentId)) {
    e.preventDefault();
    return false;
  }
}, true);
document.addEventListener('cut', function(e) { e.preventDefault(); return false; }, true);

// ─── 전역 변수 및 상수 ──────────────────────
const textEncoder = new TextEncoder();
const textDecoder = new TextDecoder();
const toBase64url = buf => btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
const fromBase64url = str => { str = str.replace(/-/g,'+').replace(/_/g,'/'); while(str.length%4) str+='='; return Uint8Array.from(atob(str),c=>c.charCodeAt(0)).buffer; };
const encodeSDP = obj => toBase64url(textEncoder.encode(JSON.stringify(obj)));
const decodeSDP = str => JSON.parse(textDecoder.decode(fromBase64url(str)));

const ICE_SERVERS = [
  { urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' },
  { urls: 'stun:stun.cloudflare.com:3478' }, { urls: 'stun:global.stun.twilio.com:3478' },
  { urls: 'stun:stun.freeswitch.org:3478' }, { urls: 'stun:stun.nextcloud.com:443' },
  { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
  { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
];

const sessions = {};
let activePeerId = null;
const DESTROY_PREFIX = 'p2p_destroyed_';
const PENDING_DESTROY_PREFIX = 'p2p_pending_destroy_';
const OFFLINE_QUEUE_PREFIX = 'p2p_offline_queue_';
const QUEUE_ENC_KEY_PREFIX = 'p2p_queue_enc_';

// BroadcastChannel으로 탭 간 삭제 전파
let bcChannel = null;
try { bcChannel = new BroadcastChannel('p2p_destroy_channel'); } catch(e) {}
if (bcChannel) {
  bcChannel.onmessage = (e) => {
    if (e.data && e.data.type === 'destroy' && e.data.peerId) {
      if (!isDestroyed(e.data.peerId)) {
        markDestroyed(e.data.peerId);
        if (activePeerId === e.data.peerId) goHome();
      }
    }
  };
}

// localStorage 변경 감지 (다른 탭에서 삭제 시)
window.addEventListener('storage', (e) => {
  if (e.key && e.key.startsWith(DESTROY_PREFIX) && e.newValue) {
    const peerId = e.key.substring(DESTROY_PREFIX.length);
    if (activePeerId === peerId && !isDestroyed(peerId)) {
      markDestroyed(peerId);
      goHome();
    }
  }
});

if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission();

// ─── 유틸리티 ─────────────────────────────────
const buf2hex = b => [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
const str2buf = s => textEncoder.encode(s);
const buf2b64 = b => btoa(String.fromCharCode(...new Uint8Array(b)));
const b642buf = s => Uint8Array.from(atob(s),c=>c.charCodeAt(0)).buffer;
const concatBufs = (...bufs) => { let len=bufs.reduce((a,b)=>a+b.byteLength,0), tmp=new Uint8Array(len), off=0; bufs.forEach(b=>{tmp.set(new Uint8Array(b),off);off+=b.byteLength;}); return tmp.buffer; };
const genUUID = () => crypto.randomUUID ? crypto.randomUUID() : 'xxxxxxxx-xxxx-4xxx-yxxx'.replace(/[xy]/g,c=>{const r=crypto.getRandomValues(new Uint8Array(1))[0]%16;return(c=='x'?r:r&0x3|0x8).toString(16);});
function formatBytes(b) { return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':b<1073741824?(b/1048576).toFixed(1)+' MB':(b/1073741824).toFixed(1)+' GB'; }
function escapeHtml(s) { return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }
function updateConn(ok) { document.getElementById('connDot').className = 'dot ' + (ok ? 'on' : 'off'); document.getElementById('connLabel').textContent = ok ? '연결됨' : '오프라인'; }

// ─── Blob URL 추적 및 해제 ──────────────────
const createdBlobURLs = new Set();
function revokeAllBlobURLs() {
  createdBlobURLs.forEach(url => { try { URL.revokeObjectURL(url); } catch(e) {} });
  createdBlobURLs.clear();
}
function trackBlobURL(url) { createdBlobURLs.add(url); return url; }

// ─── 로컬 스토리지 기반 오프라인 큐 (암호화 저장) ────
function getQueueEncKey() {
  let keyB64 = sessionStorage.getItem(QUEUE_ENC_KEY_PREFIX);
  if (!keyB64) {
    const key = crypto.getRandomValues(new Uint8Array(32));
    keyB64 = buf2b64(key.buffer);
    sessionStorage.setItem(QUEUE_ENC_KEY_PREFIX, keyB64);
  }
  return b642buf(keyB64);
}
async function encryptQueueItem(item) {
  const keyBuf = getQueueEncKey();
  const key = await crypto.subtle.importKey('raw', keyBuf, { name: 'AES-GCM', length: 256 }, false, ['encrypt']);
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, str2buf(JSON.stringify(item)));
  return { iv: Array.from(new Uint8Array(iv)), ct: Array.from(new Uint8Array(ct)) };
}
async function decryptQueueItem(enc) {
  const keyBuf = getQueueEncKey();
  const key = await crypto.subtle.importKey('raw', keyBuf, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: new Uint8Array(enc.iv) }, key, new Uint8Array(enc.ct));
  return JSON.parse(textDecoder.decode(plain));
}
async function saveOfflineQueue(peerId, queue) {
  try {
    const encrypted = [];
    for (const item of queue) { encrypted.push(await encryptQueueItem(item)); }
    localStorage.setItem(OFFLINE_QUEUE_PREFIX + peerId, JSON.stringify(encrypted));
  } catch (e) {}
}
async function loadOfflineQueue(peerId) {
  try {
    const raw = localStorage.getItem(OFFLINE_QUEUE_PREFIX + peerId);
    if (!raw) return [];
    const encrypted = JSON.parse(raw);
    const queue = [];
    for (const enc of encrypted) { try { queue.push(await decryptQueueItem(enc)); } catch(e) { /* skip corrupted */ } }
    return queue;
  } catch (e) { return []; }
}
function clearOfflineQueue(peerId) {
  localStorage.removeItem(OFFLINE_QUEUE_PREFIX + peerId);
}
function setPendingDestroy(peerId) {
  try { localStorage.setItem(PENDING_DESTROY_PREFIX + peerId, Date.now().toString()); } catch (e) {}
}
function clearPendingDestroy(peerId) {
  localStorage.removeItem(PENDING_DESTROY_PREFIX + peerId);
}
function hasPendingDestroy(peerId) {
  return !!localStorage.getItem(PENDING_DESTROY_PREFIX + peerId);
}

// ─── 암호화 상수 ──────────────────────────────
const ECDH_ALG = { name: 'ECDH', namedCurve: 'P-521' };
const PBKDF2_ITERS = 20000000;
const SALT_SIZE = 4096;
const AES_LEN = 256;
const HMAC_HASH = 'SHA-512';
const TYPING_AES_LEN = 128;
const PADDING_MIN = 256, PADDING_MAX = 512;

// ─── 세션 객체 ────────────────────────────────
function getOrCreateSession(peerId) {
  if (!sessions[peerId]) sessions[peerId] = {
    pc: null, dc: null, typingDC: null, typingKey: null, isOfferer: false, password: null,
    rootKey: null, sendChainKey: null, recvChainKey: null, sendMsgNum: 0, recvMsgNum: 0,
    ourEphemeralKeyPair: null, theirEphemeralPub: null,
    salt: null, ourEcdhPair: null, peerEcdhPub: null,
    handshakeDone: false, confirmed: false, isOnline: false,
    receivedMessageIds: new Set(), pendingMessages: [],
    fileReceive: null, typingTimer: null, reconnectAttempts: 0,
    pendingConfirm: null, destroyRetry: 0,
    authKey: null, // PBKDF2 derived key
  };
  return sessions[peerId];
}
function isDestroyed(peerId) { return !!(localStorage.getItem(DESTROY_PREFIX + peerId) || sessionStorage.getItem(DESTROY_PREFIX + peerId)); }
function markDestroyed(peerId) {
  localStorage.setItem(DESTROY_PREFIX + peerId, Date.now());
  sessionStorage.setItem(DESTROY_PREFIX + peerId, Date.now());
  clearPendingDestroy(peerId);
  clearOfflineQueue(peerId);
  if (location.hash) history.replaceState(null, '', location.pathname);
  // BroadcastChannel으로 다른 탭에도 알림
  if (bcChannel) { try { bcChannel.postMessage({ type: 'destroy', peerId, ts: Date.now() }); } catch(e) {} }
  // 세션 객체에서 민감 데이터 제거
  const sess = sessions[peerId];
  if (sess) {
    sess.rootKey = null; sess.sendChainKey = null; sess.recvChainKey = null;
    sess.password = null; sess.ourEphemeralKeyPair = null; sess.theirEphemeralPub = null;
    sess.ourEcdhPair = null; sess.peerEcdhPub = null; sess.authKey = null;
    sess.typingKey = null; sess.salt = null;
  }
}
setInterval(() => { if (activePeerId && isDestroyed(activePeerId)) goHome(); }, 500);

// ─── 연락처 ───────────────────────────────────
function getContacts() { try { return JSON.parse(localStorage.getItem('p2p_contacts') || '[]'); } catch (e) { return []; } }
function saveContacts(contacts) { localStorage.setItem('p2p_contacts', JSON.stringify(contacts)); }
function addContact(peerId, name) { let contacts = getContacts(); if (!contacts.find(c => c.id === peerId)) { contacts.push({ id: peerId, name }); saveContacts(contacts); } renderContactList(); }
function renameChat() { if (!activePeerId || isDestroyed(activePeerId)) return; const contacts = getContacts(); const c = contacts.find(c => c.id === activePeerId); if (!c) return; const newName = prompt('새 이름:', c.name); if (newName) { c.name = newName; saveContacts(contacts); document.getElementById('chatTitle').textContent = newName; renderContactList(); } }
function renderContactList() {
  const container = document.getElementById('contactList'); if (!container) return;
  const contacts = getContacts().filter(c => !isDestroyed(c.id) && !hasPendingDestroy(c.id));
  container.innerHTML = contacts.map(c => {
    const sess = sessions[c.id]; const online = sess && sess.isOnline;
    const unread = sess ? sess.pendingMessages.length : 0;
    const unreadBadge = unread > 0 ? `<span class="unread-badge">${unread}</span>` : '';
    return `<div class="contact-card ${c.id === activePeerId ? 'active' : ''}" onclick="selectPeer('${c.id}')"><div class="contact-avatar">${escapeHtml(c.name).charAt(0)}<span class="contact-dot ${online ? 'on' : 'off'}"></span></div><div class="contact-info"><div class="contact-name">${escapeHtml(c.name)} ${unreadBadge}</div><div class="contact-status">${online ? '온라인' : '오프라인'}</div></div></div>`;
  }).join('');
}

// ─── UI 전환 ──────────────────────────────────
function showView(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.add('hidden'));
  const target = document.getElementById(viewId);
  if (target) { target.classList.remove('hidden'); target.style.display = viewId === 'chatScreen' ? 'flex' : ''; }
}
function selectPeer(peerId) {
  if (isDestroyed(peerId)) { alert('이 대화는 삭제되었습니다.'); return; }
  if (hasPendingDestroy(peerId)) { markDestroyed(peerId); alert('이 대화는 삭제 요청되었습니다.'); renderContactList(); return; }
  activePeerId = peerId; showView('chatScreen');
  const messagesDiv = document.getElementById('messages');
  messagesDiv.innerHTML = '';
  const sess = getOrCreateSession(peerId);
  sess.pendingMessages.forEach(msg => { appendMessage(msg.text, msg.who, msg.msgId); });
  sess.pendingMessages = [];
  document.getElementById('chatTitle').textContent = getContacts().find(c => c.id === peerId)?.name || '채팅';
  updateConn(sess.isOnline);
  const securityCard = document.getElementById('securityCard');
  const passPrompt = document.getElementById('passwordPrompt');
  if (sess.rootKey && sess.confirmed) {
    securityCard.style.display = 'flex';
    document.getElementById('sessionFingerprint').textContent = buf2hex(sess.rootKey);
    passPrompt.style.display = 'none';
  } else {
    securityCard.style.display = 'none';
    passPrompt.style.display = 'block';
  }
  // 민감 모드 시작 (개발자 도구 방어 활성화)
  antiDebug.start();
  renderContactList();
}
function goHome() {
  if (activePeerId) {
    clearRevealedMessages(activePeerId);
    revokeAllBlobURLs();
  }
  activePeerId = null;
  showView('simpleMode');
  const messagesDiv = document.getElementById('messages');
  if (messagesDiv) messagesDiv.innerHTML = '';
  document.getElementById('securityCard').style.display = 'none';
  document.getElementById('passwordPrompt').style.display = 'block';
  updateConn(false);
  antiDebug.stop();
  renderContactList();
}

// ─── 모달 & 연결 패널 ─────────────────────────
function showNameModal() { document.getElementById('nameModal').classList.remove('hidden'); document.getElementById('peerNameInput').focus(); }
function closeNameModal() { document.getElementById('nameModal').classList.add('hidden'); }

function showJoinPanel() { showView('answerPanel'); }
async function createAnswerFromOffer() {
  const t = document.getElementById('remoteOfferSDP').value.trim(); if (!t) return;
  let offerStr = t; let peerId;
  if (t.startsWith('http')) { const u = new URL(t); const hp = new URLSearchParams(u.hash.substring(1)); if (!hp.has('offer')) { alert('올바른 초대 링크가 아닙니다.'); return; } offerStr = hp.get('offer'); peerId = hp.get('peer') || genUUID(); }
  else { peerId = genUUID(); }

function closeAnswerModal() { document.getElementById('answerModal').classList.add('hidden'); }
function copyAnswerModalLink() { const text = document.getElementById('answerModalLink').textContent; navigator.clipboard.writeText(text).then(() => alert('복사됨')).catch(() => prompt('복사:', text)); }
async function applyAnswerLink() {

  try {
    let answerStr = l; if (l.startsWith('http')) { const u = new URL(l); const hp = new URLSearchParams(u.hash.substring(1)); if (!hp.has('answer')) { alert('올바르지 않은 Answer 링크입니다.'); return; } answerStr = hp.get('answer'); }

function waitIce(pc) { return new Promise(r => { if (pc.iceGatheringState === 'complete') r(); else pc.addEventListener('icegatheringstatechange', () => { if (pc.iceGatheringState === 'complete') r(); }); }); }

// ─── WebRTC 연결 ──────────────────────────────
function initPC(peerId) {
  const sess = sessions[peerId];
  if (sess.pc) { sess.pc.close(); sess.pc = null; }
  sess.pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
  sess.pc.oniceconnectionstatechange = () => {
    const state = sess.pc.iceConnectionState;
    if (state === 'connected' || state === 'completed') {
      sess.isOnline = true; updateConn(true); renderContactList();
      sess.reconnectAttempts = 0;
      if (hasPendingDestroy(peerId)) trySendDestroy(peerId);
    } else if (state === 'disconnected' || state === 'failed' || state === 'closed') {
      const wasOnline = sess.isOnline;
      sess.isOnline = false; updateConn(false);
      if (wasOnline) {
        sendClearRevealed(peerId);
        clearRevealedMessages(peerId);
      }
      if (state === 'failed') {
        if (sess.reconnectAttempts < 3) {
          sess.reconnectAttempts++;
          setTimeout(() => { if (sess.pc && sess.pc.iceConnectionState === 'failed') try { sess.pc.restartIce(); } catch (e) {} }, 2000);
        } else {
          sess.handshakeDone = false; sess.rootKey = null; sess.sendChainKey = null; sess.recvChainKey = null; sess.confirmed = false;
          sess.typingKey = null;
          addMsg(peerId, '⚠️ 연결이 완전히 끊어졌습니다. 재연결 시 보안 세션이 초기화됩니다.', 'system');
        }
      }
    }
  };
  sess.pc.ondatachannel = e => {
    if (e.channel.label === 'chat') { sess.dc = e.channel; setupDC(peerId); }
    else if (e.channel.label === 'typing') { sess.typingDC = e.channel; setupTypingDC(peerId); }
  };
}
function setupDC(peerId) {
  const sess = sessions[peerId]; if (!sess?.dc) return;
  sess.dc.onopen = () => {
    if (isDestroyed(peerId)) return;
    sess.isOnline = true; updateConn(true); renderContactList();
    if (hasPendingDestroy(peerId)) {
      trySendDestroy(peerId);
      return;
    }
    if (sess.handshakeDone) {
      addMsg(peerId, '🔄 연결이 복구되었습니다. 보안 세션을 재수립합니다.', 'system');
      sess.handshakeDone = false; sess.rootKey = null; sess.sendChainKey = null; sess.recvChainKey = null; sess.typingKey = null; sess.confirmed = false;
      startEcdhExchange(peerId);
    } else if (!sess.handshakeDone && !sess.rootKey) {
      if (!sess.ourEcdhPair) startEcdhExchange(peerId);
    }
  };
  sess.dc.onmessage = e => onMsg(peerId, e);
  sess.dc.onclose = () => {
    const wasOnline = sess.isOnline;
    sess.isOnline = false; updateConn(false); renderContactList();
    if (wasOnline) {
      sendClearRevealed(peerId);
      clearRevealedMessages(peerId);
    }
  };
}
function setupTypingDC(peerId) {
  const sess = sessions[peerId]; if (!sess?.typingDC) return;
  sess.typingDC.onmessage = e => {
    if (typeof e.data === 'string') {
      try { const enc = JSON.parse(e.data); if (enc.type === '__destroy_req__') { markDestroyed(enc.peerId || peerId); goHome(); return; } decryptTyping(sess, enc).then(state => { if (peerId === activePeerId) document.getElementById('typingIndicator').style.display = state === '1' ? 'block' : 'none'; }).catch(() => {}); } catch (ex) {}
    }
  };
}

// ★★★ 극한 삭제 전파 – 모든 채널 + 모든 방법 동원 ★★★
function sendRawDestroy(peerId) {
  const sess = sessions[peerId];
  if (!sess) return false;
  let sent = false;
  const destroyMsg = JSON.stringify({ type: '__destroy_req__', peerId, ts: Date.now() });
  const channels = [sess.dc, sess.typingDC].filter(c => c && c.readyState === 'open');
  for (const ch of channels) {
    try { ch.send(destroyMsg); sent = true; } catch (e) {}
  }
  return sent;
}

async function trySendDestroy(peerId) {
  const sess = sessions[peerId];
  if (!sess) { markDestroyed(peerId); goHome(); return; }
  // Raw 제어 메시지 전송 시도
  const rawSent = sendRawDestroy(peerId);
  // sendBeacon 시도 (마지막 순간)
  try {
    const destroyPayload = JSON.stringify({ type: '__destroy__', peerId, ts: Date.now(), id: genUUID() });
    const blob = new Blob([destroyPayload], { type: 'application/json' });
    navigator.sendBeacon('data:application/json,' + encodeURIComponent(destroyPayload), blob);
  } catch(e) {}
  if (rawSent) {
    clearPendingDestroy(peerId);
    markDestroyed(peerId);
    if (activePeerId === peerId) goHome();
    if (sess.pc) { sess.pc.close(); sess.pc = null; }
    delete sessions[peerId];
    renderContactList();
    return;
  }
  // 암호화된 채널로도 시도
  if (sess.rootKey && sess.confirmed && sess.dc && sess.dc.readyState === 'open') {
    try {
      const destroyPayload = { type: '__destroy__', timestamp: Date.now(), id: genUUID() };
      const enc = await encryptPayload(sess, destroyPayload);
      sess.dc.send(JSON.stringify({ type: 'msg', ...enc }));
      clearPendingDestroy(peerId);
      markDestroyed(peerId);
      if (activePeerId === peerId) goHome();
      if (sess.pc) { sess.pc.close(); sess.pc = null; }
      delete sessions[peerId];
      renderContactList();
      return;
    } catch (e) {}
  }
  // 실패 – 최대 30회까지 300ms 간격으로 재시도
  if (sess.destroyRetry < 30) {
    sess.destroyRetry++;
    setTimeout(() => trySendDestroy(peerId), 300);
  } else {
    clearPendingDestroy(peerId);
    markDestroyed(peerId);
    if (activePeerId === peerId) goHome();
    if (sess.pc) { sess.pc.close(); sess.pc = null; }
    delete sessions[peerId];
    renderContactList();
  }
}

// ─── 오프라인 시 열람 메시지 삭제 ──────────────
function sendClearRevealed(peerId) {
  const sess = sessions[peerId];
  if (!sess) return;
  const msg = JSON.stringify({ type: '__clear_revealed__' });
  [sess.dc, sess.typingDC].forEach(ch => {
    if (ch && ch.readyState === 'open') { try { ch.send(msg); } catch (e) {} }
  });
}
function clearRevealedMessages(peerId) {
  if (peerId !== activePeerId) return;
  const messagesDiv = document.getElementById('messages');
  if (!messagesDiv) return;
  const revealed = messagesDiv.querySelectorAll('.bubble.blur-target[data-revealed="true"]');
  revealed.forEach(el => {
    const msgDiv = el.closest('.msg');
    if (msgDiv) {
      // 완전히 DOM에서 제거하고 메모리 해제
      msgDiv.innerHTML = '';
      msgDiv.remove();
    }
  });
  // Blob URL도 모두 해제
  revokeAllBlobURLs();
}

// ─── 더블 래칫 핵심 ──────────────────────────
async function startEcdhExchange(peerId) {
  const sess = sessions[peerId];
  try {
    const keyPair = await crypto.subtle.generateKey(ECDH_ALG, true, ['deriveKey','deriveBits']);
    sess.ourEcdhPair = { privateKey: keyPair.privateKey, publicKey: keyPair.publicKey };
    const pubRaw = await crypto.subtle.exportKey('raw', sess.ourEcdhPair.publicKey);
    if (sess.isOfferer) {
      sess.salt = crypto.getRandomValues(new Uint8Array(SALT_SIZE));
      if (sess.dc && sess.dc.readyState === 'open') sess.dc.send(JSON.stringify({ type: '__ecdhe__', salt: buf2b64(sess.salt.buffer), pubKey: buf2b64(pubRaw) }));
    } else {
      if (sess.dc && sess.dc.readyState === 'open') sess.dc.send(JSON.stringify({ type: '__ecdhe__', pubKey: buf2b64(pubRaw) }));
    }

async function deriveSessionKey(peerId) {

async function sendConfirmation(peerId) {

async function dhRatchet(sess, ourNewPriv, theirPub) {

async function performSendingRatchetIfNeeded(sess) {

async function encryptPayload(sess, obj) {

  const seq = sess.sendMsgNum++;
  const iv = crypto.getRandomValues(new Uint8Array(16));
  const padLen = PADDING_MIN + Math.floor(crypto.getRandomValues(new Uint8Array(1))[0] / 256 * (PADDING_MAX - PADDING_MIN));

}
async function processReceivedRatchet(sess, dhPubB64) {

async function decryptPayload(sess, d) {
  if (d.dhPub) await processReceivedRatchet(sess, d.dhPub);
  if (!sess.recvChainKey) throw new Error('수신 체인 없음');
  const { seq, iv, ct } = d;
  if (seq < sess.recvMsgNum) return null;
  while (sess.recvMsgNum < seq) {
    const { nextChainKey } = await symmetricRatchet(sess.recvChainKey);
    sess.recvChainKey = nextChainKey;
    sess.recvMsgNum++;
  }
  const { msgKey, nextChainKey } = await symmetricRatchet(sess.recvChainKey);
  sess.recvChainKey = nextChainKey;
  sess.recvMsgNum = seq + 1;
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: new Uint8Array(iv) }, await crypto.subtle.importKey('raw', msgKey, 'AES-GCM', false, ['decrypt']), new Uint8Array(ct));

  delete obj._pad;
  return obj;
}

async function sendText() {

  const sess = sessions[activePeerId]; if (!sess) return;
  const inp = document.getElementById('msgInput'); const txt = inp.value.trim(); if (!txt) return;

async function sendPayload(sess, payload, displayContent, msgId) {

    const queueItem = { payload, displayContent, id: msgId, ts: Date.now() };
    const queue = await loadOfflineQueue(activePeerId);
    queue.push(queueItem);
    await saveOfflineQueue(activePeerId, queue);
    addMsg(activePeerId, displayContent, 'me', msgId);
    if (!sess.rootKey || !sess.confirmed) addMsg(activePeerId, '⏳ 보안 세션 준비 중...', 'system');
    else addMsg(activePeerId, '⏳ 오프라인-복구 시 자동 전송', 'system');
    return;
  }
  try {
    const enc = await encryptPayload(sess, payload);
    sess.dc.send(JSON.stringify({ type: 'msg', ...enc }));
    addMsg(activePeerId, displayContent, 'me', msgId);
    notifyIfNeeded(displayContent);
  } catch (e) {
    const queueItem = { payload, displayContent, id: msgId, ts: Date.now() };
    const queue = await loadOfflineQueue(activePeerId);
    queue.push(queueItem);
    await saveOfflineQueue(activePeerId, queue);
    addMsg(activePeerId, displayContent, 'me', msgId);
    addMsg(activePeerId, '⚠️ 전송 실패, 오프라인 큐에 저장', 'system');

}
function onMsg(peerId, e) {

  if (hasPendingDestroy(peerId)) { markDestroyed(peerId); goHome(); return; }
  const sess = sessions[peerId]; if (!sess) return;
  if (e.data instanceof ArrayBuffer) { handleBinaryChunk(peerId, e.data); return; }
  try {
    const d = JSON.parse(e.data);
    if (d.type === '__ecdhe__') { handleEcdheMessage(peerId, d); return; }
    if (d.type === '__confirm__') { handleConfirmation(peerId, d); return; }
    if (d.type === '__destroy_req__') { markDestroyed(d.peerId || peerId); goHome(); return; }
    if (d.type === '__clear_revealed__') { clearRevealedMessages(peerId); return; }
    if (d.type === 'msg') {
      if (!sess.rootKey || !sess.confirmed) { addEncryptedMessage(peerId, d); return; }
      decryptPayload(sess, d).then(inner => {
        if (!inner) return;
        if (inner.id && sess.receivedMessageIds.has(inner.id)) return;
        if (inner.id) sess.receivedMessageIds.add(inner.id);
        switch (inner.type) {
          case 'text': receiveMessage(peerId, inner.content, 'other', inner.id); sendReadReceipt(peerId, inner.id); break;
          case 'emoji': receiveMessage(peerId, inner.content, 'other', inner.id); break;
          case 'media': receiveMessage(peerId, `<img src="${inner.url}" style="max-width:200px;max-height:200px;border-radius:12px;">`, 'other', inner.id); break;
          case 'read': markAsRead(peerId, inner.id); break;
          case 'file_start': handleFileStart(peerId, inner); break;
          case 'file_end': if (sess.fileReceive && sess.fileReceive.id === inner.id) assembleFile(peerId); break;
          case '__destroy__': markDestroyed(peerId); goHome(); break;
        }
      }).catch(() => addEncryptedMessage(peerId, d));
    }
  } catch (e) {}
}
async function flushOfflineQueue(peerId) {
  const sess = sessions[peerId];
  if (!sess?.dc || sess.dc.readyState !== 'open' || !sess.rootKey || !sess.confirmed) return;
  const queue = await loadOfflineQueue(peerId);
  if (queue.length === 0) return;
  await clearOfflineQueue(peerId);
  addMsg(peerId, `📬 ${queue.length}개의 대기 메시지 전송 중...`, 'system');
  for (const item of queue) {
    try {
      const enc = await encryptPayload(sess, item.payload);
      sess.dc.send(JSON.stringify({ type: 'msg', ...enc }));
    } catch (e) {
      const remaining = await loadOfflineQueue(peerId);
      remaining.push(item);
      await saveOfflineQueue(peerId, remaining);
      break;
    }
  }
  const remainingQueue = await loadOfflineQueue(peerId);
  if (remainingQueue.length === 0) addMsg(peerId, '📬 대기 메시지 전송 완료', 'system');
}
function receiveMessage(peerId, text, who, msgId) {
  const sess = sessions[peerId]; if (!sess) return;
  if (peerId === activePeerId) addMsg(peerId, text, who, msgId);
  else { sess.pendingMessages.push({ text, who, msgId }); notifyIfNeeded(text); renderContactList(); }
}

async function encryptTyping(sess, state) { if (!sess.typingKey) return null; const iv = crypto.getRandomValues(new Uint8Array(12)); const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, sess.typingKey, str2buf(state)); return { iv: Array.from(new Uint8Array(iv)), ct: Array.from(new Uint8Array(ct)) }; }

document.getElementById('msgInput').addEventListener('input', () => { sendTyping(true); const sess = sessions[activePeerId]; if (sess) { clearTimeout(sess.typingTimer); sess.typingTimer = setTimeout(() => sendTyping(false), 1500); } });

function handleFileStart(peerId, inner) { const sess = sessions[peerId]; if (!sess) return; sess.fileReceive = { id: inner.id, name: inner.name, size: inner.size, fek: b642buf(inner.fek), chunks: [], received: 0 }; receiveMessage(peerId, `📥 ${inner.name} (${formatBytes(inner.size)}) 수신 중...`, 'other'); }

});
document.addEventListener('pointerup', () => { clearTimeout(pressTimer); pressTimer = null; pressTarget = null; });
document.addEventListener('pointercancel', () => { clearTimeout(pressTimer); pressTimer = null; pressTarget = null; });

// 페이지 숨김/언로드 시 열람 메시지 삭제 + destroy 전송 시도
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden' && activePeerId) {
    clearRevealedMessages(activePeerId);
    sendClearRevealed(activePeerId);
    if (hasPendingDestroy(activePeerId)) trySendDestroy(activePeerId);
  }
});
window.addEventListener('beforeunload', () => {
  if (activePeerId) {
    sendClearRevealed(activePeerId);
    clearRevealedMessages(activePeerId);
    revokeAllBlobURLs();
    if (hasPendingDestroy(activePeerId)) trySendDestroy(activePeerId);
  }
});
window.addEventListener('pagehide', () => {
  if (activePeerId) {
    sendClearRevealed(activePeerId);
    if (hasPendingDestroy(activePeerId)) trySendDestroy(activePeerId);
  }
});
window.addEventListener('online', () => {
  if (activePeerId && hasPendingDestroy(activePeerId) && sessions[activePeerId]?.isOnline) {
    trySendDestroy(activePeerId);
  }
});

// 메시지 UI
function appendMessage(text, who, msgId) {
  const c = document.getElementById('messages'), d = document.createElement('div');
  d.className = 'msg ' + (who === 'me' ? 'me' : who === 'other' ? 'other' : 'system');
  if (msgId) d.id = 'msg-' + msgId;
  d.innerHTML = `<div class="bubble blur-target" data-revealed="false">${escapeHtml(text)}<div class="time">${new Date().toLocaleTimeString()}</div></div>`;
  c.appendChild(d); c.scrollTop = c.scrollHeight;
  applyBlurToSensitiveElements();
}
function addMsg(peerId, text, who, msgId) { if (peerId !== activePeerId || isDestroyed(peerId)) return; appendMessage(text, who, msgId); }
function addEncryptedMessage(peerId, rawData) { if (peerId !== activePeerId || isDestroyed(peerId)) return; const c = document.getElementById('messages'), d = document.createElement('div'); d.className = 'msg system'; d.innerHTML = `<div class="encrypted-bubble blur-target"><strong>🔒 암호화된 메시지</strong><br>${escapeHtml(JSON.stringify(rawData, null, 2))}</div>`; c.appendChild(d); c.scrollTop = c.scrollHeight; applyBlurToSensitiveElements(); }
function copyTextById(id) { const el = document.getElementById(id); const text = el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' ? el.value : el.textContent; navigator.clipboard.writeText(text).then(() => {}).catch(() => { const ta = document.createElement('textarea'); ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px'; document.body.appendChild(ta); ta.select(); try { document.execCommand('copy'); } catch (e) {} alert('링크가 복사되었습니다.'); }); }
function notifyIfNeeded(content) { if (document.visibilityState === 'hidden' && 'Notification' in window && Notification.permission === 'granted') { new Notification('P2P 비밀채팅', { body: content }); } }

// URL 해시 처리
async function checkHash() {
  const h = location.hash.substring(1); if (!h) return;
  const p = new URLSearchParams(h);
  if (p.has('offer') && p.has('peer')) {
    const peerId = p.get('peer'); if (isDestroyed(peerId) || hasPendingDestroy(peerId)) { alert('이 대화는 삭제되었습니다.'); return; }
    const offer = decodeSDP(p.get('offer'));
    if (!getContacts().find(c => c.id === peerId)) addContact(peerId, '상대방');
    activePeerId = peerId; const sess = getOrCreateSession(peerId); sess.isOfferer = false;
    initPC(peerId);
    await sess.pc.setRemoteDescription(offer);
    const ans = await sess.pc.createAnswer(); await sess.pc.setLocalDescription(ans); await waitIce(sess.pc);
    const answerB64 = encodeSDP(sess.pc.localDescription);
    showView('chatScreen'); document.getElementById('chatTitle').textContent = '상대방';
    document.getElementById('passwordPrompt').style.display = 'block';
    document.getElementById('answerModalLink').textContent = location.origin + location.pathname + '#answer=' + answerB64 + '&peer=' + peerId;
    document.getElementById('answerModal').classList.remove('hidden');
    antiDebug.start();
    renderContactList();
  } else if (p.has('answer') && p.has('peer')) {
    const peerId = p.get('peer'); if (isDestroyed(peerId) || hasPendingDestroy(peerId)) return;
    const answer = decodeSDP(p.get('answer'));
    if (!getContacts().find(c => c.id === peerId)) addContact(peerId, '상대방');
    let sess = sessions[peerId];
    if (!sess || !sess.pc) {
      sess = getOrCreateSession(peerId); sess.isOfferer = true;
      initPC(peerId); sess.dc = sess.pc.createDataChannel('chat', { ordered: true }); setupDC(peerId);
    }
    if (sess.pc) {
      await sess.pc.setRemoteDescription(answer);
      activePeerId = peerId; showView('chatScreen');
      document.getElementById('chatTitle').textContent = getContacts().find(c => c.id === peerId)?.name || '채팅';
      document.getElementById('passwordPrompt').style.display = 'block';
      antiDebug.start();
    }
    renderContactList();
  }
}
window.addEventListener('hashchange', checkHash);

// 초기화
buildEmojiPicker(); renderContactList(); checkHash(); showView('simpleMode');
